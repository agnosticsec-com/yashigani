# ACS-RISK-008 admission test — NON-COMPLIANT pod fixture (privilege escalation)
# Last updated: 2026-05-02T00:00:00+01:00
#
# This pod deliberately omits allowPrivilegeEscalation: false (default is true).
# It MUST be REJECTED by the yashigani-require-no-privilege-escalation policy.
#
# Expected result:
#   Error from server: admission webhook "validate.kyverno.svc" denied the request:
#   [...] ACS-RISK-008: Container 'test' [...] must set allowPrivilegeEscalation: false
#
# Usage:
#   kubectl apply -f tests/admission/fixture-noncompliant-privesc.yaml
#   # Must print a policy violation error and exit non-zero.
---
apiVersion: v1
kind: Pod
metadata:
  name: yashigani-test-noncompliant-privesc
  namespace: yashigani
  labels:
    app.kubernetes.io/name: yashigani-test-noncompliant-privesc
    app.kubernetes.io/component: admission-test
  annotations:
    yashigani.io/test: "acs-risk-008-noncompliant-privesc"
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: test
      image: busybox:1.36.1
      command: ["sh", "-c", "echo 'This should never run'; sleep 5"]
      securityContext:
        # INTENTIONALLY VIOLATING: allowPrivilegeEscalation not set (defaults true)
        readOnlyRootFilesystem: true
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          cpu: "10m"
          memory: "16Mi"
        limits:
          cpu: "50m"
          memory: "32Mi"
