<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yashigani Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: #fff; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); padding: 2rem; width: 100%; max-width: 400px; }
        h1 { font-size: 1.5rem; font-weight: 700; color: #1e293b; text-align: center; }
        .subtitle { color: #94a3b8; font-size: 0.85rem; text-align: center; margin-top: 4px; margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.85rem; font-weight: 500; color: #475569; margin-bottom: 4px; }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.95rem; outline: none; margin-bottom: 1rem; }
        input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
        .totp-input { text-align: center; font-size: 1.3rem; letter-spacing: 0.3em; }
        button { width: 100%; padding: 12px; background: #2563eb; color: #fff; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 500; cursor: pointer; }
        button:hover { background: #1d4ed8; }
        button:disabled { background: #93c5fd; cursor: not-allowed; }
        .error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; padding: 10px 14px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1rem; display: none; }
        .error.visible { display: block; }
        .success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #16a34a; padding: 10px 14px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1rem; display: none; }
        .success.visible { display: block; }
        .footer { text-align: center; color: #94a3b8; font-size: 0.75rem; margin-top: 1.5rem; }
        .field { margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Yashigani</h1>
        <p class="subtitle">Admin Control Plane</p>

        <div id="error-box" class="error"></div>
        <div id="success-box" class="success"></div>

        <form id="login-form">
            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            <div class="field">
                <label for="totp_code">TOTP Code</label>
                <input type="text" id="totp_code" name="totp_code" required pattern="[0-9]{6}" maxlength="6" inputmode="numeric" autocomplete="one-time-code" class="totp-input" placeholder="000000">
            </div>
            <button type="submit" id="submit-btn">Sign In</button>
        </form>

        <p class="footer">Yashigani v2.1 &mdash; Agnostic Security</p>
    </div>

    <script>
    document.getElementById('login-form').addEventListener('submit', async function(e) {
        e.preventDefault();

        var errorBox = document.getElementById('error-box');
        var successBox = document.getElementById('success-box');
        var btn = document.getElementById('submit-btn');

        errorBox.className = 'error';
        errorBox.textContent = '';
        successBox.className = 'success';
        successBox.textContent = '';
        btn.disabled = true;
        btn.textContent = 'Authenticating...';

        var username = document.getElementById('username').value;
        var password = document.getElementById('password').value;
        var totp_code = document.getElementById('totp_code').value;

        try {
            var resp = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username, password: password, totp_code: totp_code })
            });

            var data = await resp.json();

            if (resp.ok) {
                if (data.force_password_change) {
                    successBox.textContent = 'Login successful. Password change required on first login — this feature is coming soon.';
                    successBox.className = 'success visible';
                } else {
                    window.location.href = '/admin/';
                }
            } else {
                var msg = 'Authentication failed';
                if (data.detail) {
                    if (typeof data.detail === 'string') msg = data.detail;
                    else if (data.detail.error) msg = data.detail.error;
                    else if (Array.isArray(data.detail)) msg = data.detail.map(function(d) { return d.msg; }).join(', ');
                    else msg = JSON.stringify(data.detail);
                }
                errorBox.textContent = msg;
                errorBox.className = 'error visible';
            }
        } catch (err) {
            errorBox.textContent = 'Connection error: ' + err.message;
            errorBox.className = 'error visible';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Sign In';
        }
    });
    </script>
</body>
</html>
