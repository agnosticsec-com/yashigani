<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yashigani Admin</title>
    <link rel="stylesheet" href="/static/css/login.css">
</head>
<body>
    <div class="card">
        <div class="branding">
            <div class="branding-title">Yashigani</div>
            <div class="branding-tagline">Security Gateway</div>
        </div>
        <p class="subtitle" id="page-subtitle">Admin Control Plane</p>

        <div id="msg-box" class="msg"></div>

        <!-- Step 1: Login -->
        <form id="login-form">
            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            <div class="field">
                <label for="totp_code">TOTP Code</label>
                <input type="text" id="totp_code" name="totp_code" required pattern="[0-9]{6}" maxlength="6" inputmode="numeric" autocomplete="one-time-code" class="totp-input" placeholder="000000">
            </div>
            <button type="submit" id="login-btn">Sign In</button>
        </form>

        <!-- Step 2: Password Change (hidden until needed) -->
        <form id="pw-form" class="hidden">
            <div class="field">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" required minlength="36">
                <p class="hint">Minimum 36 characters. Use a password manager to generate one.</p>
            </div>
            <div class="field">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required minlength="36">
            </div>
            <button type="submit" id="pw-btn">Change Password</button>
        </form>

        <!-- WebAuthn / FIDO2 hardware key option
             Hidden until JS confirms browser support (via webauthn_login.js).
             Username field is shared with the TOTP form above. -->
        <div id="webauthn-section">
            <div class="divider"><span>or</span></div>
            <button type="button" id="webauthn-login-btn" class="btn-secondary">
                Sign in with Security Key
            </button>
            <p class="hint webauthn-hint">
                Touch your FIDO2 / YubiKey when prompted.
                If you have lost all keys, use the password + TOTP form above.
            </p>
        </div>

        <p class="footer">Yashigani v2.23.3 &mdash; Agnostic Security</p>
    </div>

    <script src="/static/js/login.js"></script>
    <script src="/static/js/webauthn_login.js"></script>
    <div class="powered-by">Powered by <a href="https://agnosticsec.com" target="_blank">Agnostic Security</a></div>
</body>
</html>
