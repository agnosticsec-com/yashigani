# Promtail — ships Docker container logs to Loki
#
# retro #84 (v2.23.2): Promtail→Loki path upgraded to mTLS.
# Promtail presents its own leaf cert (promtail_client.crt/key) so Loki can
# verify the ingest client. The CA trust anchor is ca_intermediate.crt
# (Pattern B — never ca_root.crt). Plain HTTP to port 3100 is rejected by
# Loki's RequireAndVerifyClientCert policy.
server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: https://loki:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 1048576
    timeout: 10s
    backoff_config:
      min_period: 100ms
      max_period: 10s
      max_retries: 10
    # retro #84: mTLS — Promtail presents its own leaf cert to Loki.
    # Trust anchor: ca_intermediate.crt (Pattern B).
    tls_config:
      cert_file: /run/secrets/promtail_client.crt
      key_file:  /run/secrets/promtail_client.key
      ca_file:   /run/secrets/ca_intermediate.crt

scrape_configs:
  - job_name: containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project"]
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: project
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream
    pipeline_stages:
      - json:
          expressions:
            level: levelname
            msg: message
            logger: name
            ts: asctime
      - labels:
          level:
          logger:
      - timestamp:
          source: ts
          format: "2006-01-02T15:04:05"
      - output:
          source: msg
