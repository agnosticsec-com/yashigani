receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
    send_batch_max_size: 2048
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
    spike_limit_mib: 64
  tail_sampling:
    decision_wait: 10s
    num_traces: 100
    expected_new_traces_per_sec: 10
    policies:
      - name: errors-policy
        type: status_code
        status_code: {status_codes: [ERROR]}
      - name: slow-policy
        type: latency
        latency: {threshold_ms: 1000}
      - name: probabilistic-policy
        type: probabilistic
        probabilistic:
          sampling_percentage: 10
  # Resource attributes → Loki stream labels.
  # Keep label cardinality low: only service.name and deployment.environment.
  resource/loki_labels:
    attributes:
      - key: service.name
        action: insert
        value: unknown
      - key: deployment.environment
        action: insert
        value: production

exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  logging:
    verbosity: basic
  # Loki log exporter — ships OTLP log records from gateway and backoffice.
  # Uses the collector-contrib loki exporter (included in otel/opentelemetry-collector-contrib).
  loki:
    endpoint: http://loki:3100/loki/api/v1/push
    default_labels_enabled:
      exporter: false
      job: true
    # Map OTEL resource attributes to Loki stream labels (low-cardinality only).
    labels:
      resource:
        service.name: "service"
        deployment.environment: "env"
      attributes:
        log.level: "level"

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, tail_sampling]
      exporters: [otlp/jaeger, logging]
    # Logs pipeline: receives OTLP log records from gateway/backoffice,
    # ships them to Loki. Promtail's docker_sd_configs approach is
    # incompatible with macOS Podman (no /var/lib/docker/containers on host).
    # OTLP log export is the Podman-compatible alternative.
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [loki]
