# Last updated: 2026-04-27T21:59:11+01:00
# M-01 fix: OTLP receivers upgraded to mTLS (Pattern B).
# Trust anchor: ca_intermediate.crt (never ca_root.crt — Pattern B rule).
# Server cert: otel-collector_client.crt / otel-collector_client.key
#   (issued by install.sh PKI bootstrap against the intermediate CA).
# Clients (gateway, backoffice) must present a valid leaf cert signed by
# the same intermediate. Unauthenticated connections are refused (client_ca_file
# + require_client_auth implicitly enabled when client_ca_file is set).

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        tls:
          cert_file: /run/secrets/otel-collector_client.crt
          key_file: /run/secrets/otel-collector_client.key
          client_ca_file: /run/secrets/ca_intermediate.crt
      http:
        endpoint: 0.0.0.0:4318
        tls:
          cert_file: /run/secrets/otel-collector_client.crt
          key_file: /run/secrets/otel-collector_client.key
          client_ca_file: /run/secrets/ca_intermediate.crt

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
    send_batch_max_size: 2048
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
    spike_limit_mib: 64
  tail_sampling:
    decision_wait: 10s
    num_traces: 100
    expected_new_traces_per_sec: 10
    policies:
      - name: errors-policy
        type: status_code
        status_code: {status_codes: [ERROR]}
      - name: slow-policy
        type: latency
        latency: {threshold_ms: 1000}
      - name: probabilistic-policy
        type: probabilistic
        probabilistic:
          sampling_percentage: 10
  # Resource attributes → Loki stream labels.
  # Keep label cardinality low: only service.name and deployment.environment.
  # The `loki.resource.labels` hint tells the loki exporter (v0.100+) which
  # resource attributes to project as Loki stream labels.
  resource/loki_labels:
    attributes:
      - key: service.name
        action: insert
        value: unknown
      - key: deployment.environment
        action: insert
        value: production
      - key: loki.resource.labels
        action: insert
        value: "service.name, deployment.environment"

exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  logging:
    verbosity: basic
  # Loki log exporter — ships OTLP log records from gateway and backoffice.
  # Uses the collector-contrib loki exporter (included in otel/opentelemetry-collector-contrib).
  #
  # v2.23.1 (retro #3s): the v0.100.0 loki exporter dropped the nested
  # `labels.resource` / `labels.attributes` config syntax. Label projection
  # now happens via the `loki.resource.labels` / `loki.attribute.labels`
  # attribute hints set by the resource/loki_labels processor below.
  loki:
    endpoint: http://loki:3100/loki/api/v1/push
    default_labels_enabled:
      exporter: false
      job: true

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, tail_sampling]
      exporters: [otlp/jaeger, logging]
    # Logs pipeline: receives OTLP log records from gateway/backoffice,
    # ships them to Loki. Promtail's docker_sd_configs approach is
    # incompatible with macOS Podman (no /var/lib/docker/containers on host).
    # OTLP log export is the Podman-compatible alternative.
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource/loki_labels, batch]
      exporters: [loki]
