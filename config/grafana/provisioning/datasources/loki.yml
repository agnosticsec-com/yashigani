# Last updated: 2026-05-07T12:05:00+01:00
# v2.23.2 retro #83 + #84: Grafanaâ†’Loki datasource over mTLS (Pattern B).
# Loki now requires a verified client cert (RequireAndVerifyClientCert) â€” retro #84.
# Grafana presents grafana_client.crt/key (issued by install.sh PKI) â€” retro #83.
# Trust anchor: ca_intermediate.crt (Pattern B â€” never ca_root.crt).
#
# NOTE: Grafana resolves cert paths relative to its data directory or
# as absolute paths. The secrets volume is mounted at /run/secrets in
# the Grafana container. TLS fields below reference that mount.
#
# Coordination: PR #83 (Grafana mTLS) configures GF_SERVER_* TLS for
# inbound connections TO Grafana. This file configures the Grafanaâ†’Loki
# OUTBOUND path. Both PRs (#83 + #84) must merge together for the obs
# plane to be fully mTLS. The shared mTLS-handshake contract:
#   Loki accepts: leaf cert signed by yashigani internal intermediate CA.
#   Grafana presents: grafana_client.crt (issued by same intermediate CA).
#
# TA-1 (insider) / TA-2 (external attacker): without mTLS on the datasource leg,
# an attacker on the obs network could intercept log traffic. mTLS closes it.
apiVersion: 1
datasources:
  - name: Loki
    type: loki
    access: proxy
    url: https://loki:3100
    isDefault: false
    version: 1
    editable: false
    jsonData:
      maxLines: 1000
      tlsAuth: true
      tlsAuthWithCACert: true
      tlsSkipVerify: false
      derivedFields:
        - datasourceUid: jaeger
          matcherRegex: '"trace_id":"(\w+)"'
          name: TraceID
          url: "$${__value.raw}"
    secureJsonData:
      # Grafana reads cert material from these fields at provisioning time.
      # The values are populated from /run/secrets at container start via
      # GF_DATASOURCE_LOKI_TLS_CA_CERT_FILE / TLS_CLIENT_CERT_FILE /
      # TLS_CLIENT_KEY_FILE environment variables (set in docker-compose.yml).
      # The jsonData.tlsAuth: true flag tells Grafana to present the client
      # cert during the TLS handshake with Loki.
      tlsCACert: "$__file{/run/secrets/ca_intermediate.crt}"
      tlsClientCert: "$__file{/run/secrets/grafana_client.crt}"
      tlsClientKey: "$__file{/run/secrets/grafana_client.key}"
