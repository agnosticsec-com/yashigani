# Loki 3.x single-binary mode — suitable for Docker Compose dev/staging.
# For Kubernetes production, use the distributed Loki Helm chart.
# All rings set to inmemory to avoid Consul/etcd dependency.
#
# retro #84 (v2.23.2): mTLS enabled for both ingest (Promtail→Loki) and
# query (Grafana→Loki) paths.
# Server cert:  /run/secrets/loki_client.crt / loki_client.key
#   (issued by install.sh PKI bootstrap against the intermediate CA).
# Trust anchor: /run/secrets/ca_intermediate.crt (Pattern B — never ca_root.crt).
#   All clients (Promtail, Grafana, otel-collector) must present a valid leaf
#   cert signed by the same intermediate. Unauthenticated plain-HTTP connections
#   are rejected at the TLS handshake.
# gRPC listener also upgraded to TLS on port 9096; clients that speak OTLP
#   or Loki gRPC must use the same cert bundle.
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn
  # retro #84: mTLS — Loki presents its own leaf cert; all clients must
  # present a cert signed by the internal intermediate CA (Pattern B).
  http_tls_config:
    cert_file: /run/secrets/loki_client.crt
    key_file:  /run/secrets/loki_client.key
    client_ca_file: /run/secrets/ca_intermediate.crt
    # client_auth_type: RequireAndVerifyClientCert is the default when
    # client_ca_file is set in Loki 3.x; stated explicitly for clarity.
    client_auth_type: RequireAndVerifyClientCert
  grpc_tls_config:
    cert_file: /run/secrets/loki_client.crt
    key_file:  /run/secrets/loki_client.key
    client_ca_file: /run/secrets/ca_intermediate.crt
    client_auth_type: RequireAndVerifyClientCert

common:
  ring:
    kvstore:
      store: inmemory
    instance_addr: 127.0.0.1
  replication_factor: 1
  path_prefix: /loki

ingester:
  chunk_idle_period: 3m
  chunk_block_size: 262144
  chunk_retain_period: 1m
  wal:
    enabled: true
    dir: /loki/wal

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-shipper-active
    cache_location: /loki/tsdb-shipper-cache
    cache_ttl: 24h
  filesystem:
    directory: /loki/chunks

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  delete_request_store: filesystem

limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  retention_period: 744h  # 31 days

query_scheduler:
  max_outstanding_requests_per_tenant: 2048

ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules-temp
  alertmanager_url: http://alertmanager:9093
  ring:
    kvstore:
      store: inmemory
  enable_api: true
