# Staging environment overrides
global:
  environment: staging

gateway:
  replicaCount: 1
  resources:
    # Bumped from 256Mi limit — FastText model + OPA clients + OTEL
    # exporters OOM at that threshold under mTLS load.
    requests: { cpu: "100m", memory: "512Mi" }
    limits:   { cpu: "1",    memory: "1Gi" }
  hpa:
    minReplicas: 1
    maxReplicas: 3

backoffice:
  replicaCount: 1

ollama:
  resources:
    requests: { cpu: "250m", memory: "1Gi" }
    limits:   { cpu: "2",    memory: "4Gi" }

topologySpread:
  enabled: false

keda:
  enabled: false
