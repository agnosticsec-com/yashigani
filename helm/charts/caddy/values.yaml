# DEPRECATED: This sub-chart is deprecated as of v2.23.2 and will be removed
# in v2.24.0. Use the parent helm/yashigani chart which renders a full-featured
# Caddy config with mTLS, Layer-B inject-caddy-verified, SPIFFE URI gating,
# TLS 1.3 enforcement, and complete security headers.
#
# DO NOT set enabled: true. This sub-chart is security-incomplete and conflicts
# with the parent chart's yashigani-caddy-config ConfigMap.
enabled: false
# note: "In Kubernetes, consider using nginx-ingress + cert-manager instead of Caddy.
#        Set caddy.enabled=false and configure an Ingress resource (global.tlsMode=nginx)."
image:
  repository: caddy
  tag: "2-alpine"
  pullPolicy: IfNotPresent
replicaCount: 1
resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "250m"
    memory: "128Mi"
service:
  port: 443
  httpPort: 80
  type: LoadBalancer
