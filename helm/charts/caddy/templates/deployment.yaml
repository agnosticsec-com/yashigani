{{- if .Values.enabled }}
{{- fail "helm/charts/caddy is deprecated and must not be enabled. Use the parent helm/yashigani chart. See helm/charts/caddy/Chart.yaml for details." }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yashigani-caddy
  namespace: {{ .Release.Namespace }}
  labels:
    app: yashigani-caddy
    app.kubernetes.io/name: yashigani-caddy
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: yashigani-caddy
  template:
    metadata:
      labels:
        app: yashigani-caddy
        app.kubernetes.io/name: yashigani-caddy
        app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    spec:
      serviceAccountName: yashigani
      securityContext:
        runAsNonRoot: false
      containers:
        - name: caddy
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 80
              protocol: TCP
              name: http
            - containerPort: 443
              protocol: TCP
              name: https
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | quote }}
              memory: {{ .Values.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | quote }}
              memory: {{ .Values.resources.limits.memory | quote }}
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 443
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: caddy-config
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
              readOnly: true
            - name: caddy-data
              mountPath: /data
            - name: caddy-config-storage
              mountPath: /config
      volumes:
        - name: caddy-config
          configMap:
            name: yashigani-caddy-config
        - name: caddy-data
          emptyDir: {}
        - name: caddy-config-storage
          emptyDir: {}
{{- end }}
