apiVersion: apps/v1
kind: Deployment
metadata:
  name: yashigani-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    app: yashigani-gateway
    app.kubernetes.io/name: yashigani-gateway
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: yashigani-gateway
  template:
    metadata:
      labels:
        app: yashigani-gateway
        app.kubernetes.io/name: yashigani-gateway
        app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    spec:
      serviceAccountName: yashigani
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: Localhost
          localhostProfile: yashigani-gateway.json
      {{- if .Values.global.topologySpread.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ .Values.global.topologySpread.maxSkew }}
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: {{ .Values.global.topologySpread.policy }}
          labelSelector:
            matchLabels:
              app: yashigani-gateway
        - maxSkew: {{ .Values.global.topologySpread.maxSkew }}
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: {{ .Values.global.topologySpread.policy }}
          labelSelector:
            matchLabels:
              app: yashigani-gateway
      {{- end }}
      containers:
        - name: gateway
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.global.imageOwner }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: YASHIGANI_UPSTREAM_URL
              value: {{ .Values.env.upstreamUrl | quote }}
            - name: YASHIGANI_OPA_URL
              value: {{ .Values.env.opaUrl | quote }}
            - name: OLLAMA_BASE_URL
              value: {{ .Values.env.ollamaUrl | quote }}
            - name: REDIS_HOST
              value: {{ .Values.env.redisHost | quote }}
            - name: REDIS_PORT
              value: {{ .Values.env.redisPort | quote }}
            - name: YASHIGANI_AGENT_ROUTING_ENABLED
              value: {{ .Values.env.agentRoutingEnabled | quote }}
            - name: YASHIGANI_AGENT_PATH_PREFIX
              value: {{ .Values.env.agentPathPrefix | quote }}
            - name: YASHIGANI_AGENT_TOKEN_MIN_LENGTH
              value: {{ .Values.env.agentTokenMinLength | quote }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecretName }}
                  key: redis-password
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | quote }}
              memory: {{ .Values.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | quote }}
              memory: {{ .Values.resources.limits.memory | quote }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            failureThreshold: 12
            periodSeconds: 5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: audit-buffer
              mountPath: /data/audit
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
        - name: audit-buffer
          emptyDir:
            medium: Memory
            sizeLimit: 512Mi
