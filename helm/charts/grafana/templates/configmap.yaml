apiVersion: v1
kind: ConfigMap
metadata:
  name: yashigani-grafana-provisioning
  namespace: {{ .Release.Namespace }}
  labels:
    app: yashigani-grafana
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://yashigani-prometheus:9090
        isDefault: true
        editable: false

  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: yashigani
        orgId: 1
        folder: Yashigani
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
