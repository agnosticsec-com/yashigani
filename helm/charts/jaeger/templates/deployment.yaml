apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  labels:
    app.kubernetes.io/name: jaeger
    app.kubernetes.io/part-of: yashigani
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: jaeger
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jaeger
    spec:
      containers:
        - name: jaeger
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # v2: config via YAML file (no env vars). v1 COLLECTOR_OTLP_ENABLED +
          # SPAN_STORAGE_TYPE env vars removed. For standalone use, mount a
          # jaeger.yml ConfigMap at /etc/jaeger/jaeger.yml and add:
          #   args: ["--config=/etc/jaeger/jaeger.yml"]
          # See config/jaeger/jaeger.yml in the main yashigani repo for an example.
          ports:
            - containerPort: 16686
              name: ui
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 13133
              # v2: healthcheckv2 extension replaces v1 admin port :14269
              name: admin
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 10
            periodSeconds: 15
          resources: {{- toYaml .Values.resources | nindent 12 }}
