---
# Headless service for StatefulSet per-pod DNS
# ollama-0.ollama-headless.<namespace>.svc.cluster.local:11434
# ollama-1.ollama-headless.<namespace>.svc.cluster.local:11434
apiVersion: v1
kind: Service
metadata:
  name: ollama-headless
  namespace: {{ .Release.Namespace }}
  labels:
    app: yashigani-ollama
    app.kubernetes.io/name: yashigani-ollama
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  clusterIP: None
  selector:
    app: yashigani-ollama
  ports:
    - name: http
      protocol: TCP
      port: 11434
      targetPort: 11434

---
# ClusterIP service for pool load balancing (round-robin at connection level)
apiVersion: v1
kind: Service
metadata:
  name: yashigani-ollama
  namespace: {{ .Release.Namespace }}
  labels:
    app: yashigani-ollama
    app.kubernetes.io/name: yashigani-ollama
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: yashigani-ollama
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: 11434
