[databases]
yashigani = host=postgres port=5432 dbname=yashigani

[pgbouncer]
listen_port = 5432
listen_addr = 0.0.0.0
; ── Authentication — auth_query (YSG-RISK-049 CLOSED v2.24.0) ───────────────
; Design: iris-v240-pgbouncer-auth-query-design.md (Amendments A2+C6).
; Threat-model: laura-v240-pgbouncer-auth-query-threat-model.md — GO.
;
; auth_type = scram-sha-256: pgbouncer SCRAM-challenges the connecting client.
; auth_user = pgbouncer_authenticator: role pgbouncer uses to dial postgres
;   for the auth_query connection. Has EXECUTE on ysg_pgbouncer_get_auth only.
;   No table grants, no schema access, no application privileges.
; auth_query: pgbouncer calls ysg_pgbouncer_get_auth($1) per connecting client,
;   fetching the SCRAM-SHA-256 verifier from pg_shadow via SECURITY DEFINER
;   function. yashigani_app cleartext is NEVER on disk in this design.
; auth_dbname = yashigani (Amendment C6): pg_shadow is a global catalog view.
;   Function exists once in the yashigani database. Both pgbouncer instances
;   use auth_dbname = yashigani. NOT letta (prior §6 was WRONG — corrected C6).
;
; pg_hba carveout (YSG-RISK-073, v2.24.3): cert auth for pgbouncer_authenticator.
;   PgBouncer 1.25.1 cannot perform SCRAM-SHA-256 as the client when connecting
;   as auth_user. A narrow `cert` carveout in pg_hba precedes the scram catch-all:
;     hostssl yashigani pgbouncer_authenticator 0.0.0.0/0 cert clientcert=verify-ca
;   This instance presents pgbouncer-auth_client.crt (CN=pgbouncer-auth), CA-signed.
;   The cert private-key proof + CA chain verification satisfy clientcert=verify-ca.
;   No SCRAM challenge is issued; no password is required for this connection.
;   05-enable-ssl.sh writes the carveout; 10-pgbouncer-auth.sh asserts idempotently.
;   YSG-RISK-050 CLOSED (dedicated cert); YSG-RISK-073 CLOSED (cert not trust).
;
; pgbouncer_authenticator_password: K8s Secret yashigani-pgbouncer-auth-secret
;   (Option C — NOT merged into yashigani-postgres-secrets). Mounted at
;   /run/secrets/pgbouncer_authenticator_password, read via
;   PGBOUNCER_AUTH_PASSWORD_FILE env. YSG-SECRETS-DIST-002 unchanged.
;
; userlist.txt GONE: edoburu does not write it under scram-sha-256 + auth_query.
; auth_file removed to avoid stale pointer (Iris §5).
;
; KMS: production KMS deployments inject pgbouncer_authenticator_password at
;   runtime via src/yashigani/kms/ — same gate as postgres_password.
auth_type = scram-sha-256
auth_user = pgbouncer_authenticator
auth_query = SELECT usename, passwd FROM ysg_pgbouncer_get_auth($1)
auth_dbname = yashigani

; ── Admin console — DISABLED (Laura F2, ASVS V14.4.1) ───────────────────────
; edoburu default sets admin_users=$DB_USER (yashigani_app) when not explicitly
; overridden. Post-escape attacker reaching the pgbouncer admin console could
; terminate connections, reload config, or inspect pool state.
; Empty string explicitly disables console access in pgbouncer 1.21+.
; Sibling: compose pgbouncer.ini and both letta variants carry the same empty
; directives. Drift audit secondary finding (859294a follow-up, 2026-05-25).
admin_users =
stats_users =
pool_mode = transaction
max_client_conn = 100
default_pool_size = 20
min_pool_size = 2
reserve_pool_size = 5
reserve_pool_timeout = 3
max_db_connections = 40
max_user_connections = 40
server_reset_query = DISCARD ALL
server_check_delay = 30
server_check_query = select 1
client_idle_timeout = 600
server_idle_timeout = 600
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60
ignore_startup_parameters = extra_float_digits,search_path,lock_timeout,statement_timeout,idle_in_transaction_session_timeout
tcp_keepalive = 1
tcp_keepidle = 60
tcp_keepintvl = 10
tcp_keepcnt = 5

; ── Yashigani internal mTLS (v2.23.1) ─────────────────────────────────────────
; Last updated: 2026-04-30T21:00:00Z (fix: ca_bundle.crt for libssl chain verify)
;
; Clients (gateway, backoffice) must present a cert signed by our internal CA.
; PgBouncer also speaks TLS to postgres (server-side), using its own client
; cert as the identity to postgres.
;
; PKI design: root → intermediate → leaf (two-tier).
;
; CA trust anchor: ca_bundle.crt (root + intermediate concatenated).
; Rationale: OpenSSL (libssl) verify-ca with only ca_root.crt FAILS when the
; peer presents a chain-bundle cert (leaf PEM block 0 + intermediate PEM block 1).
; openssl verify -CAfile ca_root.crt pgbouncer_client.crt returns error 20
; "unable to get local issuer certificate" because it only reads the first PEM
; block from the cert file and cannot build the chain. A CAfile with both root
; and intermediate resolves this: leaf -> intermediate (in CAfile) -> root (in
; CAfile, self-signed anchor) -> PASS. Verified by DevOps R4 K8s gate
; 2026-04-30. Python ssl consumers (asyncpg, uvicorn, OTEL) work with ca_root.crt
; alone (Python ssl handles chain building from the presented cert). libssl
; consumers (pgbouncer, libpq/psycopg2) require ca_bundle.crt.
;
; ca_bundle.crt is generated by the mtls-bootstrap Job (cat ca_root.crt
; ca_intermediate.crt > ca_bundle.crt) and stored in yashigani-pki-certs Secret.
; Neither CA private key is in workload containers.
client_tls_sslmode = verify-ca
client_tls_ca_file = /run/secrets/ca_bundle.crt
client_tls_key_file = /run/secrets/pgbouncer_client.key
client_tls_cert_file = /run/secrets/pgbouncer_client.crt
client_tls_protocols = secure
; ── pgbouncer→postgres outbound TLS (YSG-RISK-050 CLOSED v2.24.0) ───────────
; Dedicated cert pair replaces shared pgbouncer_client.crt on the outbound side.
; pgbouncer_client.crt/key is retained for the inbound client_tls_* side only.
; pg_hba cert carveout (YSG-RISK-073 v2.24.3) covers pgbouncer_authenticator:
;   hostssl yashigani pgbouncer_authenticator 0.0.0.0/0 cert clientcert=verify-ca
; This cert (pgbouncer-auth_client.crt, CN=pgbouncer-auth) satisfies the carveout.
; YSG-RISK-050 (v2.24.0): dedicated cert for postgres-facing identity.
; YSG-RISK-073 (v2.24.3): cert carveout replaces SCRAM for auth_user connection.
; REQUIRES postgres pg_hba to use `clientcert=verify-ca` (NOT verify-full)
; because CN=pgbouncer-auth does not match SCRAM role pgbouncer_authenticator.
; If future hardening switches to verify-full, CN must change to
; pgbouncer_authenticator (or cert CN must equal the role name).
server_tls_sslmode = verify-ca
server_tls_ca_file = /run/secrets/ca_bundle.crt
server_tls_key_file = /run/secrets/pgbouncer-auth_client.key
server_tls_cert_file = /run/secrets/pgbouncer-auth_client.crt
server_tls_protocols = secure
