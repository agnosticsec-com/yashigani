{{- if ne .Values.global.tlsMode "caddy" }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: yashigani
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: {{ .Values.global.certManagerIssuer | default "letsencrypt-prod" }}
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  tls:
    - hosts:
        - {{ .Values.global.tlsDomain }}
      secretName: yashigani-tls
  rules:
    - host: {{ .Values.global.tlsDomain }}
      http:
        paths:
          - path: /agents
            pathType: Prefix
            backend:
              service:
                name: yashigani-gateway
                port:
                  number: 8080
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: yashigani-backoffice
                port:
                  number: 8443
          - path: /
            pathType: Prefix
            backend:
              service:
                name: yashigani-gateway
                port:
                  number: 8080
{{- end }}
