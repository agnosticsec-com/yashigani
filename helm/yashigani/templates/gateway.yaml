{{- if .Values.gateway.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yashigani-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: yashigani-gateway
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: yashigani-gateway
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "yashigani.serviceAccountName" . }}
      # /run/secrets mount collision — see redis.yaml note.
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        # fsGroup triggers chgrp on Secret volumes so UID 1001 can read
        # /run/secrets/*. Without this, mode 0440 files stay root:root.
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.global.imageOwner }}/{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          securityContext:
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: YASHIGANI_ENV
              value: {{ .Values.global.environment | quote }}
            - name: YASHIGANI_KSM_PROVIDER
              value: "docker"
            - name: YASHIGANI_SERVICE_NAME
              value: "gateway"
            - name: YASHIGANI_UPSTREAM_URL
              value: {{ .Values.gateway.env.upstreamUrl | quote }}
            - name: YASHIGANI_OPA_URL
              value: {{ .Values.gateway.env.opaUrl | quote }}
            - name: OLLAMA_BASE_URL
              value: {{ .Values.gateway.env.ollamaUrl | quote }}
            - name: REDIS_HOST
              value: {{ .Values.gateway.env.redisHost | quote }}
            - name: REDIS_PORT
              value: {{ if .Values.mtls.enabled }}"6380"{{ else }}{{ .Values.gateway.env.redisPort | quote }}{{ end }}
            # Budget Redis — separate instance, code default "budget-redis"
            # wouldn't resolve in-cluster. K8s service is yashigani-budget-redis.
            - name: BUDGET_REDIS_HOST
              value: "yashigani-budget-redis"
            - name: BUDGET_REDIS_PORT
              value: {{ if .Values.mtls.enabled }}"6380"{{ else }}"6379"{{ end }}
            {{- if .Values.mtls.enabled }}
            - name: REDIS_USE_TLS
              value: "true"
            - name: YASHIGANI_SERVICE_MANIFEST_PATH
              value: "/etc/yashigani/service_identities.yaml"
            - name: YASHIGANI_INTERNAL_CA_DIR
              value: "/run/secrets"
            {{- end }}
            - name: YASHIGANI_AGENT_ROUTING_ENABLED
              value: {{ .Values.gateway.env.agentRoutingEnabled | quote }}
            - name: YASHIGANI_AGENT_PATH_PREFIX
              value: {{ .Values.gateway.env.agentPathPrefix | quote }}
            - name: YASHIGANI_AGENT_TOKEN_MIN_LENGTH
              value: {{ .Values.gateway.env.agentTokenMinLength | quote }}
            - name: YASHIGANI_DEPLOYMENT_STREAM
              value: {{ .Values.gateway.env.deploymentStream | quote }}
            {{- if .Values.mtls.enabled }}
            # M-01 fix: mTLS OTLP endpoint (grpcs://). Gateway presents its
            # leaf cert. Python OTEL exporter goes through Python ssl —
            # Pattern A trust anchor (ca_root.crt) per gate #58a evidence.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "grpcs://otel-collector:4317"
            - name: OTEL_EXPORTER_OTLP_CERTIFICATE
              value: "/run/secrets/ca_root.crt"
            - name: OTEL_EXPORTER_OTLP_CLIENT_CERTIFICATE
              value: "/run/secrets/gateway_client.crt"
            - name: OTEL_EXPORTER_OTLP_CLIENT_KEY
              value: "/run/secrets/gateway_client.key"
            {{- else }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.gateway.env.otelEndpoint | quote }}
            {{- end }}
            - name: FASTTEXT_MODEL_PATH
              value: {{ .Values.gateway.env.fasttextModelPath | quote }}
            - name: YASHIGANI_SECRETS_DIR
              value: "/run/secrets"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.existingSecretName | default "yashigani-postgres-secrets" }}
                  key: postgres_password
            {{- if .Values.mtls.enabled }}
            # mTLS DSN — verify-ca + client cert, via pgbouncer.
            - name: YASHIGANI_DB_DSN
              # Pattern A for Python ssl: asyncpg + psycopg2 both consume this
              # DSN via Python ssl, not libpq binary — sslrootcert anchor is
              # the public ca_root.crt (Py 3.12/OpenSSL 3.0 strict-chain — gate
              # #58a/#3bc evidence).
              value: "postgresql://yashigani_app:$(POSTGRES_PASSWORD)@yashigani-pgbouncer:5432/yashigani?sslmode=verify-ca&sslrootcert=/run/secrets/ca_root.crt&sslcert=/run/secrets/gateway_client.crt&sslkey=/run/secrets/gateway_client.key"
            {{- else }}
            - name: YASHIGANI_DB_DSN
              value: "postgresql://yashigani_app:$(POSTGRES_PASSWORD)@yashigani-pgbouncer:5432/yashigani"
            {{- end }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.existingSecretName | default "yashigani-redis-secrets" }}
                  key: redis_password
          envFrom:
            - secretRef:
                name: {{ .Values.gateway.existingSecretName | default "yashigani-gateway-secrets" }}
          {{- if .Values.mtls.enabled }}
          # Startup probe: grants up to 30×10s = 5min for FastText + OTEL +
          # uvicorn TLS bind to come up before liveness starts. Cheap socket
          # connect (no TLS handshake) so we just confirm uvicorn is bound.
          startupProbe:
            exec:
              command:
                - python3
                - -c
                - "import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost',8080))"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 30
          readinessProbe:
            exec:
              command:
                - python3
                - -c
                - "import ssl,urllib.request;c=ssl.create_default_context(cafile='/run/secrets/ca_root.crt');c.load_cert_chain('/run/secrets/gateway_client.crt','/run/secrets/gateway_client.key');urllib.request.urlopen('https://localhost:8080/healthz',context=c)"
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            exec:
              command:
                - python3
                - -c
                - "import ssl,urllib.request;c=ssl.create_default_context(cafile='/run/secrets/ca_root.crt');c.load_cert_chain('/run/secrets/gateway_client.crt','/run/secrets/gateway_client.key');urllib.request.urlopen('https://localhost:8080/healthz',context=c)"
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          {{- else }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          {{- end }}
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: varlog
              mountPath: /var/log/yashigani
            - name: secrets
              mountPath: /run/secrets
              readOnly: true
            {{- if .Values.mtls.enabled }}
            - name: service-manifest
              mountPath: /etc/yashigani
              readOnly: true
            {{- end }}
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
        - name: varlog
          emptyDir:
            sizeLimit: 50Mi
        - name: secrets
          {{- if .Values.mtls.enabled }}
          secret:
            secretName: {{ .Values.mtls.existingSecretName | default .Values.mtls.secretName }}
            # 0440 + fsGroup: pod (1001) can read, others blocked.
            defaultMode: 0440
          {{- else }}
          emptyDir:
            sizeLimit: 10Mi
          {{- end }}
        {{- if .Values.mtls.enabled }}
        - name: service-manifest
          configMap:
            name: yashigani-pki-manifest
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: yashigani-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  type: {{ .Values.gateway.service.type }}
  selector:
    app.kubernetes.io/name: yashigani-gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.gateway.service.port }}
      targetPort: 8080
      protocol: TCP
{{- end }}
