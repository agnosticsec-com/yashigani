{{- if .Values.backoffice.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yashigani-backoffice
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-backoffice
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backoffice.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: yashigani-backoffice
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: yashigani-backoffice
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "yashigani.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backoffice
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.global.imageOwner }}/{{ .Values.backoffice.image.repository }}:{{ .Values.backoffice.image.tag }}"
          imagePullPolicy: {{ .Values.backoffice.image.pullPolicy }}
          securityContext:
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8443
              protocol: TCP
          env:
            - name: YASHIGANI_ENV
              value: {{ .Values.global.environment | quote }}
            - name: YASHIGANI_KSM_PROVIDER
              value: "docker"
            - name: YASHIGANI_SERVICE_NAME
              value: "backoffice"
            - name: REDIS_HOST
              value: "yashigani-redis"
            - name: REDIS_PORT
              value: {{ if .Values.mtls.enabled }}"6380"{{ else }}"6379"{{ end }}
            {{- if .Values.mtls.enabled }}
            - name: REDIS_USE_TLS
              value: "true"
            - name: YASHIGANI_SERVICE_MANIFEST_PATH
              value: "/etc/yashigani/service_identities.yaml"
            - name: YASHIGANI_INTERNAL_CA_DIR
              value: "/run/secrets"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.existingSecretName | default "yashigani-postgres-secrets" }}
                  key: postgres_password
            - name: YASHIGANI_DB_DSN
              value: "postgresql://yashigani_app:$(POSTGRES_PASSWORD)@yashigani-pgbouncer:5432/yashigani?sslmode=verify-ca&sslrootcert=/run/secrets/ca_root.crt&sslcert=/run/secrets/backoffice_client.crt&sslkey=/run/secrets/backoffice_client.key"
            {{- end }}
            - name: YASHIGANI_OPA_URL
              value: "http://yashigani-policy:8181"
            - name: YASHIGANI_SECRETS_DIR
              value: "/run/secrets"
            - name: YASHIGANI_DEPLOYMENT_STREAM
              value: {{ .Values.gateway.env.deploymentStream | quote }}
            - name: YASHIGANI_TLS_DOMAIN
              value: {{ .Values.global.tlsDomain | quote }}
            - name: OWUI_API_URL
              value: "http://open-webui:8080"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.existingSecretName | default "yashigani-redis-secrets" }}
                  key: redis_password
          envFrom:
            - secretRef:
                name: {{ .Values.backoffice.existingSecretName | default "yashigani-backoffice-secrets" }}
          {{- if .Values.mtls.enabled }}
          readinessProbe:
            exec:
              command:
                - python3
                - -c
                - "import ssl,urllib.request;c=ssl.create_default_context(cafile='/run/secrets/ca_root.crt');c.load_cert_chain('/run/secrets/backoffice_client.crt','/run/secrets/backoffice_client.key');urllib.request.urlopen('https://localhost:8443/healthz',context=c)"
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            exec:
              command:
                - python3
                - -c
                - "import ssl,urllib.request;c=ssl.create_default_context(cafile='/run/secrets/ca_root.crt');c.load_cert_chain('/run/secrets/backoffice_client.crt','/run/secrets/backoffice_client.key');urllib.request.urlopen('https://localhost:8443/healthz',context=c)"
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          {{- else }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8443
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8443
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          {{- end }}
          resources:
            {{- toYaml .Values.backoffice.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: varlog
              mountPath: /var/log/yashigani
            - name: secrets
              mountPath: /run/secrets
              readOnly: true
            {{- if .Values.mtls.enabled }}
            - name: service-manifest
              mountPath: /etc/yashigani
              readOnly: true
            {{- end }}
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
        - name: varlog
          emptyDir:
            sizeLimit: 50Mi
        - name: secrets
          {{- if .Values.mtls.enabled }}
          secret:
            secretName: {{ .Values.mtls.existingSecretName | default .Values.mtls.secretName }}
            defaultMode: 0400
          {{- else }}
          emptyDir:
            sizeLimit: 10Mi
          {{- end }}
        {{- if .Values.mtls.enabled }}
        - name: service-manifest
          configMap:
            name: yashigani-pki-manifest
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: yashigani-backoffice
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-backoffice
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  type: {{ .Values.backoffice.service.type }}
  selector:
    app.kubernetes.io/name: yashigani-backoffice
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.backoffice.service.port }}
      targetPort: 8443
      protocol: TCP
{{- end }}
