{{- /*
  Last updated: 2026-05-01T22:00:00+01:00
  v2.23.1 task #94 — startupProbe + tightened liveness/readiness so
  helm install --wait does not stall on slow first-boot of upstream image.
  v2.23.1 GA fix — initContainer chowns upstream image static/ dir so the
  main container (uid 1000) can write branding files at startup. Without this,
  open-webui exits immediately after the banner with Permission denied errors
  on /app/backend/open_webui/static/, preventing uvicorn from binding to :8080
  and causing startupProbe to fail. The initContainer explicitly runs as root
  (runAsUser: 0, runAsNonRoot: false) which is a documented exception for
  third-party image compatibility — the root privilege is scoped to this single
  chown call and the main container continues running as uid 1000.
*/ -}}
{{- if .Values.openWebui.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: open-webui
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.openWebui.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: open-webui
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: open-webui
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "yashigani.serviceAccountName" . }}
      # Retro #3ak — runAsNonRoot:true alone causes CrashLoopBackOff because
      # the upstream open-webui image's USER directive is root. The image
      # supports running as a non-root uid when WEBUI_USER_UID is honoured,
      # but a simpler+more portable fix is to:
      #   1. set runAsUser explicitly to 1000 (POSIX uid for unprivileged
      #      services in our convention) — kubelet then runs the container
      #      as uid 1000 regardless of the USER directive.
      #   2. set fsGroup so the PVC at /app/backend/data is writable by 1000.
      # Pentagon-posture requirement: still runAsNonRoot:true; we just give
      # the kubelet enough information to enforce it without the image
      # running as root for one frame and crashing.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      # Retro #3ak follow-up (v2.23.1 GA fix) — the upstream open-webui image bakes
      # /app/backend/open_webui/static/ with root:root ownership (dir: 755, files:
      # 644). Running the main container as uid 1000 means uid 1000 can READ the
      # baked files but cannot WRITE to the directory. open-webui's startup code
      # copies user-configured branding overrides into static/ at boot; every copy
      # fails with EPERM and the process exits before uvicorn binds to :8080.
      #
      # Fix: mount an emptyDir volume at /app/backend/open_webui/static so the main
      # container writes to a uid-1000-owned tmpfs instead of the root-owned image
      # layer. An initContainer (running as uid 1000, no privilege escalation) copies
      # the original baked static files into the emptyDir before the main container
      # starts, preserving the app's expected static asset tree. The open-webui
      # startup code then succeeds when it writes branding files.
      #
      # This approach requires NO root privileges at any point — the baked files are
      # 644 (world-readable) and cp/sh run as uid 1000 in the initContainer.
      initContainers:
        - name: open-webui-copy-static
          image: "{{ .Values.openWebui.image.repository }}:{{ .Values.openWebui.image.tag }}"
          imagePullPolicy: {{ .Values.openWebui.image.pullPolicy }}
          # Copy the image-baked static/ tree into the writable emptyDir mount.
          # We use cp -r (recursive, no timestamp preservation) because cp -a /
          # cp -p attempt utimensat(2) which RuntimeDefault seccomp blocks with
          # EPERM, causing the initContainer to exit non-zero. Files are readable
          # by uid 1000 (baked as 644) so cp -r succeeds without privilege.
          command:
            - sh
            - -c
            - |
              cp -r /app/backend/open_webui/static/. /static-rw/
          securityContext:
            runAsUser: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          volumeMounts:
            - name: static-rw
              mountPath: /static-rw
      containers:
        - name: open-webui
          image: "{{ .Values.openWebui.image.repository }}:{{ .Values.openWebui.image.tag }}"
          imagePullPolicy: {{ .Values.openWebui.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: WEBUI_AUTH
              value: {{ .Values.openWebui.env.webuiAuth | quote }}
            - name: WEBUI_AUTH_TRUSTED_EMAIL_HEADER
              value: {{ .Values.openWebui.env.webuiAuthTrustedEmailHeader | quote }}
            - name: WEBUI_AUTH_TRUSTED_NAME_HEADER
              value: {{ .Values.openWebui.env.webuiAuthTrustedNameHeader | quote }}
            - name: ENABLE_SIGNUP
              value: {{ .Values.openWebui.env.enableSignup | quote }}
            - name: WEBUI_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.openWebui.env.webuiSecretKeySecretName }}
                  key: {{ .Values.openWebui.env.webuiSecretKeySecretKey }}
            - name: OPENAI_API_BASE_URL
              value: {{ .Values.openWebui.env.openaiApiBaseUrl | quote }}
            - name: OPENAI_API_KEY
              value: {{ .Values.openWebui.env.openaiApiKey | quote }}
            - name: OLLAMA_BASE_URL
              value: {{ .Values.openWebui.env.ollamaBaseUrl | quote }}
            - name: ENABLE_OLLAMA_API
              value: {{ .Values.openWebui.env.enableOllamaApi | quote }}
            - name: DEFAULT_MODELS
              value: {{ .Values.openWebui.env.defaultModels | quote }}
            - name: WEBUI_NAME
              value: {{ .Values.openWebui.env.webuiName | quote }}
            # Disable HuggingFace model auto-download at startup. Our NetworkPolicy
            # blocks open-webui egress to huggingface.co (correct zero-trust posture).
            # Without these flags, open-webui tries to download embedding models on
            # boot; each attempt times out after ~110s (ConnectTimeout) before failing
            # gracefully. 4 model download attempts × 110s = 440s of blocked startup,
            # which causes the startupProbe to fail even at 600s (120 × 5s) window.
            # Setting RAG_EMBEDDING_MODEL_AUTO_UPDATE=false and using the default local
            # model (if cached) or skipping the download resolves this.
            - name: RAG_EMBEDDING_MODEL_AUTO_UPDATE
              value: "false"
            - name: SENTENCE_TRANSFORMERS_HOME
              value: "/app/backend/data/cache/embedding/models"
          # Retro #3ag (v2.23.1 task #94) — startupProbe gates liveness/readiness
          # so cold-boot of the upstream open-webui image (SvelteKit + Python +
          # LangChain stack, regularly 90-180s on Docker Desktop) does not get
          # killed by liveness before /health ever opens. Without this gate,
          # helm install --wait sat polling Available=0 until the 15m timeout
          # elapsed and then surfaced "client rate limiter Wait returned an
          # error: context deadline exceeded" — a misleading symptom whose
          # real cause is the readiness loop never converging. See:
          # /Users/max/Documents/Claude/Internal/Compliance/yashigani/v2.23.1/
          #   restore-test-evidence/k8s/restore_20260426T195713Z_run.log
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            # Allow up to 120 * 5s = 600s (10 min) for first-boot. The open-webui
            # image (SvelteKit + Python + LangChain) consistently takes 4-7 min to
            # bind :8080 on Docker Desktop K8s; 300s (60 failures) was insufficient
            # — uvicorn runs as PID 1 but imports LangChain modules before serving.
            # Once startupProbe passes, livenessProbe starts policing normally.
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 120
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            {{- toYaml .Values.openWebui.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
            - name: static-rw
              mountPath: /app/backend/open_webui/static
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: open-webui-data
        # emptyDir that shadows the baked static/ directory so uid 1000 can write
        # branding overrides at runtime. Pre-populated by the open-webui-copy-static
        # initContainer before the main container starts.
        - name: static-rw
          emptyDir: {}
---
{{- if .Values.openWebui.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: open-webui-data
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: open-webui
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.openWebui.persistence.storageClass }}
  storageClassName: {{ .Values.openWebui.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.openWebui.persistence.size }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: open-webui
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: open-webui
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  type: {{ .Values.openWebui.service.type }}
  selector:
    app.kubernetes.io/name: open-webui
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.openWebui.service.port }}
      targetPort: 8080
      protocol: TCP
{{- end }}
