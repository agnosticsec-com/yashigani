{{/* ConfigMaps for services that need mounted config files */}}

{{- if .Values.policy.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: yashigani-policy-bundle
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
data:
  yashigani.rego: |
    package yashigani
    import rego.v1
    default allow := true
  v1_routing.rego: |
    package yashigani.v1_routing
    import rego.v1
    default allow := true
    default response_allow := true
  rbac.rego: |
    package yashigani.rbac
    import rego.v1
    default allow := true
  agents.rego: |
    package yashigani.agents
    import rego.v1
    default allow := true
{{- end }}

{{- if .Values.otelCollector.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: yashigani-otel-collector-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
data:
  otel-collector.yml: |
    # M-01 fix (2026-04-27): OTLP receivers upgraded to mTLS (Pattern B).
    # Trust anchor: ca_intermediate.crt. Clients must present leaf certs.
    {{- if .Values.mtls.enabled }}
    # mTLS enabled: receivers require client cert auth (Pattern B).
    {{- end }}
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
            {{- if .Values.mtls.enabled }}
            tls:
              cert_file: /run/secrets/otel-collector_client.crt
              key_file: /run/secrets/otel-collector_client.key
              client_ca_file: /run/secrets/ca_intermediate.crt
            {{- end }}
          http:
            endpoint: "0.0.0.0:4318"
            {{- if .Values.mtls.enabled }}
            tls:
              cert_file: /run/secrets/otel-collector_client.crt
              key_file: /run/secrets/otel-collector_client.key
              client_ca_file: /run/secrets/ca_intermediate.crt
            {{- end }}
    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 256
      batch:
        timeout: 5s
        send_batch_size: 1024
    exporters:
      otlp/jaeger:
        endpoint: "yashigani-jaeger:4317"
        tls:
          insecure: true
      loki:
        endpoint: "http://yashigani-loki:3100/loki/api/v1/push"
    extensions:
      health_check:
        endpoint: "0.0.0.0:13133"
    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlp/jaeger]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [loki]
{{- end }}

{{- if .Values.alertmanager.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: yashigani-alertmanager-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
    route:
      receiver: default
      group_by: ['alertname']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 1h
    receivers:
      - name: default
{{- end }}

{{- if .Values.loki.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: yashigani-loki-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
data:
  loki.yml: |
    auth_enabled: false
    server:
      http_listen_port: 3100
    common:
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
    schema_config:
      configs:
        - from: "2020-10-24"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    limits_config:
      reject_old_samples: false
{{- end }}

{{- if .Values.caddy.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: yashigani-caddy-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
data:
  Caddyfile: |
    {
      local_certs
      servers {
        timeouts {
          read_body   10s
          read_header 5s
          write       30s
          idle        120s
        }
      }
    }
    # Retro #3al — explicit :80 listener so kubelet probes (which target
    # pod-IP, not the global tlsDomain) get a deterministic answer. Caddy's
    # admin endpoint at :2019 is bound to localhost-only and therefore
    # refuses pod-IP probes; opening it to 0.0.0.0 would expose the entire
    # admin API. The :80 listener gives kubelet a cheap GET / -> 308 plus a
    # /healthz that returns 204 No Content for a tighter probe.
    :80 {
      handle /healthz {
        respond "" 204
      }
      handle {
        redir https://{host}{uri} permanent
      }
    }
    # ────────────────────────────────────────────────────────────────────────
    # Internal mTLS snippet — used by every reverse_proxy that targets a
    # service terminating mTLS (gateway:8080, backoffice:8443). Caddy
    # presents caddy_client.{crt,key} and verifies the upstream against
    # ca_intermediate.crt (Pattern B). Mirrors docker/Caddyfile.selfsigned (internal-mtls).
    # ────────────────────────────────────────────────────────────────────────
    {{- if .Values.mtls.enabled }}
    # K8s service names (yashigani-gateway / yashigani-backoffice) don't
    # match the cert SANs (gateway / backoffice — sourced from
    # service_identities.yaml). Override SNI via tls_server_name so the
    # handshake validates against the right SAN. Two snippets, one per
    # upstream, since Caddy snippets can't take parameters in v2.
    (internal-mtls-gateway) {
      transport http {
        tls
        tls_trusted_ca_certs /run/secrets/ca_intermediate.crt
        tls_client_auth /run/secrets/caddy_client.crt /run/secrets/caddy_client.key
        tls_server_name gateway
      }
    }
    (internal-mtls-backoffice) {
      transport http {
        tls
        tls_trusted_ca_certs /run/secrets/ca_intermediate.crt
        tls_client_auth /run/secrets/caddy_client.crt /run/secrets/caddy_client.key
        tls_server_name backoffice
      }
    }
    {{- end }}
    # ────────────────────────────────────────────────────────────────────────
    # EX-231-10 Layer B — Caddy HMAC shared-secret marker.
    # Last updated: 2026-04-29T16:04:58+01:00
    #
    # caddy_internal_hmac is written by the mtls-bootstrap Job into the
    # yashigani-pki-certs Secret and mounted at /run/secrets/caddy_internal_hmac
    # in Caddy, gateway, and backoffice pods. Caddy reads it via the
    # CADDY_INTERNAL_HMAC env var (sourced from the K8s Secret via envFrom or
    # explicit env mapping in caddy.yaml). See compose-side design rationale in
    # docker/Caddyfile.selfsigned.
    # ────────────────────────────────────────────────────────────────────────
    (inject-caddy-verified) {
      # Strip any inbound value — only Caddy may set this header downstream.
      header_up -X-Caddy-Verified-Secret
      # Inject the per-install shared secret from the env var.
      header_up X-Caddy-Verified-Secret {env.CADDY_INTERNAL_HMAC}
    }
    # Bind on :443 (any Host) so port-forward / NodePort / IP-based tests
    # work regardless of how the cluster operator routes the public domain.
    # Captain #58c #3by (2026-04-29): use explicit PKI cert (caddy_client.crt/key)
    # instead of `tls internal`. Caddy's internal CA issued a cert bound to
    # 'localhost', causing HTTP 421 Misdirected Request for IP-based connections
    # (e.g. port-forward to 127.0.0.1). caddy_client.crt has IP Address:127.0.0.1
    # in its SANs (mtls-bootstrap Job generates it with that SAN via service_identities.yaml).
    :443 {
      {{- if .Values.mtls.enabled }}
      # Site-level mTLS (Caddy v2 requires `client_auth` at the server block,
      # not inside `handle`). `verify_if_given` accepts non-mTLS browser
      # connections AND extracts SPIFFE URI from a presented client cert when
      # one is given. Per-path SPIFFE forwarding stays in `handle` blocks.
      # Captain #58c #3br evidence (2026-04-28).
      # #3by: explicit cert (not `tls internal`) — Caddy internal auto-cert
      # binds to 'localhost' only; our PKI cert has IP Address:127.0.0.1 SAN.
      tls /run/secrets/caddy_client.crt /run/secrets/caddy_client.key {
        client_auth {
          mode verify_if_given
          trust_pool file /run/secrets/ca_intermediate.crt
        }
      }
      {{- else }}
      tls /run/secrets/caddy_client.crt /run/secrets/caddy_client.key
      {{- end }}
      header {
        X-Content-Type-Options    "nosniff"
        X-Frame-Options           "DENY"
        Referrer-Policy           "no-referrer"
        Content-Security-Policy   "default-src 'self'; object-src 'none'; base-uri 'none'"
        Cross-Origin-Opener-Policy "same-origin"
        -Server
      }
      handle /healthz {
        reverse_proxy https://yashigani-gateway:8080 {
          {{- if .Values.mtls.enabled }}
          import internal-mtls-gateway
          {{- end }}
          import inject-caddy-verified
        }
      }
      # V10.3.5 sender-constrained tokens: client cert is verified at the
      # site-level `tls` block (above). Per-path: extract SPIFFE URI from the
      # validated peer cert and forward it as a header to the gateway.
      handle /v1/* {
        {{- if .Values.mtls.enabled }}
        request_header -X-SPIFFE-ID
        request_header X-SPIFFE-ID {http.request.tls.client.san.uris.0}
        {{- end }}
        reverse_proxy https://yashigani-gateway:8080 {
          {{- if .Values.mtls.enabled }}
          import internal-mtls-gateway
          {{- end }}
          import inject-caddy-verified
        }
      }
      handle /agents/* {
        {{- if .Values.mtls.enabled }}
        request_header -X-SPIFFE-ID
        request_header X-SPIFFE-ID {http.request.tls.client.san.uris.0}
        {{- end }}
        reverse_proxy https://yashigani-gateway:8080 {
          {{- if .Values.mtls.enabled }}
          import internal-mtls-gateway
          {{- end }}
          import inject-caddy-verified
        }
      }
      handle /mcp/* {
        reverse_proxy https://yashigani-gateway:8080 {
          {{- if .Values.mtls.enabled }}
          import internal-mtls-gateway
          {{- end }}
          import inject-caddy-verified
        }
      }
      handle /admin/* {
        reverse_proxy https://yashigani-backoffice:8443 {
          {{- if .Values.mtls.enabled }}
          import internal-mtls-backoffice
          {{- end }}
          import inject-caddy-verified
        }
      }
      handle /auth/* {
        reverse_proxy https://yashigani-backoffice:8443 {
          {{- if .Values.mtls.enabled }}
          import internal-mtls-backoffice
          {{- end }}
          import inject-caddy-verified
        }
      }
      handle /static/* {
        reverse_proxy https://yashigani-backoffice:8443 {
          {{- if .Values.mtls.enabled }}
          import internal-mtls-backoffice
          {{- end }}
          import inject-caddy-verified
        }
      }
      handle /login {
        reverse_proxy https://yashigani-backoffice:8443 {
          {{- if .Values.mtls.enabled }}
          import internal-mtls-backoffice
          {{- end }}
          import inject-caddy-verified
        }
      }
      handle {
        reverse_proxy open-webui:8080
      }
    }
    {{- if .Values.caddy.internalMetricsListener.enabled }}
    # ────────────────────────────────────────────────────────────────────────
    # EX-231-08 (+ #81) — SPIFFE-gated internal observability listeners.
    # Last updated: 2026-04-24T13:47:12+01:00
    # See docker/Caddyfile.acme for the full comment block.
    # Requires ca_intermediate.crt + caddy_client.{crt,key} mounted at /run/secrets.
    #
    # NOTE (retro #81-b): this Helm ConfigMap hand-codes a stripped Caddyfile
    # that is deliberately NOT full-parity with docker/Caddyfile.acme. Full
    # parity is a separate v2.23.2 work item (#76) — do not merge the two
    # files until that item lands.
    #
    # Split-listener design (was: single :8444 with Host-header matcher):
    #   :8444 -> yashigani-gateway:8080
    #   :8445 -> yashigani-backoffice:8443
    # Prometheus v3.x rejects setting Host via http_headers, so each upstream
    # gets its own port. Both listeners enforce the identical SPIFFE URI gate.
    # ────────────────────────────────────────────────────────────────────────
    :{{ .Values.caddy.internalMetricsListener.port }} {
      tls /run/secrets/caddy_client.crt /run/secrets/caddy_client.key {
        client_auth {
          mode require_and_verify
          trust_pool file /run/secrets/ca_intermediate.crt
        }
        protocols tls1.2 tls1.3
      }
      @metrics path /internal/metrics
      handle @metrics {
        request_header -X-SPIFFE-ID
        request_header X-SPIFFE-ID {http.request.tls.client.san.uris.0}
        reverse_proxy https://yashigani-gateway:8080 {
          transport http {
            tls
            tls_trusted_ca_certs /run/secrets/ca_intermediate.crt
            tls_client_auth /run/secrets/caddy_client.crt /run/secrets/caddy_client.key
            tls_server_name gateway
          }
          import inject-caddy-verified
        }
      }
      handle {
        respond "Not Found" 404
      }
    }
    {{- end }}
    {{- if .Values.caddy.internalMetricsListenerBackoffice.enabled }}
    # Parallel listener for the backoffice upstream — identical SPIFFE gate,
    # identical strip-before-set header discipline. #81 split-listener design.
    :{{ .Values.caddy.internalMetricsListenerBackoffice.port }} {
      tls /run/secrets/caddy_client.crt /run/secrets/caddy_client.key {
        client_auth {
          mode require_and_verify
          trust_pool file /run/secrets/ca_intermediate.crt
        }
        protocols tls1.2 tls1.3
      }
      @metrics path /internal/metrics
      handle @metrics {
        request_header -X-SPIFFE-ID
        request_header X-SPIFFE-ID {http.request.tls.client.san.uris.0}
        reverse_proxy https://yashigani-backoffice:8443 {
          transport http {
            tls
            tls_trusted_ca_certs /run/secrets/ca_intermediate.crt
            tls_client_auth /run/secrets/caddy_client.crt /run/secrets/caddy_client.key
            tls_server_name backoffice
          }
          import inject-caddy-verified
        }
      }
      handle {
        respond "Not Found" 404
      }
    }
    {{- end }}
{{- end }}
