{{/* ConfigMaps for services that need mounted config files */}}

{{- if .Values.policy.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: yashigani-policy-bundle
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
data:
  yashigani.rego: |
    # Yashigani — OPA policy bundle.
    # All policy decisions are local. No cloud delegation. (ASVS V4.2)
    #
    # Inputs provided by the gateway proxy:
    #   input.method        — HTTP method
    #   input.path          — request path
    #   input.session_id    — caller session token (hashed)
    #   input.agent_id      — X-Yashigani-Agent-Id header value
    #   input.user_id       — X-Yashigani-User-Id header value
    #   input.headers       — sanitized request headers (no Authorization/Cookie)
    #
    # The gateway's fail-closed behaviour: any OPA error → deny.

    package yashigani

    import future.keywords.if
    import future.keywords.in

    # ---------------------------------------------------------------------------
    # Default: deny unless explicitly allowed
    # ---------------------------------------------------------------------------

    default allow := false

    # ---------------------------------------------------------------------------
    # Allow authenticated sessions
    # ---------------------------------------------------------------------------

    allow if {
        # Session ID must be present (non-empty, non-anonymous)
        input.session_id != ""
        input.session_id != "anonymous"

        # Agent ID must be declared
        input.agent_id != ""
        input.agent_id != "unknown"

        # Method must be in the allowed set
        input.method in allowed_methods

        # Path must not match any blocked pattern
        not path_blocked
    }

    # ---------------------------------------------------------------------------
    # Allowed HTTP methods for MCP traffic
    # ---------------------------------------------------------------------------

    allowed_methods := {"GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"}

    # ---------------------------------------------------------------------------
    # Blocked path patterns
    # ---------------------------------------------------------------------------

    path_blocked if {
        # Block direct access to internal metadata/admin paths
        startswith(input.path, "/admin")
    }

    path_blocked if {
        startswith(input.path, "/.well-known/internal")
    }

    path_blocked if {
        input.path == "/metrics"
    }

    path_blocked if {
        input.path == "/healthz"
    }

    # ---------------------------------------------------------------------------
    # RBAC enforcement — deny if RBAC data is loaded and user is not permitted
    # ---------------------------------------------------------------------------
    # When data.yashigani.rbac.groups is non-empty, every request that passed
    # the session/method/path checks above must additionally satisfy allow_rbac
    # (defined in rbac.rego).  If RBAC data is absent or empty the gate is
    # open — this preserves backwards compatibility during roll-out.

    deny_rbac if {
        count(data.yashigani.rbac.groups) > 0
        not allow_rbac
    }

    # Override the default allow: deny when RBAC says no
    allow := false if { deny_rbac }

    # ---------------------------------------------------------------------------
    # Agent-to-agent enforcement
    # agent_call_allowed is defined in agents.rego (same package yashigani).
    # ---------------------------------------------------------------------------

    # Deny agent calls that are not explicitly allowed
    deny_agent_call if {
        input.principal.type == "agent"
        not agent_call_allowed
    }

    allow := false if { deny_agent_call }
  v1_routing.rego: |
    # Yashigani v1.0 — OPA Routing Safety Net
    #
    # Second-pass validation of Optimization Engine routing decisions.
    # Defence-in-depth: even if the OE has a bug, OPA catches policy violations.
    #
    # Input schema:
    #   input.identity          — identity record (kind, groups, allowed_models, sensitivity_ceiling)
    #   input.routing_decision  — OE decision (provider, model, route, sensitivity, rule)
    #   input.request           — request metadata (path, method)

    package yashigani.v1

    import rego.v1

    # ── Identity authorisation ────────────────────────────────────────────────

    # Allow /v1/* requests from authenticated identities
    default allow_v1 := false

    allow_v1 if {
        input.identity.status == "active"
    }

    # ── Model access control ─────────────────────────────────────────────────

    # Identity can use the selected model
    default model_allowed := true

    model_allowed if {
        count(input.identity.allowed_models) == 0  # No restriction = all models allowed
    }

    model_allowed if {
        input.routing_decision.model in input.identity.allowed_models
    }

    model_allowed if {
        "*" in input.identity.allowed_models
    }

    # ── Routing safety net ────────────────────────────────────────────────────

    # CRITICAL: CONFIDENTIAL/RESTRICTED data must NEVER route to cloud
    # unless the provider is in the trusted_cloud_providers list
    default routing_safe := true

    routing_safe := false if {
        input.routing_decision.sensitivity in {"CONFIDENTIAL", "RESTRICTED"}
        input.routing_decision.route == "cloud"
        not trusted_cloud_provider
    }

    trusted_cloud_provider if {
        input.routing_decision.provider in input.trusted_cloud_providers
    }

    # Identity cannot receive data above their sensitivity ceiling
    default sensitivity_allowed := true

    sensitivity_allowed := false if {
        sensitivity_rank(input.routing_decision.sensitivity) > sensitivity_rank(input.identity.sensitivity_ceiling)
    }

    sensitivity_rank(level) := 0 if level == "PUBLIC"
    sensitivity_rank(level) := 1 if level == "INTERNAL"
    sensitivity_rank(level) := 2 if level == "CONFIDENTIAL"
    sensitivity_rank(level) := 3 if level == "RESTRICTED"

    # ── Response-path enforcement ─────────────────────────────────────────────
    #
    # Evaluates whether a response can be delivered to the caller.
    # Input schema (response path):
    #   input.identity              — caller's identity record
    #   input.response_sensitivity  — detected sensitivity of the response content
    #   input.response_verdict      — inspection verdict (clean/suspicious/blocked)
    #   input.pii_detected          — boolean, PII found in response

    default response_allowed := true

    # Block response if its sensitivity exceeds the caller's ceiling
    response_allowed := false if {
        sensitivity_rank(input.response_sensitivity) > sensitivity_rank(input.identity.sensitivity_ceiling)
    }

    # Block response if inspection verdict is BLOCKED and identity is not admin
    response_allowed := false if {
        input.response_verdict == "blocked"
        input.identity.kind != "admin"
    }

    response_decision := {
        "allow": response_allowed,
        "reason": response_reason,
    }

    response_reason := "ok" if response_allowed

    response_reason := "response_sensitivity_exceeds_ceiling" if {
        not response_allowed
        sensitivity_rank(input.response_sensitivity) > sensitivity_rank(input.identity.sensitivity_ceiling)
    }

    response_reason := "response_blocked_by_inspection" if {
        not response_allowed
        input.response_verdict == "blocked"
    }

    # ── Combined decision ─────────────────────────────────────────────────────

    decision := {
        "allow": allow_v1,
        "model_allowed": model_allowed,
        "routing_safe": routing_safe,
        "sensitivity_allowed": sensitivity_allowed,
        "reason": reason,
    }

    reason := "ok" if {
        allow_v1
        model_allowed
        routing_safe
        sensitivity_allowed
    }

    reason := "identity_not_active" if not allow_v1

    reason := "model_not_allowed" if {
        allow_v1
        not model_allowed
    }

    reason := "routing_unsafe_sensitive_to_cloud" if {
        allow_v1
        model_allowed
        not routing_safe
    }

    reason := "sensitivity_ceiling_exceeded" if {
        allow_v1
        model_allowed
        routing_safe
        not sensitivity_allowed
    }
  rbac.rego: |
    # Yashigani RBAC — OPA enforcement module.
    #
    # Deny-by-default: if data.yashigani.rbac is empty or the user has no
    # groups, allow_rbac evaluates to false.
    #
    # data.yashigani.rbac is populated by rbac/opa_push.py after every mutation
    # via a PUT to /v1/data/yashigani/rbac.
    #
    # Input fields consumed:
    #   input.session.email    — user email resolved from the gateway session
    #   input.request.method   — HTTP method
    #   input.request.path     — request path

    package yashigani

    import future.keywords.if
    import future.keywords.in

    # ---------------------------------------------------------------------------
    # allow_rbac — true if the user is in a group that permits the request
    # ---------------------------------------------------------------------------

    allow_rbac if {
        # Require RBAC data to be present and non-empty
        count(data.yashigani.rbac.groups) > 0

        email := input.session.email
        email != ""

        # Walk user → group → pattern
        group_id := data.yashigani.rbac.user_groups[email][_]
        group    := data.yashigani.rbac.groups[group_id]
        pattern  := group.allowed_resources[_]

        _method_matches(pattern.method, input.request.method)
        _path_matches(pattern.path_glob, input.request.path)
    }

    # ---------------------------------------------------------------------------
    # Method helper — "*" matches anything; otherwise exact match
    # ---------------------------------------------------------------------------

    _method_matches(pattern, method) if { pattern == "*" }
    _method_matches(pattern, method) if { pattern == method }

    # ---------------------------------------------------------------------------
    # Path helper — mirrors store.py _path_matches exactly
    #
    #   "**"           — any path
    #   "/prefix/**"   — /prefix/ and anything underneath
    #   exact string   — only that path
    # ---------------------------------------------------------------------------

    _path_matches(glob, path) if { glob == "**" }
    _path_matches(glob, path) if { glob == path }
    _path_matches(glob, path) if {
        endswith(glob, "/**")
        prefix := trim_suffix(glob, "/**")
        startswith(path, concat("", [prefix, "/"]))
    }
  agents.rego: |
    package yashigani

    import future.keywords.if
    import future.keywords.in

    # ---------------------------------------------------------------------------
    # agent_call_allowed — true when a calling agent is permitted to reach
    # the target agent's path.
    #
    # Input fields (set by the gateway for /agents/* requests):
    #   input.principal.type                  "agent"
    #   input.principal.agent_id              calling agent's ID
    #   input.principal.groups                list of RBAC group IDs the caller belongs to
    #   input.target_agent.agent_id           target agent ID
    #   input.target_agent.allowed_caller_groups  groups allowed to call this agent
    #   input.target_agent.allowed_paths      path prefixes or exact paths the agent accepts
    #   input.request.remainder_path          path after /agents/{target_agent_id}
    # ---------------------------------------------------------------------------

    agent_call_allowed if {
        input.principal.type == "agent"
        input.principal.agent_id != ""

        # Caller must be in at least one of the target's allowed_caller_groups
        group := input.principal.groups[_]
        group in input.target_agent.allowed_caller_groups

        # The remainder path must match at least one allowed path pattern
        _path_allowed(input.request.remainder_path, input.target_agent.allowed_paths)
    }

    # Path matching helper — exact or prefix
    _path_allowed(path, allowed_paths) if {
        p := allowed_paths[_]
        _agent_path_matches(p, path)
    }

    _agent_path_matches(pattern, path) if { pattern == "**" }
    _agent_path_matches(pattern, path) if { pattern == path }
    _agent_path_matches(pattern, path) if {
        endswith(pattern, "/**")
        prefix := trim_suffix(pattern, "/**")
        startswith(path, concat("", [prefix, "/"]))
    }
    _agent_path_matches(pattern, path) if {
        not endswith(pattern, "/**")
        not contains(pattern, "*")
        startswith(path, concat("", [pattern, "/"]))
    }

    # ---------------------------------------------------------------------------
    # agent_call_deny_reason — human-readable explanation used in audit events
    # ---------------------------------------------------------------------------

    agent_call_deny_reason := "caller_group_not_in_allowed_caller_groups" if {
        input.principal.type == "agent"
        not _caller_group_allowed
    }

    agent_call_deny_reason := "path_not_in_allowed_paths" if {
        input.principal.type == "agent"
        _caller_group_allowed
        not _path_allowed(input.request.remainder_path, input.target_agent.allowed_paths)
    }

    agent_call_deny_reason := "target_agent_not_in_data" if {
        input.principal.type == "agent"
        not input.target_agent.agent_id
    }

    _caller_group_allowed if {
        group := input.principal.groups[_]
        group in input.target_agent.allowed_caller_groups
    }
{{- end }}

{{- if .Values.otelCollector.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: yashigani-otel-collector-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
data:
  otel-collector.yml: |
    # M-01 fix (2026-04-27): OTLP receivers upgraded to mTLS.
    # Trust anchor: ca_bundle.crt (root+intermediate). Go x509 (OTEL Collector)
    # verifies client certs (leaf+intermediate chain bundles) against the CA pool.
    # Internal K8s gate finding: using ca_bundle.crt for consistency with
    # all other Go/libssl consumers (pgbouncer, Caddy).
    {{- if .Values.mtls.enabled }}
    # mTLS enabled: receivers require client cert auth.
    {{- end }}
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
            {{- if .Values.mtls.enabled }}
            tls:
              cert_file: /run/secrets/otel-collector_client.crt
              key_file: /run/secrets/otel-collector_client.key
              client_ca_file: /run/secrets/ca_bundle.crt
            {{- end }}
          http:
            endpoint: "0.0.0.0:4318"
            {{- if .Values.mtls.enabled }}
            tls:
              cert_file: /run/secrets/otel-collector_client.crt
              key_file: /run/secrets/otel-collector_client.key
              client_ca_file: /run/secrets/ca_bundle.crt
            {{- end }}
    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 256
      batch:
        timeout: 5s
        send_batch_size: 1024
    exporters:
      otlp/jaeger:
        # EX-231-09 fix (v2.23.2): switched from insecure: true to mTLS.
        # otel-collector presents its leaf cert; Jaeger verifies against
        # ca_bundle.crt (root+intermediate, K8s Go x509 pattern).
        endpoint: "yashigani-jaeger:4317"
        {{- if .Values.mtls.enabled }}
        tls:
          cert_file: /run/secrets/otel-collector_client.crt
          key_file: /run/secrets/otel-collector_client.key
          ca_file: /run/secrets/ca_bundle.crt
        {{- else }}
        tls:
          insecure: true
        {{- end }}
      # v2.23.3: otelcol-contrib 0.151.0 removed the 'loki' exporter type.
      # Loki 3.x accepts OTLP natively at /otlp/v1/logs — use otlphttp instead.
      # Resource attributes (service.name, deployment.environment) map to Loki
      # stream labels automatically via Loki 3.x OTLP label discovery.
      otlphttp/loki:
        endpoint: "https://yashigani-loki:3100"
        {{- if .Values.mtls.enabled }}
        tls:
          cert_file: /run/secrets/otel-collector_client.crt
          key_file:  /run/secrets/otel-collector_client.key
          ca_file:   /run/secrets/ca_intermediate.crt
        {{- end }}
    extensions:
      health_check:
        endpoint: "0.0.0.0:13133"
    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlp/jaeger]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlphttp/loki]
{{- end }}

{{- if .Values.jaeger.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: yashigani-jaeger-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
data:
  jaeger.yml: |
    # Jaeger v2 all-in-one configuration (K8s deployment).
    # Migrated from v1 env-var config to v2 YAML config (OpenTelemetry Collector format).
    # EX-231-09: OTLP gRPC collector port mTLS-enabled (Pattern B — Go x509).
    # CA: ca_bundle.crt (root+intermediate — K8s Go x509 convention).
    service:
      extensions: [jaeger_storage, jaeger_query, healthcheckv2]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [jaeger_storage_exporter]
      telemetry:
        resource:
          service.name: jaeger
        metrics:
          level: basic
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888
        logs:
          level: info

    extensions:
      healthcheckv2:
        # use_v2: false is required. When use_v2: true, healthcheckv2 does NOT expose
        # HTTP routes — every path (including /health/status) returns 404 or no response.
        # use_v2: false enables the HTTP server on :13133 serving /health/status (JSON 200).
        # Su verified live: patched true→false, pod served health correctly. B-K8S-5 follow-up.
        use_v2: false
        http:
          endpoint: 0.0.0.0:13133

      jaeger_query:
        storage:
          traces: in_memory_storage

      jaeger_storage:
        backends:
          in_memory_storage:
            memory:
              max_traces: 100000

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
            {{- if .Values.mtls.enabled }}
            tls:
              cert_file: /run/secrets/jaeger_client.crt
              key_file: /run/secrets/jaeger_client.key
              # Pattern B: ca_bundle.crt (root+intermediate) for Go x509 K8s consumers.
              client_ca_file: /run/secrets/ca_bundle.crt
            {{- end }}
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 1s
        send_batch_size: 1024

    exporters:
      jaeger_storage_exporter:
        trace_storage: in_memory_storage
{{- end }}

{{- if .Values.alertmanager.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: yashigani-alertmanager-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
    route:
      receiver: default
      group_by: ['alertname']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 1h
    receivers:
      - name: default
{{- end }}

{{- if .Values.loki.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: yashigani-loki-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
data:
  loki.yml: |
    # retro #84 (v2.23.2): mTLS enabled for Loki ingest + query paths.
    # Server cert: /run/secrets/loki_client.crt/key (PKI Secret).
    # Trust anchor: /run/secrets/ca_intermediate.crt (Pattern B).
    auth_enabled: false
    server:
      http_listen_port: 3100
      grpc_listen_port: 9096
      {{- if .Values.mtls.enabled }}
      # retro #84: mTLS — Loki presents its leaf cert; clients must present
      # a cert signed by the internal intermediate CA (Pattern B).
      http_tls_config:
        cert_file: /run/secrets/loki_client.crt
        key_file:  /run/secrets/loki_client.key
        client_ca_file: /run/secrets/ca_intermediate.crt
        client_auth_type: RequireAndVerifyClientCert
      grpc_tls_config:
        cert_file: /run/secrets/loki_client.crt
        key_file:  /run/secrets/loki_client.key
        client_ca_file: /run/secrets/ca_intermediate.crt
        client_auth_type: RequireAndVerifyClientCert
      {{- end }}
    common:
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
    schema_config:
      configs:
        - from: "2020-10-24"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    limits_config:
      reject_old_samples: false
{{- end }}

{{- if .Values.caddy.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: yashigani-caddy-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
data:
  Caddyfile: |
    {
      local_certs
      servers {
        timeouts {
          read_body   10s
          read_header 5s
          write       30s
          idle        120s
        }
      }
    }
    # Retro #3al — explicit :80 listener so kubelet probes (which target
    # pod-IP, not the global tlsDomain) get a deterministic answer. Caddy's
    # admin endpoint at :2019 is bound to localhost-only and therefore
    # refuses pod-IP probes; opening it to 0.0.0.0 would expose the entire
    # admin API. The :80 listener gives kubelet a cheap GET / -> 308 plus a
    # /healthz that returns 204 No Content for a tighter probe.
    :80 {
      handle /healthz {
        respond "" 204
      }
      handle {
        redir https://{host}{uri} permanent
      }
    }
    # ────────────────────────────────────────────────────────────────────────
    # Internal mTLS snippet — used by every reverse_proxy that targets a
    # service terminating mTLS (gateway:8080, backoffice:8443). Caddy
    # presents caddy_client.{crt,key} and verifies the upstream against
    # ca_bundle.crt (root+intermediate). Internal K8s gate finding:
    # Caddy Go TLS also fails to verify chain-bundle upstreams with only
    # ca_intermediate.crt as the trust anchor — x509: certificate signed by
    # unknown authority. ca_bundle.crt (root+intermediate) resolves this.
    # ────────────────────────────────────────────────────────────────────────
    {{- if .Values.mtls.enabled }}
    # K8s service names (yashigani-gateway / yashigani-backoffice) don't
    # match the cert SANs (gateway / backoffice — sourced from
    # service_identities.yaml). Override SNI via tls_server_name so the
    # handshake validates against the right SAN. Two snippets, one per
    # upstream, since Caddy snippets can't take parameters in v2.
    (internal-mtls-gateway) {
      transport http {
        tls
        tls_trust_pool file /run/secrets/ca_bundle.crt
        tls_client_auth /run/secrets/caddy_client.crt /run/secrets/caddy_client.key
        tls_server_name gateway
      }
    }
    (internal-mtls-backoffice) {
      transport http {
        tls
        tls_trust_pool file /run/secrets/ca_bundle.crt
        tls_client_auth /run/secrets/caddy_client.crt /run/secrets/caddy_client.key
        tls_server_name backoffice
      }
    }
    {{- end }}
    # ────────────────────────────────────────────────────────────────────────
    # EX-231-10 Layer B — Caddy HMAC shared-secret marker.
    # Last updated: 2026-04-29T17:45:00+01:00
    #
    # caddy_internal_hmac is written by the mtls-bootstrap Job into the
    # yashigani-pki-certs Secret and mounted at /run/secrets/caddy_internal_hmac
    # in Caddy, gateway, and backoffice pods. Caddy reads it via the
    # CADDY_INTERNAL_HMAC env var (sourced from the K8s Secret via envFrom or
    # explicit env mapping in caddy.yaml). See compose-side design rationale in
    # docker/Caddyfile.selfsigned.
    # IMPORTANT: {$CADDY_INTERNAL_HMAC} is parse-time env substitution. Do NOT
    # use {env.CADDY_INTERNAL_HMAC} — request-time placeholder, not resolved in
    # header_up directives (Round 1 failure root cause, 2026-04-29).
    # ────────────────────────────────────────────────────────────────────────
    (inject-caddy-verified) {
      # Inject the per-install shared secret via parse-time env substitution.
      # NOTE: `header_up -X-Caddy-Verified-Secret` (delete) is intentionally
      # absent. In Caddy v2, header_up operations apply in order: set, then
      # delete — meaning delete runs AFTER set and removes the injected value.
      # `header_up X val` (without + prefix) is a SET operation that replaces
      # any existing client-supplied value, which is the correct behaviour.
      # Parity with docker/Caddyfile.selfsigned (lines 97-117) and
      # docker/Caddyfile.acme (lines 76-84). Bug introduced in Helm-only
      # Caddyfile during #58c — fixed at b85aad1 closure (2026-04-30).
      header_up X-Caddy-Verified-Secret {$CADDY_INTERNAL_HMAC}
    }
    # Bind on :443 (any Host) so port-forward / NodePort / IP-based tests
    # work regardless of how the cluster operator routes the public domain.
    # Internal K8s integration finding: use explicit PKI cert (caddy_client.crt/key)
    # instead of `tls internal`. Caddy's internal CA issued a cert bound to
    # 'localhost', causing HTTP 421 Misdirected Request for IP-based connections
    # (e.g. port-forward to 127.0.0.1). caddy_client.crt has IP Address:127.0.0.1
    # in its SANs (mtls-bootstrap Job generates it with that SAN via service_identities.yaml).
    :443 {
      {{- if .Values.mtls.enabled }}
      # Site-level mTLS (Caddy v2 requires `client_auth` at the server block,
      # not inside `handle`). `verify_if_given` accepts non-mTLS browser
      # connections AND extracts SPIFFE URI from a presented client cert when
      # one is given. Per-path SPIFFE forwarding stays in `handle` blocks.
      # Internal K8s integration evidence.
      # Explicit cert (not `tls internal`) — Caddy internal auto-cert
      # binds to 'localhost' only; our PKI cert has IP Address:127.0.0.1 SAN.
      tls /run/secrets/caddy_client.crt /run/secrets/caddy_client.key {
        # TLS 1.3 minimum + GCM-only ciphers. Project security baseline.
        # Closes QA finding. Consistent with docker/Caddyfile.acme.
        protocols tls1.3
        ciphers TLS_AES_256_GCM_SHA384 TLS_AES_128_GCM_SHA256
        curves x25519mlkem768 x25519 secp384r1 secp256r1
        client_auth {
          mode verify_if_given
          trust_pool file /run/secrets/ca_bundle.crt
        }
      }
      {{- else }}
      tls /run/secrets/caddy_client.crt /run/secrets/caddy_client.key {
        protocols tls1.3
        ciphers TLS_AES_256_GCM_SHA384 TLS_AES_128_GCM_SHA256
        curves x25519mlkem768 x25519 secp384r1 secp256r1
      }
      {{- end }}
      header {
        X-Content-Type-Options    "nosniff"
        X-Frame-Options           "DENY"
        Referrer-Policy           "no-referrer"
        Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'; form-action 'self'; report-uri /admin/csp-report; report-to default"
        Cross-Origin-Opener-Policy "same-origin"
        -Server
      }
      handle /healthz {
        reverse_proxy https://yashigani-gateway:8080 {
          {{- if .Values.mtls.enabled }}
          import internal-mtls-gateway
          {{- end }}
          import inject-caddy-verified
        }
      }
      # V10.3.5 sender-constrained tokens: client cert is verified at the
      # site-level `tls` block (above). Per-path: extract SPIFFE URI from the
      # validated peer cert and forward it as a header to the gateway.
      handle /v1/* {
        {{- if .Values.mtls.enabled }}
        request_header -X-SPIFFE-ID
        request_header X-SPIFFE-ID {http.request.tls.client.san.uris.0}
        {{- end }}
        reverse_proxy https://yashigani-gateway:8080 {
          {{- if .Values.mtls.enabled }}
          import internal-mtls-gateway
          {{- end }}
          import inject-caddy-verified
        }
      }
      handle /agents/* {
        {{- if .Values.mtls.enabled }}
        request_header -X-SPIFFE-ID
        request_header X-SPIFFE-ID {http.request.tls.client.san.uris.0}
        {{- end }}
        reverse_proxy https://yashigani-gateway:8080 {
          {{- if .Values.mtls.enabled }}
          import internal-mtls-gateway
          {{- end }}
          import inject-caddy-verified
        }
      }
      handle /mcp/* {
        reverse_proxy https://yashigani-gateway:8080 {
          {{- if .Values.mtls.enabled }}
          import internal-mtls-gateway
          {{- end }}
          import inject-caddy-verified
        }
      }
      # Iris Seam 15 (PR #145): gateway:8080 serves GET /openapi.json and
      # GET /docs (Swagger UI). Without explicit handles these fell through
      # to the Open WebUI catch-all and were functionally unreachable.
      handle /openapi.json {
        reverse_proxy https://yashigani-gateway:8080 {
          {{- if .Values.mtls.enabled }}
          import internal-mtls-gateway
          {{- end }}
          import inject-caddy-verified
        }
      }
      handle /docs {
        reverse_proxy https://yashigani-gateway:8080 {
          {{- if .Values.mtls.enabled }}
          import internal-mtls-gateway
          {{- end }}
          import inject-caddy-verified
        }
      }
      handle /admin/* {
        {{- if .Values.mtls.enabled }}
        # SIDE-001 (2026-05-19): inject Caddy's own SPIFFE identity on the
        # Caddy→backoffice leg so require_spiffe_id("/admin/agents") can verify
        # the caller.  Browser sessions arrive at Caddy without a client cert;
        # Caddy presents caddy_client.crt to backoffice via internal-mtls.
        # require_spiffe_id trusts x-spiffe-id when x-spiffe-id-peer-cert is
        # absent (uvicorn does not expose the ASGI TLS peer_cert extension).
        # The hardcoded "spiffe://yashigani.internal/caddy" matches the ACL
        # entry in service_identities.yaml endpoint_acls["/admin/agents"].
        # Parity with docker/Caddyfile.{selfsigned,ca,acme} (commit 8a1dbf5).
        request_header -X-SPIFFE-ID
        request_header X-SPIFFE-ID "spiffe://yashigani.internal/caddy"
        {{- end }}
        reverse_proxy https://yashigani-backoffice:8443 {
          {{- if .Values.mtls.enabled }}
          import internal-mtls-backoffice
          {{- end }}
          import inject-caddy-verified
        }
      }
      handle /auth/* {
        reverse_proxy https://yashigani-backoffice:8443 {
          {{- if .Values.mtls.enabled }}
          import internal-mtls-backoffice
          {{- end }}
          import inject-caddy-verified
        }
      }
      handle /me/* {
        reverse_proxy https://yashigani-backoffice:8443 {
          {{- if .Values.mtls.enabled }}
          import internal-mtls-backoffice
          {{- end }}
          import inject-caddy-verified
        }
      }
      handle /static/* {
        reverse_proxy https://yashigani-backoffice:8443 {
          {{- if .Values.mtls.enabled }}
          import internal-mtls-backoffice
          {{- end }}
          import inject-caddy-verified
        }
      }
      handle /login {
        reverse_proxy https://yashigani-backoffice:8443 {
          {{- if .Values.mtls.enabled }}
          import internal-mtls-backoffice
          {{- end }}
          import inject-caddy-verified
        }
      }
      # ── Open WebUI — catch-all (LAURA-V231-010 fix) ──────────────────────────
      # Strip any externally-supplied identity headers before auth runs.
      # Prevents X-Forwarded-User spoofing: an unauthenticated client must
      # not be able to forge the trusted-email header open-webui consumes.
      # Mirrors docker/Caddyfile.selfsigned catch-all handle block exactly.
      handle {
        request_header -X-Forwarded-User
        request_header -X-Forwarded-Name
        request_header -X-Forwarded-Groups

        # Forward auth: validate session cookie against backoffice.
        # On 200: copies X-Forwarded-User/Name/Email from auth response.
        # On 401: redirect to login page.
        forward_auth https://yashigani-backoffice:8443 {
          {{- if .Values.mtls.enabled }}
          import internal-mtls-backoffice
          {{- end }}
          import inject-caddy-verified
          uri /auth/verify
          copy_headers X-Forwarded-User X-Forwarded-Name X-Forwarded-Email

          @unauthorized status 401
          handle_response @unauthorized {
            redir * /login?next={http.request.uri} 302
          }
        }

        # inject-caddy-verified: open-webui does not validate the header but
        # we inject it uniformly across all reverse_proxy blocks. Auth is
        # enforced by the forward_auth block above. Closes LU-231-10-A.
        reverse_proxy open-webui:8080 {
          import inject-caddy-verified
          header_up X-Forwarded-Proto https
          header_up X-Real-IP {remote_host}
          header_up X-Forwarded-User {http.request.header.X-Forwarded-User}
          header_up X-Forwarded-Name {http.request.header.X-Forwarded-Name}
          header_up X-Forwarded-Email {http.request.header.X-Forwarded-Email}
        }
      }
    }
    {{- if .Values.caddy.internalMetricsListener.enabled }}
    # ────────────────────────────────────────────────────────────────────────
    # EX-231-08 (+ #81) — SPIFFE-gated internal observability listeners.
    # Last updated: 2026-04-24T13:47:12+01:00
    # See docker/Caddyfile.acme for the full comment block.
    # Requires ca_intermediate.crt + caddy_client.{crt,key} mounted at /run/secrets.
    #
    # NOTE (retro #81-b): this Helm ConfigMap hand-codes a stripped Caddyfile
    # that is deliberately NOT full-parity with docker/Caddyfile.acme. Full
    # parity is a separate v2.23.2 work item (#76) — do not merge the two
    # files until that item lands.
    #
    # Split-listener design (was: single :8444 with Host-header matcher):
    #   :8444 -> yashigani-gateway:8080
    #   :8445 -> yashigani-backoffice:8443
    # Prometheus v3.x rejects setting Host via http_headers, so each upstream
    # gets its own port. Both listeners enforce the identical SPIFFE URI gate.
    # ────────────────────────────────────────────────────────────────────────
    :{{ .Values.caddy.internalMetricsListener.port }} {
      tls /run/secrets/caddy_client.crt /run/secrets/caddy_client.key {
        client_auth {
          mode require_and_verify
          trust_pool file /run/secrets/ca_bundle.crt
        }
        protocols tls1.3
        ciphers TLS_AES_256_GCM_SHA384 TLS_AES_128_GCM_SHA256
        curves x25519mlkem768 x25519 secp384r1 secp256r1
      }
      @metrics path /internal/metrics
      handle @metrics {
        request_header -X-SPIFFE-ID
        request_header X-SPIFFE-ID {http.request.tls.client.san.uris.0}
        reverse_proxy https://yashigani-gateway:8080 {
          transport http {
            tls
            tls_trust_pool file /run/secrets/ca_bundle.crt
            tls_client_auth /run/secrets/caddy_client.crt /run/secrets/caddy_client.key
            tls_server_name gateway
          }
          import inject-caddy-verified
        }
      }
      handle {
        respond "Not Found" 404
      }
    }
    {{- end }}
    {{- if .Values.caddy.internalMetricsListenerBackoffice.enabled }}
    # Parallel listener for the backoffice upstream — identical SPIFFE gate,
    # identical strip-before-set header discipline. #81 split-listener design.
    :{{ .Values.caddy.internalMetricsListenerBackoffice.port }} {
      tls /run/secrets/caddy_client.crt /run/secrets/caddy_client.key {
        client_auth {
          mode require_and_verify
          trust_pool file /run/secrets/ca_bundle.crt
        }
        protocols tls1.3
        ciphers TLS_AES_256_GCM_SHA384 TLS_AES_128_GCM_SHA256
        curves x25519mlkem768 x25519 secp384r1 secp256r1
      }
      @metrics path /internal/metrics
      handle @metrics {
        request_header -X-SPIFFE-ID
        request_header X-SPIFFE-ID {http.request.tls.client.san.uris.0}
        reverse_proxy https://yashigani-backoffice:8443 {
          transport http {
            tls
            tls_trust_pool file /run/secrets/ca_bundle.crt
            tls_client_auth /run/secrets/caddy_client.crt /run/secrets/caddy_client.key
            tls_server_name backoffice
          }
          import inject-caddy-verified
        }
      }
      handle {
        respond "Not Found" 404
      }
    }
    {{- end }}
{{- end }}

{{/*
── Partition maintenance script ConfigMap ──────────────────────────────────────
  The partition_maintenance.py script is NOT baked into the gateway image
  (only the gateway service entrypoint lives there). Mount it via ConfigMap so
  the CronJob can invoke it without requiring an image rebuild.
  See: partition-cronjob.yaml for mount and command usage.
  Finding D regression fix 2026-05-01.
*/}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "yashigani.fullname" . }}-partition-script
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
    app.kubernetes.io/component: db-maintenance
data:
  partition_maintenance.py: |
    #!/usr/bin/env python3
    """
    Yashigani DB Partition Maintenance
    ====================================
    Ensures the current month + next `months_ahead` months of audit_events and
    inference_events partitions exist.

    Safe to run repeatedly — CREATE TABLE IF NOT EXISTS semantics.
    Called from pg_cron or the Kubernetes CronJob on the 1st of each month at 00:05 UTC.

    Usage:
        DATABASE_URL=postgresql://user:pass@host/db python scripts/partition_maintenance.py
        python scripts/partition_maintenance.py --months-ahead 6

    Last updated: 2026-05-01T23:47:00+01:00
    mTLS fix: extract sslrootcert/sslcert/sslkey from DSN, build ssl.SSLContext
    for asyncpg (asyncpg does not parse libpq ssl params from DSN query string).
    """
    from __future__ import annotations

    import argparse
    import asyncio
    import logging
    import os
    import re
    import ssl
    import sys
    from datetime import date
    from urllib.parse import urlparse, parse_qs, urlencode, urlunparse

    logger = logging.getLogger(__name__)

    # Identifier quoting: only allow identifiers that are safe ASCII alphanumeric +
    # underscore, matching the naming convention enforced by _PARTITIONED_TABLES and
    # _partition_name().  This is a defence-in-depth guard — asyncpg DDL params
    # bind date literals; we use safe quoting for the identifier tokens.
    _SAFE_IDENT_RE = re.compile(r"^[a-zA-Z_][a-zA-Z0-9_]*$")


    def _quote_ident(name: str) -> str:
        """Quote a PostgreSQL identifier safely."""
        if not _SAFE_IDENT_RE.match(name):
            raise ValueError(
                f"Identifier {name!r} contains characters outside [a-zA-Z0-9_] "
                "and cannot be safely quoted — possible injection attempt."
            )
        escaped = name.replace('"', '""')
        return f'"{escaped}"'


    _PARTITIONED_TABLES = ["audit_events", "inference_events"]


    def _partition_range(year: int, month: int) -> tuple[date, date]:
        """Return (start_inclusive, end_exclusive) for a monthly partition."""
        start = date(year, month, 1)
        if month == 12:
            end = date(year + 1, 1, 1)
        else:
            end = date(year, month + 1, 1)
        return start, end


    def _partition_name(table: str, year: int, month: int) -> str:
        return f"{table}_{year}_{month:02d}"


    def _build_ssl_context(dsn: str) -> tuple[str, ssl.SSLContext | None]:
        """Extract libpq SSL params from DSN query string, build ssl.SSLContext.

        asyncpg does not parse sslrootcert/sslcert/sslkey from the DSN query
        string — it expects an ssl.SSLContext object or the string 'require'.
        This helper pulls the params out and returns a clean DSN + context.

        F-V232-002 (V14.4.1): sslmode=require (no server-cert validation)
        is intentionally unsupported.  Only verify-ca and verify-full are
        accepted.  Any other sslmode causes a hard failure so that
        misconfigured DSNs are caught at startup rather than silently
        bypassing TLS certificate validation.
        """
        parsed = urlparse(dsn)
        params = parse_qs(parsed.query, keep_blank_values=True)
        sslmode = params.pop("sslmode", [None])[0]
        sslrootcert = params.pop("sslrootcert", [None])[0]
        sslcert = params.pop("sslcert", [None])[0]
        sslkey = params.pop("sslkey", [None])[0]

        # Rebuild DSN without the extracted params
        new_query = urlencode({k: v[0] for k, v in params.items()})
        clean_dsn = urlunparse(parsed._replace(query=new_query))

        if sslmode is None or sslmode == "disable":
            return clean_dsn, None

        if sslmode not in ("verify-ca", "verify-full"):
            raise ValueError(
                f"F-V232-002: sslmode='{sslmode}' is not permitted. "
                "Only verify-ca and verify-full are accepted — sslmode=require "
                "disables server certificate validation and is a security "
                "violation per V14.4.1. Update the DSN to use sslmode=verify-ca."
            )

        ctx = ssl.create_default_context(cafile=sslrootcert)
        if sslcert and sslkey:
            ctx.load_cert_chain(certfile=sslcert, keyfile=sslkey)
        # verify-ca: validate cert against CA but skip hostname check
        # (hostname is validated at the mTLS/SPIFFE layer).
        # verify-full: validate cert AND hostname (used for external postgres).
        if sslmode == "verify-ca":
            ctx.check_hostname = False
        # verify-full leaves check_hostname=True (default) — nothing to patch.
        return clean_dsn, ctx


    async def ensure_partitions(conn_dsn: str, months_ahead: int = 3) -> dict[str, list[str]]:
        """
        Ensure partitions exist for the current month through months_ahead months forward.
        Returns a dict mapping table name to list of partition names ensured.
        """
        try:
            import asyncpg
        except ImportError:
            logger.error("asyncpg is required. pip install asyncpg")
            sys.exit(1)

        clean_dsn, ssl_ctx = _build_ssl_context(conn_dsn)
        conn_kwargs: dict = {"ssl": ssl_ctx} if ssl_ctx is not None else {}
        conn = await asyncpg.connect(clean_dsn, **conn_kwargs)
        created: dict[str, list[str]] = {t: [] for t in _PARTITIONED_TABLES}

        try:
            today = date.today().replace(day=1)
            for i in range(months_ahead + 1):
                month_offset = today.month - 1 + i
                year = today.year + month_offset // 12
                month = month_offset % 12 + 1
                start, end = _partition_range(year, month)

                for table in _PARTITIONED_TABLES:
                    name = _partition_name(table, year, month)
                    # Safe identifier quoting — _quote_ident rejects any name
                    # that doesn't match [a-zA-Z_][a-zA-Z0-9_]* before the
                    # statement is composed (CWE-89, YSG-RISK-001 #3ar).
                    # Date literals are formatted directly as ISO-8601 strings
                    # (YYYY-MM-DD). asyncpg bind parameters ($1/$2) are NOT
                    # supported in DDL statements like CREATE TABLE — the server
                    # reports "expects 0 arguments" and fails. The date values
                    # come from Python date arithmetic (not user input) so
                    # direct string interpolation is safe here.
                    q_name = _quote_ident(name)
                    q_table = _quote_ident(table)
                    await conn.execute(
                        f"CREATE TABLE IF NOT EXISTS {q_name}"
                        f" PARTITION OF {q_table}"
                        f" FOR VALUES FROM ('{start.isoformat()}') TO ('{end.isoformat()}')"
                    )
                    created[table].append(name)
                    logger.info("Partition %s: OK", name)
        finally:
            await conn.close()

        return created


    def main() -> None:
        logging.basicConfig(
            level=logging.INFO,
            format="%(asctime)s %(levelname)s %(message)s",
        )

        parser = argparse.ArgumentParser(
            description="Create missing audit/inference log partitions"
        )
        parser.add_argument(
            "--months-ahead",
            type=int,
            default=3,
            help="Number of future months to pre-create (default: 3)",
        )
        args = parser.parse_args()

        dsn = os.environ.get("DATABASE_URL")
        if not dsn:
            logger.error("DATABASE_URL environment variable is required")
            sys.exit(1)

        created = asyncio.run(ensure_partitions(dsn, months_ahead=args.months_ahead))

        total = sum(len(v) for v in created.values())
        print(f"Partition maintenance complete: {total} partition(s) ensured.")
        for table, names in created.items():
            for name in names:
                print(f"  {name}: OK")


    if __name__ == "__main__":
        main()

{{- /* B-K8S-4: yashigani-prometheus-web-config ConfigMap removed.
  web-config.yml is now a second key in yashigani-prometheus-config (prometheus.yaml),
  served via the whole-dir /etc/prometheus mount. Separate ConfigMap + subPath
  is blocked on containerd: subPath into an already-mounted dir is not allowed.
*/ -}}

{{- if and .Values.grafana.enabled .Values.mtls.enabled }}
{{/*
── Grafana provisioning ConfigMap ─────────────────────────────────────────────
  retro #83: datasource provisioning YAMLs with mTLS config.
  Mounted at /etc/grafana/provisioning in the Grafana StatefulSet.
  $__file{} references resolved at runtime from /run/secrets (pki-certs volume).
  Trust anchor: ca_intermediate.crt (Pattern B — never ca_root.crt).
*/}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: yashigani-grafana-provisioning
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-grafana-provisioning
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "yashigani.labels" . | nindent 4 }}
data:
  datasources_prometheus.yml: |
    # retro #83: Grafana → Prometheus datasource over mTLS (Pattern B).
    # TA-1/TA-2: mTLS prevents impersonation and eavesdropping on obs network.
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: https://{{ include "yashigani.fullname" . }}-prometheus:9090
        isDefault: true
        editable: false
        jsonData:
          timeInterval: "15s"
          tlsAuth: true
          tlsAuthWithCACert: true
          tlsSkipVerify: false
        secureJsonData:
          tlsCACert: $__file{/run/secrets/ca_intermediate.crt}
          tlsClientCert: $__file{/run/secrets/grafana_client.crt}
          tlsClientKey: $__file{/run/secrets/grafana_client.key}
  datasources_loki.yml: |
    # retro #83: Grafana → Loki datasource over mTLS (Pattern B).
    # NOTE: Loki TLS termination enabled by parallel PR #84.
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        access: proxy
        url: https://{{ include "yashigani.fullname" . }}-loki:3100
        isDefault: false
        version: 1
        editable: false
        jsonData:
          maxLines: 1000
          tlsAuth: true
          tlsAuthWithCACert: true
          tlsSkipVerify: false
          derivedFields:
            - datasourceUid: jaeger
              matcherRegex: '"trace_id":"(\w+)"'
              name: TraceID
              url: "$${__value.raw}"
        secureJsonData:
          tlsCACert: $__file{/run/secrets/ca_intermediate.crt}
          tlsClientCert: $__file{/run/secrets/grafana_client.crt}
          tlsClientKey: $__file{/run/secrets/grafana_client.key}
  datasources_jaeger.yml: |
    # retro #83: Jaeger query/UI port (16686) remains HTTP on obs-internal.
    # EX-231-09 closed otel-collector → Jaeger gRPC (4317) mTLS separately.
    # Jaeger UI TLS deferred to v2.24 (RETRO-84).
    apiVersion: 1
    datasources:
      - name: Jaeger
        type: jaeger
        uid: jaeger
        access: proxy
        url: http://{{ include "yashigani.fullname" . }}-jaeger:16686
        isDefault: false
        version: 1
        editable: false
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            filterByTraceID: true
            filterBySpanID: false
            customQuery: false
            query: '{service="${__tags.service}"}'
          tracesToMetrics:
            datasourceUid: prometheus
            tags: [{key: "service.name", value: "service"}]
            queries:
              - name: "Request Rate"
                query: "rate(yashigani_gateway_requests_total[$__rate_interval])"
{{- end }}
{{- /*
  Backup script ConfigMap (MP.L2-3.8.9)
  Embeds scripts/backup.sh so the backup CronJob can invoke it without
  requiring a custom image build. The gateway image already carries the
  age binary (installed in Dockerfile.gateway).
  See: backup-cronjob.yaml for mount and command usage.
  Last updated: 2026-05-09T00:00:00+01:00
*/}}
{{- if .Values.backup.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "yashigani.fullname" . }}-backup-script
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
  annotations:
    yashigani.io/finding: "MP.L2-3.8.9"
    yashigani.io/cwe: "CWE-312"
data:
  backup.sh: |
    #!/usr/bin/env bash
    # Yashigani backup.sh — age-encrypted backup (MP.L2-3.8.9 / CMMC L2)
    # Helm-embedded copy of scripts/backup.sh.
    # Last updated: 2026-05-09T00:00:00+01:00
    set -euo pipefail
    umask 077
    RECIPIENT_KEY_FILE="${YASHIGANI_BACKUP_RECIPIENT:-/etc/yashigani/backup-recipient.age.pub}"
    OUTPUT_DIR="${YASHIGANI_BACKUP_OUTPUT_DIR:-/var/lib/yashigani/backups}"
    SOURCE_DIR="${YASHIGANI_BACKUP_SOURCE_DIR:-/var/lib/yashigani}"
    log_info()    { printf "    --> %s\n" "$*"; }
    log_success() { printf "    ok  %s\n" "$*"; }
    log_error()   { printf "    !!  ERROR: %s\n" "$*" >&2; }
    if ! command -v age >/dev/null 2>&1; then
      log_error "age binary not found. Install: apt-get install -y age (or apk add age)"
      exit 1
    fi
    if [[ ! -f "${RECIPIENT_KEY_FILE}" ]]; then
      log_error "Recipient public key not found: ${RECIPIENT_KEY_FILE}"
      log_error "Provision ConfigMap '${YASHIGANI_BACKUP_RECIPIENT_CONFIGMAP:-yashigani-backup-recipient}' with key recipient.age.pub"
      log_error "See docs/operations/backup.md"
      exit 1
    fi
    RECIPIENT_KEY="$(< "${RECIPIENT_KEY_FILE}")"
    RECIPIENT_KEY="${RECIPIENT_KEY%%$'\n'*}"
    RECIPIENT_KEY="${RECIPIENT_KEY%"${RECIPIENT_KEY##*[![:space:]]}"}"
    if [[ -z "${RECIPIENT_KEY}" || "${RECIPIENT_KEY}" != age1* ]]; then
      log_error "Invalid recipient key in ${RECIPIENT_KEY_FILE} — must start with 'age1'"
      exit 1
    fi
    if [[ ! -d "${SOURCE_DIR}" ]]; then
      log_error "Source directory not found: ${SOURCE_DIR}"
      exit 1
    fi
    mkdir -p "${OUTPUT_DIR}"
    chmod 0700 "${OUTPUT_DIR}"
    TIMESTAMP="$(date -u +%Y%m%d_%H%M%S)"
    OUTPUT_FILE="${OUTPUT_DIR}/${TIMESTAMP}.tar.gz.age"
    TMP_OUTPUT="${OUTPUT_DIR}/.tmp-${TIMESTAMP}-$$.tar.gz.age"
    trap 'rm -f "${TMP_OUTPUT}" 2>/dev/null; exit 1' INT TERM
    TAR_STATUS=0
    ENCRYPT_STATUS=0
    { tar --create --gzip --directory "$(dirname "${SOURCE_DIR}")" "$(basename "${SOURCE_DIR}")" 2>/dev/null; TAR_STATUS=$?; } \
      | age --encrypt --recipient "${RECIPIENT_KEY}" --output "${TMP_OUTPUT}" 2>/dev/null
    ENCRYPT_STATUS=$?
    if [[ "${TAR_STATUS}" -ne 0 ]]; then
      rm -f "${TMP_OUTPUT}" 2>/dev/null || true; trap - INT TERM
      log_error "tar failed (exit ${TAR_STATUS})"
      exit 1
    fi
    if [[ "${ENCRYPT_STATUS}" -ne 0 ]]; then
      rm -f "${TMP_OUTPUT}" 2>/dev/null || true; trap - INT TERM
      log_error "age encryption failed (exit ${ENCRYPT_STATUS})"
      exit 1
    fi
    mv "${TMP_OUTPUT}" "${OUTPUT_FILE}"
    trap - INT TERM
    chmod 0400 "${OUTPUT_FILE}"
    log_success "Encrypted backup: ${OUTPUT_FILE} ($(du -sh "${OUTPUT_FILE}" | awk '{print $1}'))"
{{- end }}
