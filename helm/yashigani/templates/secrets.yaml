{{/*
  Auto-generated secrets for services that do not specify an existingSecretName.
  In production, set existingSecretName for each service or use external-secrets-operator.
  These generated secrets use random 32-byte alphanumeric strings.

  UPGRADE SAFETY: All secrets use helm `lookup` to preserve existing values on upgrade.
  randAlphaNum is called ONLY on first install (when the secret does not yet exist).
  This prevents password/key rotation on every `helm upgrade`, which would break
  stateful services (postgres, redis) whose data was initialized with the original value.

  Bug history: randAlphaNum without lookup caused postgres_password to rotate on
  revision 4 upgrade (2026-04-30), breaking gateway SSL auth to pgbouncer because
  the DB user password was initialized with the rev-3 value and was not rotated with it.
  Fixed at tip 54e607a closure (2026-04-30). Reference: secrets.yaml upgrade-safety fix.
*/}}

{{- if not .Values.global.useExternalSecrets }}

{{/*
  Captain Bucket-C: per-install internal bearer token for agent→gateway auth.
  Auto-generates a 32-byte hex token on first install; preserves it on upgrade
  via helm lookup (same upgrade-safety pattern as all other secrets here).
  If internalBearer.value is non-empty, that value is used verbatim (operator-supplied).
  If internalBearer.existingSecretName is set, this block is skipped entirely.
*/}}
{{- if not .Values.internalBearer.existingSecretName }}
{{- $ibSecret := lookup "v1" "Secret" .Release.Namespace "yashigani-agent-bearer" }}
---
apiVersion: v1
kind: Secret
metadata:
  name: yashigani-agent-bearer
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
type: Opaque
data:
  yashigani_internal_bearer: {{ if $ibSecret }}{{ index $ibSecret.data "yashigani_internal_bearer" | quote }}{{ else if .Values.internalBearer.value }}{{ .Values.internalBearer.value | b64enc | quote }}{{ else }}{{ randAlphaNum 64 | b64enc | quote }}{{ end }}
{{- end }}

{{- if not .Values.postgres.existingSecretName }}
{{- $pgSecret := lookup "v1" "Secret" .Release.Namespace "yashigani-postgres-secrets" }}
---
