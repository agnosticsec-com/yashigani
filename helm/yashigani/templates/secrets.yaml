  name: yashigani-openclaw-token
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
type: Opaque
data:
  # BUG-NEW-001 fix: openclaw bundle references yashigani-openclaw-token Secret
  # (values.yaml agentBundles.openclaw.tokenSecretName) but secrets.yaml had no
  # corresponding creation block. Mirrors the langflow/letta pattern exactly.
  # Upgrade-safe: lookup preserves existing token on helm upgrade.
  token: {{ if $ocToken }}{{ index $ocToken.data "token" | quote }}{{ else }}{{ randAlphaNum 32 | b64enc | quote }}{{ end }}
{{- end }}

