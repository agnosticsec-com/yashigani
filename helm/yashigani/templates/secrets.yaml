{{- end }}

{{/*
  YSG-RISK-049 CLOSED v2.24.0 — dedicated pgbouncer authenticator Secret.
  Option C isolation (Laura C7 + Iris §7): NOT co-located in yashigani-postgres-secrets.
  Mounted ONLY into pgbouncer pods. YSG-SECRETS-DIST-002 blast radius unchanged.

  Operator provisioning instructions:
    Option A — Helm auto-generate (non-KMS, dev/standalone):
      The block below auto-generates a 32-char alphanumeric password on first
      install and preserves it on upgrade via helm lookup. No operator action needed.
      The same value must be given to Tom's 10-pgbouncer-auth.sh init script as
      PGBOUNCER_AUTHENTICATOR_PASSWORD so postgres creates the role with this password.

    Option B — Operator-supplied (production, non-KMS):
      helm upgrade ... --set pgbouncer.authSecretName=<your-secret-name>
      Then create the Secret manually:
        kubectl create secret generic <your-secret-name> \
          --from-literal=pgbouncer_authenticator_password=<your-password> \
          -n <namespace>
      And ensure 10-pgbouncer-auth.sh received the same password at postgres init.

    Option C — External Secrets Operator (KMS-configured production):
      Set pgbouncer.authSecretName to an ExternalSecret-backed K8s Secret name.
      The KMS provider injects pgbouncer_authenticator_password at runtime.
      Same gate as postgres_password — src/yashigani/kms/ architecture.
*/}}
{{- if not .Values.pgbouncer.authSecretName }}
{{- $pbAuthSecret := lookup "v1" "Secret" .Release.Namespace "yashigani-pgbouncer-auth-secret" }}
---
apiVersion: v1
kind: Secret
metadata:
  name: yashigani-pgbouncer-auth-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
type: Opaque
data:
  pgbouncer_authenticator_password: {{ if $pbAuthSecret }}{{ index $pbAuthSecret.data "pgbouncer_authenticator_password" | quote }}{{ else }}{{ randAlphaNum 32 | b64enc | quote }}{{ end }}
{{- end }}

{{- if .Values.agentBundles.langflow.enabled }}
{{- $lfToken := lookup "v1" "Secret" .Release.Namespace "yashigani-langflow-token" }}
---
apiVersion: v1
kind: Secret
metadata:
  name: yashigani-langflow-token
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
type: Opaque
data:
  # fix(helm): #140 completion — agent-bundles.yaml secretKeyRef.key is "token"
  # Upgrade-safe: lookup preserves existing token on helm upgrade.
  token: {{ if $lfToken }}{{ index $lfToken.data "token" | quote }}{{ else }}{{ randAlphaNum 32 | b64enc | quote }}{{ end }}
{{- end }}

{{- if .Values.agentBundles.letta.enabled }}
{{- $lettaToken := lookup "v1" "Secret" .Release.Namespace "yashigani-letta-token" }}
