{{- if not .Values.backoffice.existingSecretName }}
{{- $boSecret := lookup "v1" "Secret" .Release.Namespace "yashigani-backoffice-secrets" }}
---
apiVersion: v1
kind: Secret
metadata:
  name: yashigani-backoffice-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
type: Opaque
data:
  jwt_secret: {{ if $boSecret }}{{ index $boSecret.data "jwt_secret" | quote }}{{ else }}{{ randAlphaNum 64 | b64enc | quote }}{{ end }}
  hmac_secret: {{ if $boSecret }}{{ index $boSecret.data "hmac_secret" | quote }}{{ else }}{{ randAlphaNum 64 | b64enc | quote }}{{ end }}
  # v2.23.3 (#59): db_aes_key required for pgcrypto pgp_sym_encrypt on auth_settings (HIBP API key at rest).
  # Missing key → CreateContainerConfigError (backoffice fails to start). Upgrade-safe: lookup preserves value.
  # Iris coord #1 (v2.25.0 P2): when backoffice.dbAesKey is non-empty, use it verbatim (operator-supplied).
  # Priority order: 1) existing Secret (upgrade-safe), 2) backoffice.dbAesKey, 3) randAlphaNum (fresh install).
  db_aes_key: {{ if $boSecret }}{{ index $boSecret.data "db_aes_key" | quote }}{{ else if .Values.backoffice.dbAesKey }}{{ .Values.backoffice.dbAesKey | b64enc | quote }}{{ else }}{{ randAlphaNum 64 | b64enc | quote }}{{ end }}
{{- end }}

