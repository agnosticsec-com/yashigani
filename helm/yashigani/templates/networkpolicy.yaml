# Open WebUI egress — EX-231-10: LLM calls route through Caddy, not gateway
# directly. open-webui connects to Caddy:443, which proxies to gateway:8080.
# This enforces the Caddy-centric model for all ingress to gateway.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-open-webui-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: open-webui
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-caddy
      ports:
        - protocol: TCP
          port: 443

---
# Prometheus — accept ingress from grafana and from caddy / nginx-ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: yashigani-prometheus
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-grafana
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-caddy
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 9090

---
# Prometheus egress — EX-231-10: scrape via Caddy only (not direct to pods).
# When Caddy internal metrics listeners are enabled (default), Prometheus
# scrapes gateway via caddy:8444 and backoffice via caddy:8445. The direct
# pod-scrape ports (:8080/:8443) are ONLY emitted when the listeners are
# explicitly disabled (non-default, deliberate testing only).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: yashigani-prometheus
  policyTypes:
    - Egress
  egress:
    {{- if .Values.caddy.internalMetricsListener.enabled }}
    # Scrape gateway via Caddy :8444 (SPIFFE-gated mTLS listener)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-caddy
      ports:
        - protocol: TCP
          port: {{ .Values.caddy.internalMetricsListener.port }}
    {{- end }}
    {{- if .Values.caddy.internalMetricsListenerBackoffice.enabled }}
    # Scrape backoffice via Caddy :8445 (SPIFFE-gated mTLS listener)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-caddy
      ports:
        - protocol: TCP
          port: {{ .Values.caddy.internalMetricsListenerBackoffice.port }}
    {{- end }}
    {{- if not .Values.caddy.internalMetricsListener.enabled }}
    # Direct gateway scrape — only when Caddy metrics listener is explicitly disabled.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-gateway
      ports:
        - protocol: TCP
          port: 8080
    {{- end }}
    {{- if not .Values.caddy.internalMetricsListenerBackoffice.enabled }}
    # Direct backoffice scrape — only when Caddy metrics listener is explicitly disabled.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-backoffice
      ports:
        - protocol: TCP
          port: 8443
    {{- end }}
    # Prometheus self-scrape + alertmanager + loki
    - to:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 9090
        - protocol: TCP
          port: 9093
        - protocol: TCP
          port: 3100

