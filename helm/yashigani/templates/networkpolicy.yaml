{{- if .Values.networkPolicies.enabled }}
# Last updated: 2026-04-30T19:30:00+01:00
# NetworkPolicy — default-deny with explicit allow rules per service.
# Enforces the principle of least privilege for intra-cluster traffic.
#
# EX-231-10 (2026-04-29): Caddy-centric isolation.
# Tiago directive: Caddy is the SOLE ingress to backoffice and gateway.
# Rules implemented:
#   - backoffice ingress: caddy ONLY (removed prometheus direct scrape)
#   - gateway ingress: caddy ONLY (removed open-webui direct access,
#     removed prometheus direct scrape)
#   - prometheus egress: via Caddy :8444/:8445 ONLY (when metrics listeners
#     enabled); direct pod-scrape egress only when listeners explicitly disabled
#   - open-webui egress: via Caddy :443 only
#   - helm test pods: via Caddy only (test connects to caddy, not direct)
#
# NOTE: Pod selectors use app.kubernetes.io/name labels, which match the
# labels emitted by every Deployment and StatefulSet in this chart.
# The legacy "app: yashigani-<service>" labels have been corrected to
# app.kubernetes.io/name: <service> throughout.

---
# Default deny-all ingress for the namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# Default deny-all egress for the namespace (allow-list per service below)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress

---
# Allow DNS resolution for all pods (required for service discovery)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# Gateway — accept ingress from Caddy ONLY (EX-231-10: Caddy is sole ingress).
# open-webui is removed — in K8s it must route through Caddy's :443 listener.
# nginx-ingress retained for installations using tlsMode=nginx (Caddy bypassed).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: yashigani-gateway
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-caddy
        # nginx-ingress controller pods (namespace may differ per cluster).
        # Only active when global.tlsMode=nginx — Caddy is bypassed in that mode.
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080

---
# Gateway egress — allow outbound to policy, redis, budget-redis, ollama, postgres (via pgbouncer), OTEL
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: yashigani-gateway
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-policy
      ports:
        - protocol: TCP
          port: 8181
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-redis
      ports:
        - protocol: TCP
          port: {{ if .Values.mtls.enabled }}6380{{ else }}6379{{ end }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-budget-redis
      ports:
        - protocol: TCP
          port: {{ if .Values.mtls.enabled }}6380{{ else }}6379{{ end }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-ollama
      ports:
        - protocol: TCP
          port: 11434
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-pgbouncer
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: otel-collector
      ports:
        - protocol: TCP
          port: 4317

---
# Backoffice — accept ingress from caddy / nginx-ingress only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backoffice-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: yashigani-backoffice
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-caddy
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8443

---
# Backoffice egress — policy, redis, budget-redis, ollama, pgbouncer
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backoffice-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: yashigani-backoffice
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-policy
      ports:
        - protocol: TCP
          port: 8181
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-redis
      ports:
        - protocol: TCP
          port: {{ if .Values.mtls.enabled }}6380{{ else }}6379{{ end }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-budget-redis
      ports:
        - protocol: TCP
          port: {{ if .Values.mtls.enabled }}6380{{ else }}6379{{ end }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-ollama
      ports:
        - protocol: TCP
          port: 11434
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-pgbouncer
      ports:
        - protocol: TCP
          port: 5432
    # Direct-to-postgres for bootstrap-class advisory locks only.
    # run_migrations() acquires a session-scoped pg_advisory_lock directly on
    # the postgres backend — pgbouncer transaction-pool mode routes each new
    # connection to a DIFFERENT backend, so two replicas can each "acquire"
    # the same key independently without serialisation. The direct path puts
    # both lock connections on the same backend process, where advisory locks
    # actually serialise. Captain #58c retro #3bw/#3bx. Scoped to port 5432
    # only; backoffice app-traffic still goes through pgbouncer.
    {{- if .Values.mtls.enabled }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-postgres
      ports:
        - protocol: TCP
          port: 5432
    {{- end }}

