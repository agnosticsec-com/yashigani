# app.kubernetes.io/component=test by the test templates. Default-deny
# catches them otherwise. Additive to existing ingress rules.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-helm-test-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: test
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-gateway
      ports:
        - protocol: TCP
          port: 8080
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-backoffice
      ports:
        - protocol: TCP
          port: 8443
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-redis
      ports:
        - protocol: TCP
          port: {{ if .Values.mtls.enabled }}6380{{ else }}6379{{ end }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-budget-redis
      ports:
        - protocol: TCP
          port: {{ if .Values.mtls.enabled }}6380{{ else }}6379{{ end }}

---
