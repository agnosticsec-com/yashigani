---
# OpenClaw — additional external egress for messaging channel webhooks.
# SECURITY NOTE: This rule allows all outbound HTTPS from openclaw pods.
# Tighten to known webhook IPs in production if your network permits.
{{- if .Values.agentBundles.openclaw.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-openclaw-external-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      yashigani.io/bundle: openclaw
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
{{- end }}
