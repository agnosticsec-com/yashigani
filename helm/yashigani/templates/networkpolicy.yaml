---
# Ollama egress — allow outbound to pull models from registry.ollama.ai
# SECURITY NOTE: Ollama requires external internet access for model pulls.
# Restrict to the ollama registry CIDR in production if possible, or use
# an OCI mirror to avoid this egress rule entirely.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ollama-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: yashigani-ollama
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80

