---
# Agent bundles — accept ingress from gateway only
# Applies to all enabled agent bundle Deployments via the bundle label.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-agent-bundle-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: agent-bundle
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-gateway
      ports:
        - protocol: TCP
          port: 8000    # langgraph
        - protocol: TCP
          port: 18789   # openclaw

---
# Agent bundles — egress to gateway only (all LLM calls route through gateway)
# openclaw also needs external internet for messaging webhooks — its egress is
# handled by a separate rule below.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-agent-bundle-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: agent-bundle
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-gateway
      ports:
        - protocol: TCP
          port: 8080
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-redis
      ports:
        - protocol: TCP
          port: {{ if .Values.mtls.enabled }}6380{{ else }}6379{{ end }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-pgbouncer
      ports:
        - protocol: TCP
          port: 5432

---
# Helm test pods — transient pods spawned by `helm test` to validate
