---
# PostgreSQL — accept ingress from pgbouncer (app traffic) and backoffice
# (direct connection for session-scoped advisory lock during run_migrations).
# See allow-backoffice-egress comment above for rationale. Captain #58c #3bw.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: yashigani-postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-pgbouncer
      ports:
        - protocol: TCP
          port: 5432
    {{- if .Values.mtls.enabled }}
    # Backoffice direct connection for advisory-lock-based migration serialisation.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-backoffice
      ports:
        - protocol: TCP
          port: 5432
    {{- end }}

