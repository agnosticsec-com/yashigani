# NetworkPolicy — default-deny with explicit allow rules per service.
# Enforces the principle of least privilege for intra-cluster traffic.

---
# Default deny-all ingress for the namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: {{ .Release.Namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# Gateway — accept ingress from caddy and from /agents/* callers (labeled external-caller)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-ingress
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: yashigani-gateway
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: yashigani-caddy
        - podSelector:
            matchLabels:
              app: yashigani-ingress
      ports:
        - protocol: TCP
          port: 8080

---
# Backoffice — accept ingress from caddy only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backoffice-ingress
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: yashigani-backoffice
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: yashigani-caddy
        - podSelector:
            matchLabels:
              app: yashigani-ingress
      ports:
        - protocol: TCP
          port: 8443

---
# Policy (OPA) — accept ingress from gateway and backoffice only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-policy-ingress
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: yashigani-policy
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: yashigani-gateway
        - podSelector:
            matchLabels:
              app: yashigani-backoffice
      ports:
        - protocol: TCP
          port: 8181

---
# Redis — accept ingress from gateway and backoffice only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis-ingress
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: yashigani-redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: yashigani-gateway
        - podSelector:
            matchLabels:
              app: yashigani-backoffice
      ports:
        - protocol: TCP
          port: 6379

---
# Ollama — accept ingress from gateway only (inference is data-plane only)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ollama-ingress
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: yashigani-ollama
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: yashigani-gateway
        - podSelector:
            matchLabels:
              app: yashigani-backoffice
      ports:
        - protocol: TCP
          port: 11434

---
# Prometheus — accept ingress from grafana and from backoffice (scrape target)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-ingress
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: yashigani-prometheus
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: yashigani-grafana
        - podSelector:
            matchLabels:
              app: yashigani-caddy
        - podSelector:
            matchLabels:
              app: yashigani-ingress
      ports:
        - protocol: TCP
          port: 9090

---
# Grafana — accept ingress from caddy / nginx-ingress only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-grafana-ingress
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: yashigani-grafana
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: yashigani-caddy
        - podSelector:
            matchLabels:
              app: yashigani-ingress
      ports:
        - protocol: TCP
          port: 3000
