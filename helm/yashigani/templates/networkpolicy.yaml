# NetworkPolicy — default-deny with explicit allow rules per service.
# Enforces the principle of least privilege for intra-cluster traffic.
#
# NOTE: Pod selectors use app.kubernetes.io/name labels, which match the
# labels emitted by every Deployment and StatefulSet in this chart.
# The legacy "app: yashigani-<service>" labels have been corrected to
# app.kubernetes.io/name: <service> throughout.

---
# Default deny-all ingress for the namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# Default deny-all egress for the namespace (allow-list per service below)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress

---
# Allow DNS resolution for all pods (required for service discovery)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# Gateway — accept ingress from caddy (if enabled) and nginx-ingress controller
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: yashigani-gateway
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-caddy
        # nginx-ingress controller pods (namespace may differ per cluster)
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: open-webui
      ports:
        - protocol: TCP
          port: 8080

---
# Gateway egress — allow outbound to policy, redis, budget-redis, ollama, postgres (via pgbouncer), OTEL
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: yashigani-gateway
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-policy
      ports:
        - protocol: TCP
          port: 8181
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-redis
      ports:
        - protocol: TCP
          port: {{ if .Values.mtls.enabled }}6380{{ else }}6379{{ end }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-budget-redis
      ports:
        - protocol: TCP
          port: {{ if .Values.mtls.enabled }}6380{{ else }}6379{{ end }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-ollama
      ports:
        - protocol: TCP
          port: 11434
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-pgbouncer
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: otel-collector
      ports:
        - protocol: TCP
          port: 4317

---
# Backoffice — accept ingress from caddy / nginx-ingress only
