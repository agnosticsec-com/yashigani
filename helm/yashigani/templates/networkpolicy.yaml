        - protocol: TCP
          port: 5432

---
# Helm test pods — EX-231-10: gateway/backoffice tests go via Caddy (:443).
# Redis tests access Redis directly (Redis is data-plane, not the SPIFFE target).
# Transient pods spawned by `helm test`, annotated with helm.sh/hook=test
# and labelled app.kubernetes.io/component=test.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-helm-test-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: test
  policyTypes:
    - Egress
  egress:
    # gateway/backoffice health checks go via Caddy (EX-231-10).
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-caddy
      ports:
        - protocol: TCP
          port: 443
    # Redis tests access Redis directly (not in scope for Caddy-centric fix).
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-redis
      ports:
        - protocol: TCP
          port: {{ if .Values.mtls.enabled }}6380{{ else }}6379{{ end }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-budget-redis
      ports:
        - protocol: TCP
          port: {{ if .Values.mtls.enabled }}6380{{ else }}6379{{ end }}

---
