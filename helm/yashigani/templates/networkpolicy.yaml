# Tighten to known webhook IPs in production if your network permits.
{{- if .Values.agentBundles.openclaw.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-openclaw-external-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      yashigani.io/bundle: openclaw
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
{{- end }}

---
# Caddy ingress — accept external client connections on :443 and :80.
# With default-deny-ingress, LoadBalancer/NodePort traffic is blocked unless
# explicitly allowed. ipBlock 0.0.0.0/0 permits external clients.
# The SPIFFE-gated metrics listeners (:8444, :8445) allow ingress from
# Prometheus only (separate rule for allow-prometheus-to-caddy-metrics-ingress).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-caddy-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: yashigani-caddy
  policyTypes:
    - Ingress
  ingress:
    # External client traffic
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
    {{- if .Values.caddy.internalMetricsListener.enabled }}
    # Prometheus scrapes Caddy's SPIFFE-gated gateway metrics listener
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-prometheus
      ports:
        - protocol: TCP
          port: {{ .Values.caddy.internalMetricsListener.port }}
    {{- end }}
    {{- if .Values.caddy.internalMetricsListenerBackoffice.enabled }}
    # Prometheus scrapes Caddy's SPIFFE-gated backoffice metrics listener
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-prometheus
      ports:
        - protocol: TCP
          port: {{ .Values.caddy.internalMetricsListenerBackoffice.port }}
    {{- end }}

---
# Caddy egress — Caddy is the K8s public TLS edge (Option B parity with
# Docker/Podman compose). Under default-deny-egress, Caddy must be granted
# explicit egress to every upstream it reverse_proxies to; otherwise the
# kernel drops every connection and the front door 502s.
#
# Upstreams (mirrors helm/yashigani/templates/configmaps.yaml :443 site):
#   - yashigani-gateway:8080      (mTLS, /v1/* + /health)
#   - yashigani-backoffice:8443   (mTLS, /admin/* + /api/admin/*)
#   - open-webui:8080             (plain, only when openWebui.enabled)
#
# DNS (UDP/TCP 53) is already covered by allow-dns-egress for all pods.
# The :8444 / :8445 SPIFFE-gated metrics listeners are *ingress* on Caddy
# (Prometheus dials Caddy), so they don't appear in this egress list.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-caddy-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: yashigani-caddy
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-gateway
      ports:
        - protocol: TCP
          port: 8080
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-backoffice
      ports:
        - protocol: TCP
          port: 8443
    {{- if .Values.openWebui.enabled }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: open-webui
      ports:
        - protocol: TCP
          port: 8080
    {{- end }}
{{- end }}{{- /* networkPolicies.enabled */ -}}
