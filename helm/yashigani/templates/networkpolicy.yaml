---
# Redis — accept ingress from gateway, backoffice, and agent bundles
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: yashigani-redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-gateway
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-backoffice
        # langgraph agent uses redis for task queue (DB 5)
        - podSelector:
            matchLabels:
              yashigani.io/bundle: langgraph
      ports:
        - protocol: TCP
          port: {{ if .Values.mtls.enabled }}6380{{ else }}6379{{ end }}

