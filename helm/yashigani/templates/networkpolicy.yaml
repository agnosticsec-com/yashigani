    # Forward logs to Loki via OTLP HTTP
    {{- if .Values.loki.enabled }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: yashigani-loki
      ports:
        - protocol: TCP
          port: 3100
    {{- end }}
{{- end }}

{{- if .Values.jaeger.enabled }}
