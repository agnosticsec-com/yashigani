{{- if .Values.pgbouncer.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yashigani-pgbouncer
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-pgbouncer
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.pgbouncer.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: yashigani-pgbouncer
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: yashigani-pgbouncer
        app.kubernetes.io/instance: {{ .Release.Name }}
      {{- if .Values.mtls.enabled }}
      annotations:
        # Trigger rolling update when PKI Secret resourceVersion changes.
        # See gateway.yaml for full rationale.
        checksum/pki-certs: {{ lookup "v1" "Secret" .Release.Namespace .Values.mtls.secretName | default dict | dig "metadata" "resourceVersion" "" | quote }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "yashigani.serviceAccountName" . }}
      # /run/secrets mount collision — see redis.yaml note.
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 70
        runAsGroup: 70
        fsGroup: 70
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: pgbouncer
          image: "{{ .Values.pgbouncer.image.repository }}:{{ .Values.pgbouncer.image.tag }}"
          imagePullPolicy: {{ .Values.pgbouncer.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            # YSG-RISK-008: readOnlyRootFilesystem NOT set — edoburu/pgbouncer
            # writes userlist.txt to /etc/pgbouncer/ at startup. An emptyDir
            # overlay is incompatible with the subPath config mount already in
            # place. Documented exception; deferred to v2.23.3.
            capabilities:
              drop: ["ALL"]
          ports:
            - name: pgbouncer
              containerPort: 5432
              protocol: TCP
          # YSG-RISK-073 cycle 7 / YSG-RISK-077 (BUG-C7-001): cert auth + pg_ident.
          # pgbouncer authenticates to postgres as auth_user via TLS client cert
          # (pgbouncer-auth_client.crt, CN=pgbouncer-auth) — no password exchange.
          # DATABASE_URL still required for edoburu entrypoint (writes userlist.txt);
          # password component omitted — cert is sole credential for auth_user.
          # YSG-RISK-049 INIT-003 fix preserved: DATABASE_URL still exported at startup.
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              # YSG-RISK-073 cycle 7: cert auth — no password in DATABASE_URL.
              # pgbouncer_authenticator auth_user authenticates via cert (pgbouncer-auth_client.crt).
              # YSG-RISK-077: avoids pgbouncer 1.25.1 ARM64 SCRAM computation bug.
              export AUTH_TYPE=scram-sha-256
              export DATABASE_URL="postgresql://pgbouncer_authenticator@${POSTGRES_HOST}:5432/yashigani"
              exec /entrypoint.sh pgbouncer /etc/pgbouncer/pgbouncer.ini
          env:
            # YSG-RISK-073 cycle 7: DATABASE_URL exported without password.
            # No secret read required — cert auth replaces password auth for auth_user.
            # pgbouncer-auth-secret volume mount REMOVED (not needed for cert auth).
            # YSG-SECRETS-DIST-002 blast radius REDUCED — auth secret no longer mounted.
            - name: POSTGRES_HOST
              value: {{ include "yashigani.fullname" . }}-postgres
            - name: POOL_MODE
              value: {{ .Values.pgbouncer.env.poolMode | quote }}
            - name: MAX_CLIENT_CONN
              value: {{ .Values.pgbouncer.env.maxClientConn | quote }}
            - name: DEFAULT_POOL_SIZE
              value: {{ .Values.pgbouncer.env.defaultPoolSize | quote }}
          {{- if .Values.mtls.enabled }}
          # mTLS mode: pg_isready cannot negotiate client-cert TLS. Fall back
          # to a plain TCP connect against 127.0.0.1 — proves the listener is
          # up; real cert-auth gets exercised on the first gateway connect.
          readinessProbe:
            exec:
              command: ["sh", "-c", "nc -w 2 127.0.0.1 5432 </dev/null >/dev/null 2>&1"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          livenessProbe:
            exec:
              command: ["sh", "-c", "nc -w 2 127.0.0.1 5432 </dev/null >/dev/null 2>&1"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          {{- else }}
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -h localhost -p 5432"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -h localhost -p 5432"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          {{- end }}
          resources:
            {{- toYaml .Values.pgbouncer.resources | nindent 12 }}
          {{- if .Values.mtls.enabled }}
          volumeMounts:
            - name: pki-certs
              mountPath: /run/secrets
              readOnly: true
            - name: pgbouncer-config
              mountPath: /etc/pgbouncer/pgbouncer.ini
              subPath: pgbouncer.ini
              readOnly: true
            # YSG-RISK-073 cycle 7: pgbouncer-auth-secret volume removed.
            # cert auth means no password secret needed in pgbouncer container.
          {{- end }}
      {{- if .Values.mtls.enabled }}
      volumes:
        - name: pki-certs
          secret:
            secretName: {{ .Values.mtls.existingSecretName | default .Values.mtls.secretName }}
            defaultMode: 0440
        - name: pgbouncer-config
          configMap:
            name: yashigani-pgbouncer-config
        # YSG-RISK-073 cycle 7: pgbouncer-auth-secret volume removed.
        # pgbouncer authenticates via cert (pgbouncer-auth_client.crt in pki-certs).
        # No separate auth password Secret required.
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: yashigani-pgbouncer
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-pgbouncer
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  type: {{ .Values.pgbouncer.service.type }}
  selector:
    app.kubernetes.io/name: yashigani-pgbouncer
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: pgbouncer
      port: {{ .Values.pgbouncer.service.port }}
      targetPort: 5432
      protocol: TCP
{{- end }}
