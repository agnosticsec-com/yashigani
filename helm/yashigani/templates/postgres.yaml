{{- if .Values.postgres.enabled }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: yashigani-postgres
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  serviceName: yashigani-postgres
  replicas: {{ .Values.postgres.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: yashigani-postgres
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: yashigani-postgres
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "yashigani.serviceAccountName" . }}
      securityContext:
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: "yashigani"
            - name: POSTGRES_USER
              value: "yashigani_app"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.existingSecretName | default "yashigani-postgres-secrets" }}
                  key: postgres_password
          {{- if .Values.mtls.enabled }}
          # mTLS mode: pg_hba.conf rewrites to hostssl+clientcert=verify-ca
          # for anything non-local, which pg_isready cannot satisfy without
          # cert flags. Hit the local unix socket instead (pg_hba keeps
          # `local all all trust` so the probe just checks the process is
          # accepting connections).
          readinessProbe:
            exec:
              command: ["pg_isready", "-h", "/var/run/postgresql", "-U", "yashigani_app", "-d", "yashigani"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-h", "/var/run/postgresql", "-U", "yashigani_app", "-d", "yashigani"]
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          {{- else }}
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "yashigani_app", "-d", "yashigani"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "yashigani_app", "-d", "yashigani"]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          {{- end }}
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            {{- if .Values.mtls.enabled }}
            - name: pki-certs
              mountPath: /run/secrets
              readOnly: true
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d/05-enable-ssl.sh
              subPath: 05-enable-ssl.sh
              readOnly: true
            {{- end }}
      {{- if .Values.mtls.enabled }}
      volumes:
        - name: pki-certs
          secret:
            secretName: {{ .Values.mtls.existingSecretName | default .Values.mtls.secretName }}
            defaultMode: 0400
        - name: init-scripts
          configMap:
            name: yashigani-postgres-init
            defaultMode: 0555
      {{- end }}
  {{- if .Values.postgres.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.postgres.persistence.storageClass }}
        storageClassName: {{ .Values.postgres.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.persistence.size }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: yashigani-postgres
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  type: {{ .Values.postgres.service.type }}
  clusterIP: None
  selector:
    app.kubernetes.io/name: yashigani-postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: postgres
      port: {{ .Values.postgres.service.port }}
      targetPort: 5432
      protocol: TCP
{{- end }}
