{{- if .Values.mtls.enabled }}
{{- /*
  PKI bootstrap + rotation RBAC.

  A dedicated ServiceAccount, scoped strictly to the release namespace,
  so the PKI Job is the ONLY identity in the cluster that can mutate
  the yashigani-pki-certs Secret. Application pods never get this verb.

  The Secret itself is seeded empty by a pre-install hook (see below) so
  the applier never needs the unrestricted `create` verb on secrets —
  it only performs update/patch against the single named resource.

  Captain pre-push review (2026-04-23): tightened from initial version
  that granted unrestricted `create` on all secrets in the namespace.
*/ -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: yashigani-pki
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-pki
    app.kubernetes.io/component: pki
    {{- include "yashigani.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: yashigani-pki
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-pki
    app.kubernetes.io/component: pki
    {{- include "yashigani.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
rules:
  # Single rule — get/update/patch on the specific pki-certs Secret only.
  # No `create` verb is needed because the empty placeholder Secret is
  # pre-created by the -9-weighted hook below. No wildcard rules.
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: [{{ .Values.mtls.secretName | quote }}]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: yashigani-pki
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-pki
    app.kubernetes.io/component: pki
    {{- include "yashigani.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
subjects:
  - kind: ServiceAccount
    name: yashigani-pki
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: yashigani-pki
  apiGroup: rbac.authorization.k8s.io
---
# Empty placeholder Secret — created by Helm itself at pre-install,
# overwritten by the bootstrap Job at weight -5. This lets us drop the
# over-broad `create` verb from the RBAC Role above. resource-policy: keep
# means it survives between helm upgrades, preserving live certs.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.mtls.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-pki
    app.kubernetes.io/component: pki
    {{- include "yashigani.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-9"
    # Once created, never deleted on subsequent upgrades — we don't want
    # to wipe live certs between `helm upgrade` runs. `hook-succeeded`
    # intentionally omitted.
    "helm.sh/resource-policy": keep
type: Opaque
data: {}
{{- end }}
