---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: yashigani
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    # AWS: uncomment and set your IAM role ARN
    # eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/yashigani"
    # GCP: uncomment and set your service account email
    # iam.gke.io/gcp-service-account: "yashigani@PROJECT_ID.iam.gserviceaccount.com"
    # Azure: uncomment and set your managed identity client ID
    # azure.workload.identity/client-id: "00000000-0000-0000-0000-000000000000"

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: yashigani
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani
    app.kubernetes.io/managed-by: {{ .Release.Service }}
rules:
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: ["keda.sh"]
    resources: ["scaledobjects"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: yashigani
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani
    app.kubernetes.io/managed-by: {{ .Release.Service }}
subjects:
  - kind: ServiceAccount
    name: yashigani
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: yashigani
  apiGroup: rbac.authorization.k8s.io
