{{- /*
Helm test: verify the gateway /healthz endpoint returns HTTP 200 via Caddy.

EX-231-10 (2026-04-29): test pods connect through Caddy (:443), NOT direct
to gateway:8080. This validates both:
  (a) the legitimate traffic path works end-to-end, and
  (b) test pods cannot reach gateway directly (NetworkPolicy enforces this).

Last updated: 2026-04-29T14:30:00+01:00
Run with: helm test <release-name> -n <namespace>
*/ -}}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "yashigani.fullname" . }}-test-gateway-health"
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: test-gateway-health
      # curl image — connects to Caddy:443. Skip TLS verify for self-signed / test.
      # The test validates HTTP 200 from the Caddy→gateway path, not TLS cert identity.
      image: "curlimages/curl:8.7.1@sha256:19370fb12f2774281640e6419d18f48e4e0df76354d04530302f690f0d5136f2"
      imagePullPolicy: IfNotPresent
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop: ["ALL"]
      command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "Testing gateway /healthz via Caddy (EX-231-10: Caddy-centric path)..."
          STATUS=$(curl -sk -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            https://yashigani-caddy:443/healthz)
          echo "Caddy-proxied gateway /healthz returned HTTP ${STATUS}"
          if [ "${STATUS}" != "200" ]; then
            echo "FAIL: expected 200, got ${STATUS}"
            echo "Check: (1) Caddy is running, (2) gateway is healthy, (3) NetworkPolicy allows Caddy→gateway"
            exit 1
          fi
          echo "PASS — gateway reachable via Caddy"
      resources:
        requests:
          cpu: "10m"
          memory: "16Mi"
        limits:
          cpu: "100m"
          memory: "64Mi"
