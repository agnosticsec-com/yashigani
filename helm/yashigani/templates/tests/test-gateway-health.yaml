{{- /*
Helm test: verify the gateway /healthz endpoint returns HTTP 200.
Run with: helm test <release-name> -n <namespace>
*/ -}}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "yashigani.fullname" . }}-test-gateway-health"
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  {{- if .Values.mtls.enabled }}
  # /run/secrets PKI mount collides with SA-token mount at
  # /var/run/secrets/kubernetes.io/serviceaccount (since /var/run→/run).
  # Test pod doesn't need the SA token.
  automountServiceAccountToken: false
  {{- end }}
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    {{- if .Values.mtls.enabled }}
    # fsGroup so UID 65534 (nobody) can read the PKI Secret files (mode 0440).
    fsGroup: 65534
    {{- end }}
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: test-gateway-health
      {{- if .Values.mtls.enabled }}
      # Python's ssl module validates the two-tier chain correctly when given
      # only the root CA (alpine curl's OpenSSL incorrectly rejects the same
      # server-presented chain with "unable to get local issuer certificate",
      # even with both root and intermediate in --cacert). Mirrors the probe
      # used by the gateway container itself.
      image: "python:3.12-alpine"
      {{- else }}
      image: "curlimages/curl:8.7.1"
      {{- end }}
      imagePullPolicy: IfNotPresent
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop: ["ALL"]
      command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "Testing gateway /healthz..."
          {{- if .Values.mtls.enabled }}
          # mTLS: gateway serves HTTPS on 8080 and requires client cert auth.
          # Server cert SAN is "gateway" (from service_identities.yaml),
          # not "yashigani-gateway" (K8s service name). Use server_hostname
          # override so SNI + cert-hostname match the SAN while we connect to
          # the K8s service IP.
          # Pattern B: trust anchor is ca_intermediate.crt only. Root never in workloads.
          python3 -c "
          import ssl, socket, sys
          ctx = ssl.create_default_context(cafile='/run/secrets/ca_intermediate.crt')
          ctx.load_cert_chain('/run/secrets/gateway_client.crt', '/run/secrets/gateway_client.key')
          ip = socket.gethostbyname('yashigani-gateway')
          sock = socket.create_connection((ip, {{ .Values.gateway.service.port }}), timeout=10)
          ss = ctx.wrap_socket(sock, server_hostname='gateway')
          ss.sendall(b'GET /healthz HTTP/1.1\r\nHost: gateway\r\nConnection: close\r\n\r\n')
          resp = b''
          while True:
              chunk = ss.recv(4096)
              if not chunk: break
              resp += chunk
          status_line = resp.split(b'\r\n', 1)[0].decode()
          print('Gateway /healthz returned:', status_line)
          if ' 200 ' not in status_line:
              print('FAIL: expected 200'); sys.exit(1)
          print('PASS')
          "
          {{- else }}
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            http://yashigani-gateway:{{ .Values.gateway.service.port }}/healthz)
          echo "Gateway /healthz returned HTTP ${STATUS}"
          if [ "${STATUS}" != "200" ]; then
            echo "FAIL: expected 200, got ${STATUS}"
            exit 1
          fi
          echo "PASS"
          {{- end }}
      {{- if .Values.mtls.enabled }}
      volumeMounts:
        - name: pki-certs
          mountPath: /run/secrets
          readOnly: true
      {{- end }}
      resources:
        requests:
          cpu: "10m"
          memory: "16Mi"
        limits:
          cpu: "100m"
          memory: "64Mi"
  {{- if .Values.mtls.enabled }}
  volumes:
    - name: pki-certs
      secret:
        secretName: {{ .Values.mtls.existingSecretName | default .Values.mtls.secretName }}
        defaultMode: 0440
  {{- end }}
