{{- if .Values.grafana.enabled }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: yashigani-grafana
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-grafana
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  serviceName: yashigani-grafana
  replicas: {{ .Values.grafana.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: yashigani-grafana
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: yashigani-grafana
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "yashigani.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 472
        fsGroup: 472
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: grafana
          image: "{{ .Values.grafana.image.repository }}:{{ .Values.grafana.image.tag }}"
          imagePullPolicy: {{ .Values.grafana.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            # ACS-RISK-008: ROFS enabled. /var/lib/grafana is PVC-mounted
            # (SQLite DB + plugins). /tmp provided by emptyDir volume below.
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: {{ .Values.grafana.adminUser | quote }}
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.grafana.existingSecretName | default "yashigani-grafana-secrets" }}
                  key: grafana_admin_password
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Viewer"
            - name: GF_SERVER_ROOT_URL
              value: "https://{{ .Values.global.tlsDomain }}/admin/grafana"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            {{- toYaml .Values.grafana.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            # ACS-RISK-008: emptyDir for /tmp required when readOnlyRootFilesystem
            # is true. Grafana writes PID files and temp buffers here.
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
  {{- if .Values.grafana.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.grafana.persistence.storageClass }}
        storageClassName: {{ .Values.grafana.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.grafana.persistence.size }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: yashigani-grafana
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-grafana
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  type: {{ .Values.grafana.service.type }}
  clusterIP: None
  selector:
    app.kubernetes.io/name: yashigani-grafana
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.grafana.service.port }}
      targetPort: 3000
      protocol: TCP
{{- end }}
