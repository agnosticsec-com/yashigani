{{- if .Values.grafana.enabled }}
# Last updated: 2026-05-09T10:00:00+01:00
# retro #83: Grafana mTLS ingress + datasource mTLS (Pattern B).
# fix(helm): G9 blocker: volume items: mapping restores in-pod path after ConfigMap key rename.
# - GF_SERVER_PROTOCOL=https, port 3443, cert from yashigani-pki-certs secret.
# - Datasource calls (Prometheus, Loki) use grafana_client.crt for mTLS.
# - Readiness/liveness probes updated to HTTPS port 3443 with insecureSkipVerify
#   (localhost-only probe; no SPIFFE validation needed for K8s probe path).
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: yashigani-grafana
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-grafana
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  serviceName: yashigani-grafana
  replicas: {{ .Values.grafana.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: yashigani-grafana
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: yashigani-grafana
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "yashigani.serviceAccountName" . }}
      # B-K8S-3 / ACS-RISK-008: Grafana makes no K8s API calls in this chart.
      # Disabling the projected SA token mount removes one attack surface if
      # Grafana is ever compromised, and eliminates the readOnlyRootFilesystem
      # CrashLoopBackOff on Docker Desktop arm64 (containerd projects the SA
      # token into /var/run/secrets which is inside the read-only rootfs).
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 472
        fsGroup: 472
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: grafana
          image: "{{ .Values.grafana.image.repository }}:{{ .Values.grafana.image.tag }}"
          imagePullPolicy: {{ .Values.grafana.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            # ACS-RISK-008: ROFS enabled. /var/lib/grafana is PVC-mounted
            # (SQLite DB + plugins). /tmp provided by emptyDir volume below.
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            # retro #83: Grafana serves HTTPS on 3443 (mTLS, Pattern B).
            # Port renamed from `http` to `https` to reflect the protocol change.
            - name: https
              containerPort: 3443
              protocol: TCP
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: {{ .Values.grafana.adminUser | quote }}
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.grafana.existingSecretName | default "yashigani-grafana-secrets" }}
                  key: grafana_admin_password
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Viewer"
            - name: GF_SERVER_ROOT_URL
              value: "https://{{ .Values.global.tlsDomain }}/admin/grafana"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
            {{- if .Values.mtls.enabled }}
            # retro #83: enable mTLS server on Grafana.
            # TA-3 (network observer): closes plaintext Caddy→Grafana leg on obs network.
            - name: GF_SERVER_PROTOCOL
              value: "https"
            - name: GF_SERVER_HTTP_PORT
              value: "3443"
            - name: GF_SERVER_CERT_FILE
              value: "/run/secrets/grafana_client.crt"
            - name: GF_SERVER_CERT_KEY
              value: "/run/secrets/grafana_client.key"
            {{- end }}
          readinessProbe:
            {{- if .Values.mtls.enabled }}
            # retro #83: Grafana serves HTTPS. K8s httpGet probe sends plain HTTP
            # which Grafana rejects. Use exec+wget with --no-check-certificate
            # (localhost probe — no mTLS client cert needed for healthcheck path).
            exec:
              command:
                - sh
                - -c
                - "wget -qO- --no-check-certificate https://localhost:3443/api/health | grep -q ok"
            {{- else }}
            httpGet:
              path: /api/health
              port: 3000
            {{- end }}
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            {{- if .Values.mtls.enabled }}
            exec:
              command:
                - sh
                - -c
                - "wget -qO- --no-check-certificate https://localhost:3443/api/health | grep -q ok"
            {{- else }}
            httpGet:
              path: /api/health
              port: 3000
            {{- end }}
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            {{- toYaml .Values.grafana.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            # ACS-RISK-008: emptyDir for /tmp required when readOnlyRootFilesystem
            # is true. Grafana writes PID files and temp buffers here.
            - name: tmp
              mountPath: /tmp
            {{- if .Values.mtls.enabled }}
            # retro #83: mount PKI certs so Grafana can serve mTLS and the
            # datasource provisioning YAMLs can reference $__file{} paths.
            # grafana_client.crt / grafana_client.key — Grafana server cert + datasource client cert.
            # ca_intermediate.crt — trust anchor for Prometheus + Loki datasource TLS verification.
            - name: pki-certs
              mountPath: /run/secrets
              readOnly: true
            - name: grafana-provisioning
              mountPath: /etc/grafana/provisioning
              readOnly: true
            {{- end }}
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
        {{- if .Values.mtls.enabled }}
        - name: pki-certs
          secret:
            secretName: {{ .Values.mtls.secretName }}
            defaultMode: 0440
        - name: grafana-provisioning
          configMap:
            name: yashigani-grafana-provisioning
            items:
              - key: datasources_prometheus.yml
                path: datasources/prometheus.yml
              - key: datasources_loki.yml
                path: datasources/loki.yml
              - key: datasources_jaeger.yml
                path: datasources/jaeger.yml
        {{- end }}
  {{- if .Values.grafana.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.grafana.persistence.storageClass }}
        storageClassName: {{ .Values.grafana.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.grafana.persistence.size }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: yashigani-grafana
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-grafana
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  type: {{ .Values.grafana.service.type }}
  clusterIP: None
  selector:
    app.kubernetes.io/name: yashigani-grafana
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    {{- if .Values.mtls.enabled }}
    - name: https
      port: {{ .Values.grafana.service.port }}
      targetPort: 3443
      protocol: TCP
    {{- else }}
    - name: http
      port: {{ .Values.grafana.service.port }}
      targetPort: 3000
      protocol: TCP
    {{- end }}
{{- end }}
