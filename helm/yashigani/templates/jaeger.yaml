{{- /* Last updated: 2026-05-02T00:00:00+01:00 */ -}}
{{- /* EX-231-09 fix (v2.23.2): Jaeger OTLP gRPC collector port mTLS-enabled. */ -}}
{{- if .Values.jaeger.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yashigani-jaeger
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-jaeger
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.jaeger.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: yashigani-jaeger
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: yashigani-jaeger
        app.kubernetes.io/instance: {{ .Release.Name }}
      {{- if .Values.mtls.enabled }}
      annotations:
        checksum/pki-certs: {{ lookup "v1" "Secret" .Release.Namespace .Values.mtls.secretName | default dict | dig "metadata" "resourceVersion" "" | quote }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "yashigani.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: jaeger
          image: "{{ .Values.jaeger.image.repository }}:{{ .Values.jaeger.image.tag }}"
          imagePullPolicy: {{ .Values.jaeger.image.pullPolicy }}
          securityContext:
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: ui
              containerPort: 16686
              protocol: TCP
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
            - name: admin
              containerPort: 14269
              protocol: TCP
          env:
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
            - name: SPAN_STORAGE_TYPE
              value: "memory"
            {{- if .Values.mtls.enabled }}
            # EX-231-09 fix: mTLS on OTLP gRPC collector port.
            # Jaeger presents jaeger leaf cert; otel-collector must present
            # a valid leaf signed by ca_bundle.crt (root+intermediate, K8s).
            - name: COLLECTOR_OTLP_GRPC_TLS_ENABLED
              value: "true"
            - name: COLLECTOR_OTLP_GRPC_TLS_CERT
              value: /run/secrets/jaeger_client.crt
            - name: COLLECTOR_OTLP_GRPC_TLS_KEY
              value: /run/secrets/jaeger_client.key
            - name: COLLECTOR_OTLP_GRPC_TLS_CLIENT_CA
              value: /run/secrets/ca_bundle.crt
            {{- end }}
          readinessProbe:
            httpGet:
              path: /
              port: 14269
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 14269
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.jaeger.resources | nindent 12 }}
          {{- if .Values.mtls.enabled }}
          volumeMounts:
            - name: secrets
              mountPath: /run/secrets
              readOnly: true
            - name: tmp
              mountPath: /tmp
          {{- end }}
      {{- if .Values.mtls.enabled }}
      volumes:
        - name: secrets
          secret:
            secretName: {{ .Values.mtls.existingSecretName | default .Values.mtls.secretName }}
            defaultMode: 0440
        - name: tmp
          emptyDir:
            sizeLimit: 50Mi
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: yashigani-jaeger
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-jaeger
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  type: {{ .Values.jaeger.service.type }}
  selector:
    app.kubernetes.io/name: yashigani-jaeger
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: ui
      port: {{ .Values.jaeger.service.port }}
      targetPort: 16686
      protocol: TCP
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
{{- end }}
