{{- /* Last updated: 2026-05-10T00:00:00+01:00 */ -}}
{{- /* EX-231-09 fix (v2.23.2): Jaeger OTLP gRPC collector port mTLS-enabled. */ -}}
{{- /* v2.23.2 Phase 3b: Jaeger v2 migration. Image renamed all-in-one→jaeger; env-var */ -}}
{{- /* TLS config replaced by YAML config file (yashigani-jaeger-config ConfigMap). */ -}}
{{- if .Values.jaeger.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yashigani-jaeger
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-jaeger
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.jaeger.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: yashigani-jaeger
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: yashigani-jaeger
        app.kubernetes.io/instance: {{ .Release.Name }}
      {{- if .Values.mtls.enabled }}
      annotations:
        checksum/pki-certs: {{ lookup "v1" "Secret" .Release.Namespace .Values.mtls.secretName | default dict | dig "metadata" "resourceVersion" "" | quote }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "yashigani.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: jaeger
          image: "{{ .Values.jaeger.image.repository }}:{{ .Values.jaeger.image.tag }}"
          imagePullPolicy: {{ .Values.jaeger.image.pullPolicy }}
          securityContext:
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: ui
              containerPort: 16686
              protocol: TCP
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
            - name: admin
              # v2: healthcheckv2 extension on :13133 (replaces v1 admin port :14269)
              containerPort: 13133
              protocol: TCP
          args:
            - "--config=/etc/jaeger/jaeger.yml"
          readinessProbe:
            # B-K8S-5 follow-up: switch from httpGet on :13133 to tcpSocket on :16686.
            # Rationale (dual fix):
            # 1. healthcheckv2 use_v2:false makes :13133 /health/status work, BUT port
            #    13133 binds IPv4-only by default; Docker Desktop K8s probes prefer IPv6
            #    and get "connection refused". Port 16686 (UI/query) is dual-stack.
            # 2. tcpSocket on the UI port is a better cluster-portable health signal —
            #    it fires as soon as Jaeger is accepting connections, works across
            #    IPv4-only, IPv6-only, and dual-stack cluster configurations.
            # Su verified live: tcpSocket :16686 resolves the probe connection-refused.
            tcpSocket:
              port: 16686
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 16686
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.jaeger.resources | nindent 12 }}
          volumeMounts:
            - name: jaeger-config
              mountPath: /etc/jaeger
              readOnly: true
            {{- if .Values.mtls.enabled }}
            - name: secrets
              mountPath: /run/secrets
              readOnly: true
            {{- end }}
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: jaeger-config
          configMap:
            name: yashigani-jaeger-config
        {{- if .Values.mtls.enabled }}
        - name: secrets
          secret:
            secretName: {{ .Values.mtls.existingSecretName | default .Values.mtls.secretName }}
            defaultMode: 0440
        {{- end }}
        - name: tmp
          emptyDir:
            sizeLimit: 50Mi
---
apiVersion: v1
kind: Service
metadata:
  name: yashigani-jaeger
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-jaeger
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  type: {{ .Values.jaeger.service.type }}
  selector:
    app.kubernetes.io/name: yashigani-jaeger
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: ui
      port: {{ .Values.jaeger.service.port }}
      targetPort: 16686
      protocol: TCP
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
{{- end }}
