{{- /*
Yashigani v0.7.0 — DB partition maintenance CronJob (P1-B)

Runs scripts/partition_maintenance.py on the 1st of every month at 02:00 UTC
to pre-create the next 3 months of audit_events and inference_events partitions.
Safe to run at any time; CREATE TABLE IF NOT EXISTS prevents double-creation.

Image: reuses the gateway image because partition_maintenance.py lives in the
same Python package. The job only needs DATABASE_URL — no network exposure.
*/ -}}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "yashigani.fullname" . }}-partition-maintenance
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "yashigani.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    helm.sh/chart: {{ include "yashigani.chart" . }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/component: db-maintenance
  annotations:
    yashigani.io/version: {{ .Chart.AppVersion | quote }}
spec:
  schedule: "0 2 1 * *"     # 02:00 UTC on the 1st of every month
  concurrencyPolicy: Forbid  # never run two instances simultaneously
  failedJobsHistoryLimit: 3
  successfulJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: {{ include "yashigani.name" . }}
            app.kubernetes.io/instance: {{ .Release.Name }}
            app.kubernetes.io/component: db-maintenance
        spec:
          serviceAccountName: {{ include "yashigani.serviceAccountName" . }}
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: partition-maintenance
              # Reuse the gateway image — partition_maintenance.py is part of the
              # same Python package. Override the entrypoint to run the script directly.
              image: "{{ .Values.global.imageRegistry }}/{{ .Values.global.imageOwner }}/{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag | default .Chart.AppVersion }}"
              imagePullPolicy: {{ .Values.gateway.image.pullPolicy | default "IfNotPresent" }}
              command:
                - python
                - scripts/partition_maintenance.py
                - --months-ahead
                - "3"
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "yashigani.fullname" . }}-db-credentials
                      key: url
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "500m"
                  memory: "256Mi"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
