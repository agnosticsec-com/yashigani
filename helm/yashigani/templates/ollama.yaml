{{- if .Values.ollama.enabled }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: yashigani-ollama
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-ollama
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  serviceName: yashigani-ollama
  replicas: {{ .Values.ollama.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: yashigani-ollama
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: yashigani-ollama
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "yashigani.serviceAccountName" . }}
      securityContext:
        # ACS-RISK-008 documented exception: ollama/ollama upstream image runs
        # as root UID 0 and writes model weights to /root/.ollama (PVC mount).
        # runAsNonRoot: true causes CrashLoopBackOff with the official image.
        # readOnlyRootFilesystem cannot be set for the same reason.
        # Mitigating controls: ollama is disabled by default (opt-in), isolated
        # behind Caddy + NetworkPolicy, and explicitly excluded from the Kyverno
        # restrict-root-user ClusterPolicy via label selector.
        # Risk-register ref: ACS-RISK-008-EX-OLLAMA-2026-05-02
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ollama
          image: "{{ .Values.ollama.image.repository }}:{{ .Values.ollama.image.tag }}"
          imagePullPolicy: {{ .Values.ollama.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 11434
              protocol: TCP
          env:
            - name: OLLAMA_HOST
              value: {{ .Values.ollama.env.ollamaHost | quote }}
          readinessProbe:
            tcpSocket:
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            tcpSocket:
              port: 11434
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            {{- toYaml .Values.ollama.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /root/.ollama
  {{- if .Values.ollama.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.ollama.persistence.storageClass }}
        storageClassName: {{ .Values.ollama.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.ollama.persistence.size }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: yashigani-ollama
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-ollama
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  type: {{ .Values.ollama.service.type }}
  clusterIP: None
  selector:
    app.kubernetes.io/name: yashigani-ollama
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.ollama.service.port }}
      targetPort: 11434
      protocol: TCP
{{- end }}
