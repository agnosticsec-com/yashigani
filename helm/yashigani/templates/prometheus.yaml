{{- /* Last updated: 2026-04-27T15:00:00+01:00 */ -}}
{{- if .Values.prometheus.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: yashigani-prometheus-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-prometheus
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "yashigani.labels" . | nindent 4 }}
data:
  # v2.23.1 EX-231-08 (+ #81): when caddy.internalMetricsListener.enabled=true
  # AND internalMetricsListenerBackoffice.enabled=true AND the mesh mTLS
  # secrets are mounted into both caddy and prometheus, Prometheus scrapes
  # go through Caddy's :8444 (gateway) + :8445 (backoffice) listeners with
  # mTLS + SPIFFE URI ACL. Otherwise (default off state of the Helm chart
  # today) Prometheus hits the pods directly — same behaviour as pre-v2.23.1.
  #
  # Prometheus v3.x rejects setting Host via http_headers, so the previous
  # single-port Host-matcher design was split into two listeners. Each
  # upstream has its own port; both enforce the identical SPIFFE URI gate.
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - yashigani-alertmanager:9093
    scrape_configs:
    {{- if .Values.caddy.internalMetricsListener.enabled }}
      - job_name: gateway
        scheme: https
        static_configs:
          - targets: ["yashigani-caddy:{{ .Values.caddy.internalMetricsListener.port }}"]
        metrics_path: /internal/metrics
        tls_config:
          ca_file:   /run/secrets/ca_intermediate.crt
          cert_file: /run/secrets/prometheus_client.crt
          key_file:  /run/secrets/prometheus_client.key
          server_name: yashigani-caddy
    {{- end }}
    {{- if .Values.caddy.internalMetricsListenerBackoffice.enabled }}
      - job_name: backoffice
        scheme: https
        static_configs:
          - targets: ["yashigani-caddy:{{ .Values.caddy.internalMetricsListenerBackoffice.port }}"]
        metrics_path: /internal/metrics
        tls_config:
          ca_file:   /run/secrets/ca_intermediate.crt
          cert_file: /run/secrets/prometheus_client.crt
          key_file:  /run/secrets/prometheus_client.key
          server_name: yashigani-caddy
    {{- end }}
    {{- if not .Values.caddy.internalMetricsListener.enabled }}
      - job_name: gateway
        static_configs:
          - targets: ["yashigani-gateway:8080"]
        metrics_path: /internal/metrics
    {{- end }}
    {{- if not .Values.caddy.internalMetricsListenerBackoffice.enabled }}
      - job_name: backoffice
        static_configs:
          - targets: ["yashigani-backoffice:8443"]
        metrics_path: /internal/metrics
    {{- end }}
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: yashigani-prometheus
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-prometheus
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  serviceName: yashigani-prometheus
  replicas: {{ .Values.prometheus.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: yashigani-prometheus
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: yashigani-prometheus
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "yashigani.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: prometheus
          image: "{{ .Values.prometheus.image.repository }}:{{ .Values.prometheus.image.tag }}"
          imagePullPolicy: {{ .Values.prometheus.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time={{ .Values.prometheus.retention }}"
            - "--web.enable-remote-write-receiver"
            - "--web.listen-address=0.0.0.0:9090"
          ports:
            - name: http
              containerPort: 9090
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.prometheus.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
              readOnly: true
            - name: data
              mountPath: /prometheus
            {{- if .Values.mtls.enabled }}
            # mTLS leaves: prometheus_client.{crt,key} + ca_intermediate.crt for
            # scraping Caddy's :8444 / :8445 SPIFFE-gated listeners (Pattern B).
            - name: pki-certs
              mountPath: /run/secrets
              readOnly: true
            {{- end }}
      {{- if .Values.mtls.enabled }}
      # /run/secrets PKI mount collides with SA-token at
      # /var/run/secrets/kubernetes.io/serviceaccount (since /var/run→/run).
      # Prometheus doesn't talk to the K8s API in this chart.
      automountServiceAccountToken: false
      {{- end }}
      volumes:
        - name: config
          configMap:
            name: yashigani-prometheus-config
        {{- if .Values.mtls.enabled }}
        - name: pki-certs
          secret:
            secretName: {{ .Values.mtls.existingSecretName | default .Values.mtls.secretName }}
            defaultMode: 0440
        {{- end }}
  {{- if .Values.prometheus.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.prometheus.persistence.storageClass }}
        storageClassName: {{ .Values.prometheus.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.prometheus.persistence.size }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: yashigani-prometheus
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-prometheus
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  type: {{ .Values.prometheus.service.type }}
  clusterIP: None
  selector:
    app.kubernetes.io/name: yashigani-prometheus
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.prometheus.service.port }}
      targetPort: 9090
      protocol: TCP
{{- end }}
