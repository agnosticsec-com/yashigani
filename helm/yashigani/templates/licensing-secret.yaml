{{/*
  Petra P0-1 (v2.24.4) — Licence Secret for K8s deployments.

  Root cause: src/yashigani/licensing/loader.py resolves /run/secrets/license_key
  as its second candidate. Docker/Podman compose provides it via bind-mount from
  docker/secrets/license_key. Helm had no equivalent — every K8s install silently
  fell back to COMMUNITY tier. This template closes that gap.

  Render conditions:
    - Only when .Values.licensing.licenseKey is non-empty.
    - When empty (default), no Secret is created and no mount is added to
      gateway/backoffice, preserving the existing COMMUNITY-tier fallback.

  Volume mount: gateway.yaml and backoffice.yaml mount this Secret at
  /run/secrets/license_key (subPath: license_key, readOnly: true) when
  .Values.licensing.licenseKey is non-empty.

  Upgrade safety: unlike auto-generated secrets (secrets.yaml), this Secret
  carries operator-supplied material. No lookup/randAlphaNum — the operator
  supplies the value explicitly. On upgrade, --set licensing.licenseKey=<val>
  replaces the Secret in-place (standard Helm upgrade behaviour).

  LIC-002: YASHIGANI_LICENSE_TIER must NOT be set via env or values.
  Use licensing.licenseKey only.
*/}}
{{- if .Values.licensing.licenseKey }}
---
apiVersion: v1
kind: Secret
metadata:
  name: yashigani-license
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "yashigani.labels" . | nindent 4 }}
  annotations:
    # Petra P0-1 (v2.24.4): K8s parity for Docker/Podman docker/secrets/license_key.
    # loader.py resolution order candidate 2: /run/secrets/license_key.
    yashigani.io/finding: "Petra-P0-1"
type: Opaque
stringData:
  # The key name "license_key" matches the filename loader.py looks for at
  # /run/secrets/license_key (subPath mount on gateway + backoffice).
  # Value is the raw content of the operator's .ysg file — K8s base64-encodes
  # it internally when storing under stringData. Pass raw content via:
  #   --set licensing.licenseKey="$(cat my.ysg)"
  license_key: {{ .Values.licensing.licenseKey | quote }}
{{- end }}
