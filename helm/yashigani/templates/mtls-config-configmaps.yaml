{{- if .Values.mtls.enabled }}
{{- /*
  ConfigMaps holding the mTLS-aware configs for postgres + pgbouncer.
  Source of truth: docker/postgres/05-enable-ssl.sh and docker/pgbouncer/
  pgbouncer.ini — shipped into the chart via `.Files.Get`.
*/ -}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: yashigani-postgres-init
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-postgres
    {{- include "yashigani.labels" . | nindent 4 }}
data:
  05-enable-ssl.sh: |
{{ .Files.Get "files/postgres-05-enable-ssl.sh" | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: yashigani-pgbouncer-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-pgbouncer
    {{- include "yashigani.labels" . | nindent 4 }}
data:
  # pgbouncer.ini: rendered with K8s service name substitution. The shipped
  # static file (helm/yashigani/files/pgbouncer.ini) declares `host=postgres`
  # for Compose; K8s ClusterIP service is `<release>-postgres` (typically
  # `yashigani-postgres`). Captain #58c #3bq evidence (2026-04-28): without
  # this substitution, pgbouncer logs `DNS lookup failed: postgres` and
  # backoffice exits 3 on lifespan timeout.
  pgbouncer.ini: |
{{ .Files.Get "files/pgbouncer.ini" | replace "host=postgres " (printf "host=%s-postgres " (include "yashigani.fullname" .)) | indent 4 }}
{{- end }}
