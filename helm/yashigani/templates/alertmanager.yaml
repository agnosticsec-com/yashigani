{{- if .Values.alertmanager.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yashigani-alertmanager
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-alertmanager
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.alertmanager.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: yashigani-alertmanager
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: yashigani-alertmanager
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "yashigani.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: alertmanager
          image: "{{ .Values.alertmanager.image.repository }}:{{ .Values.alertmanager.image.tag }}"
          imagePullPolicy: {{ .Values.alertmanager.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          args:
            - "--config.file=/etc/alertmanager/alertmanager.yml"
            - "--storage.path=/alertmanager"
          ports:
            - name: http
              containerPort: 9093
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /-/healthy
              port: 9093
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9093
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.alertmanager.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
              readOnly: true
            - name: storage
              mountPath: /alertmanager
      volumes:
        - name: config
          configMap:
            name: yashigani-alertmanager-config
        - name: storage
          persistentVolumeClaim:
            claimName: yashigani-alertmanager-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: yashigani-alertmanager-data
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-alertmanager
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.alertmanager.persistence.storageClass }}
  storageClassName: {{ .Values.alertmanager.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.alertmanager.persistence.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: yashigani-alertmanager
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-alertmanager
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  type: {{ .Values.alertmanager.service.type }}
  selector:
    app.kubernetes.io/name: yashigani-alertmanager
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.alertmanager.service.port }}
      targetPort: 9093
      protocol: TCP
{{- end }}
