{{- if .Values.loki.enabled }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: yashigani-loki
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-loki
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  serviceName: yashigani-loki
  replicas: {{ .Values.loki.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: yashigani-loki
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: yashigani-loki
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "yashigani.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: loki
          image: "{{ .Values.loki.image.repository }}:{{ .Values.loki.image.tag }}"
          imagePullPolicy: {{ .Values.loki.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          args: ["-config.file=/etc/loki/loki.yml"]
          ports:
            - name: http
              containerPort: 3100
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            {{- toYaml .Values.loki.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/loki
              readOnly: true
            - name: data
              mountPath: /loki
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: yashigani-loki-config
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
  {{- if .Values.loki.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.loki.persistence.storageClass }}
        storageClassName: {{ .Values.loki.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.loki.persistence.size }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: yashigani-loki
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-loki
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "yashigani.labels" . | nindent 4 }}
spec:
  type: {{ .Values.loki.service.type }}
  clusterIP: None
  selector:
    app.kubernetes.io/name: yashigani-loki
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.loki.service.port }}
      targetPort: 3100
      protocol: TCP
{{- end }}
