{{- if .Values.mtls.enabled }}
{{- if not .Values.mtls.existingSecretName }}
{{- /* Last updated: 2026-05-01T20:00:00+01:00 */}}
{{- /*
  PKI bootstrap Job — pre-install + pre-upgrade hook.

  Pattern:
    1. initContainer `issuer` (gateway image) runs
       `python -m yashigani.pki.issuer bootstrap` against a mounted
       ConfigMap manifest and writes certs/keys to an in-memory emptyDir.
       --network=none is implicit: the Job has no network egress except
       to the apiserver, and the issuer never phones out.
    2. container `applier` (kubectl image) reads the emptyDir and writes
       the Secret via `kubectl create secret generic … --dry-run=client
       -o yaml | kubectl apply -f -` (idempotent, tolerates re-runs).

  Private keys never touch node disk — emptyDir `medium: Memory`.
*/ -}}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: yashigani-pki-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-pki
    app.kubernetes.io/component: pki
    {{- include "yashigani.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: yashigani-pki
        app.kubernetes.io/component: pki
    spec:
      restartPolicy: Never
      serviceAccountName: yashigani-pki
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # ── pre-seed (v2.23.1 Path A PKI race fix) ─────────────────────────
        # On helm upgrade the emptyDir starts empty.  If the CA-keys Secret
        # already exists (yashigani-pki-ca-keys), copy root + intermediate
        # private keys + public certs into the shared emptyDir (/secrets) and
        # set a sentinel file (/secrets/.upgrade_mode) so the issuer container
        # knows to call rotate-leaves instead of bootstrap.
        # On fresh install the Secret is absent → sentinel is NOT written →
        # issuer runs full bootstrap as before.
        # The || true on kubectl get ensures a missing secret (first install)
        # does not fail this container.
        - name: pki-pre-seed
          image: "{{ .Values.mtls.kubectlImage.repository }}:{{ .Values.mtls.kubectlImage.tag }}"
          imagePullPolicy: {{ .Values.mtls.kubectlImage.pullPolicy }}
          securityContext:
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -euo pipefail
              existing_root_key=$(kubectl get secret {{ .Values.mtls.caKeysSecretName }} \
                --namespace {{ .Release.Namespace }} \
                -o jsonpath='{.data.ca_root\.key}' 2>/dev/null \
                | base64 -d 2>/dev/null || true)

              if [ -n "$existing_root_key" ]; then
                echo "[pre-seed] Existing CA keys found in {{ .Values.mtls.caKeysSecretName }} — upgrade path."

                # CA private keys
                kubectl get secret {{ .Values.mtls.caKeysSecretName }} \
                  --namespace {{ .Release.Namespace }} \
                  -o jsonpath='{.data.ca_root\.key}' | base64 -d > /secrets/ca_root.key
                kubectl get secret {{ .Values.mtls.caKeysSecretName }} \
                  --namespace {{ .Release.Namespace }} \
                  -o jsonpath='{.data.ca_intermediate\.key}' | base64 -d > /secrets/ca_intermediate.key

                # CA public certs (from leaves Secret which always has them)
                kubectl get secret {{ .Values.mtls.secretName }} \
                  --namespace {{ .Release.Namespace }} \
                  -o jsonpath='{.data.ca_root\.crt}' | base64 -d > /secrets/ca_root.crt
                kubectl get secret {{ .Values.mtls.secretName }} \
                  --namespace {{ .Release.Namespace }} \
                  -o jsonpath='{.data.ca_intermediate\.crt}' | base64 -d > /secrets/ca_intermediate.crt

                # Sentinel: tells the issuer container to call rotate-leaves
                printf "1" > /secrets/.upgrade_mode

                echo "[pre-seed] Existing CA material seeded — upgrade will rotate leaves only."
              else
                echo "[pre-seed] No existing CA keys — fresh install, running full bootstrap."
              fi
          volumeMounts:
            - name: pki-certs
              mountPath: /secrets
          resources:
            {{- toYaml .Values.mtls.bootstrapResources | nindent 12 }}
        - name: issuer
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.global.imageOwner }}/{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          securityContext:
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          # The issuer writes bootstrap_token_sha256 values back into the
          # manifest (_update_manifest_hashes in pki/issuer.py). That's a
          # compose-flow artefact; in K8s the Secret itself is the source
          # of truth, so throwing away those writes is fine. But a RO
          # ConfigMap mount makes the issuer crash with EROFS, so we copy
          # the manifest into a writable emptyDir first.
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -euo pipefail
              cp /manifest-ro/service_identities.yaml /manifest-rw/service_identities.yaml

              if [ -f /secrets/.upgrade_mode ]; then
                echo "[issuer] Upgrade mode: rotating leaves under existing CA root."
                python -m yashigani.pki.issuer \
                  --secrets-dir /secrets \
                  --manifest /manifest-rw/service_identities.yaml \
                  rotate-leaves \
                  --leaf-lifetime-days {{ .Values.mtls.leafLifetimeDays }}
              else
                echo "[issuer] Fresh install: running full bootstrap."
                python -m yashigani.pki.issuer \
                  --secrets-dir /secrets \
                  --manifest /manifest-rw/service_identities.yaml \
                  bootstrap \
                  --root-lifetime-years {{ .Values.mtls.rootLifetimeYears }} \
                  --intermediate-lifetime-days {{ .Values.mtls.intermediateLifetimeDays }} \
                  --leaf-lifetime-days {{ .Values.mtls.leafLifetimeDays }}
              fi
              # Retro #3am — fail-closed verification that SPIFFE URI SAN
              # made it onto every leaf. If issuer.build_leaf silently
              # skipped the URI SAN (manifest path bug, schema regression,
              # cryptography library mismatch) the SPIFFE gate becomes a
              # rubber stamp. Reject the bootstrap before the applier ever
              # writes the Secret. Emit the script via base64 so YAML block
              # indent does not bleed into the Python source.
              echo "" \
                | base64 -d > /tmp/verify_spiffe.py
              python /tmp/verify_spiffe.py

          volumeMounts:
            - name: pki-certs
              mountPath: /secrets
            - name: manifest
              mountPath: /manifest-ro
              readOnly: true
            - name: manifest-rw
              mountPath: /manifest-rw
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.mtls.bootstrapResources | nindent 12 }}
      containers:
        - name: applier
          image: "{{ .Values.mtls.kubectlImage.repository }}:{{ .Values.mtls.kubectlImage.tag }}"
          imagePullPolicy: {{ .Values.mtls.kubectlImage.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -euo pipefail
              cd /secrets
              echo "[applier] Files present after issuer bootstrap:"
              ls -l
              # Safety guard (internal pre-push review): under POSIX sh an
              # unmatched glob expands literally, so `for f in *.crt *.key` with
              # no files would emit zero --from-file= args and we'd overwrite a
              # good Secret with an empty one. Fail fast if issuer produced no
              # certs.
              crt_count=$(ls -1 *.crt 2>/dev/null | wc -l)
              key_count=$(ls -1 *.key 2>/dev/null | wc -l)
              if [ "$crt_count" -eq 0 ] || [ "$key_count" -eq 0 ]; then
                echo "[applier] FATAL: issuer produced no cert/key files" >&2
                echo "[applier] crt=$crt_count key=$key_count — aborting to" >&2
                echo "[applier] avoid clobbering existing Secret." >&2
                exit 1
              fi
              # Retro #3aj — split materials into two Secrets:
              #   * leaves Secret (.Values.mtls.secretName, mounted by every
              #     workload pod): all *_client.{crt,key} + ca_root.crt +
              #     ca_intermediate.crt. NO ca_*.key.
              #   * CA-keys Secret (.Values.mtls.caKeysSecretName, mounted
              #     only by the bootstrap Job + rotation CronJob): the two
              #     CA private keys ca_root.key and ca_intermediate.key.
              # Workload pods can therefore never read CA private material
              # even if the SA-token mount is misconfigured.
              #
              # --dry-run=client + apply -f - gives an idempotent upsert
              # that works for both fresh install and upgrade.
              mkdir -p /tmp/leaves /tmp/cakeys
              for f in *.crt; do
                [ -f "$f" ] || continue
                cp -- "$f" /tmp/leaves/
              done
              for f in *_client.key; do
                [ -f "$f" ] || continue
                cp -- "$f" /tmp/leaves/
              done
              # CA private keys: ca_root.key + ca_intermediate.key only.
              # Anything matching ca_*.key (literal underscore, not glob).
              for f in ca_root.key ca_intermediate.key; do
                [ -f "$f" ] || continue
                cp -- "$f" /tmp/cakeys/
              done
              echo "[applier] Workload-bound Secret payload:"
              ls -l /tmp/leaves
              echo "[applier] CA-keys Secret payload:"
              ls -l /tmp/cakeys
              # Sanity guard: a leaves Secret must NEVER contain ca_*.key.
              if ls /tmp/leaves/ca_root.key /tmp/leaves/ca_intermediate.key 2>/dev/null; then
                echo "[applier] FATAL: CA private key leaked into leaves Secret payload" >&2
                exit 1
              fi
              # EX-231-10 Layer B: generate per-install caddy_internal_hmac and
              # include it in the leaves Secret alongside PKI material.
              # 32 bytes (256-bit), hex-encoded, written to the same Secret that
              # backoffice, gateway, and Caddy mount at /run/secrets so all three
              # can read it without a separate volume. Mode is controlled by K8s
              # Secret → fsGroup 1001 on the mounting pods.
              if ! command -v dd >/dev/null 2>&1 || ! command -v od >/dev/null 2>&1; then
                echo "[applier] FATAL: dd/od not found — cannot generate caddy_internal_hmac" >&2
                exit 1
              fi
              # Idempotent: if the Secret already contains the key (upgrade), reuse
              # the existing value so a live stack doesn't break mid-apply.
              existing_hmac=""
              existing_hmac=$(kubectl get secret {{ .Values.mtls.secretName }} \
                --namespace {{ .Release.Namespace }} \
                -o jsonpath='{.data.caddy_internal_hmac}' 2>/dev/null \
                | base64 -d 2>/dev/null || true)
              if [ -n "$existing_hmac" ]; then
                echo "[applier] Reusing existing caddy_internal_hmac from Secret (upgrade path)"
                printf "%s" "$existing_hmac" > /tmp/leaves/caddy_internal_hmac
              else
                echo "[applier] Generating fresh caddy_internal_hmac (fresh install)"
                dd if=/dev/urandom bs=32 count=1 2>/dev/null | od -A n -t x1 | tr -d " \n" > /tmp/leaves/caddy_internal_hmac
              fi
              echo "[applier] caddy_internal_hmac ready in leaves payload"

              # ca_bundle.crt — root + intermediate concatenated. Required by
              # libssl/libpq consumers (pgbouncer, psycopg2) that cannot build
              # a chain from a chain-bundle cert when only the root is in the
              # CAfile. openssl verify -CAfile ca_root.crt pgbouncer_client.crt
              # fails with "unable to get local issuer certificate" (error 20)
              # even though pgbouncer_client.crt contains the intermediate as
              # block 2 — OpenSSL only reads the first block as the cert to
              # verify. With ca_root.crt+ca_intermediate.crt bundled in the
              # CAfile, OpenSSL verifies correctly. Python ssl consumers work
              # with ca_root.crt alone (chain building from presented cert).
              # Internal K8s gate finding.
              cat /tmp/leaves/ca_root.crt /tmp/leaves/ca_intermediate.crt > /tmp/leaves/ca_bundle.crt
              echo "[applier] ca_bundle.crt (root+intermediate) created for libssl consumers."

              cd /tmp/leaves
              kubectl create secret generic {{ .Values.mtls.secretName }} \
                --namespace {{ .Release.Namespace }} \
                $(for f in *.crt *.key caddy_internal_hmac; do [ -f "$f" ] && echo "--from-file=$f=$f"; done) \
                --dry-run=client -o yaml \
              | kubectl apply -n {{ .Release.Namespace }} -f -
              echo "[applier] Secret {{ .Values.mtls.secretName }} applied (leaves + CA pubs + caddy_internal_hmac)."
              cd /tmp/cakeys
              kubectl create secret generic {{ .Values.mtls.caKeysSecretName }} \
                --namespace {{ .Release.Namespace }} \
                $(for f in *.key; do [ -f "$f" ] && echo "--from-file=$f=$f"; done) \
                --dry-run=client -o yaml \
              | kubectl apply -n {{ .Release.Namespace }} -f -
              echo "[applier] Secret {{ .Values.mtls.caKeysSecretName }} applied (CA private keys)."
          volumeMounts:
            - name: pki-certs
              mountPath: /secrets
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.mtls.bootstrapResources | nindent 12 }}
      volumes:
        # Private keys in RAM only — never hit node disk.
        - name: pki-certs
          emptyDir:
            medium: Memory
            sizeLimit: 10Mi
        - name: manifest
          configMap:
            name: yashigani-pki-manifest
        - name: manifest-rw
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
        - name: tmp
          emptyDir:
            sizeLimit: 10Mi
{{- end }}
{{- end }}
