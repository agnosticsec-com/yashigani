{{- if .Values.mtls.enabled }}
{{- /*
  Service identity manifest, mounted into the PKI issuer Job.
  Source of truth is docker/service_identities.yaml — this ConfigMap is
  populated via `.Files.Get`, so `helm package` ships a version-pinned copy.
  helm/yashigani/files/service_identities.yaml is a derived copy maintained
  by `make sync-service-identities`. Never edit it directly. SHA parity is
  enforced by CI (tests/contracts/test_service_identities_sha.py).
  See docs/development/service_identities.md for the update workflow.
*/ -}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: yashigani-pki-manifest
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-pki
    app.kubernetes.io/component: pki
    {{- include "yashigani.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-9"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  service_identities.yaml: |
{{ .Files.Get "files/service_identities.yaml" | indent 4 }}
{{- end }}
