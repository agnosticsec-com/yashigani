{{- if .Values.mtls.enabled }}
{{- /*
  Service identity manifest, mounted into the PKI issuer Job.
  Source of truth is docker/service_identities.yaml — this ConfigMap is
  populated via `.Files.Get`, so `helm package` ships a version-pinned copy.
  Keep helm/yashigani/files/service_identities.yaml in sync with the
  docker/ copy; release tooling verifies the hashes match.
*/ -}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: yashigani-pki-manifest
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: yashigani-pki
    app.kubernetes.io/component: pki
    {{- include "yashigani.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-9"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  service_identities.yaml: |
{{ .Files.Get "files/service_identities.yaml" | indent 4 }}
{{- end }}
