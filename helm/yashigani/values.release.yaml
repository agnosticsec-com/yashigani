# Yashigani v2.23.2 — Helm release digest overlay
# Last updated: 2026-05-02T23:00:00+01:00
#
# Purpose: pins every upstream image in values.yaml to its sha256 digest,
# closing ASVS V10.3.1 (H-02 from internal design-drift audit). Apply as a
# second values file:
#
#   helm upgrade --install yashigani ./helm/yashigani \
#     -f helm/yashigani/values.yaml \
#     -f helm/yashigani/values.release.yaml
#
# Our own images (gateway, backoffice, adminBootstrap) reference
# registry.agnosticsec.com/<image>:<tag>@sha256:<digest> — those are set
# by the release pipeline when images are built and pushed. This file pins
# the upstream/third-party images only.
#
# Mirror plan: registry.agnosticsec.com mirroring tracked as retro item
# RETRO-H02-MIRROR (v2.23.2 P0). Until that lands, upstream registries are
# used with digest pinning.
#
# NOTE: As of v2.23.2 image-pin sweep (2026-05-02), digests are now embedded
# directly in values.yaml tag fields (format: "tag@sha256:..."). The digest:
# fields in this file serve as human-readable audit evidence only — they are
# not consumed by Helm templates. Both must be kept in sync.
#
# Digests verified 2026-05-02 via podman pull + inspect on aarch64 macOS.
# Re-verify with: podman pull <image>:<tag> && podman inspect <image>:<tag> \
#   --format '{{.Digest}}'

