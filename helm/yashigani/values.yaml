# Yashigani v2.23.1 — Umbrella Chart Top-Level Values
# All sub-chart values are namespaced under their service name.

global:
  imageRegistry: "ghcr.io"
  imageOwner: "yashigani"
  # REQUIRED: Replace with your actual domain before deployment
  tlsDomain: "yashigani.example.com"
  # tlsMode: caddy | nginx (cert-manager + nginx-ingress)
  tlsMode: "nginx"
  certManagerIssuer: "letsencrypt-prod"
  acmeEmail: "admin@example.com"
  environment: "production"
  useExternalSecrets: false

  keda:
    enabled: true

  topologySpread:
    enabled: true
    policy: DoNotSchedule
    maxSkew: 1

  pdb:
    enabled: true

# ---------------------------------------------------------------------------
# Internal mTLS (v2.23.1) — core-plane mutual TLS between gateway, backoffice,
# postgres, pgbouncer, redis, budget-redis.
#
# On install/upgrade a Helm pre-install hook Job boots the two-tier PKI
# (root → intermediate → per-service leaves) using the gateway image's
# `python -m yashigani.pki.issuer` CLI, then writes the resulting certs and
# trust bundle into a namespace-scoped Secret (yashigani-pki-certs) that
# every core-plane pod mounts at /run/secrets.
#
# A CronJob rotates leaf certs weekly (default Sun 02:00). Pods pick up
# the new cert on the next roll/restart — no in-place reload in v2.23.1.
#
# OPA (policy) stays on plaintext HTTP; mtls_capable:false in the manifest.
# Observability-plane mTLS lands in v2.23.2 (task #54).
#
# UPGRADE NOTE — plaintext → mTLS on an existing PVC:
# The postgres init script (05-enable-ssl.sh) only runs on a fresh initdb.
# If you are upgrading a running release whose postgres PVC is non-empty,
# after the upgrade:
#   1) kubectl exec into the postgres pod,
#   2) append the hostssl rules to $PGDATA/pg_hba.conf by hand (the script
#      is available at /docker-entrypoint-initdb.d/05-enable-ssl.sh as a
#      reference),
#   3) psql --host /var/run/postgresql -c "SELECT pg_reload_conf();"
# Alternatively: uninstall the release + delete the PVC + fresh install.
# Automated in-place migration for existing data is tracked as task #54.
# ---------------------------------------------------------------------------
mtls:
  # Hard-off switch. When false the chart renders the pre-v2.23.1 plaintext
  # topology (no PKI job, no cert mounts). Intended for deliberate testing
  # only — production deployments MUST keep this enabled.
  enabled: true

  # Image used by the applier container that materialises the Secret from
  # the issuer output. alpine/k8s ships kubectl + sh in a single image —
  # necessary because we shell-wrap the apply pipeline. registry.k8s.io/
  # kubectl is distroless (no sh) and therefore won't work here. Override
  # to your internal mirror if air-gapped.
  kubectlImage:
    repository: "alpine/k8s"
    tag: "1.29.4"
    pullPolicy: IfNotPresent

  # Two-tier PKI lifetime policy. Must sit inside the bounds declared in
  # docker/service_identities.yaml cert_policy.* — the issuer enforces them.
  rootLifetimeYears: 10
  intermediateLifetimeDays: 180
  leafLifetimeDays: 90

  # Weekly rotation of leaf certs. Keeps every service <7 days away from a
  # fresh cert; aligns with PCI DSS 4.0 4.2.1.1 guidance. Cron in UTC.
  rotation:
    enabled: true
    schedule: "0 2 * * 0"
    # Keep the last N rotation CronJob runs in history for audit trail.
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3
    # Backoff before the rotation CronJob gives up on a failing run.
    backoffLimit: 2

  # Name of the Secret the bootstrap job writes into. Every core-plane
  # Deployment/StatefulSet mounts this at /run/secrets.
  # Do NOT set existingSecretName unless you're running the issuer
  # out-of-band and materialising the Secret yourself.
  secretName: "yashigani-pki-certs"
  existingSecretName: ""

  # Bootstrap job resources — small, single-shot, short-lived.
  bootstrapResources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

# ---------------------------------------------------------------------------
# Gateway — MCP reverse proxy (data plane)
# ---------------------------------------------------------------------------
gateway:
  enabled: true
  image:
    repository: yashigani-gateway
    tag: "2.23.1"
    pullPolicy: IfNotPresent
  replicaCount: 2
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "512Mi"
  service:
    port: 8080
    type: ClusterIP
  existingSecretName: ""  # leave empty to auto-generate, or set to a pre-created K8s secret name
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  pdb:
    enabled: true
    minAvailable: 1
  env:
    upstreamUrl: ""
    opaUrl: "http://yashigani-policy:8181"
    ollamaUrl: "http://yashigani-ollama:11434"
    redisHost: "yashigani-redis"
    redisPort: "6379"
    agentRoutingEnabled: "true"
    agentPathPrefix: "/agents"
    agentTokenMinLength: "64"
    # v0.5.0
    deploymentStream: "opensource"
    otelEndpoint: "http://otel-collector:4317"
    fasttextModelPath: "/app/models/fasttext_classifier.bin"

# ---------------------------------------------------------------------------
# Backoffice — Admin control plane
# ---------------------------------------------------------------------------
backoffice:
  enabled: true
  image:
    repository: yashigani-backoffice
    tag: "2.23.1"
    pullPolicy: IfNotPresent
  replicaCount: 2
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  service:
    port: 8443
    type: ClusterIP
  existingSecretName: ""
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  pdb:
    enabled: true
    minAvailable: 1

# ---------------------------------------------------------------------------
# Policy — Open Policy Agent
# ---------------------------------------------------------------------------
policy:
  enabled: true
  image:
    repository: openpolicyagent/opa
    tag: "1.15.1"
    pullPolicy: IfNotPresent
  replicaCount: 2
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  service:
    port: 8181
    type: ClusterIP
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 60
  pdb:
    enabled: true
    minAvailable: 1

# ---------------------------------------------------------------------------
# Redis — session store + rate limiter
# ---------------------------------------------------------------------------
redis:
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  service:
    port: 6379
    type: ClusterIP
  existingSecretName: ""
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""
  # Phase 9 adds cluster mode — single-node for now
  cluster:
    enabled: false

# ---------------------------------------------------------------------------
# Ollama — local LLM inference (StatefulSet, 2 replicas for HA)
# ---------------------------------------------------------------------------
ollama:
  enabled: true
  image:
    repository: ollama/ollama
    tag: "0.6.2"
    pullPolicy: IfNotPresent
  replicaCount: 2
  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "4"
      memory: "8Gi"
  service:
    port: 11434
    type: ClusterIP
  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
  model: "qwen2.5:3b"
  env:
    ollamaHost: "0.0.0.0"

# ---------------------------------------------------------------------------
# Prometheus — metrics collection
# ---------------------------------------------------------------------------
prometheus:
  enabled: true
  image:
    repository: prom/prometheus
    tag: "v3.2.1"
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "2Gi"
  service:
    port: 9090
    type: ClusterIP
  retention: "30d"
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""

# ---------------------------------------------------------------------------
# Grafana — dashboards and alerting
# ---------------------------------------------------------------------------
grafana:
  enabled: true
  image:
    repository: grafana/grafana
    tag: "11.5.2"
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  service:
    port: 3000
    type: ClusterIP
  existingSecretName: ""
  adminUser: "grafana-admin"
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""

# ---------------------------------------------------------------------------
# Alertmanager — alert routing (v0.5.0)
# ---------------------------------------------------------------------------
alertmanager:
  enabled: true
  image:
    repository: prom/alertmanager
    tag: "v0.27.0"
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"
  service:
    port: 9093
    type: ClusterIP
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""

# ---------------------------------------------------------------------------
# Loki — log aggregation (v0.5.0)
# ---------------------------------------------------------------------------
loki:
  enabled: true
  image:
    repository: grafana/loki
    tag: "3.0.0"
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  service:
    port: 3100
    type: ClusterIP
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""

# ---------------------------------------------------------------------------
# Jaeger — distributed tracing UI (v0.5.0)
# ---------------------------------------------------------------------------
jaeger:
  enabled: true
  image:
    repository: jaegertracing/all-in-one
    tag: "1.57"
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  service:
    port: 16686
    type: ClusterIP

# ---------------------------------------------------------------------------
# OpenTelemetry Collector — OTLP receiver, Jaeger exporter
# ---------------------------------------------------------------------------
otelCollector:
  enabled: true
  image:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.100.0"
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  service:
    otlpGrpcPort: 4317
    otlpHttpPort: 4318
    metricsPort: 8889
    type: ClusterIP

# ---------------------------------------------------------------------------
# Caddy — TLS edge proxy (optional in K8s — prefer nginx-ingress + cert-manager)
# ---------------------------------------------------------------------------
caddy:
  enabled: false
  # note: "In Kubernetes, consider using nginx-ingress + cert-manager instead of Caddy.
  #        Set caddy.enabled=false and configure an Ingress resource."
  image:
    repository: caddy
    tag: "2-alpine"
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "250m"
      memory: "128Mi"
  service:
    port: 443
    httpPort: 80
    type: LoadBalancer
  # v2.23.1 EX-231-08 — Caddy-centric SPIFFE URI ACL on /internal/metrics.
  # When enabled, Caddy terminates an additional internal-only listener on
  # :8444 that requires peer-cert auth, validates the URI SAN, and forwards
  # it as X-SPIFFE-ID to the gateway/backoffice upstream. Prometheus scrapes
  # go through this listener instead of hitting the pods directly.
  # Requires the mesh mTLS plane (caddy_client.{crt,key} + ca_root.crt) to
  # be mounted into the caddy pod — parity with docker-compose is tracked.
  internalMetricsListener:
    enabled: false
    port: 8444
  # #81 fix parallel backoffice listener (Prom v3 rejects Host via http_headers).
  # Toggle in lockstep with internalMetricsListener.enabled.
  internalMetricsListenerBackoffice:
    enabled: false
    port: 8445

# ---------------------------------------------------------------------------
# Optional Agent Bundles (v0.8.0)
#
# All four agents are DISABLED by default.  Enable per-agent with:
#   helm upgrade yashigani ./helm/yashigani \
#     --set agentBundles.langgraph.enabled=true
#
# DISCLAIMER: These integrations are provided AS IS by Agnostic Security.
# Image digests are pinned and updated with each Yashigani release.
# All support goes to the upstream maintainers.
# ---------------------------------------------------------------------------
agentBundles:

  langgraph:
    enabled: false
    image:
      # Digest pinned per Yashigani release — do not override manually
      repository: langchain/langgraph-api
      tag: "latest"
      pullPolicy: IfNotPresent
    replicaCount: 1
    env:
      LANGGRAPH_YASHIGANI_URL: "http://yashigani-gateway:8080"
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    # Secret name that holds the agent registration token
    tokenSecretName: "yashigani-langgraph-token"
    tokenSecretKey: "token"

  # goose: REMOVED — ACP protocol too slow on CPU (~300s per request)
  # crewai: REMOVED — enterprise-only as of v2.1. Contact sales@agnosticsec.com.

  openclaw:
    # NOTE: Node.js 24 image — approximately 800 MB (larger than Python agent images).
    # OpenClaw runs its own Gateway on port 18789.
    # Integration: OpenClaw Gateway -> Yashigani Gateway -> LLM providers.
    # License: TBD — verify at openclaw.ai before production use.
    enabled: false
    image:
      repository: openclaw/openclaw
      tag: "latest"
      pullPolicy: IfNotPresent
    replicaCount: 1
    env:
      OPENCLAW_UPSTREAM_URL: "http://yashigani-gateway:8080"
      OPENCLAW_SERVER_MODE: "true"
      OPENCLAW_DISABLE_AUDIO: "true"
      OPENCLAW_DISABLE_CAMERA: "true"
      OPENCLAW_DISABLE_LOCATION: "true"
      OPENCLAW_DISABLE_VOICE_WAKE: "true"
    service:
      # Expose OpenClaw's own gateway port for incoming messaging webhooks
      port: 18789
      type: ClusterIP
    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1Gi"
    tokenSecretName: "yashigani-openclaw-token"
    tokenSecretKey: "token"

# ---------------------------------------------------------------------------
# Open WebUI — user-facing chat interface (v2.1)
# Internal only. All inference routes through gateway.
# ---------------------------------------------------------------------------
openWebui:
  enabled: true
  image:
    repository: ghcr.io/open-webui/open-webui
    tag: "main"
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  service:
    port: 8080
    type: ClusterIP
  env:
    webuiAuth: "false"
    webuiAuthTrustedEmailHeader: "X-Forwarded-User"
    webuiAuthTrustedNameHeader: "X-Forwarded-Name"
    enableSignup: "true"
    webuiSecretKeySecretName: "yashigani-open-webui-secrets"
    webuiSecretKeySecretKey: "secret_key"
    openaiApiBaseUrl: "http://yashigani-gateway:8080/v1"
    openaiApiKey: "yashigani-internal"
    ollamaBaseUrl: ""
    enableOllamaApi: "false"
    defaultModels: "qwen2.5:3b"
    webuiName: "Yashigani AI"
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""

# ---------------------------------------------------------------------------
# Budget Redis — dedicated Redis for token budget counters (v1.0)
# Separate from main Redis; maxmemory-policy noeviction required.
# ---------------------------------------------------------------------------
budgetRedis:
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "250m"
      memory: "384Mi"
  service:
    port: 6379
    type: ClusterIP
  existingSecretName: ""
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""

# ---------------------------------------------------------------------------
# PostgreSQL 16 — primary durable store
# ---------------------------------------------------------------------------
postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "1Gi"
  service:
    port: 5432
    type: ClusterIP
  existingSecretName: ""
  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""

# ---------------------------------------------------------------------------
# PgBouncer — connection pooler
# ---------------------------------------------------------------------------
pgbouncer:
  enabled: true
  image:
    repository: edoburu/pgbouncer
    tag: "v1.23.1-p0"
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "250m"
      memory: "128Mi"
  service:
    port: 5432
    type: ClusterIP
  env:
    poolMode: transaction
    maxClientConn: "100"
    defaultPoolSize: "20"

# ---------------------------------------------------------------------------
# v2.2 Feature Flags
# ---------------------------------------------------------------------------

# PII Detection — controls detection mode for request/response payloads.
# Modes: log (detect + record only), redact (inline replacement), block (drop payload).
# Requires license tier: pii_log (Community+), pii_redact (Pro+).
pii:
  enabled: false
  mode: "log"          # log | redact | block
  enabledTypes:        # PII categories to scan — leave empty to scan all
    - SSN
    - CREDIT_CARD
    - EMAIL
    - PHONE
    - IBAN
    - PASSPORT
    - NHS_NUMBER
    - DRIVERS_LICENCE
    - IP_ADDRESS
    - DATE_OF_BIRTH
  scanRequests: true
  scanResponses: true

# DDoS Protection — application-layer per-IP connection counting (v2.2).
# Backed by Redis (main redis DB 0, key namespace ddos:).
# fail-open: if Redis is unreachable, requests are allowed through.
ddosProtection:
  enabled: true
  maxConnectionsPerIp: 50
  windowSeconds: 60

# Response Inspection — run Ollama classifier over LLM responses (v0.9.0).
responseInspection:
  enabled: false

# SSO / Identity Provider configuration (v2.1).
# Mirrors the YASHIGANI_IDP_<N>_* env vars used by docker-compose.
# Up to 10 IdPs may be configured. Secrets (clientSecret) must be stored in
# a Kubernetes Secret and referenced via existingSecretName.
sso:
  twoFactorRequired: false
  # existingSecretName: yashigani-sso-secrets
  # The secret must contain keys idp_<n>_client_secret for each IdP index.
  idps: []
  # Example:
  # - id: "keycloak-dev"
  #   name: "Keycloak Dev"
  #   protocol: "oidc"
  #   discoveryUrl: "https://keycloak.example.com/realms/yashigani/.well-known/openid-configuration"
  #   clientId: "yashigani"
  #   clientSecretKey: "idp_1_client_secret"   # key inside existingSecretName
  #   emailDomains: "example.com"
  #   redirectUri: "https://yashigani.example.com/admin/sso/callback"

# Model Aliases — Redis-backed alias-to-model routing (v2.3 backoffice feature).
# Aliases are managed at runtime via the backoffice UI/API.
# Seed defaults may be provided here; they are applied on backoffice startup.
modelAliases:
  seedDefaults: true
  # defaults are defined in the DB migration (0005_identity_budget_routing.py)
  # Override or add custom aliases:
  # extra:
  #   - alias: "fast"
  #     provider: "local"
  #     modelName: "qwen2.5:3b"
  #     forceLocal: true
