# Yashigani v2.24.0 — Umbrella Chart Top-Level Values
# All sub-chart values are namespaced under their service name.
# Last updated: 2026-05-17 (feat: internalBearer per-install secret — Captain Bucket-C; remove hardcoded yashigani-internal)

global:
  # imageRegistry and imageOwner are used only for gateway / backoffice /
  # adminBootstrap (images you build from source). Leave both empty for
  # local Docker/Podman deployments where images are built by install.sh and
  # already present on the node. For K8s: set these to your private registry
  # and namespace, then push your locally-built images there before deploying.
  # Example: imageRegistry: "registry.example.com", imageOwner: "myorg"
  # Agnostic Security does not host or distribute these images.
  imageRegistry: ""
  imageOwner: ""
  # REQUIRED: Replace with your actual domain before deployment
  tlsDomain: "yashigani.example.com"
  # tlsMode: caddy | nginx (cert-manager + nginx-ingress)
  tlsMode: "caddy"
  certManagerIssuer: "letsencrypt-prod"
  acmeEmail: "admin@example.com"
  environment: "production"
  useExternalSecrets: false

  keda:
    enabled: true

  topologySpread:
    enabled: true
    policy: DoNotSchedule
    maxSkew: 1

  pdb:
    enabled: true

# ---------------------------------------------------------------------------
# Internal mTLS (v2.23.1) — core-plane mutual TLS between gateway, backoffice,
# postgres, pgbouncer, redis, budget-redis.
#
# On install/upgrade a Helm pre-install hook Job boots the two-tier PKI
# (root → intermediate → per-service leaves) using the gateway image's
# `python -m yashigani.pki.issuer` CLI, then writes the resulting certs and
# trust bundle into a namespace-scoped Secret (yashigani-pki-certs) that
# every core-plane pod mounts at /run/secrets.
#
# A CronJob rotates leaf certs weekly (default Sun 02:00). Pods pick up
# the new cert on the next roll/restart — no in-place reload in v2.23.1.
#
# OPA (policy) now serves mTLS; mtls_capable:true in the manifest (v2.23.2).
# All callers updated to use internal_httpx_client (EX-231-01 closed).
#
# UPGRADE NOTE — plaintext → mTLS on an existing PVC:
# The postgres init script (05-enable-ssl.sh) only runs on a fresh initdb.
# If you are upgrading a running release whose postgres PVC is non-empty,
# after the upgrade:
#   1) kubectl exec into the postgres pod,
#   2) append the hostssl rules to $PGDATA/pg_hba.conf by hand (the script
#      is available at /docker-entrypoint-initdb.d/05-enable-ssl.sh as a
#      reference),
#   3) psql --host /var/run/postgresql -c "SELECT pg_reload_conf();"
# Alternatively: uninstall the release + delete the PVC + fresh install.
# Automated in-place migration for existing data is tracked as task #54.
# ---------------------------------------------------------------------------
# ---------------------------------------------------------------------------
# Network Policies (EX-231-10 — Caddy-centric isolation)
# ---------------------------------------------------------------------------
# When enabled (default), the chart renders NetworkPolicy resources that
# enforce the Caddy-sole-ingress posture: backoffice and gateway only accept
# connections from yashigani-caddy pods. Prometheus scrapes go through Caddy's
# SPIFFE-gated listeners (:8444/:8445) only.
#
# Set to false ONLY in CNI environments that do not support NetworkPolicy
# (e.g. plain kind without Calico/Cilium, or specific managed K8s tiers).
# In that case you accept that the Caddy-centric isolation control is
# network-layer absent; application-layer mTLS + SPIFFE gate remain active.
# Document any disablement in the risk register with maintainer sign-off.
# ---------------------------------------------------------------------------
networkPolicies:
  enabled: true

# ---------------------------------------------------------------------------
# Admission Control (YSG-RISK-008 — v2.23.2 P1)
# ---------------------------------------------------------------------------
# When enabled, the chart renders Kyverno ClusterPolicy resources that REJECT
# pods missing the YSG-RISK-008 container hardening baseline:
#   - runAsNonRoot: true (pod or container level)
#   - allowPrivilegeEscalation: false (every container)
#   - seccompProfile.type: RuntimeDefault (pod level)
#   - capabilities.drop: [ALL] (every container)
#   - No runAsUser: 0 (except documented exceptions)
#
# Set to true only AFTER installing Kyverno cluster-wide
# (`helm install kyverno kyverno/kyverno -n kyverno --create-namespace`).
# The chart does not bundle Kyverno.
#
# In CNI environments or clusters without Kyverno the ClusterPolicy CRD will
# not be present and helm install/upgrade will fail with an opaque API-server
# error. Leaving this false means application-layer mTLS + SPIFFE gate remain
# active; document any disablement in the risk register with maintainer
# sign-off, referencing YSG-RISK-008.
# ---------------------------------------------------------------------------
# ---------------------------------------------------------------------------
# LIC-002 SECURITY NOTICE — YASHIGANI_LICENSE_TIER is NOT an operator-settable
# value and MUST NOT appear anywhere in this values file, in extraEnv blocks,
# or in any Kubernetes Secret/ConfigMap managed by this chart. Setting it via
# the environment bypasses the signed-license enforcement path and lets any
# operator claim any tier without a valid license token.
#
# There is intentionally NO extraEnv escape hatch in this chart. If you are
# adding a new env var to the gateway or backoffice, add it as a first-class
# chart value with a named field — never via an open-ended extraEnv list.
#
# If you see YASHIGANI_LICENSE_TIER in any manifest or values file, treat that
# as a HIGH-severity finding and remove it before deploying.
# ---------------------------------------------------------------------------
admissionPolicies:
  enabled: false
  # Kyverno policy action: Enforce (hard reject) or Audit (log only).
  # Must be Enforce in production. Audit only during rollout evaluation.
  validationFailureAction: Enforce

mtls:
  # Hard-off switch. When false the chart renders the pre-v2.23.1 plaintext
  # topology (no PKI job, no cert mounts). Intended for deliberate testing
  # only — production deployments MUST keep this enabled.
  enabled: true

  # Image used by the applier container that materialises the Secret from
  # the issuer output. alpine/k8s ships kubectl + sh in a single image —
  # necessary because we shell-wrap the apply pipeline. registry.k8s.io/
  # kubectl is distroless (no sh) and therefore won't work here. Override
  # to your internal mirror if air-gapped.
  kubectlImage:
    repository: "alpine/k8s"
    tag: "1.29.15@sha256:82171c2a1b3412fc0450ff347f11451294f917122c7f49a63d77f3499a068f11"
    pullPolicy: IfNotPresent

  # Two-tier PKI lifetime policy. Must sit inside the bounds declared in
  # docker/service_identities.yaml cert_policy.* — the issuer enforces them.
  rootLifetimeYears: 10
  intermediateLifetimeDays: 180
  leafLifetimeDays: 90

  # Weekly rotation of leaf certs. Keeps every service <7 days away from a
  # fresh cert; aligns with PCI DSS 4.0 4.2.1.1 guidance. Cron in UTC.
  rotation:
    enabled: true
    schedule: "0 2 * * 0"
    # Keep the last N rotation CronJob runs in history for audit trail.
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3
    # Backoff before the rotation CronJob gives up on a failing run.
    backoffLimit: 2

  # Name of the leaves-Secret the bootstrap job writes into. Every core-plane
  # Deployment/StatefulSet mounts this at /run/secrets. After retro #3aj this
  # Secret contains LEAF material only:
  #   * <service>_client.crt + <service>_client.key (the per-service leaves)
  #   * ca_root.crt + ca_intermediate.crt (public certs — workloads use intermediate only, Pattern B)
  #   * caddy_internal_hmac (EX-231-10 Layer B) — per-install shared secret
  #     injected by Caddy as X-Caddy-Verified-Secret on every upstream proxy.
  #     backoffice and gateway verify it via the gateway/backoffice middleware. The bootstrap Job
  #     generates it fresh on install; on upgrade it reuses the existing value
  #     from the Secret (idempotent) so a live stack isn't disrupted mid-apply.
  # It deliberately does NOT contain the CA private keys — those live in
  # caKeysSecretName below and are mounted only by the bootstrap Job and
  # rotation CronJob. Name retained as `yashigani-pki-certs` for upgrade
  # compatibility (the bootstrap-job applier rewrites the contents in place).
  # Do NOT set existingSecretName unless you're running the issuer
  # out-of-band and materialising the Secret yourself.
  secretName: "yashigani-pki-certs"
  existingSecretName: ""

  # Retro #3aj — separate Secret for the CA private keys (root + intermediate).
  # Mounted ONLY by the PKI bootstrap Job and rotation CronJob; workload pods
  # never see ca_root.key or ca_intermediate.key. RBAC restricts mutation of
  # this Secret to the yashigani-pki ServiceAccount used by those Jobs only.
  caKeysSecretName: "yashigani-pki-ca-keys"

  # Bootstrap job resources — small, single-shot, short-lived.
  bootstrapResources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

# ---------------------------------------------------------------------------
# Admin Bootstrap (retro #3ap) — primary + backup admin + dual TOTP.
#
# Mirrors install.sh _gen_admin_credentials in compose: produces admin1 and
# admin2 usernames, passwords, and TOTP secrets, and stores them in a Secret
# that the backoffice mounts into /run/secrets. This is the K8s parity for
# the project's two-admin bootstrap policy — every install must yield TWO
# admin accounts with TOTP pre-provisioned, never a single-admin install.
#
# Disable ONLY if you intend to seed admins out-of-band by pre-creating
# `existingSecretName` with the same key schema (admin1_username,
# admin1_initial_password, admin1_totp_secret, admin2_username,
# admin2_password, admin2_totp_secret).
# ---------------------------------------------------------------------------
adminBootstrap:
  enabled: true
  # Name of the Secret the bootstrap Job writes into and the backoffice
  # mounts at /run/secrets (alongside the PKI leaves).
  secretName: "yashigani-admin-bootstrap"
  # Skip the chart-managed Job and use a Secret you have pre-created out of
  # band. Must contain the six keys listed above.
  existingSecretName: ""
  # Image used to mint passwords + TOTP secrets. The gateway image already
  # bundles python3 + pyotp + secrets which is everything we need; reusing
  # it avoids another image pull.
  image:
    # Built locally by install.sh from the v2.24.0 tagged source.
    # For K8s deployments: push to your own private registry and update
    # the repository field accordingly. Pin your post-build digest with
    # `@sha256:<digest>` for supply-chain attestation (recommended).
    repository: yashigani-gateway
    tag: "2.24.0"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

# ---------------------------------------------------------------------------
# Internal Bearer Token (Captain Bucket-C — per-install, rotatable secret)
# ---------------------------------------------------------------------------
# YASHIGANI_INTERNAL_BEARER is the shared token agent bundles (open-webui,
# langflow, letta) present as the OpenAI `Authorization: Bearer <token>` when
# calling gateway:8081/v1. The gateway's AgentAuthMiddleware validates it at
# the app layer. Previously hardcoded to "yashigani-internal"; now per-install.
#
# Fail-closed: if internalBearer.value is empty AND no existingSecretName is
# set, helm template/install/upgrade will fail (see validate-security.yaml).
# Generate with: openssl rand -hex 32
#
# Upgrade-safe: the auto-generated Secret uses helm lookup so the value is
# preserved on `helm upgrade` and only generated fresh on first install.
internalBearer:
  # Set a non-empty value here, or leave empty to auto-generate on first install.
  # In production: pass via --set internalBearer.value="$(openssl rand -hex 32)"
  # or supply an existingSecretName with key `yashigani_internal_bearer`.
  value: ""
  # Optionally point to a pre-created K8s Secret (key: yashigani_internal_bearer).
  existingSecretName: ""

# ---------------------------------------------------------------------------
# Gateway — MCP reverse proxy (data plane)
# ---------------------------------------------------------------------------
gateway:
  enabled: true
  image:
    # Built locally by install.sh from the v2.24.0 tagged source.
    # For K8s deployments: push to your own private registry and update
    # the repository field accordingly. Pin your post-build digest with
    # `@sha256:<digest>` for supply-chain attestation (recommended).
    repository: yashigani-gateway
    tag: "2.24.0"
    pullPolicy: IfNotPresent
  replicaCount: 2
  # YSG-RISK-005 #3av: requests = 50% of limit (scheduler sizing).
  # Limits match compose sizing baseline (retro #3au / risk register).
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1024Mi"
  service:
    port: 8080
    type: ClusterIP
  existingSecretName: ""  # leave empty to auto-generate, or set to a pre-created K8s secret name
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  pdb:
    enabled: true
    minAvailable: 1
  env:
    upstreamUrl: ""
    opaUrl: "https://yashigani-policy:8181"
    ollamaUrl: "http://yashigani-ollama:11434"
    redisHost: "yashigani-redis"
    redisPort: "6379"
    agentRoutingEnabled: "true"
    agentPathPrefix: "/agents"
    agentTokenMinLength: "64"
    # v0.5.0
    deploymentStream: "opensource"
    # M-01 fix: overridden to grpcs:// by gateway.yaml when mtls.enabled=true.
    # This value applies only when mTLS is disabled (non-default, testing only).
    otelEndpoint: "http://otel-collector:4317"
    sklearnModelPath: "/app/models/sensitivity_classifier.joblib"

# ---------------------------------------------------------------------------
# Backoffice — Admin control plane
# ---------------------------------------------------------------------------
backoffice:
  enabled: true
  # v2.23.2 fix — SSRF guard hostname allowlist (TM-V231-004 / Pentest #95).
  # _assert_safe_upstream_url() blocks loopback/RFC1918/link-local by default.
  # agentUpstreamHostnames lists the Kubernetes service hostnames that are permitted
  # as agent upstream URLs despite resolving to cluster-internal IPs. The rendered
  # value is joined with commas and injected as YASHIGANI_AGENT_UPSTREAM_HOSTNAMES
  # on the backoffice container.
  # Default: the three canonical Yashigani-internal bundle service names.
  # Extend: add your custom agent service names to this list.
  # Security: adding a name trusts that K8s service as a legitimate internal mesh
  # endpoint. Agent registration is still admin-gated (TOTP step-up + audit trail).
  agentUpstreamHostnames:
    - langflow
    - letta
    - openclaw
  image:
    # Built locally by install.sh from the v2.24.0 tagged source.
    # For K8s deployments: push to your own private registry and update
    # the repository field accordingly. Pin your post-build digest with
    # `@sha256:<digest>` for supply-chain attestation (recommended).
    repository: yashigani-backoffice
    tag: "2.24.0"
    pullPolicy: IfNotPresent
  replicaCount: 2
  # YSG-RISK-005 #3av: requests = 50% of limit.
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1024Mi"
  service:
    port: 8443
    type: ClusterIP
  existingSecretName: ""
  # v2.23.3 (#59): the backoffice K8s Secret (existingSecretName / default
  # "yashigani-backoffice-secrets") must contain the following keys:
  #   db_aes_key  — 64-char hex (32 bytes) or 44-char base64; used by
  #                 pgcrypto pgp_sym_encrypt to encrypt auth_settings values
  #                 (including the HIBP API key) at rest.  install.sh generates
  #                 this key automatically; for Helm-only deployments, generate
  #                 with: openssl rand -hex 32
  #   Missing key → RuntimeError at backoffice startup (fail-closed, SOP 1).
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  pdb:
    enabled: true
    minAvailable: 1
  # v2.23.2 #47 — Backup status + verify.
  # Set to the absolute host path of the backups directory (created by install.sh).
  # Empty string = skip the mount (endpoints return empty state gracefully).
  # Example: /opt/yashigani/backups
  backupsHostPath: ""

# ---------------------------------------------------------------------------
# Backup — age-encrypted CronJob (MP.L2-3.8.9 / CMMC L2)
# Last updated: 2026-05-09T00:00:00+01:00
# ---------------------------------------------------------------------------
# Operator pre-requisites (see docs/operations/backup.md — Encryption section):
#
#   1. Generate key pair on the operator host (NOT inside the cluster):
#        age-keygen -o /tmp/backup-identity.age
#        chmod 0400 /tmp/backup-identity.age
#
#   2. Extract recipient public key:
#        age-keygen -y /tmp/backup-identity.age   # prints: age1...
#
#   3. Create ConfigMap with the recipient public key:
#        kubectl create configmap yashigani-backup-recipient \
#          --from-literal=recipient.age.pub="age1<your-public-key>" \
#          -n yashigani
#
#   4. Create Secret with the identity private key (for restore access — store
#      a copy offline, do NOT keep only in-cluster):
#        kubectl create secret generic yashigani-backup-identity \
#          --from-file=identity.age=/tmp/backup-identity.age \
#          -n yashigani
#        rm /tmp/backup-identity.age  # shred the original
#
#   Encryption-only backup job does NOT require the identity Secret.
#   The identity Secret is only needed by the restore path.
#
backup:
  enabled: false  # set to true after provisioning recipientKeyConfigMap
  schedule: "0 2 * * *"  # 02:00 UTC daily
  # Name of ConfigMap holding the age recipient public key.
  # ConfigMap key must be named exactly: recipient.age.pub
  # Contents: a single line starting with 'age1' (bech32 X25519 public key).
  recipientKeyConfigMap: "yashigani-backup-recipient"
  # Name of Secret holding the age identity (private key) — used by restore path only.
  # Secret key must be named exactly: identity.age
  # This Secret is NOT mounted by the backup CronJob (encryption uses the public key only).
  identitySecret: "yashigani-backup-identity"
  # Output directory inside the CronJob pod. This path must be backed by a
  # PersistentVolume or hostPath so that encrypted archives survive pod restarts.
  outputDir: "/var/lib/yashigani/backups"
  # Source directory inside the pod to archive.
  sourceDir: "/var/lib/yashigani"
  # PersistentVolumeClaim to mount at outputDir. If empty, no PVC is created
  # and the operator must supply a hostPath or other volume via extraVolumes.
  pvcName: ""
  # If pvcName is empty and you want the chart to create a PVC, set these:
  pvc:
    create: false
    storageClassName: ""
    size: "10Gi"
    accessMode: ReadWriteOnce
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"
  # History limits
  failedJobsHistoryLimit: 3
  successfulJobsHistoryLimit: 3

# ---------------------------------------------------------------------------
# Policy — Open Policy Agent
# ---------------------------------------------------------------------------
policy:
  enabled: true
  image:
    repository: openpolicyagent/opa
    tag: "1.16.1@sha256:c6f9910d5e982df13fa4c65f02cfa7f65f9cfdbef9fbaf80d6547f840294aa02"
    pullPolicy: IfNotPresent
  replicaCount: 2
  # YSG-RISK-005 #3av: requests = 50% of limit.
  resources:
    requests:
      cpu: "125m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"
  service:
    port: 8181
    type: ClusterIP
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 60
  pdb:
    enabled: true
    minAvailable: 1

# ---------------------------------------------------------------------------
# Redis — session store + rate limiter
# ---------------------------------------------------------------------------
redis:
  enabled: true
  image:
    repository: redis
    tag: "7.4.9-alpine@sha256:286bd4264adb303147270bb2d735352497e950f7b73b2ca42364d63d7daf61ee"
    pullPolicy: IfNotPresent
  replicaCount: 1
  # YSG-RISK-005 #3av: requests = 50% of limit.
  resources:
    requests:
      cpu: "125m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"
  service:
    port: 6379
    type: ClusterIP
  existingSecretName: ""
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""
  # Phase 9 adds cluster mode — single-node for now
  cluster:
    enabled: false

# ---------------------------------------------------------------------------
# Ollama — local LLM inference (StatefulSet, 2 replicas for HA)
# ---------------------------------------------------------------------------
ollama:
  enabled: true
  image:
    repository: ollama/ollama
    tag: "0.23.1@sha256:6077dbbd6508dce8973f8b91c30d8026b1279ab0483e15f0dfad469dba676c2f"
    pullPolicy: IfNotPresent
  replicaCount: 2
  # YSG-RISK-005 #3av: requests = 50% of limit.
  # LLM inference — high memory requirement, 2 CPUs to keep inference
  # from starving other services. Increase on GPU hosts.
  resources:
    requests:
      cpu: "1000m"
      memory: "2048Mi"
    limits:
      cpu: "2000m"
      memory: "4096Mi"
  service:
    port: 11434
    type: ClusterIP
  persistence:
    enabled: true
    # Sized for: model storage (3-30 GB depending on model) +
    # per-user inference data (documents, files, embeddings caches).
    # Increase further for multi-user heavy-document workloads.
    size: 100Gi
    storageClass: ""
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
  model: "qwen2.5:3b"
  env:
    ollamaHost: "0.0.0.0"
    # HOME=/data routes ollama's key + state (~/.ollama) to the persistent
    # volume mount, allowing the container to run as UID 1000 (non-root).
    # Verified 2026-05-03 — no root required.
    home: "/data"
    ollamaModels: "/data/models"
  # initJob — one-shot Kubernetes Job to pull the default model on first deploy.
  # Activated only when openWebui.enabled=true (no model needed for API-only).
  # defaultModel: model to pull. Must match openWebui.env.defaultModels so the
  #   chat surface shows it as an available backend.
  # modelDigest: short SHA prefix for supply-chain verification (SOL-SC-03).
  #   Set to "skip" after an upstream model update that changes the digest.
  # minDiskGiB: minimum free gigabytes required on the ollama volume before pull.
  #   If free space < minDiskGiB the Job logs a warning and exits 0 (warn-only).
  initJob:
    # defaultModel: qwen2.5:3b — 1.9 GB, Qwen 2.5 3B-parameter instruct model.
    # Good balance of size and capability for a single-node deployment.
    defaultModel: "qwen2.5:3b"
    modelDigest: "357c53fb659c"
    minDiskGiB: 3
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"

