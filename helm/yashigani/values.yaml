# ---------------------------------------------------------------------------
# Caddy — TLS edge proxy (K8s front door, Option B parity with Docker/Podman)
# ---------------------------------------------------------------------------
# Caddy is the K8s front door for Yashigani. It terminates the public TLS
# session and speaks mTLS upstream to gateway/backoffice/policy — exact
# parity with Docker/Podman compose. Cluster operators MAY layer
# nginx-ingress + cert-manager (or any L7) in front of Caddy at the cluster
# edge for ACME automation, WAF, or multi-tenant routing — Caddy stays.
#
# Disabling caddy here will break the in-cluster mTLS plane: gateway and
# backoffice both terminate mTLS internally, so a plaintext upstream from
# any other reverse proxy will be refused at the TLS handshake. Use the
# layered-edge pattern instead.
# ---------------------------------------------------------------------------
caddy:
  enabled: true
  image:
    repository: caddy
    tag: "2.11.2-alpine@sha256:834468128c7696cec0ceea6172f7d692daf645ae51983ca76e39da54a97c570d"
    pullPolicy: IfNotPresent
  replicaCount: 1
  # YSG-RISK-005 #3av: requests = 50% of limit.
  resources:
    requests:
      cpu: "250m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  service:
    port: 443
    httpPort: 80
    type: LoadBalancer
  # v2.23.1 EX-231-08 — Caddy-centric SPIFFE URI ACL on /internal/metrics.
  # When enabled, Caddy terminates an additional internal-only listener on
  # :8444 that requires peer-cert auth, validates the URI SAN, and forwards
  # it as X-SPIFFE-ID to the gateway/backoffice upstream. Prometheus scrapes
  # go through this listener instead of hitting the pods directly.
  # Requires the mesh mTLS plane (caddy_client.{crt,key} + ca_intermediate.crt) to
  # be mounted into the caddy pod — Pattern B: intermediate only, not root.
  internalMetricsListener:
    enabled: true
    port: 8444
  # #81 fix parallel backoffice listener (Prom v3 rejects Host via http_headers).
  # Toggle in lockstep with internalMetricsListener.enabled.
  internalMetricsListenerBackoffice:
    enabled: true
    port: 8445
  # YSG-RISK-061 (v2.24.1): operator ACME / external egress allowlist.
  # Comma-separated list of additional host:port pairs to allow in the
  # caddy-entrypoint.sh iptables OUTPUT rules. Default is empty (only the
  # built-in defaults — LE ACME + OCSP — are applied by the entrypoint).
  # Example: "acme.corp.example:443,ocsp.corp.example:80"
  egressAllowlist: ""

# ---------------------------------------------------------------------------
# Optional Agent Bundles (v0.8.0)
#
# All four agents are DISABLED by default.  Enable per-agent with:
#   helm upgrade yashigani ./helm/yashigani \
#     --set agentBundles.langgraph.enabled=true
#
# DISCLAIMER: These integrations are provided AS IS by Agnostic Security.
# Image digests are pinned and updated with each Yashigani release.
# All support goes to the upstream maintainers.
# ---------------------------------------------------------------------------
agentBundles:

  langgraph:
    enabled: false
    image:
      # ANOMALY 2026-05-02: langchain/langgraph-api is not publicly available on
      # Docker Hub — pull fails. Agent bundle disabled by default (enabled: false).
      # G16 hold-back 2026-05-10 (resolution shipped in v2.23.3): no stable public
      # tag exists; floating "latest" replaced with "not-yet-available" sentinel
      # per image-pinning policy. Sentinel is unpullable by design — operators
      # must supply a real tag+digest before flipping `enabled: true`.
      # Re-evaluate when langchain/langgraph-api publishes a public tag.
      repository: langchain/langgraph-api
      tag: "not-yet-available"
      pullPolicy: IfNotPresent
    replicaCount: 1
    env:
      LANGGRAPH_YASHIGANI_URL: "http://yashigani-gateway:8080"
    # YSG-RISK-005 #3av: requests = 50% of limit.
    resources:
      requests:
        cpu: "500m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1024Mi"
    # Secret name that holds the agent registration token
    tokenSecretName: "yashigani-langgraph-token"
    tokenSecretKey: "token"

  # goose: REMOVED — ACP protocol too slow on CPU (~300s per request)
  # crewai: REMOVED — enterprise-only as of v2.1. Contact sales@agnosticsec.com.

  openclaw:
    # NOTE: Node.js 24 image — approximately 800 MB (larger than Python agent images).
    # OpenClaw runs its own Gateway on port 18789.
    # Integration: OpenClaw Gateway -> Yashigani Gateway -> LLM providers.
    # License: MIT (github.com/openclaw/openclaw)
    enabled: false
    image:
      # Pinned to 2026.5.6 to match docker-compose.yml. INDEX digest verified
      # 2026-05-07 via crane digest — multi-arch (linux/amd64 + linux/arm64).
      repository: ghcr.io/openclaw/openclaw
      tag: "2026.5.6@sha256:2ca86d6296fe2ae7111dac14843551340a4c5099e01566253b62c4d3e0a337fc"
      pullPolicy: IfNotPresent
    replicaCount: 1
    env:
      # BUG-V241-OPENCLAW-EXTENDED: gateway:8080 is mTLS-only — openclaw has no
      # client cert; route to plain-HTTP mesh port :8081. Same class as e4f38f8.
      OPENCLAW_UPSTREAM_URL: "http://yashigani-gateway:8081"
      OPENCLAW_SERVER_MODE: "true"
      OPENCLAW_DISABLE_AUDIO: "true"
      OPENCLAW_DISABLE_CAMERA: "true"
      OPENCLAW_DISABLE_LOCATION: "true"
      OPENCLAW_DISABLE_VOICE_WAKE: "true"
    service:
      # Expose OpenClaw's own gateway port for incoming messaging webhooks
      port: 18789
      type: ClusterIP
    # YSG-RISK-005 #3av: requests = 50% of limit.
    resources:
      requests:
        cpu: "500m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1024Mi"
    tokenSecretName: "yashigani-openclaw-token"
    tokenSecretKey: "token"

  # Langflow — Visual multi-agent workflow builder (MIT)
  # https://github.com/langflow-ai/langflow
  # Single container, embedded SQLite. OpenAI-compatible API on port 7860.
  # Users build custom agent workflows visually via the Langflow UI.
  # All LLM calls route through Yashigani gateway (OpenAI-compatible).
  langflow:
    enabled: false
    image:
      # Pinned to 1.9.2 to match docker-compose.yml.
      # INDEX digest verified 2026-05-13 — multi-arch (linux/amd64 + linux/arm64).
      repository: docker.io/langflowai/langflow
      tag: "1.9.2@sha256:45238e614ce42bf93fea36a56316d3ebafdaf70c4df4425aeb2c90b035ec4a14"
      pullPolicy: IfNotPresent
    replicaCount: 1
    env:
      # Route all LLM calls through Yashigani gateway (OpenAI-compatible)
      # BUG-V241-LANGFLOW-LETTA-BASE-URL: gateway:8080 is mTLS-only — route langflow
      # through gateway's internal mesh port (8081, plain HTTP). NetworkPolicy is the
      # transport guard; AgentAuthMiddleware enforces token auth at the app layer.
      # open-webui got this fix at v2.23.4 BUG-2 (values.yaml line 1175).
      OPENAI_API_BASE: "http://yashigani-gateway:8081/v1"
      # OPENAI_API_KEY is injected via secretKeyRef (internalBearer Secret) in
      # agent-bundles.yaml — do NOT set it here (Captain Bucket-C fix).
      LANGFLOW_DEFAULT_MODEL: "qwen2.5:3b"
      DO_NOT_TRACK: "true"
      LANGFLOW_AUTO_LOGIN: "true"
      # FAIL-002 parity (v2.23.4): langflow 1.9.2 writes alembic migration log to
      # /app/.venv/lib/python3.12/site-packages/langflow/alembic/alembic.log — inside
      # the image rootfs. readOnlyRootFilesystem:false already prevents EROFS in K8s,
      # but this env var is defence-in-depth: redirects alembic output to stdout
      # (langflow.services.database.service._run_migrations uses nullcontext(sys.stdout)
      # when alembic_log_to_stdout=True, bypassing the file open entirely).
      LANGFLOW_ALEMBIC_LOG_TO_STDOUT: "true"
    service:
      port: 7860
      type: ClusterIP
    # YSG-RISK-005 #3av: requests = 50% of limit.
    # Langflow is heavier than letta (visual UI + workflow engine): 1 GiB limit.
    resources:
      requests:
        cpu: "500m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1024Mi"
    # Persistent volume for Langflow SQLite DB and flow data.
    persistence:
      enabled: true
      mountPath: /app/langflow
      size: 5Gi
      storageClass: ""
      accessMode: ReadWriteOnce
    tokenSecretName: "yashigani-langflow-token"
    tokenSecretKey: "token"
    # Langflow image (1.9.2) runs as uid=1000 with named user "user" (non-numeric).
    # K8s runAsNonRoot rejects non-numeric USER directives without runAsUser set.
    # Fix: explicit runAsUser: 1000 so K8s can verify non-root. Risk: LOW (image
    # is non-root by design; UID matches upstream image USER directive).
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      # YSG-SECRETS-DIST-002 CLOSED (Laura A1): langflow UID 1000 is the sole
      # remaining GID 2002 consumer on Compose path (reads bearer as group).
      # In K8s, bearer is delivered via secretKeyRef env var — supplementalGroups
      # is not functionally required here but retained for documentation parity.
      # All other services (postgres, redis, budget-redis, open-webui, letta)
      # have had supplementalGroups: [2002] removed.
      supplementalGroups: [2002]
    containerSecurityContext:
      allowPrivilegeEscalation: false
      # MUST-6 fix (v2.24.1): readOnlyRootFilesystem: true — langflow write paths
      # handled via extraVolumeMounts below (parity with Compose read_only:true).
      # LANGFLOW_ALEMBIC_LOG_TO_STDOUT: "true" eliminates the alembic log write at
      # /app/.venv/.../langflow/alembic/alembic.log (redirects to stdout).
      # Remaining write paths covered by emptyDir mounts:
      #   /tmp       — Python runtime temp files (mode=1777, UID 1000 writes here)
      #   /app/data  — langflow mkdir at startup (ephemeral cache; not persisted)
      # /app/langflow — persistent volume (PVC), writable via named volume mount.
      readOnlyRootFilesystem: true
      capabilities:
        drop: ["ALL"]
    # Extra writable paths for langflow with readOnlyRootFilesystem:true.
    # Matches Compose tmpfs mounts (docker-compose.yml:1598-1599).
    extraVolumeMounts:
      - name: langflow-tmp
        mountPath: /tmp
      - name: langflow-appdata
        mountPath: /app/data
    extraVolumes:
      - name: langflow-tmp
        emptyDir:
          medium: Memory
          sizeLimit: 128Mi
      - name: langflow-appdata
        emptyDir:
          sizeLimit: 64Mi

  # Letta (formerly MemGPT) — Stateful agent with persistent memory (Apache 2.0)
  # https://github.com/letta-ai/letta
  # Agent with long-term memory, tool use, and conversation persistence.
  # Exposes REST API on port 8283. Uses shared Postgres (separate `letta` DB).
  # Dependency: Postgres must be available and the `letta` database must exist.
  # The install.sh installer creates the `letta` database; for K8s deployments
  # run `CREATE DATABASE letta OWNER yashigani_app;` before enabling this bundle.
  letta:
    enabled: false
    image:
      # Pinned to 0.16.7 to match docker-compose.yml.
      # INDEX digest verified 2026-05-13 — multi-arch (linux/amd64 + linux/arm64).
      repository: docker.io/letta/letta
      tag: "0.16.7@sha256:fb7bd2c94a8bb7badbcfdb78a334abe3c1a75b5ea59e177aeba2e6356f54f92c"
      pullPolicy: IfNotPresent
    replicaCount: 1
    env:
      # Route LLM calls through Yashigani gateway (OpenAI-compatible)
      # BUG-V241-LANGFLOW-LETTA-BASE-URL: gateway:8080 is mTLS-only — route letta
      # through gateway's internal mesh port (8081, plain HTTP). NetworkPolicy is the
      # transport guard; AgentAuthMiddleware enforces token auth at the app layer.
      # open-webui got this fix at v2.23.4 BUG-2 (values.yaml line 1175).
      OPENAI_API_BASE: "http://yashigani-gateway:8081/v1"
      # OPENAI_API_KEY is injected via secretKeyRef (internalBearer Secret) in
      # agent-bundles.yaml — do NOT set it here (Captain Bucket-C fix).
      LETTA_LLM_MODEL: "qwen2.5:3b"
      LETTA_EMBEDDING_MODEL: "qwen2.5:3b"
    # Letta connects to Postgres via the letta-pgbouncer sidecar (pod loopback).
    # The URI is assembled from the postgres secret by agent-bundles.yaml:
    #   LETTA_PG_URI=postgresql://yashigani_app:<pw>@127.0.0.1:5432/letta
    # Secret must contain a `postgres_password` key (same secret as Yashigani core).
    # The sidecar pgbouncer dials yashigani-postgres:5432 over full mTLS using
    # letta-pgbouncer_client.crt (issued by mtls-bootstrap-job, UID 70:0400).
    dbPasswordSecretName: "yashigani-postgres-secrets"
    dbPasswordSecretKey: "postgres_password"
    service:
      port: 8283
      type: ClusterIP
    # YSG-RISK-005 #3av: requests = 50% of limit.
    resources:
      requests:
        cpu: "500m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1024Mi"
    # Persistent volume for Letta agent memory store.
    persistence:
      enabled: true
      mountPath: /root/.letta
      size: 5Gi
      storageClass: ""
      accessMode: ReadWriteOnce
    tokenSecretName: "yashigani-letta-token"
    tokenSecretKey: "token"
    # Letta image (0.16.7) runs as uid=0 (root). Upstream requires root for
    # /root/.letta persistence path. runAsNonRoot must be false for this bundle.
    # Compensating controls: seccomp RuntimeDefault, CAP_ALL dropped,
    # allowPrivilegeEscalation: false, network policy restricts egress to gateway
    # + pgbouncer only. Risk: YSG-RISK-005 (agent bundle third-party).
    # Re-evaluate if letta ships a non-root image variant.
    podSecurityContext:
      runAsNonRoot: false
      runAsUser: 0
      # YSG-SECRETS-DIST-002 CLOSED: yashigani_internal_bearer delivered via
      # secretKeyRef env var in K8s. supplementalGroups: [2002] was vestigial.
      # Removed per Laura A1 amendment — GID 2002 narrowed to langflow-only on
      # Compose path; K8s never needed it.
    containerSecurityContext:
      allowPrivilegeEscalation: false
      # readOnlyRootFilesystem: true — restored (was incorrectly false since v2.23.x).
      # letta 0.16.7 write paths handled via extraVolumeMounts below:
      #   /app/openapi_letta.json  — emptyDir (app.py:162 writes openapi schema at startup)
      #   /root/nltk_data          — emptyDir (lifespan NLTK punkt_tab fallback download)
      # All other writes go to /root/.letta (PVC) or /tmp (tmpfs via emptyDir medium:Memory).
      # Detection-lane parity finding 2026-05-20: readOnlyRootFilesystem:false was never
      # correct — set since agent-bundles.yaml introduction, missed by Lu/Iris/Laura across
      # multiple releases. Closed as part of letta read_only:true security debt closure.
      readOnlyRootFilesystem: true
      capabilities:
        drop: ["ALL"]
    # Extra volumes for letta write paths that cannot go to the persistent /root/.letta PVC.
    extraVolumeMounts:
      # letta app.py:162 writes openapi_letta.json relative to CWD (/app) at module import.
      # emptyDir provides a writable inode at /app/openapi_letta.json without opening the
      # rest of /app. subPath mounts the single file path only.
      - name: letta-runtime
        mountPath: /app/openapi_letta.json
        subPath: openapi_letta.json
      # NLTK punkt_tab download in lifespan (fallback — not pre-baked in Docker image).
      # Silently fails without a writable path; emptyDir here avoids the silent failure.
      - name: letta-nltk
        mountPath: /root/nltk_data
      # /tmp for Python runtime temp files.
      - name: letta-tmp
        mountPath: /tmp
    extraVolumes:
      - name: letta-runtime
        emptyDir: {}
      - name: letta-nltk
        emptyDir: {}
      - name: letta-tmp
        emptyDir:
          medium: Memory
          sizeLimit: 64Mi
      # PKI secrets volume — provides ca_root.crt + letta-pgbouncer_client.crt/key
      # to the letta-pgbouncer sidecar for mTLS toward postgres.
      # auth_type=plain: no pgbouncer_userlist Secret needed (YSG-RISK-049 revert).
      - name: letta-pgbouncer-pki
        secret:
          secretName: "yashigani-pki-certs"
          defaultMode: 0400
      # letta-pgbouncer-ini — ConfigMap with pgbouncer-letta.ini content.
      # Mounted at /etc/pgbouncer/pgbouncer.ini:ro inside the sidecar.
      # ConfigMap is generated by the Helm chart from docker/pgbouncer/pgbouncer-letta.ini.
      # BUG-WAVE5-002 fix: values.yaml is NOT a Go template — {{ include }} is
      # evaluated literally, not rendered. Hardcoded to the resolved name.
      - name: letta-pgbouncer-ini
        configMap:
          name: "yashigani-letta-pgbouncer-ini"
          defaultMode: 0444
    # letta-pgbouncer sidecar — pgbouncer session-mode proxy for letta→postgres mTLS.
    # YSG-RISK-048 CLOSED 2026-05-20 — replaces stunnel+socat sidecar (e694127).
    # Iris design doc: iris-letta-postgres-mtls-design-review.md (Option 1, 33/35).
    # Laura threat model: laura-pgbouncer-letta-threat-model.md (F1–F4 all fixed).
    #
    # letta connects to 127.0.0.1:5432 (pod loopback — pod network namespace shared
    # between all containers in the pod). pgbouncer sidecar dials yashigani-postgres:5432
    # over full mTLS presenting letta-pgbouncer_client.crt (UID 70:0400, no C4 violation).
    # session mode required for alembic DDL advisory locks.
    #
    # Multi-arch: edoburu/pgbouncer:v1.25.1-p0 publishes arm64+amd64. No buildx required.
    # Same image as existing yashigani-pgbouncer Deployment. No new registry dependency.
    extraContainers:
      - name: letta-pgbouncer
        image: "docker.io/edoburu/pgbouncer:v1.25.1-p0@sha256:c7bfcaa24de830e29588bb9ad1eb39cebaf07c27149e1974445899b695634bb4"
        imagePullPolicy: IfNotPresent
        securityContext:
          # pgbouncer runs as UID 70 (edoburu image USER pgbouncer). runAsNonRoot:true
          # is correct and is an improvement over the stunnel sidecar (runAsNonRoot:false).
          # Laura threat model §5: this is a security improvement over stunnel.
          runAsNonRoot: true
          runAsUser: 70
          runAsGroup: 70
          allowPrivilegeEscalation: false
          # readOnlyRootFilesystem: pgbouncer entrypoint writes userlist.txt at startup.
          # Same documented exception as the existing pgbouncer Deployment (pgbouncer.yaml).
          # Compensating controls: cap_drop ALL + no-new-privileges + runAsUser:70.
          readOnlyRootFilesystem: false
          capabilities:
            drop: ["ALL"]
        # exec-chain fix (9b9d2b8): pass pgbouncer.ini explicitly to edoburu entrypoint.
        # auth_type=plain (YSG-RISK-049 ACCEPTED-LOW non-KMS-only — Tiago directive 2026-05-21).
        # edoburu entrypoint writes cleartext userlist.txt from DATABASE_URL at startup.
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -e
            exec /entrypoint.sh pgbouncer /etc/pgbouncer/pgbouncer.ini
        env:
          # edoburu image uses DATABASE_URL to populate [databases] section at container start.
          # LETTA_PG_PASSWORD declared first — K8s $(VAR) forward-ref constraint.
          - name: LETTA_PG_PASSWORD
            valueFrom:
              secretKeyRef:
                name: "yashigani-postgres-secrets"
                key: "postgres_password"
          - name: DATABASE_URL
            value: "postgresql://yashigani_app:$(LETTA_PG_PASSWORD)@yashigani-postgres:5432/letta"
          - name: AUTH_TYPE
            value: "plain"
          - name: POOL_MODE
            value: "session"
          - name: MAX_CLIENT_CONN
            value: "50"
          - name: DEFAULT_POOL_SIZE
            value: "20"
        resources:
          requests:
            cpu: "10m"
            memory: "16Mi"
          limits:
            cpu: "100m"
            memory: "64Mi"
        volumeMounts:
          # pgbouncer-letta.ini — session mode config with server_tls_sslmode=verify-full.
          - name: letta-pgbouncer-ini
            mountPath: /etc/pgbouncer/pgbouncer.ini
            subPath: pgbouncer-letta.ini
            readOnly: true
          # PKI secrets — ca_root.crt + letta-pgbouncer_client.crt/key for mTLS to postgres.
          - name: letta-pgbouncer-pki
            mountPath: /run/secrets
            readOnly: true

# ---------------------------------------------------------------------------
# Open WebUI — optional integration with the open-source Open WebUI project (v2.1)
# Image pulled unmodified from ghcr.io/open-webui/open-webui (upstream).
# Open WebUI is governed by its own licence terms — review at
# https://github.com/open-webui/open-webui/blob/main/LICENSE before enabling.
# Yashigani orchestrates deployment via Helm; it does not redistribute Open
# WebUI binaries. Internal only — all inference routes through the gateway.
#
# DEPRECATED (v2.23.2): Open WebUI integration is sunsetting. Yashigani's own
# built-in UI ships in v2.24.0. Set enabled: false (the default) unless you
# are running a v2.23.x install that previously opted in.
# LU-7023360-001: default corrected from true → false.
# ---------------------------------------------------------------------------
openWebui:
  enabled: false
  image:
    # Pinned to v0.9.1 to match docker-compose.yml (was floating :main — fixed
    # in v2.23.2 image-pin sweep 2026-05-02).
    repository: ghcr.io/open-webui/open-webui
    tag: "v0.9.2@sha256:a7e4796ae894d1e2a0c1824860ade472f35c507608a01c3581377b5c19b0ed49"
    pullPolicy: IfNotPresent
  replicaCount: 1
  # Retro #3ar — open-webui OOMKilled (exit 137) with 512Mi limit on K8s.
  # The bundled SvelteKit + Python embedding + LangChain stack consistently
  # peaks at ~1.2-1.5 GiB on first boot. 512Mi was guesswork carried over
  # from the docker-compose default; insufficient for the K8s pod where
  # there is no host page cache to lean on.
  # Retro #3as — OOMKilled again at 2Gi limit. LangChain + sentence-transformers
  # stack imports during startup push peak RSS above 2Gi even with
  # HF_HUB_OFFLINE=1 (which eliminates download wait but not model-graph init).
  # 3Gi limit gives stable headroom on Docker Desktop single-node cluster.
  # YSG-RISK-005 #3av: requests = 50% of limit (risk register sizing: 3072m/1.0).
  resources:
    requests:
      cpu: "500m"
      memory: "1536Mi"
    limits:
      cpu: "1000m"
      memory: "3072Mi"
  service:
    port: 8080
    type: ClusterIP
  env:
    webuiAuth: "false"
    webuiAuthTrustedEmailHeader: "X-Forwarded-User"
    webuiAuthTrustedNameHeader: "X-Forwarded-Name"
    enableSignup: "true"
    webuiSecretKeySecretName: "yashigani-open-webui-secrets"
    webuiSecretKeySecretKey: "secret_key"
    # BUG-2 (v2.23.4): gateway:8080 is mTLS-only. Use the internal mesh port
    # (8081, plain HTTP). Network isolation (K8s NetworkPolicy) is the transport
    # guard; AgentAuthMiddleware enforces token auth at the app layer.
    openaiApiBaseUrl: "http://yashigani-gateway:8081/v1"
    # openaiApiKey is now wired via secretKeyRef (internalBearer Secret) in
    # open-webui.yaml — Captain Bucket-C fix. This field is intentionally absent.
    ollamaBaseUrl: ""
    enableOllamaApi: "false"
    defaultModels: "qwen2.5:3b"
    webuiName: "Yashigani AI"
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""

# ---------------------------------------------------------------------------
# Budget Redis — dedicated Redis for token budget counters (v1.0)
# Separate from main Redis; maxmemory-policy noeviction required.
# ---------------------------------------------------------------------------
budgetRedis:
  enabled: true
  image:
    repository: redis
    tag: "7.4.9-alpine@sha256:286bd4264adb303147270bb2d735352497e950f7b73b2ca42364d63d7daf61ee"
    pullPolicy: IfNotPresent
  replicaCount: 1
  # YSG-RISK-005 #3av: requests = 50% of limit.
  resources:
    requests:
      cpu: "125m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"
  service:
    port: 6379
    type: ClusterIP
  existingSecretName: ""
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""

# ---------------------------------------------------------------------------
# PostgreSQL 16 — primary durable store
# ---------------------------------------------------------------------------
postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine@sha256:4e6e670bb069649261c9c18031f0aded7bb249a5b6664ddec29c013a89310d50"
    pullPolicy: IfNotPresent
  replicaCount: 1
  # YSG-RISK-005 #3av: requests = 50% of limit.
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1024Mi"
  service:
    port: 5432
    type: ClusterIP
  existingSecretName: ""
  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""

# ---------------------------------------------------------------------------
# PgBouncer — connection pooler
# ---------------------------------------------------------------------------
pgbouncer:
  enabled: true
  image:
    repository: edoburu/pgbouncer
    tag: "v1.25.1-p0@sha256:c7bfcaa24de830e29588bb9ad1eb39cebaf07c27149e1974445899b695634bb4"
    pullPolicy: IfNotPresent
  replicaCount: 1
  # YSG-RISK-005 #3av: requests = 50% of limit.
  resources:
    requests:
      cpu: "125m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"
  service:
    port: 5432
    type: ClusterIP
  env:
    poolMode: transaction
    maxClientConn: "100"
    defaultPoolSize: "20"
  # ---------------------------------------------------------------------------
  # YSG-RISK-049 CLOSED v2.24.0 — auth_query credential (Amendments A2+C6)
  # ---------------------------------------------------------------------------
  # authSecretName: Name of the K8s Secret containing pgbouncer_authenticator_password.
  #   Default: "" (secrets.yaml auto-generates yashigani-pgbouncer-auth-secret).
  #   Override: set to an operator-provisioned or ExternalSecret-backed Secret name.
  #   The Secret MUST contain key: pgbouncer_authenticator_password
  #   Option C isolation: dedicated Secret, NOT merged into yashigani-postgres-secrets.
  #   See secrets.yaml comment block for full provisioning instructions.
  authSecretName: ""
  # authNetworkCidr REMOVED (YSG-RISK-050 close v2.24.0): the pg_hba A2 CIDR
  # carveout is gone. pgbouncer_authenticator now presents pgbouncer-auth_client.crt
  # (dedicated outbound cert); the catch-all hostssl rule applies uniformly.
  # No CIDR override is needed. See iris-v240-ysg-risk-050-cert-separation-design.md.

# ---------------------------------------------------------------------------
# Partition maintenance CronJob — DB partition pre-creation (runs monthly)
# ---------------------------------------------------------------------------
partitionCronjob:
  # YSG-RISK-005 #3av: requests = 50% of limit. Single-shot job, low resource.
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"

# ---------------------------------------------------------------------------
# v2.2 Feature Flags
# ---------------------------------------------------------------------------

# PII Detection — controls detection mode for request/response payloads.
# Modes: log (detect + record only), redact (inline replacement), block (drop payload).
# Requires license tier: pii_log (Community+), pii_redact (Pro+).
pii:
  enabled: false
  mode: "log"          # log | redact | block
  enabledTypes:        # PII categories to scan — leave empty to scan all
    - SSN
    - CREDIT_CARD
    - EMAIL
    - PHONE
    - IBAN
    - PASSPORT
    - NHS_NUMBER
    - DRIVERS_LICENCE
    - IP_ADDRESS
    - DATE_OF_BIRTH
  scanRequests: true
  scanResponses: true

# DDoS Protection — application-layer per-IP connection counting (v2.2).
# Backed by Redis (main redis DB 0, key namespace ddos:).
# fail-open: if Redis is unreachable, requests are allowed through.
ddosProtection:
  enabled: true
  maxConnectionsPerIp: 50
  windowSeconds: 60

# Response Inspection — run Ollama classifier over LLM responses (v0.9.0).
responseInspection:
  enabled: false

# SSO / Identity Provider configuration (v2.1 — OIDC; v2.23.4 — SAMLv2).
# Mirrors the YASHIGANI_IDP_<N>_* env vars used by docker-compose.
# Up to 10 IdPs may be configured. Secrets (clientSecret, samlSpPrivateKey)
# must be stored in a Kubernetes Secret and referenced via existingSecretName.
sso:
  twoFactorRequired: false
  # existingSecretName: yashigani-sso-secrets
  # The secret must contain keys idp_<n>_client_secret for OIDC IdPs,
  # and idp_<n>_saml_sp_private_key for SAML IdPs (RSA keys only —
  # non-RSA keys reject startup per YSG-RISK-044 mitigation).
  idps: []
  # OIDC example:
  # - id: "keycloak-dev"
  #   name: "Keycloak Dev"
  #   protocol: "oidc"
  #   discoveryUrl: "https://keycloak.example.com/realms/yashigani/.well-known/openid-configuration"
  #   clientId: "yashigani"
  #   clientSecretKey: "idp_1_client_secret"   # key inside existingSecretName
  #   emailDomains: "example.com"
  #   redirectUri: "https://yashigani.example.com/admin/sso/callback"
  #
  # SAMLv2 example (requires Professional tier or above):
  # - id: "entra-saml"
  #   name: "Entra ID (SAML)"
  #   protocol: "saml"
  #   entityId: "https://yashigani.example.com/saml"   # SP entity ID
  #   samlIdpSsoUrl: "https://login.microsoftonline.com/<tenant>/saml2"
  #   samlIdpSlsUrl: "https://login.microsoftonline.com/<tenant>/saml2"
  #   samlIdpX509Cert: "<base64-cert-body-no-headers>"
  #   samlSpSlsUrl: "https://yashigani.example.com/auth/sso/saml/entra-saml/sls"
  #   samlSpPrivateKeySecretKey: "idp_2_saml_sp_private_key"  # RSA key in existingSecretName
  #   samlSpCertSecretKey: "idp_2_saml_sp_cert"
  #   redirectUri: "https://yashigani.example.com/auth/sso/saml/entra-saml/acs"
  #   emailDomains: "example.com"

# Model Aliases — Redis-backed alias-to-model routing (v2.3 backoffice feature).
# Aliases are managed at runtime via the backoffice UI/API.
# Seed defaults may be provided here; they are applied on backoffice startup.
modelAliases:
  seedDefaults: true
  # defaults are defined in the DB migration (0005_identity_budget_routing.py)
  # Override or add custom aliases:
  # extra:
  #   - alias: "fast"
  #     provider: "local"
  #     modelName: "qwen2.5:3b"
  #     forceLocal: true

# ---------------------------------------------------------------------------
# PoolManager — per-identity container spawning (YSG-RISK-070)
# ---------------------------------------------------------------------------
# The PoolManager provides container-per-identity isolation for agents registered
# with upstream_url="pool://<image>". In K8s deployments, the KubernetesBackend
# spawns pods via the API server instead of requiring a Docker/Podman socket.
#
# k8sBackend.enabled: set to true in Kubernetes deployments only.
#   - Creates rbac-pool-manager.yaml Role + RoleBinding granting the gateway
#     ServiceAccount pods CRUD in this namespace.
#   - Creates NetworkPolicy rules allowing gateway → pool-pod dispatch and
#     enforcing inter-pod isolation (UA-10, YSG-RISK-055).
#   - Does NOT apply in Docker/Podman deployments (auto-detected in pool/backend.py).
#
# agentPort: the port pool-managed pods listen on. Must match the port declared
#   in the agent image (e.g. 8080 for most Python-based agents). Used in the
#   NetworkPolicy ingress/egress rules.
#
# podReadyTimeoutSeconds: how long the gateway waits for a pool-managed pod to
#   reach Running phase before returning 503 Retry-After. K8s pod startup
#   (image pull + scheduler) can take 10-60s for cached images, longer for cold
#   pulls. Increase if operators see spurious 503s on first dispatch.
poolManager:
  k8sBackend:
    enabled: false
    agentPort: 8080
    podReadyTimeoutSeconds: 120

# ---------------------------------------------------------------------------
# FIPS mode — Nico N-001 (v2.24.4)
# ---------------------------------------------------------------------------
# lib/yashigani-fips.sh defines FIPS_MODE and routes openssl dgst calls through
# the OpenSSL FIPS Provider when FIPS_MODE=1. install.sh sources it for
# host-side backup MANIFEST hashing + air-gap bundle integrity. Prior to v2.24.4
# NO container env block passed FIPS_MODE to gateway / backoffice / caddy —
# the in-container FIPS code path existed but never activated.
#
# CRITICAL HONESTY NOTE (Nico N-001):
#   Setting fips.mode: true injects FIPS_MODE=1 into gateway, backoffice, and
#   caddy containers so that openssl dgst calls (hash verification) run in
#   FIPS mode IF a FIPS-configured base image is present.
#
#   The DEFAULT base images (python:3.14.0-slim, caddy:2.11.2-alpine) DO NOT
#   contain the CMVP #4985-validated OpenSSL FIPS Provider. Setting fips.mode=true
#   without swapping to a FIPS-configured base image does NOT produce FIPS-validated
#   cryptography — it only activates code paths that call openssl via subprocess.
#
#   To achieve FIPS-validated crypto operators MUST:
#     1. Use a base image that ships the CMVP #4985-validated OpenSSL FIPS Provider,
#        e.g. a RHEL/UBI-based image with openssl-fips, or an AWS BoringCrypto image.
#     2. Set fips.mode: true in this chart.
#
#   "FIPS-capable" (code path exists) vs "FIPS-validated" (CMVP module loaded) are
#   NOT the same. Do not claim FIPS compliance without a FIPS-configured base image.
#   Ref: CMVP certificate #4985 (ACTIVE, FIPS 140-3, sunset 2030-03-10).
#
# Set to true ONLY if you have deployed a FIPS-configured base image.
# Default false: FIPS_MODE env is not injected; containers use standard OpenSSL.
# ---------------------------------------------------------------------------
fips:
  mode: false

# ---------------------------------------------------------------------------
# Licensing — Petra P0-1 (v2.24.4)
# ---------------------------------------------------------------------------
# The license loader (src/yashigani/licensing/loader.py) resolves /run/secrets/
# license_key as its second candidate after YASHIGANI_LICENSE_FILE. In compose
# deployments, install.sh writes the operator's .ysg file to docker/secrets/
# license_key and Docker/Podman mounts it at /run/secrets/license_key
# automatically. Helm had NO equivalent — every K8s install silently fell back
# to COMMUNITY tier regardless of what the customer paid.
#
# This block provides the K8s parity:
#   1. Set licenseKey to the raw content of your .ysg file, e.g.:
#        --set licensing.licenseKey="$(cat my.ysg)"
#      or supply it via a values override file.
#   2. The chart renders a Secret named yashigani-license and mounts it at
#      /run/secrets/license_key on gateway and backoffice.
#   3. When licenseKey is empty (default), no Secret is rendered and no mount
#      is added — the loader falls back to COMMUNITY tier as designed.
#
# OPERATOR NOTE: if licenseKey is empty after install the gateway and backoffice
# run in COMMUNITY tier. A prominent warning is emitted by install.sh when
# MODE=k8s and this field is empty (Petra P0-1).
#
# LIC-002 reminder: YASHIGANI_LICENSE_TIER MUST NOT be set via env or values —
# that bypasses the signed-license enforcement path. Use this licenseKey field.
# ---------------------------------------------------------------------------
licensing:
  # Raw content of your .ysg license file (K8s handles base64 internally via stringData).
  # Leave empty to run in COMMUNITY tier.
  # Example: licenseKey: "$(cat /path/to/my.ysg)"
  licenseKey: ""
