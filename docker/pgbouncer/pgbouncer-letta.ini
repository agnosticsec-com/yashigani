[databases]
letta = host=postgres port=5432 dbname=letta

[pgbouncer]
; ── Pool mode ─────────────────────────────────────────────────────────────────
; MUST be session, NOT transaction.
; Alembic DDL (CREATE INDEX CONCURRENTLY, advisory locks) requires one backend
; connection per client for the connection's lifetime. Transaction mode would
; recycle the backend between statements, breaking advisory lock semantics.
; Same reason backoffice uses YASHIGANI_DB_DSN_DIRECT to bypass the main
; pgbouncer instance (which is transaction-mode). See Iris design doc §Option 1.
pool_mode = session

; ── Listen address ────────────────────────────────────────────────────────────
listen_port = 5432
; Compose path: letta connects to letta-pgbouncer:5432 (Docker DNS).
; Helm path: sidecar listens on 127.0.0.1:5432 (pod loopback) — see values.yaml.
listen_addr = 0.0.0.0

; ── Authentication — plain (YSG-RISK-049 ACCEPTED-LOW non-KMS-only) ──────────
; auth_type = plain: pgbouncer needs cleartext to construct its own SCRAM proof
; when authenticating TO postgres as a client (pgbouncer → postgres leg).
; A SCRAM verifier cannot be used to derive plaintext at runtime — Ava blocker
; confirmed in phase1-verdict.md (v2.23.4-batches123-final-8b6b38e, 2026-05-21).
; Tiago directive 2026-05-21: revert SCRAM Step 2; reclassify YSG-RISK-049.
; KMS note: production KMS-configured deployments (YSG_KMS_PROVIDER=vault|azure|
; aws|gcp|keeper) fetch credentials at runtime via src/yashigani/kms/ and do not
; rely on the on-disk cleartext path — cleartext concern is non-KMS-only.
; edoburu entrypoint writes cleartext to /etc/pgbouncer/userlist.txt from
; DATABASE_URL env (default path — no auth_file override needed).
auth_type = plain

; ── Admin console — DISABLED (Laura F2) ──────────────────────────────────────
; Console disabled — letta-pgbouncer is a single-purpose proxy; no admin console
; access required. Empty strings explicitly disable console access in pgbouncer 1.21+.
; ASVS-V14.4.1: no unnecessary services/interfaces exposed.
admin_users =
stats_users =

; ── Connection limits ─────────────────────────────────────────────────────────
; letta is a single-tenant agent service. Conservative limits prevent runaway
; session-mode connection exhaustion (see Iris design §cross-seam risks, F7).
; Tuning knob: raise default_pool_size if letta concurrency grows.
max_client_conn = 50
default_pool_size = 20
; No min_pool_size: session mode holds connections for client lifetime; min pool
; serves transaction mode more than session mode.
reserve_pool_size = 2
reserve_pool_timeout = 3
max_db_connections = 25
max_user_connections = 25

; ── Session cleanup ───────────────────────────────────────────────────────────
; DISCARD ALL: run on session exit (session mode runs this once per disconnect,
; not between transactions). Prevents state leakage between letta reconnects.
server_reset_query = DISCARD ALL
server_check_delay = 30
server_check_query = select 1
client_idle_timeout = 600
server_idle_timeout = 600

; ── Logging — minimal, NO query content (Laura F5) ───────────────────────────
; pgbouncer does not log SQL query content at any verbosity level.
; Suppressing per-connection logging prevents metadata leakage from logs.
; This is the same posture as the existing yashigani pgbouncer instance.
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

; ── Protocol compatibility ────────────────────────────────────────────────────
; pg8000 sends extra_float_digits and search_path in startup packet.
; Ignoring these parameters prevents pgbouncer from rejecting letta's connection
; (same parameter set as the existing yashigani pgbouncer instance).
ignore_startup_parameters = extra_float_digits,search_path,lock_timeout,statement_timeout,idle_in_transaction_session_timeout

; ── TCP keepalives ────────────────────────────────────────────────────────────
tcp_keepalive = 1
tcp_keepidle = 60
tcp_keepintvl = 10
tcp_keepcnt = 5

; ── Client-side TLS (letta → pgbouncer) ──────────────────────────────────────
; letta pg8000 driver cannot present client certs via URI params (constraint C1
; in Iris's design register: iris-letta-postgres-mtls-design-review.md).
; client_tls_sslmode MUST remain disable on this instance.
; Do NOT upgrade to verify-ca without first patching letta's driver (upstream change).
; The plain-TCP segment between letta and this sidecar is trusted at the network
; boundary (Compose: Docker `data` network; Helm: pod loopback 127.0.0.1).
; (Laura F3 — mandatory inline constraint comment)
client_tls_sslmode = disable

; ── Server-side TLS (pgbouncer → postgres) — full mTLS ───────────────────────
; pgbouncer presents letta-pgbouncer_client.crt to postgres over verify-full.
; Postgres pg_hba catch-all (hostssl ... clientcert=verify-ca) requires this cert.
; The ca_root.crt trust anchor validates the postgres server cert (same chain as
; all other mTLS workloads). No pg_hba carveout needed.
server_tls_sslmode = verify-full
server_tls_ca_file = /run/secrets/ca_root.crt
server_tls_key_file = /run/secrets/letta-pgbouncer_client.key
server_tls_cert_file = /run/secrets/letta-pgbouncer_client.crt
server_tls_protocols = secure
