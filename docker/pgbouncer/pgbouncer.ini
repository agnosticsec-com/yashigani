[databases]
yashigani = host=postgres port=5432 dbname=yashigani

[pgbouncer]
listen_port = 5432
listen_addr = 0.0.0.0
auth_type = plain
; the edoburu image auto-generates userlist.txt from DATABASE_URL and postgres_password at container start
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 100
default_pool_size = 20
min_pool_size = 2
reserve_pool_size = 5
reserve_pool_timeout = 3
max_db_connections = 40
max_user_connections = 40
server_reset_query = DISCARD ALL
server_check_delay = 30
server_check_query = select 1
client_idle_timeout = 600
server_idle_timeout = 600
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60
ignore_startup_parameters = extra_float_digits,search_path,lock_timeout,statement_timeout,idle_in_transaction_session_timeout
tcp_keepalive = 1
tcp_keepidle = 60
tcp_keepintvl = 10
tcp_keepcnt = 5

; ── Yashigani internal mTLS (v2.23.1) ─────────────────────────────────────────
; Last updated: 2026-04-27T20:40:49Z (BUG-59-01: trust intermediate CA, not root)
;
; Clients (gateway, backoffice) must present a cert signed by our internal CA.
; PgBouncer also speaks TLS to postgres (server-side), using its own client
; cert as the identity to postgres.
;
; PKI design: root → intermediate → leaf (two-tier).  All service leaf certs
; are signed directly by the intermediate.  Both client-side and server-side
; CA files must reference the intermediate so pgbouncer can verify peers whose
; certs chain to the intermediate without requiring the root in the trust store.
; The root CA MUST NOT be mounted as an mTLS trust anchor into workload
; containers (design invariant — root stays 0400 on disk, never in containers).
client_tls_sslmode = verify-ca
client_tls_ca_file = /run/secrets/ca_intermediate.crt
client_tls_key_file = /run/secrets/pgbouncer_client.key
client_tls_cert_file = /run/secrets/pgbouncer_client.crt
client_tls_protocols = secure
server_tls_sslmode = verify-ca
server_tls_ca_file = /run/secrets/ca_intermediate.crt
server_tls_key_file = /run/secrets/pgbouncer_client.key
server_tls_cert_file = /run/secrets/pgbouncer_client.crt
server_tls_protocols = secure
