# Yashigani v2.23.2 — Release digest overlay
# Last updated: 2026-04-27T21:59:11+01:00
#
# Purpose: overrides every `image:` field in docker-compose.yml to pin the
# exact digest verified at release time. This closes ASVS V10.3.1 (H-02
# from internal design-drift audit): the dev compose uses mutable tags; this
# overlay locks every upstream image to its sha256 digest so a compromised
# registry tag cannot silently replace a deployed image.
#
# Usage (deploy with digest pins):
#   docker compose -f docker/docker-compose.yml \
#                  -f docker/docker-compose.release.yml \
#                  up -d
#
# Usage (Podman):
#   podman compose -f docker/docker-compose.yml \
#                  -f docker/docker-compose.release.yml \
#                  up -d
#
# Mirror plan: per internal image-pinning policy, release images must also be
# mirrored to registry.agnosticsec.com. Digests below are upstream-registry
# verified (2026-04-27). Mirror task is tracked as v2.23.2 P0 retro item
# RETRO-H02-MIRROR: "push digest-pinned images to registry.agnosticsec.com
# and update this file to use the mirrored refs". Until that lands, this file
# uses upstream registries with digest pinning.
