# ---------------------------------------------------------------------------
# Docker secrets (populated by backoffice bootstrap)
# ---------------------------------------------------------------------------
# Docker secrets section removed — all services bind-mount ./secrets directly.
# Secret files are generated by install.sh and stored in docker/secrets/.
# To upgrade to a paid tier, replace docker/secrets/license_key with your .ysg content.

# ---------------------------------------------------------------------------
# Networks — Caddy-centric isolation (EX-231-10 fix, 2026-04-29)
# ---------------------------------------------------------------------------
# Four networks enforce the security directive: Caddy is the SOLE ingress to
# backoffice and gateway. No other service may reach :8443 or :8080 directly.
#
# Network topology:
#
#   edge          — Caddy only; host port mapping (80/443) lives here.
#                   `internal: false` so Caddy can reach Let's Encrypt ACME.
#
#   caddy_internal — Caddy + backoffice + gateway ONLY.
#                   `internal: true` — no host-port egress.
#                   This is the only network where backoffice/:8443 and
#                   gateway/:8080 are reachable. Since Docker DNS only resolves
#                   hostnames to IPs on shared networks, a service on `data`
#                   that is NOT on `caddy_internal` cannot resolve backoffice or
#                   gateway at all (DNS returns NXDOMAIN).
#
#   data          — backoffice + gateway + their outbound deps: postgres,
#                   pgbouncer, redis, budget-redis, policy (OPA), ollama.
#                   `internal: true`. Backoffice/gateway are MEMBERS of this
#                   network so their outbound DB/cache calls work, but their
#                   listeners (:8443/:8080) are NOT reachable here because
#                   every service on `data` that IS NOT also on `caddy_internal`
#                   will get an NXDOMAIN for `backoffice` and `gateway` (Docker
#                   DNS scopes resolution to shared networks).
#
#   obs           — prometheus + grafana + loki + alertmanager + otel-collector
#                   + jaeger. `internal: true`.
#                   Prometheus scrapes gateway/backoffice via Caddy's
#                   SPIFFE-gated listeners (:8444/:8445), so Caddy also joins
#                   `obs`. Obs services never need to reach `data` services
#                   directly, so they are NOT joined to `data`.
#
# Residual risk (documented, not hidden):
#   Docker containers bind listeners to 0.0.0.0 by default, so a container
#   that IS on both `caddy_internal` and `data` (backoffice, gateway) will
#   technically accept TCP connections to :8443/:8080 from any peer that has
#   a route to either network IP. However:
#     (a) No `data`-only peer (postgres, redis, OPA, etc.) shares the
#         `caddy_internal` network, so they have NO route to those IPs.
#     (b) The `data` IP of backoffice/gateway is unreachable to `data`-only
#         peers because Docker DNS will NOT resolve `backoffice` or `gateway`
#         from a network where they don't share membership — Docker DNS is
#         scoped to shared-network members only.
#     (c) A `data`-only attacker would have to discover the raw IP via
#         e.g. ARP/ICMP, which requires layer-2 adjacency — Docker bridges
#         are separate L2 segments. Different bridge = no ARP reachability.
#   The belt-and-braces mTLS + SPIFFE middleware remains active. K8s
#   NetworkPolicy enforces this at the kernel level (no residual).
#
networks:
  edge:
    driver: bridge
    # external: true — Caddy needs internet access for ACME challenges
  caddy_internal:
    driver: bridge
    internal: true
    # Only Caddy, backoffice, gateway are members.
    # Caddy → backoffice:8443 and Caddy → gateway:8080 happen here.
  data:
    driver: bridge
    internal: true
    # Core data-plane: backoffice + gateway (outbound) + their deps.
    # No obs services; no edge services.
  obs:
    driver: bridge
    internal: true
    # Observability-plane: prometheus, grafana, loki, alertmanager,
    # otel-collector, jaeger. Caddy joins to proxy /admin/grafana etc.
