---
# Yashigani v2.23.1 — Docker Compose stack
# Last updated: 2026-04-28T22:00:00+01:00
#
# Services: caddy (TLS edge), gateway, backoffice, policy (OPA),
#           redis, ollama, prometheus, grafana
#
# Usage:
#   cp .env.example .env          # fill in required values
#   docker compose up -d
#
# First run: all service passwords are auto-generated and printed to stdout
# by the backoffice bootstrap process. Check: docker compose logs backoffice
#
# TLS modes (YASHIGANI_TLS_MODE):
#   acme        — Let's Encrypt (default, requires public DNS)
#   ca          — CA-signed cert (mount ./tls/server.crt + ./tls/server.key)
#   selfsigned  — local/demo only, self-signed (Caddy internal CA)

# version field removed — obsolete in Docker Compose v2+

# ---------------------------------------------------------------------------
# DNS-resolver hardening (retro #3ah, defensive widening)
# ---------------------------------------------------------------------------
# Every service in this file declares `dns_search: ["."]`. The single dot is
# a literal "empty search list" sentinel — Docker treats `[]` as "no override"
# but `["."]` writes a resolv.conf with no `search` line at all.
#
# Why every service, not just pgbouncer?
# When Docker Engine runs inside a libvirt/qemu VM (or any host where
# systemd-resolved is the upstream resolver), Docker copies the host's search
# domains into every container's /etc/resolv.conf — including artefacts like
# "placeholder-NNNN.hostname.internal lan". The behaviour of a container's
# DNS resolver against these search domains depends on the resolver library:
#
#   * c-ares (pgbouncer) treats SERVFAIL on "postgres.<search>" as fatal and
#     returns result=0 without falling through to a bare "postgres" lookup.
#     This was the original observed symptom (#3ah).
#   * musl-libc and some older glibc versions can exhibit similar fail-fatal
#     behaviour on transient SERVFAILs from upstream resolvers.
#   * Modern glibc usually falls through, but the failure mode is host- and
#     resolver-version-dependent and not under our control.
#
# Setting `dns_search: ["."]` per service eliminates the variable: containers
# resolve service names directly against Docker's embedded DNS (127.0.0.11)
# with no search-domain expansion. Podman writes its own minimal resolv.conf
# and was unaffected, but applying the override on Podman is benign — it
# either matches Podman's existing default or is silently ignored.
#
# `dns: [...]` is intentionally NOT set: hardcoding 127.0.0.11 breaks Podman
# (which uses aardvark-dns at a different address) and breaks user-defined
# networks where Docker may inject a different resolver address. Empty search
# is the minimum viable, runtime-portable change.
# ---------------------------------------------------------------------------


x-common-env: &common-env
  YASHIGANI_ENV: ${YASHIGANI_ENV:-development}
  YASHIGANI_KSM_PROVIDER: ${YASHIGANI_KSM_PROVIDER:-docker}
  YASHIGANI_AUDIT_LOG_PATH: /data/audit/audit.log
  YASHIGANI_AUDIT_MAX_FILE_SIZE_MB: ${YASHIGANI_AUDIT_MAX_FILE_SIZE_MB:-100}
  YASHIGANI_AUDIT_RETENTION_DAYS: ${YASHIGANI_AUDIT_RETENTION_DAYS:-90}
  # Internal mTLS — every service reads its identity from this manifest + its
  # own bootstrap token. Path is mounted read-only on every Python service.
  YASHIGANI_SERVICE_MANIFEST_PATH: /etc/yashigani/service_identities.yaml
  YASHIGANI_INTERNAL_CA_DIR: /run/secrets

# Reminder for readers: the manifest is mounted into each Python service as
#   ./service_identities.yaml:/etc/yashigani/service_identities.yaml:ro
# Adding a service? Add it to docker/service_identities.yaml AND bind-mount
# the file here. install.sh bootstrap_internal_pki() will issue its cert on
# the next rotate-certs run.

services:

  # ---------------------------------------------------------------------------
  # Caddy — TLS edge proxy
  # Routes /admin/* to backoffice, /metrics-federate to prometheus (authed),
  # everything else to gateway.
  # ---------------------------------------------------------------------------
  caddy:
    dns_search: ["."]
    image: docker.io/library/caddy:2-alpine
    restart: unless-stopped
    mem_limit: ${YASHIGANI_CADDY_MEM_LIMIT:-256m}
    cpus: ${YASHIGANI_CADDY_CPU_LIMIT:-0.5}
    ports:
      - "${YASHIGANI_HTTP_PORT:-80}:80"
      - "${YASHIGANI_HTTPS_PORT:-443}:443"
    # Mesh-internal SPIFFE-gated metrics listeners — NEVER host-mapped.
    # 8444 = gateway upstream, 8445 = backoffice upstream (#81 fix).
    # `expose:` is documentation only on bridge networks, but it is the
    # canonical place to record which internal ports a service opens.
    expose:
      - "8444"
      - "8445"
    environment:
      YASHIGANI_TLS_DOMAIN: ${YASHIGANI_TLS_DOMAIN:?set YASHIGANI_TLS_DOMAIN}
      CADDY_ACME_EMAIL: ${YASHIGANI_ADMIN_USERNAME:-admin@yashigani.local}
      PROMETHEUS_BASICAUTH_USER: ${PROMETHEUS_BASICAUTH_USER:-prometheus}
      PROMETHEUS_BASICAUTH_HASH: ${PROMETHEUS_BASICAUTH_HASH:?run bootstrap to get this value}
    volumes:
      - ./Caddyfile.${YASHIGANI_TLS_MODE:-acme}:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - ./tls:/etc/caddy/tls:ro    # only used in ca mode
      # Internal mesh CA — Caddy calls backoffice /auth/verify via forward_auth
      # (mTLS client). Its own client cert lives in ./secrets; the manifest
      # is mounted read-only.
      - ./secrets:/run/secrets:ro
      - ./service_identities.yaml:/etc/yashigani/service_identities.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:2019/config/"]
      interval: 15s
      timeout: 5s
      retries: 3
    # v2.23.1: Caddy is the FIRST container to start — no depends_on.
    # It tolerates 502s on upstreams until gateway/backoffice come up;
    # external traffic still reaches it immediately for health checks.
    # Previous depends_on (gateway + backoffice) created a deadlock with
    # forward_auth — those services now bind-mount the internal CA for
    # their own mTLS identity, and Caddy waits for them via upstream
    # retries, not compose ordering.
    networks:
      - external
      - internal

  # ---------------------------------------------------------------------------
  # Gateway — MCP reverse proxy (data plane)
  # ---------------------------------------------------------------------------
  gateway:
    dns_search: ["."]
    image: yashigani/gateway:${YASHIGANI_VERSION:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.gateway
    restart: unless-stopped
    mem_limit: ${YASHIGANI_GATEWAY_MEM_LIMIT:-1024m}
    cpus: ${YASHIGANI_GATEWAY_CPU_LIMIT:-1.0}
    environment:
      <<: *common-env
      YASHIGANI_SERVICE_NAME: gateway
      YASHIGANI_UPSTREAM_URL: ${UPSTREAM_MCP_URL:?set UPSTREAM_MCP_URL}
      # OPA stays on HTTP in v2.23.1 — mTLS for OPA lands in v2.23.2 (task #54).
      YASHIGANI_OPA_URL: http://policy:8181
      OLLAMA_BASE_URL: http://ollama:11434  # Ollama has no TLS; internal bridge-only + bearer token (honest gap, tracked in manifest as mtls_capable: false)
      REDIS_HOST: redis
      REDIS_PORT: "6380"                     # TLS-only port
      REDIS_USE_TLS: "true"
      YASHIGANI_SECRETS_DIR: /run/secrets
      YASHIGANI_AGENT_ROUTING_ENABLED: "true"
      YASHIGANI_AGENT_PATH_PREFIX: "/agents"
      YASHIGANI_AGENT_TOKEN_MIN_LENGTH: "64"
      # Postgres via PgBouncer — TLS verify-ca + client cert.
      YASHIGANI_DB_DSN: postgresql://yashigani_app:${POSTGRES_PASSWORD_URLENC}@pgbouncer:5432/yashigani?sslmode=verify-ca&sslrootcert=/run/secrets/ca_root.crt&sslcert=/run/secrets/gateway_client.crt&sslkey=/run/secrets/gateway_client.key
      YASHIGANI_DEPLOYMENT_STREAM: ${YASHIGANI_DEPLOYMENT_STREAM:-opensource}
      # M-01 fix: switched from http:// (plaintext) to grpcs:// (mTLS).
      # Pattern A for Python ssl: opentelemetry-exporter-otlp uses Python ssl,
      # so trust anchor is the PUBLIC ca_root.crt (Py 3.12/OpenSSL 3.0 strict
      # chain — gate #58a evidence). Gateway presents its leaf from /run/secrets.
      OTEL_EXPORTER_OTLP_ENDPOINT: grpcs://otel-collector:4317
      OTEL_EXPORTER_OTLP_CERTIFICATE: /run/secrets/ca_root.crt
      OTEL_EXPORTER_OTLP_CLIENT_CERTIFICATE: /run/secrets/gateway_client.crt
      OTEL_EXPORTER_OTLP_CLIENT_KEY: /run/secrets/gateway_client.key
      FASTTEXT_MODEL_PATH: /app/models/fasttext_classifier.bin
      # Agent auth tokens for upstream calls
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      # v2.2 — PII detection (ON by default for all traffic)
      # Modes: log | redact | block  (default: log)
      YASHIGANI_PII_MODE: ${YASHIGANI_PII_MODE:-log}
      # Cloud bypass OFF by default — admin must explicitly enable to allow PII to cloud LLMs
      YASHIGANI_PII_CLOUD_BYPASS: ${YASHIGANI_PII_CLOUD_BYPASS:-false}
    volumes:
      - audit_data:/data/audit
      - bootstrap_data:/data/bootstrap
      - ./secrets:/run/secrets:ro
      # Internal mTLS — service identity manifest (read-only).
      - ./service_identities.yaml:/etc/yashigani/service_identities.yaml:ro
      # Container socket for Pool Manager (per-identity isolation)
      # SECURITY: read-only mount, gateway runs as non-root (UID 1001).
      # Pool Manager uses only: containers.run(), .get(), .kill(), .remove().
      # No host filesystem access. Podman rootless provides additional isolation.
      # To disable: set CONTAINER_SOCKET_ENABLED=false — Pool Manager falls back to stub mode.
      # macOS Podman: socket can't be mounted from host — Pool Manager uses stub mode.
    read_only: true
    tmpfs:
      - /tmp:size=100M
      - /var/log/yashigani:size=50M
    security_opt:
      - no-new-privileges:true
      # Seccomp default (Lu Review Finding #2 — enabled by default in v2.23.1).
      # Profile ships at docker/seccomp/yashigani.json. Override with
      # YASHIGANI_SECCOMP_PROFILE=unconfined if a host kernel rejects it.
      - seccomp=${YASHIGANI_SECCOMP_PROFILE:-./seccomp/yashigani.json}
      # AppArmor default (Linux hosts with apparmor loaded).
      # Load once per host: sudo apparmor_parser -r docker/apparmor/yashigani-gateway
      # Override with YASHIGANI_APPARMOR_PROFILE=unconfined on hosts without
      # AppArmor (macOS, rootless Podman without profile loaded).
      - apparmor=${YASHIGANI_APPARMOR_PROFILE:-yashigani-gateway}
    depends_on:
      redis:
        condition: service_healthy
      policy:
        condition: service_healthy
      ollama:
        condition: service_healthy
      pgbouncer:
        condition: service_started
    healthcheck:
      # mTLS port now used — healthcheck uses the client cert inside the
      # container. Pattern A for Python ssl: trust anchor is the public ca_root.crt
      # (Py 3.12/OpenSSL 3.0 strict-chain rejects intermediate-only — gate #58a).
      test: ["CMD-SHELL", "python3 -c \"import ssl, urllib.request; c=ssl.create_default_context(cafile='/run/secrets/ca_root.crt'); c.load_cert_chain('/run/secrets/gateway_client.crt','/run/secrets/gateway_client.key'); urllib.request.urlopen('https://localhost:8080/healthz', context=c)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Backoffice — Admin control plane (generates first-run credentials)
  # ---------------------------------------------------------------------------
  backoffice:
    dns_search: ["."]
    image: yashigani/backoffice:${YASHIGANI_VERSION:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.backoffice
    restart: unless-stopped
    mem_limit: ${YASHIGANI_BACKOFFICE_MEM_LIMIT:-1024m}
    cpus: ${YASHIGANI_BACKOFFICE_CPU_LIMIT:-1.0}
    environment:
      <<: *common-env
      YASHIGANI_SERVICE_NAME: backoffice
      REDIS_HOST: redis
      REDIS_PORT: "6380"             # TLS-only
      REDIS_USE_TLS: "true"
      # OPA stays on HTTP in v2.23.1 — mTLS for OPA lands in v2.23.2 (task #54).
      YASHIGANI_OPA_URL: http://policy:8181
      YASHIGANI_ADMIN_USERNAME: ${YASHIGANI_ADMIN_USERNAME:-admin@yashigani.local}
      YASHIGANI_ADMIN_MIN_TOTAL: "2"
      YASHIGANI_ADMIN_MIN_ACTIVE: "2"
      YASHIGANI_ADMIN_SOFT_TARGET: "3"
      YASHIGANI_SECRETS_DIR: /run/secrets
      YASHIGANI_INSPECTION_DEFAULT_BACKEND: ${YASHIGANI_INSPECTION_DEFAULT_BACKEND:-ollama}
      # v2.2: gemini removed from default fallback to prevent unredacted content reaching
      # cloud providers before PII filtering. Admins who explicitly want cloud fallback
      # can set this var; ensure YASHIGANI_PII_MODE=redact or block first.
      YASHIGANI_INSPECTION_FALLBACK_CHAIN: ${YASHIGANI_INSPECTION_FALLBACK_CHAIN:-ollama,fail_closed}
      # Postgres via PgBouncer — TLS verify-ca + client cert.
      YASHIGANI_DB_DSN: postgresql://yashigani_app:${POSTGRES_PASSWORD_URLENC}@pgbouncer:5432/yashigani?sslmode=verify-ca&sslrootcert=/run/secrets/ca_root.crt&sslcert=/run/secrets/backoffice_client.crt&sslkey=/run/secrets/backoffice_client.key
      YASHIGANI_DEPLOYMENT_STREAM: ${YASHIGANI_DEPLOYMENT_STREAM:-opensource}
      OWUI_API_URL: http://open-webui:8080
      # OWUI_SECRET_KEY is required — install.sh generates a fresh random
      # value and writes it to docker/.env. No fallback default here
      # (Lu Review Finding #4, fail-closed). If unset the container will
      # fail to start with a clear error rather than run with a
      # publicly-known secret.
      OWUI_SECRET_KEY: ${OWUI_SECRET_KEY:?OWUI_SECRET_KEY must be set in docker/.env — run install.sh to generate}
      YASHIGANI_TLS_DOMAIN: ${YASHIGANI_TLS_DOMAIN:-localhost}
      # SSO 2FA — require Yashigani TOTP after IdP authentication
      YASHIGANI_SSO_2FA_REQUIRED: ${YASHIGANI_SSO_2FA_REQUIRED:-false}
      # SSO IdP configuration — up to 10 IdPs via env vars
      # Format: YASHIGANI_IDP_<N>_ID, _NAME, _PROTOCOL, _DISCOVERY_URL,
      #         _CLIENT_ID, _CLIENT_SECRET, _EMAIL_DOMAINS, _REDIRECT_URI
      YASHIGANI_IDP_1_ID: ${YASHIGANI_IDP_1_ID:-}
      YASHIGANI_IDP_1_NAME: ${YASHIGANI_IDP_1_NAME:-}
      YASHIGANI_IDP_1_PROTOCOL: ${YASHIGANI_IDP_1_PROTOCOL:-}
      YASHIGANI_IDP_1_DISCOVERY_URL: ${YASHIGANI_IDP_1_DISCOVERY_URL:-}
      YASHIGANI_IDP_1_CLIENT_ID: ${YASHIGANI_IDP_1_CLIENT_ID:-}
      YASHIGANI_IDP_1_CLIENT_SECRET: ${YASHIGANI_IDP_1_CLIENT_SECRET:-}
      YASHIGANI_IDP_1_EMAIL_DOMAINS: ${YASHIGANI_IDP_1_EMAIL_DOMAINS:-}
      YASHIGANI_IDP_1_REDIRECT_URI: ${YASHIGANI_IDP_1_REDIRECT_URI:-}
      YASHIGANI_IDP_2_ID: ${YASHIGANI_IDP_2_ID:-}
      YASHIGANI_IDP_2_NAME: ${YASHIGANI_IDP_2_NAME:-}
      YASHIGANI_IDP_2_PROTOCOL: ${YASHIGANI_IDP_2_PROTOCOL:-}
      YASHIGANI_IDP_2_DISCOVERY_URL: ${YASHIGANI_IDP_2_DISCOVERY_URL:-}
      YASHIGANI_IDP_2_CLIENT_ID: ${YASHIGANI_IDP_2_CLIENT_ID:-}
      YASHIGANI_IDP_2_CLIENT_SECRET: ${YASHIGANI_IDP_2_CLIENT_SECRET:-}
      YASHIGANI_IDP_2_EMAIL_DOMAINS: ${YASHIGANI_IDP_2_EMAIL_DOMAINS:-}
      YASHIGANI_IDP_2_REDIRECT_URI: ${YASHIGANI_IDP_2_REDIRECT_URI:-}
      # M-01 fix: backoffice also exports OTLP traces to the collector via mTLS.
      # Pattern A for Python ssl: anchor on the public ca_root.crt — Python OTEL
      # exporter goes through Python ssl (gate #58a evidence, 2026-04-28).
      OTEL_EXPORTER_OTLP_ENDPOINT: grpcs://otel-collector:4317
      OTEL_EXPORTER_OTLP_CERTIFICATE: /run/secrets/ca_root.crt
      OTEL_EXPORTER_OTLP_CLIENT_CERTIFICATE: /run/secrets/backoffice_client.crt
      OTEL_EXPORTER_OTLP_CLIENT_KEY: /run/secrets/backoffice_client.key
    volumes:
      - audit_data:/data/audit
      - bootstrap_data:/data/bootstrap
      - ./secrets:/run/secrets
      # Internal mTLS — manifest mounted read-only.
      - ./service_identities.yaml:/etc/yashigani/service_identities.yaml:ro
    read_only: true
    tmpfs:
      - /tmp:size=100M
      - /var/log/yashigani:size=50M
    security_opt:
      - no-new-privileges:true
      # Seccomp + AppArmor default (Lu Review Finding #2 — enabled in v2.23.1).
      # See gateway service above for override env var documentation.
      - seccomp=${YASHIGANI_SECCOMP_PROFILE:-./seccomp/yashigani.json}
      # Backoffice shares the gateway AppArmor profile (same Python/FastAPI
      # surface). A dedicated yashigani-backoffice profile may ship later.
      - apparmor=${YASHIGANI_APPARMOR_PROFILE:-yashigani-gateway}
    healthcheck:
      # mTLS — Pattern A for Python ssl: trust anchor is the public ca_root.crt
      # (Py 3.12/OpenSSL 3.0 strict-chain rejects intermediate-only — gate #58a).
      test: ["CMD-SHELL", "python3 -c \"import ssl, urllib.request; c=ssl.create_default_context(cafile='/run/secrets/ca_root.crt'); c.load_cert_chain('/run/secrets/backoffice_client.crt','/run/secrets/backoffice_client.key'); urllib.request.urlopen('https://localhost:8443/healthz', context=c)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Open WebUI — User-facing chat interface (v1.0)
  # Internal network only. No external port. All LLM calls route through gateway.
  # Auth: trusts X-Forwarded-User from Caddy (SSO) or API key passthrough.
  # ---------------------------------------------------------------------------
  open-webui:
    dns_search: ["."]
    image: ghcr.io/open-webui/open-webui:v0.9.1
    restart: unless-stopped
    mem_limit: ${YASHIGANI_OPENWEBUI_MEM_LIMIT:-2048m}
    cpus: ${YASHIGANI_OPENWEBUI_CPU_LIMIT:-1.0}
    environment:
      # Disable Open WebUI's own auth — Caddy/Yashigani handles identity
      WEBUI_AUTH: "false"
      WEBUI_AUTH_TRUSTED_EMAIL_HEADER: "X-Forwarded-User"
      WEBUI_AUTH_TRUSTED_NAME_HEADER: "X-Forwarded-Name"
      ENABLE_SIGNUP: "true"
      # Secret key for JWT signing — allows programmatic API access.
      # Fail-closed: MUST be set in docker/.env (install.sh generates it).
      WEBUI_SECRET_KEY: ${OWUI_SECRET_KEY:?OWUI_SECRET_KEY must be set in docker/.env — run install.sh to generate}
      # Point ALL inference at Yashigani gateway — OpenAI-compatible
      OPENAI_API_BASE_URL: http://gateway:8080/v1
      OPENAI_API_KEY: "yashigani-internal"
      # Disable direct Ollama access — everything through gateway
      OLLAMA_BASE_URL: ""
      ENABLE_OLLAMA_API: "false"
      # UI settings
      DEFAULT_MODELS: "qwen2.5:3b"
      WEBUI_NAME: "Yashigani AI — Powered by Open WebUI"
    volumes:
      - openwebui_data:/app/backend/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      gateway:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    networks:
      - internal
    profiles:
      - openwebui

  # ---------------------------------------------------------------------------
  # Budget Redis — Dedicated Redis for budget counters (noeviction)
  # Separate from main Redis to prevent counter loss under memory pressure.
  # ---------------------------------------------------------------------------
  budget-redis:
    dns_search: ["."]
    image: docker.io/library/redis:7-alpine
    restart: unless-stopped
    mem_limit: ${YASHIGANI_BUDGET_REDIS_MEM_LIMIT:-256m}
    cpus: ${YASHIGANI_BUDGET_REDIS_CPU_LIMIT:-0.25}
    entrypoint: ["sh", "-c"]
    # v2.23.1 — TLS-only port 6380 with client-cert auth; plaintext disabled.
    # trust anchor: ca_root.crt — libssl strict-mode (error:0A000086 with intermediate)
    command:
      - |
        redis-server \
          --port 0 \
          --tls-port 6380 \
          --tls-cert-file /run/secrets/budget-redis_client.crt \
          --tls-key-file /run/secrets/budget-redis_client.key \
          --tls-ca-cert-file /run/secrets/ca_root.crt \
          --tls-auth-clients yes \
          --tls-protocols "TLSv1.2 TLSv1.3" \
          --maxmemory-policy noeviction \
          --maxmemory 256mb \
          --requirepass "$(cat /run/secrets/redis_password)" \
          --appendonly yes
    volumes:
      - budget_redis_data:/data
      - ./secrets:/run/secrets:ro
    healthcheck:
      # trust anchor: ca_root.crt — libssl strict-mode (error:0A000086 with intermediate)
      test: ["CMD-SHELL", "redis-cli --tls --cert /run/secrets/budget-redis_client.crt --key /run/secrets/budget-redis_client.key --cacert /run/secrets/ca_root.crt -p 6380 -a \"$(cat /run/secrets/redis_password)\" ping 2>/dev/null | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Policy — OPA (Open Policy Agent) — always local, never cloud-delegated
  # ---------------------------------------------------------------------------
  policy:
    dns_search: ["."]
    image: docker.io/openpolicyagent/opa:1.15.1
    restart: unless-stopped
    mem_limit: ${YASHIGANI_POLICY_MEM_LIMIT:-256m}
    cpus: ${YASHIGANI_POLICY_CPU_LIMIT:-0.25}
    # v2.23.1 NOTE: OPA retains plaintext HTTP on the internal bridge network
    # pending the mTLS migration of the gateway's ~6 direct httpx client
    # call sites to OPA (proxy.py, agent_router.py, openai_router.py).
    # Moved to task #54 (v2.23.2) alongside observability mTLS. OPA handles
    # policy decisions, not user credentials or session secrets — the
    # internal bridge network + service identity manifest remain the
    # defence-in-depth for this single service.
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--diagnostic-addr=0.0.0.0:8282"
      - "--log-level=error"
      - "/policies"
    volumes:
      - ../policy:/policies:ro
      - ../policy/data:/policies/data:ro
    healthcheck:
      test: ["CMD", "/opa", "eval", "true"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Redis — session store + TOTP provisioning tokens + rate limiter counters
  # ---------------------------------------------------------------------------
  redis:
    dns_search: ["."]
    image: docker.io/library/redis:7-alpine
    restart: unless-stopped
    mem_limit: ${YASHIGANI_REDIS_MEM_LIMIT:-256m}
    cpus: ${YASHIGANI_REDIS_CPU_LIMIT:-0.25}
    # v2.23.1 — plaintext 6379 disabled (port 0), TLS-only on 6380 with
    # client-cert auth (tls-auth-clients yes). Clients connect via rediss://.
    # trust anchor: ca_root.crt — libssl strict-mode (error:0A000086 with intermediate)
    command: >
      sh -c 'redis-server
      --port 0
      --tls-port 6380
      --tls-cert-file /run/secrets/redis_client.crt
      --tls-key-file /run/secrets/redis_client.key
      --tls-ca-cert-file /run/secrets/ca_root.crt
      --tls-auth-clients yes
      --tls-protocols "TLSv1.2 TLSv1.3"
      --save ""
      --appendonly no
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass "$$(cat /run/secrets/redis_password)"'
    volumes:
      - redis_data:/data
      - ./secrets:/run/secrets:ro
    healthcheck:
      # redis-cli over TLS with our client cert.
      # trust anchor: ca_root.crt — libssl strict-mode (error:0A000086 with intermediate)
      test: >
        sh -c 'redis-cli --tls --cert /run/secrets/redis_client.crt
        --key /run/secrets/redis_client.key --cacert /run/secrets/ca_root.crt
        -p 6380 -a "$$(cat /run/secrets/redis_password)" ping'
      interval: 10s
      timeout: 3s
      retries: 5
    # No depends_on — redis_password is written by the installer to docker/secrets/
    # before compose starts. Removed backoffice dependency to break cycle.
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Ollama — local LLM inference (never a cloud call for security classification)
  # ---------------------------------------------------------------------------
  ollama:
    dns_search: ["."]
    image: docker.io/ollama/ollama:0.6.2
    restart: unless-stopped
    mem_limit: ${YASHIGANI_OLLAMA_MEM_LIMIT:-4096m}
    cpus: ${YASHIGANI_OLLAMA_CPU_LIMIT:-2.0}
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: "0.0.0.0"
    healthcheck:
      # ollama image has no curl/wget — use bash /dev/tcp to check port
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/11434' 2>/dev/null"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - internal
      - external    # Required for model pulls from registry.ollama.ai
    # Uncomment for NVIDIA GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # Model bootstrap — pull classifier model on first start
  ollama-init:
    dns_search: ["."]
    image: docker.io/ollama/ollama:0.6.2
    restart: on-failure:3
    mem_limit: ${YASHIGANI_OLLAMA_INIT_MEM_LIMIT:-256m}
    cpus: ${YASHIGANI_OLLAMA_INIT_CPU_LIMIT:-0.25}
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        until </dev/tcp/ollama/11434 2>/dev/null; do
          echo "waiting for ollama..."; sleep 3
        done
        echo "ollama is ready, pulling model..."
        OLLAMA_HOST=http://ollama:11434 ollama pull ${OLLAMA_MODEL:-qwen2.5:3b}
        # Verify model digest — detect tampered/poisoned models (SOL-SC-03)
        EXPECTED_DIGEST="${OLLAMA_MODEL_DIGEST:-357c53fb659c}"
        ACTUAL_DIGEST=$(OLLAMA_HOST=http://ollama:11434 ollama list | grep "${OLLAMA_MODEL:-qwen2.5:3b}" | awk '{print $2}')
        if [ -n "$EXPECTED_DIGEST" ] && [ "$EXPECTED_DIGEST" != "skip" ]; then
          if echo "$ACTUAL_DIGEST" | grep -q "$EXPECTED_DIGEST"; then
            echo "Model digest verified: $ACTUAL_DIGEST"
          else
            echo "WARNING: Model digest mismatch! Expected=$EXPECTED_DIGEST Actual=$ACTUAL_DIGEST"
            echo "This may indicate a tampered or updated model. Set OLLAMA_MODEL_DIGEST=skip to bypass."
            exit 1
          fi
        fi
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - internal
      - external    # Required for model registry DNS resolution

  # ---------------------------------------------------------------------------
  # Prometheus — metrics collection
  # Exposed externally only via Caddy /metrics-federate (basic auth)
  # ---------------------------------------------------------------------------
  prometheus:
    dns_search: ["."]
    image: docker.io/prom/prometheus:v3.2.1
    restart: unless-stopped
    mem_limit: ${YASHIGANI_PROMETHEUS_MEM_LIMIT:-1024m}
    cpus: ${YASHIGANI_PROMETHEUS_CPU_LIMIT:-0.5}
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}"
      - "--web.enable-remote-write-receiver"
      - "--web.listen-address=0.0.0.0:9090"
    volumes:
      - ../config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../config/prometheus_alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
      # v2.23.1 EX-231-08 (+ #81): Prometheus presents its leaf cert to Caddy's
      # :8444 (gateway) + :8445 (backoffice) listeners for SPIFFE-URI-gated
      # scrapes of /internal/metrics. Split-listener design replaced the prior
      # Host-header matcher (Prom v3 forbids setting Host via http_headers).
      - ./secrets:/run/secrets:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Grafana — dashboards and alerting
  # Admin password auto-generated at bootstrap (check backoffice logs)
  # ---------------------------------------------------------------------------
  grafana:
    dns_search: ["."]
    image: docker.io/grafana/grafana:11.5.2
    restart: unless-stopped
    mem_limit: ${YASHIGANI_GRAFANA_MEM_LIMIT:-512m}
    cpus: ${YASHIGANI_GRAFANA_CPU_LIMIT:-0.25}
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-grafana-admin}
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_SERVER_ROOT_URL: "https://${YASHIGANI_TLS_DOMAIN}/admin/grafana"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./secrets:/run/secrets:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      prometheus:
        condition: service_healthy
      backoffice:
        condition: service_healthy
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — primary durable store (tenants, audit, inference, RBAC)
  # ---------------------------------------------------------------------------
  postgres:
    dns_search: ["."]
    image: docker.io/pgvector/pgvector:pg16
    restart: unless-stopped
    mem_limit: ${YASHIGANI_POSTGRES_MEM_LIMIT:-1024m}
    cpus: ${YASHIGANI_POSTGRES_CPU_LIMIT:-1.0}
    environment:
      POSTGRES_DB: yashigani
      POSTGRES_USER: yashigani_app
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Bind-mount host secrets directory directly (not the shared named volume).
      # Postgres starts before backoffice populates secrets_volume, so it needs
      # the installer-generated password file from disk immediately.
      - ./secrets:/run/secrets:ro
      # Init scripts run in alphabetical order — 05 must come before 10.
      # 05 enables TLS + client-cert verification on first initdb.
      - ./postgres/05-enable-ssl.sh:/docker-entrypoint-initdb.d/05-enable-ssl.sh:ro
      - ./postgres/init-agent-dbs.sh:/docker-entrypoint-initdb.d/10-agent-dbs.sh:ro
    healthcheck:
      # pg_isready over a local socket — doesn't need TLS.
      test: ["CMD-SHELL", "pg_isready -U yashigani_app -d yashigani"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # PgBouncer — transaction-mode connection pooler
  # ---------------------------------------------------------------------------
  pgbouncer:
    image: docker.io/edoburu/pgbouncer:v1.23.1-p0
    restart: unless-stopped
    mem_limit: ${YASHIGANI_PGBOUNCER_MEM_LIMIT:-256m}
    cpus: ${YASHIGANI_PGBOUNCER_CPU_LIMIT:-0.25}
    # Retro #3ah (v2.23.1): c-ares fail-fatal on host-leaked search domains.
    # Originator of the dns_search hardening — see top-of-file block for
    # the full rationale now that every service inherits the same setting.
    dns_search: ["."]
    environment:
      DATABASE_URL: postgresql://yashigani_app:${POSTGRES_PASSWORD}@postgres:5432/yashigani
      AUTH_TYPE: plain
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "100"
      DEFAULT_POOL_SIZE: "20"
    volumes:
      - ./secrets:/run/secrets:ro
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
    healthcheck:
      # Captain Review Finding: pg_isready can't negotiate TLS with
      # client_tls_sslmode=verify-ca (it has no --sslcert flag).
      # edoburu/pgbouncer image is busybox-based — no bash + sh has no
      # /dev/tcp support + busybox nc doesn't understand -z. Quirks:
      #   * localhost resolves IPv6-first, pgbouncer only binds v4 → use 127.0.0.1
      #   * -w 2 = 2s connect timeout
      #   * </dev/null so nc doesn't hang on stdin
      # A successful TCP connect proves the process is listening; real
      # cert-auth is exercised by gateway/backoffice connection path.
      test: ["CMD-SHELL", "nc -w 2 127.0.0.1 5432 </dev/null >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Alertmanager — alert routing (Slack → Email → PagerDuty)
  # ---------------------------------------------------------------------------
  alertmanager:
    dns_search: ["."]
    image: docker.io/prom/alertmanager:v0.27.0
    restart: unless-stopped
    mem_limit: ${YASHIGANI_ALERTMANAGER_MEM_LIMIT:-256m}
    cpus: ${YASHIGANI_ALERTMANAGER_CPU_LIMIT:-0.25}
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ../config/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
      - ./secrets:/run/secrets:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9093/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Loki — log aggregation backend
  # ---------------------------------------------------------------------------
  loki:
    dns_search: ["."]
    image: docker.io/grafana/loki:3.0.0
    restart: unless-stopped
    mem_limit: ${YASHIGANI_LOKI_MEM_LIMIT:-512m}
    cpus: ${YASHIGANI_LOKI_CPU_LIMIT:-0.25}
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ../config/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready | grep -q ready"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Promtail — ships Docker container logs to Loki
  # ---------------------------------------------------------------------------
  promtail:
    dns_search: ["."]
    image: docker.io/grafana/promtail:3.0.0
    restart: unless-stopped
    mem_limit: ${YASHIGANI_PROMTAIL_MEM_LIMIT:-256m}
    cpus: ${YASHIGANI_PROMTAIL_CPU_LIMIT:-0.25}
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ../config/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9080' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      - loki
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # OpenTelemetry Collector — OTLP receiver, Jaeger exporter
  # M-01 fix (2026-04-27): receivers upgraded to mTLS.
  # Cert: otel-collector_client.crt (issued by install.sh PKI bootstrap).
  # Trust anchor: ca_intermediate.crt (Pattern B — never ca_root.crt).
  # Clients (gateway, backoffice) must present valid leaf certs signed by
  # the same intermediate. See config/otel/otel-collector.yml for TLS config.
  # ---------------------------------------------------------------------------
  otel-collector:
    dns_search: ["."]
    image: docker.io/otel/opentelemetry-collector-contrib:0.100.0
    restart: unless-stopped
    mem_limit: ${YASHIGANI_OTEL_COLLECTOR_MEM_LIMIT:-512m}
    cpus: ${YASHIGANI_OTEL_COLLECTOR_CPU_LIMIT:-0.5}
    command: ["--config=/etc/otel/otel-collector.yml"]
    volumes:
      - ../config/otel/otel-collector.yml:/etc/otel/otel-collector.yml:ro
      # PKI certs: collector presents otel-collector leaf cert to clients;
      # trusts ca_intermediate.crt as the client-cert verification CA.
      - ./secrets:/run/secrets:ro
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "components"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      - jaeger
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Jaeger — distributed trace UI
  # ---------------------------------------------------------------------------
  jaeger:
    dns_search: ["."]
    image: docker.io/jaegertracing/all-in-one:1.57
    restart: unless-stopped
    mem_limit: ${YASHIGANI_JAEGER_MEM_LIMIT:-512m}
    cpus: ${YASHIGANI_JAEGER_CPU_LIMIT:-0.5}
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: memory   # dev/demo only — production must use persistent storage (e.g. Elasticsearch or Cassandra)
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:14269/"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Keycloak — upstream test IdP for OIDC/SAML federation validation
  # WARNING: dev-mode (start-dev) — NOT for production. Internal network only.
  # Usage: docker compose --profile test-idp --env-file docker/.env.test-idp up -d
  # Realm is imported on first boot from docker/keycloak/yashigani-test-realm.json.
  # ---------------------------------------------------------------------------
  keycloak:
    dns_search: ["."]
    image: quay.io/keycloak/keycloak:26.0
    restart: unless-stopped
    mem_limit: ${YASHIGANI_KEYCLOAK_MEM_LIMIT:-1024m}
    cpus: ${YASHIGANI_KEYCLOAK_CPU_LIMIT:-1.0}
    command:
      - "start-dev"
      - "--import-realm"
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "false"
      # H2 is fine for dev-mode; no external DB dependency
      KC_DB: dev-file
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak:/opt/keycloak/data/import:ro
    healthcheck:
      test:
        - "CMD-SHELL"
        - "bash -c '</dev/tcp/localhost/9000' 2>/dev/null"
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    networks:
      - internal
    profiles:
      - test-idp

  # ---------------------------------------------------------------------------
  # Vault — HashiCorp Vault dev-mode KMS (opt-in: --profile vault)
  # WARNING: dev-mode — data NOT persisted. NOT for production.
  # ---------------------------------------------------------------------------
  vault:
    dns_search: ["."]
    image: docker.io/hashicorp/vault:1.16
    restart: unless-stopped
    mem_limit: ${YASHIGANI_VAULT_MEM_LIMIT:-512m}
    cpus: ${YASHIGANI_VAULT_CPU_LIMIT:-0.5}
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    volumes:
      - ./secrets:/run/secrets:ro
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    profiles:
      - vault

  # ---------------------------------------------------------------------------
  # OPTIONAL AGENT BUNDLES
  # Provided as a courtesy by Agnostic Security.
  # Images are pinned to upstream-tagged digests and updated with each
  # Yashigani release. All support goes to the upstream maintainers.
  # Enable at install time or via:
  #   docker compose --profile langflow up -d
  #   docker compose --profile letta up -d
  #   docker compose --profile openclaw up -d
  #
  # DISCLAIMER: These integrations carry no support obligation from
  # Agnostic Security. Direct issues to the upstream project teams.
  # ---------------------------------------------------------------------------

  # Langflow — Visual multi-agent workflow builder (MIT)
  # https://github.com/langflow-ai/langflow
  # Single container, embedded SQLite. OpenAI-compatible API on port 7860.
  # Users build custom agent workflows visually via the Langflow UI.
  langflow:
    dns_search: ["."]
    image: docker.io/langflowai/langflow:1.9.0
    restart: unless-stopped
    mem_limit: ${YASHIGANI_LANGFLOW_MEM_LIMIT:-1024m}
    cpus: ${YASHIGANI_LANGFLOW_CPU_LIMIT:-1.0}
    environment:
      # Route all LLM calls through Yashigani gateway (OpenAI-compatible)
      OPENAI_API_BASE: http://gateway:8080/v1
      OPENAI_API_KEY: "yashigani-internal"
      # Default model for new flows
      LANGFLOW_DEFAULT_MODEL: "qwen2.5:3b"
      # Disable telemetry
      DO_NOT_TRACK: "true"
      LANGFLOW_AUTO_LOGIN: "true"
    volumes:
      - langflow_data:/app/langflow
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:7860/health', timeout=5)\""]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s
    depends_on:
      gateway:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    networks:
      - internal
    profiles:
      - langflow

  # Letta (formerly MemGPT) — Stateful agent with persistent memory (Apache 2.0)
  # https://github.com/letta-ai/letta
  # Agent with long-term memory, tool use, and conversation persistence.
  # Exposes REST API on port 8283 with OpenAI-compatible chat endpoint.
  letta:
    dns_search: ["."]
    image: docker.io/letta/letta:0.16.7
    restart: unless-stopped
    mem_limit: ${YASHIGANI_LETTA_MEM_LIMIT:-1024m}
    cpus: ${YASHIGANI_LETTA_CPU_LIMIT:-1.0}
    environment:
      # Route LLM calls through Yashigani gateway
      OPENAI_API_BASE: http://gateway:8080/v1
      OPENAI_API_KEY: "yashigani-internal"
      LETTA_LLM_MODEL: "qwen2.5:3b"
      LETTA_EMBEDDING_MODEL: "qwen2.5:3b"
      # Use shared Postgres for persistence (separate DB)
      LETTA_PG_URI: postgresql://yashigani_app:${POSTGRES_PASSWORD}@postgres:5432/letta
    volumes:
      - letta_data:/root/.letta
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8283/v1/health\", timeout=5)'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      gateway:
        condition: service_healthy
      postgres:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    networks:
      - internal
    profiles:
      - letta

  # Goose — REMOVED (ACP protocol too slow on CPU, ~300s per request)

  # CrewAI — removed from community/open-source edition.
  # CrewAI Docker image is now an enterprise-only feature.
  # Contact sales@agnosticsec.com for Enterprise tier with CrewAI support.

  # OpenClaw — Node.js personal AI with 30+ messaging channel integrations
  # https://openclaw.ai  |  https://github.com/openclaw/openclaw
  # Runs its own Gateway on port 18789. All LLM requests route through Yashigani.
  # Integration: OpenClaw (:18789) → Yashigani Gateway (:8080) → Ollama/LLM
  openclaw:
    dns_search: ["."]
    image: ghcr.io/openclaw/openclaw:2026.3.1
    restart: unless-stopped
    mem_limit: ${YASHIGANI_OPENCLAW_MEM_LIMIT:-1024m}
    cpus: ${YASHIGANI_OPENCLAW_CPU_LIMIT:-1.0}
    ports:
      # YSG-RISK-006 #3aw: loopback-bind only. OpenClaw is behind the gateway;
      # external clients must never bypass the gateway to reach OpenClaw directly.
      # Messaging channel webhooks reach OpenClaw via the host loopback (or a
      # local nginx/Caddy reverse proxy) — not directly from the public internet.
      # Gateway-to-OpenClaw traffic stays on the internal Docker bridge (no ports:
      # entry needed for that path). CWE-668 — Tiago decision 2026-04-28, option A.
      - "127.0.0.1:18789:18789"
    environment:
      OPENCLAW_CONFIG_PATH: /etc/openclaw/openclaw.json
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_SERVER_MODE: "true"
      OPENCLAW_DISABLE_AUDIO: "true"
      OPENCLAW_DISABLE_CAMERA: "true"
      OPENCLAW_DISABLE_LOCATION: "true"
      OPENCLAW_DISABLE_VOICE_WAKE: "true"
    volumes:
      - openclaw_data:/home/node/.openclaw
      - ./secrets:/run/secrets:ro
      - ./openclaw/openclaw.json:/etc/openclaw/openclaw.json:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:18789/healthz 2>/dev/null || wget -qO- http://localhost:18789/healthz 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      gateway:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    networks:
      - internal
      - external      # Port 18789 must be reachable by messaging channel webhooks
    profiles:
      - openclaw

  # ---------------------------------------------------------------------------
  # Wazuh SIEM — Open source security monitoring (opt-in)
  # Full stack: manager (receives events) + indexer (OpenSearch) + dashboard
  # All Yashigani audit events are forwarded via the SIEM sink (audit/sinks.py)
  # ---------------------------------------------------------------------------
  wazuh-manager:
    dns_search: ["."]
    image: docker.io/wazuh/wazuh-manager:4.9.2
    restart: unless-stopped
    mem_limit: ${YASHIGANI_WAZUH_MANAGER_MEM_LIMIT:-1024m}
    cpus: ${YASHIGANI_WAZUH_MANAGER_CPU_LIMIT:-1.0}
    environment:
      INDEXER_URL: https://wazuh-indexer:9200
      INDEXER_USERNAME: admin
      INDEXER_PASSWORD: ${WAZUH_INDEXER_PASSWORD:-}
      FILEBEAT_SSL_VERIFICATION_MODE: none
      SSL_CERTIFICATE_AUTHORITIES: /etc/ssl/root-ca.pem
      SSL_CERTIFICATE: /etc/wazuh-indexer/certs/wazuh.manager.pem
      SSL_KEY: /etc/wazuh-indexer/certs/wazuh.manager-key.pem
      API_USERNAME: wazuh-wui
      API_PASSWORD: ${WAZUH_API_PASSWORD:-}
    volumes:
      - wazuh_api_configuration:/var/ossec/api/configuration
      - wazuh_etc:/var/ossec/etc
      - wazuh_logs:/var/ossec/logs
      - wazuh_queue:/var/ossec/queue
      - wazuh_var_multigroups:/var/ossec/var/multigroups
      - wazuh_integrations:/var/ossec/integrations
      - wazuh_active_response:/var/ossec/active-response/bin
      - wazuh_agentless:/var/ossec/agentless
      - wazuh_wodles:/var/ossec/wodles
      - filebeat_etc:/etc/filebeat
      - filebeat_var:/var/lib/filebeat
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:55000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - internal
    profiles:
      - wazuh

  wazuh-indexer:
    dns_search: ["."]
    image: docker.io/wazuh/wazuh-indexer:4.9.2
    restart: unless-stopped
    mem_limit: ${YASHIGANI_WAZUH_INDEXER_MEM_LIMIT:-1024m}
    cpus: ${YASHIGANI_WAZUH_INDEXER_CPU_LIMIT:-1.0}
    environment:
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - wazuh_indexer_data:/var/lib/wazuh-indexer
    healthcheck:
      test: ["CMD-SHELL", "curl -sf https://localhost:9200 -k || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - internal
    profiles:
      - wazuh

  wazuh-dashboard:
    dns_search: ["."]
    image: docker.io/wazuh/wazuh-dashboard:4.9.2
    restart: unless-stopped
    mem_limit: ${YASHIGANI_WAZUH_DASHBOARD_MEM_LIMIT:-1024m}
    cpus: ${YASHIGANI_WAZUH_DASHBOARD_CPU_LIMIT:-1.0}
    environment:
      INDEXER_USERNAME: admin
      INDEXER_PASSWORD: ${WAZUH_INDEXER_PASSWORD:-}
      WAZUH_API_URL: https://wazuh-manager
      DASHBOARD_USERNAME: kibanaserver
      DASHBOARD_PASSWORD: ${WAZUH_DASHBOARD_PASSWORD:-}
      API_USERNAME: wazuh-wui
      API_PASSWORD: ${WAZUH_API_PASSWORD:-}
    volumes:
      - wazuh_dashboard_config:/usr/share/wazuh-dashboard/data/wazuh/config
      - wazuh_dashboard_custom:/usr/share/wazuh-dashboard/plugins/wazuh/public/assets/custom
    depends_on:
      wazuh-manager:
        condition: service_healthy
      wazuh-indexer:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - internal
    profiles:
      - wazuh

  # ---------------------------------------------------------------------------
  # Smallstep CA — Internal Certificate Authority for service-to-service TLS
  # Provides automated certificate issuance and renewal for all internal
  # services. Caddy integrates natively with step-ca via ACME.
  # Enable with: --with-internal-ca
  # ---------------------------------------------------------------------------
  step-ca:
    dns_search: ["."]
    image: docker.io/smallstep/step-ca:0.30.2
    restart: unless-stopped
    mem_limit: ${YASHIGANI_STEP_CA_MEM_LIMIT:-256m}
    cpus: ${YASHIGANI_STEP_CA_CPU_LIMIT:-0.25}
    environment:
      DOCKER_STEPCA_INIT_NAME: "Yashigani Internal CA"
      DOCKER_STEPCA_INIT_DNS_NAMES: "step-ca,localhost"
      DOCKER_STEPCA_INIT_REMOTE_MANAGEMENT: "true"
      DOCKER_STEPCA_INIT_ACME: "true"
    volumes:
      - step_ca_data:/home/step
    healthcheck:
      test: ["CMD-SHELL", "step ca health --ca-url https://localhost:9000 --root /home/step/certs/root_ca.crt 2>/dev/null || curl -sf -k https://localhost:9000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - internal
    profiles:
      - internal-ca

# ---------------------------------------------------------------------------
# Named volumes
# ---------------------------------------------------------------------------
volumes:
  audit_data:
    driver: local
    # On Linux with a dedicated audit partition, override with:
    #   AUDIT_DATA_PATH=/mnt/audit docker compose up -d
    # driver_opts:
    #   type: none
    #   o: bind
    #   device: ${AUDIT_DATA_PATH:-./data/audit}
  bootstrap_data:
    driver: local
  # secrets_volume removed — all services now bind-mount ./secrets directly
  redis_data:
    driver: local
  ollama_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
  postgres_data:
    driver: local
  alertmanager_data:
    driver: local
  loki_data:
    driver: local
  # Test IdP volume
  keycloak_data:
    driver: local
  # Agent bundle volumes
  openclaw_data:
    driver: local
  langflow_data:
    driver: local
  letta_data:
    driver: local
  openwebui_data:
    driver: local
  budget_redis_data:
    driver: local
  step_ca_data:
    driver: local
  # Wazuh SIEM volumes (opt-in)
  wazuh_api_configuration:
    driver: local
  wazuh_etc:
    driver: local
  wazuh_logs:
    driver: local
  wazuh_queue:
    driver: local
  wazuh_var_multigroups:
    driver: local
  wazuh_integrations:
    driver: local
  wazuh_active_response:
    driver: local
  wazuh_agentless:
    driver: local
  wazuh_wodles:
    driver: local
  filebeat_etc:
    driver: local
  filebeat_var:
    driver: local
  wazuh_indexer_data:
    driver: local
  wazuh_dashboard_config:
    driver: local
  wazuh_dashboard_custom:
    driver: local

# ---------------------------------------------------------------------------
# Docker secrets (populated by backoffice bootstrap)
# ---------------------------------------------------------------------------
# Docker secrets section removed — all services bind-mount ./secrets directly.
# Secret files are generated by install.sh and stored in docker/secrets/.
# To upgrade to a paid tier, replace docker/secrets/license_key with your .ysg content.

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge
