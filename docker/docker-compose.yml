---
# Yashigani v2.24.1 — Docker Compose stack
# Last updated: 2026-05-24T12:00:00+01:00 (security(secrets): PROBE-AG1 — per-key Docker named-secrets on langflow/letta/letta-pgbouncer; openclaw /run/secrets mount removed; closes NICO-V241-001 + YSG-RISK-060)
# Last updated: 2026-05-24T00:00:00+01:00 (feat(security): YSG-RISK-055 UA-10 — per-agent bridge isolation; langflow→letta and langflow→openclaw lateral TCP severed at L2)
# Last updated: 2026-05-20T12:00:00+01:00 (fix(compose): revert AGENT-RUNTIME-003d — restore read_only:true on letta + single-file bind mount for openapi_letta.json + tmpfs /root/nltk_data)
# Last updated: 2026-05-20T10:50:00+01:00 (fix(compose): AGENT-RUNTIME-003c drop sslmode=require from LETTA_PG_URI — pg8000 alembic path)
# Last updated: 2026-05-20T10:30:00+01:00 (fix(compose): AGENT-RUNTIME-003b drop cd /tmp from letta shim + langflow ALEMBIC_LOG_TO_STDOUT)
# Last updated: 2026-05-20T00:06:00+01:00 (fix(postgres,compose): LETTA-001 — pg_hba letta-specific TLS rule + sslmode=require URI)
# Last updated: 2026-05-19T00:00:00+00:00 (fix(compose): ollama-init profiles — add langflow/letta/openclaw so SF-011 closed; umask 0077 in gateway-start.sh)
# Last updated: 2026-05-17T12:00:00+01:00 (feat: ollama-init profiles gate + disk-space check + env var — auto-pull model only when --with-openwebui)
# Last updated: 2026-05-16T21:00:00+01:00 (fix: YSG-RISK-008 compose hardening — read_only+tmpfs 24/27 + no-new-privileges 27/27)
# Last updated: 2026-05-16T18:00:00+01:00 (v2.23.4: bump version 2.23.3 → 2.23.4 across install/build/helm/airgap)
# Last updated: 2026-05-10T00:00:00+01:00 (fix: G16 image-pin + to_thread run_migrations; start_period 30s→60s)
# Last updated: 2026-05-09T00:00:00+01:00 (fix/v233-base-regressions: add YASHIGANI_DB_AES_KEY to backoffice env — smoke fix)
#
# Services: caddy (TLS edge), gateway, backoffice, policy (OPA),
#           redis, ollama, prometheus, grafana
#
# Usage:
#   cp .env.example .env          # fill in required values
#   docker compose up -d
#
# First run: all service passwords are auto-generated and printed to stdout
# by the backoffice bootstrap process. Check: docker compose logs backoffice
#
# TLS modes (YASHIGANI_TLS_MODE):
#   acme        — Let's Encrypt (default, requires public DNS)
#   ca          — CA-signed cert (mount ./tls/server.crt + ./tls/server.key)
#   selfsigned  — local/demo only, self-signed (Caddy internal CA)

# version field removed — obsolete in Docker Compose v2+

# ---------------------------------------------------------------------------
# DNS-resolver hardening (retro #3ah, defensive widening)
# ---------------------------------------------------------------------------
# Every service in this file declares `dns_search: ["."]`. The single dot is
# a literal "empty search list" sentinel — Docker treats `[]` as "no override"
# but `["."]` writes a resolv.conf with no `search` line at all.
#
# Why every service, not just pgbouncer?
# When Docker Engine runs inside a libvirt/qemu VM (or any host where
# systemd-resolved is the upstream resolver), Docker copies the host's search
# domains into every container's /etc/resolv.conf — including artefacts like
# "placeholder-NNNN.hostname.internal lan". The behaviour of a container's
# DNS resolver against these search domains depends on the resolver library:
#
#   * c-ares (pgbouncer) treats SERVFAIL on "postgres.<search>" as fatal and
#     returns result=0 without falling through to a bare "postgres" lookup.
#     This was the original observed symptom (#3ah).
#   * musl-libc and some older glibc versions can exhibit similar fail-fatal
#     behaviour on transient SERVFAILs from upstream resolvers.
#   * Modern glibc usually falls through, but the failure mode is host- and
#     resolver-version-dependent and not under our control.
#
# Setting `dns_search: ["."]` per service eliminates the variable: containers
# resolve service names directly against Docker's embedded DNS (127.0.0.11)
# with no search-domain expansion. Podman writes its own minimal resolv.conf
# and was unaffected, but applying the override on Podman is benign — it
# either matches Podman's existing default or is silently ignored.
#
# `dns: [...]` is intentionally NOT set: hardcoding 127.0.0.11 breaks Podman
# (which uses aardvark-dns at a different address) and breaks user-defined
# networks where Docker may inject a different resolver address. Empty search
# is the minimum viable, runtime-portable change.
# ---------------------------------------------------------------------------


x-common-env: &common-env
  # LIC-001: YASHIGANI_ENV must be "production" in deployed stacks. The value
  # "development" used to be the default here, which silently disabled license
  # integrity checks (verifier skips hash + counter-key validation when
  # YASHIGANI_ENV=dev). Default is now "production" so shipped stacks fail-closed.
  # Set YASHIGANI_ENV=dev ONLY in local developer builds — never in .env.example.
  # Non-license telemetry label is carried separately as YASHIGANI_ENVIRONMENT_LABEL.
  YASHIGANI_ENV: ${YASHIGANI_ENV:-production}
  YASHIGANI_ENVIRONMENT_LABEL: ${YASHIGANI_ENVIRONMENT_LABEL:-production}
  YASHIGANI_KMS_PROVIDER: ${YASHIGANI_KMS_PROVIDER:-docker}
  YASHIGANI_AUDIT_LOG_PATH: /data/audit/audit.log
  YASHIGANI_AUDIT_MAX_FILE_SIZE_MB: ${YASHIGANI_AUDIT_MAX_FILE_SIZE_MB:-100}
  YASHIGANI_AUDIT_RETENTION_DAYS: ${YASHIGANI_AUDIT_RETENTION_DAYS:-90}
  # Internal mTLS — every service reads its identity from this manifest + its
  # own bootstrap token. Path is mounted read-only on every Python service.
  YASHIGANI_SERVICE_MANIFEST_PATH: /etc/yashigani/service_identities.yaml
  YASHIGANI_INTERNAL_CA_DIR: /run/secrets
  # YSG-COMPOSE-ENV-001: per-install internal service token generated by install.sh
  # and written to docker/.env. Compose only passes .env vars to containers when
  # they are EXPLICITLY declared in environment: blocks. This declaration ensures
  # the value reaches every Python service (gateway + backoffice) that reads
  # os.environ.get("YASHIGANI_INTERNAL_BEARER"). Fail-fast syntax: missing value
  # surfaces at compose-up, not deep inside the container at lifespan startup.
  # Bucket-C shims (open-webui, langflow, letta) read from /run/secrets/yashigani_internal_bearer
  # via Docker named-secrets (langflow + letta) or direct bind-mount (open-webui — untouched
  # per brief). openclaw reads the bearer from openclaw.json (pre-substituted by install.sh) —
  # it has no /run/secrets mount at all (PROBE-AG1 fix). They also benefit from the env var for consistency.
  YASHIGANI_INTERNAL_BEARER: ${YASHIGANI_INTERNAL_BEARER:?run install.sh to generate yashigani_internal_bearer}
  # Nico N-001 (v2.24.4): FIPS_MODE propagation to containers.
  # lib/yashigani-fips.sh defines FIPS_MODE and routes openssl dgst calls through
  # the OpenSSL FIPS Provider when FIPS_MODE=1. Previously host-shell only — no
  # container ever received this var. Now injected via x-common-env anchor.
  # Default 0 (unset) = standard OpenSSL; set to 1 via YSG_FIPS_MODE env var
  # or --fips-mode flag in install.sh.
  #
  # IMPORTANT: FIPS_MODE=1 activates the FIPS code path only if the container's
  # OpenSSL installation includes the CMVP #4985-validated FIPS Provider.
  # The default python:3.14.0-slim and caddy:2.11.2-alpine images do NOT
  # include the FIPS Provider. Operators requiring FIPS-validated crypto MUST
  # use a FIPS-configured base image (e.g. UBI + openssl-fips or AWS BoringCrypto).
  FIPS_MODE: ${YSG_FIPS_MODE:-0}
  # Nico N-002 (v2.25.0 P2 B9): CMVP cert number for runtime FIPS attestation.
  # Surfaced by /admin/crypto/inventory as evidence for auditors. Operator opt-in
  # via YSG_CMVP_CERT env (e.g. "#4985" for the CMVP-validated OpenSSL FIPS Provider).
  # Empty default = attestation field reports null.
  YASHIGANI_CMVP_CERT: ${YSG_CMVP_CERT:-}

# Reminder for readers: the runtime manifest (with per-install bootstrap_token_sha256
# values populated) is mounted into each Python service as:
#   ./var/runtime/service_identities.yaml:/etc/yashigani/service_identities.yaml:ro
# The canonical schema source is docker/service_identities.yaml (git-tracked, all
# bootstrap_token_sha256 placeholders empty). install.sh copies it to
# docker/var/runtime/service_identities.yaml and populates the hashes there.
# docker/var/ is gitignored — post-install git status stays clean.
# Adding a service? Add it to docker/service_identities.yaml AND bind-mount
# the file here. install.sh bootstrap_internal_pki() will issue its cert on
# the next run.

services:

  # ---------------------------------------------------------------------------
  # Caddy — TLS edge proxy
  # Routes /admin/* to backoffice, /metrics-federate to prometheus (authed),
  # everything else to gateway.
  # ---------------------------------------------------------------------------
  caddy:
    dns_search: ["."]
    # YSG-RISK-061 (v2.24.1): use hardened build (caddy/Dockerfile.caddy) which
    # adds iptables + iproute2-minimal and installs caddy-entrypoint.sh.
    # The base image is the same digest-pinned caddy:2.11.2-alpine upstream.
    build:
      context: ..
      dockerfile: docker/caddy/Dockerfile.caddy
    image: yashigani/caddy:${YASHIGANI_VERSION:-2.24.1}
    restart: unless-stopped
    mem_limit: ${YASHIGANI_CADDY_MEM_LIMIT:-256m}
    cpus: ${YASHIGANI_CADDY_CPU_LIMIT:-0.5}
    ports:
      - "${YASHIGANI_HTTP_PORT:-80}:80"
      - "${YASHIGANI_HTTPS_PORT:-443}:443"
    # Mesh-internal SPIFFE-gated metrics listeners — NEVER host-mapped.
    # 8444 = gateway upstream, 8445 = backoffice upstream (#81 fix).
    # `expose:` is documentation only on bridge networks, but it is the
    # canonical place to record which internal ports a service opens.
    expose:
      - "8444"
      - "8445"
    environment:
      YASHIGANI_TLS_DOMAIN: ${YASHIGANI_TLS_DOMAIN:?set YASHIGANI_TLS_DOMAIN}
      CADDY_ACME_EMAIL: ${YASHIGANI_ADMIN_USERNAME:-admin@yashigani.local}
      PROMETHEUS_BASICAUTH_USER: ${PROMETHEUS_BASICAUTH_USER:-prometheus}
      PROMETHEUS_BASICAUTH_HASH: ${PROMETHEUS_BASICAUTH_HASH:?run bootstrap to get this value}
      # EX-231-10 Layer B — per-install HMAC shared secret.
      # Caddy injects this value as X-Caddy-Verified-Secret on every upstream
      # proxy call to gateway and backoffice. the gateway/backoffice middleware verifies it.
      # Generated by install.sh PKI bootstrap; regenerated on --upgrade.
      CADDY_INTERNAL_HMAC: ${CADDY_INTERNAL_HMAC:?run install.sh to generate caddy_internal_hmac}
      # YSG-RISK-061: ACME + operator egress allowlist (comma-separated host:port).
      # Default: LE production + LE staging + OCSP responders.
      # Operators add extra allowed egress destinations here (e.g. custom ACME CA).
      # The entrypoint resolves each hostname to IPs at startup and creates an
      # iptables OUTPUT ACCEPT rule per IP+port pair. Unresolvable hostnames are
      # logged as WARN and skipped (Caddy still starts).
      YASHIGANI_CADDY_EGRESS_ALLOWLIST: ${YASHIGANI_CADDY_EGRESS_ALLOWLIST:-}
      # LAURA-V243-002 (env-propagation closure): TLS mode must be visible to
      # caddy-entrypoint.sh INSIDE the container, not just at compose-parse
      # time for the Caddyfile volume mount path below. Without this env
      # passthrough, the entrypoint's TLS_MODE gate (which prevents ACME-host
      # egress fallback in selfsigned/ca mode) reads an empty var and defaults
      # to "acme" in any mode, defeating the LAURA-V243-002 fix. The Caddy
      # container would still allowlist Cloudflare ACME IPs even though Caddy
      # never invokes ACME — exactly the gap Laura found.
      YASHIGANI_TLS_MODE: ${YASHIGANI_TLS_MODE:-acme}
      # Nico N-001 (v2.24.4): FIPS_MODE for caddy. Caddy does not use x-common-env
      # (caddy has its own env block). Add separately to ensure parity.
      FIPS_MODE: ${YSG_FIPS_MODE:-0}
    volumes:
      - ./Caddyfile.${YASHIGANI_TLS_MODE:-acme}:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - ./tls:/etc/caddy/tls:ro    # only used in ca mode
      # S4 (P1 W3 Phase 2a): agent Caddyfile snippet directory.
      # Onboarded-agent snippets (generated by ringfence-init codegen) land in
      # docker/caddy/agents/<agent>.caddy and are picked up by the
      # `import /etc/caddy/agents/*.caddy` sentinel at the end of the Caddyfile.
      # Read-only: snippets are written by install.sh/ringfence-init only.
      # Empty at base install (no agents onboarded); Caddy continues normally.
      - ./caddy/agents:/etc/caddy/agents:ro
      # Internal mesh CA — Caddy calls backoffice /auth/verify via forward_auth
      # (mTLS client). Its own client cert lives in ./secrets; the runtime manifest
      # (with per-install bootstrap_token_sha256 values) is mounted read-only.
      # Source is docker/var/runtime/ (gitignored, populated by install.sh).
      # LAURA-001 (MED, RISK-REGISTERED): flat ./secrets mount exposes
      # caddy_client.key to ~18 services sharing this bind-mount. Pre-existing
      # compose architecture constraint; per-service secret-split is tracked as
      # a risk item (not in scope for this branch). K8s uses pki-certs Secret
      # (caddy.yaml) which is already correctly isolated to the caddy pod only.
      - ./secrets:/run/secrets:ro
      - ./var/runtime/service_identities.yaml:/etc/yashigani/service_identities.yaml:ro
    healthcheck:
      # MUST-4 / v2.24.1: admin TCP :2019 removed; unix socket is the only
      # admin path. curl --unix-socket targets the socket from inside the
      # container — no TCP listener exposed to any network.
      test: ["CMD", "curl", "-fsS", "--unix-socket", "/run/caddy/admin.sock", "http://localhost/config/"]
      interval: 15s
      timeout: 5s
      retries: 3
    read_only: true
    tmpfs:
      # YSG-RISK-008 (v2.23.4): caddy_data + caddy_config are named volumes
      # (writable). /tmp needed for ACME challenge staging + TLS cert staging.
      - /tmp:size=64m,mode=1777
      # MUST-4 / v2.24.1: /run/caddy holds the admin unix socket.
      # read_only rootfs requires tmpfs here — caddy creates admin.sock at startup.
      - /run/caddy:size=1m,mode=0700
    # C6 (P1 W3 Phase 2a): seccomp profile + no-new-privileges hardening.
    # Parity with gateway/backoffice — both use the same yashigani.json profile.
    # yashigani.json extends Docker's default seccomp allowlist by explicitly
    # blocking container-escape + kernel-modification syscalls.
    security_opt:
      - no-new-privileges:true
      - seccomp=${YASHIGANI_SECCOMP_PROFILE:-./seccomp/yashigani.json}
    # V232-CSCAN-01k-RES-01 / YSG-RISK-061 (v2.24.1):
    # NET_BIND_SERVICE required: Caddy binds privileged ports 80 and 443.
    # NET_ADMIN (NEW): required for iptables-based egress restriction in
    #   caddy-entrypoint.sh. NET_ADMIN allows iptables manipulation within
    #   the container's network namespace ONLY — it does NOT affect the host
    #   network stack. Docker/Podman enforce this via Linux network namespaces.
    #   Trade-off documented in YSG-RISK-061 (accepted by Tiago 2026-05-25).
    cap_drop: [ALL]
    cap_add:
      - NET_BIND_SERVICE
      - NET_ADMIN
    # v2.23.1: Caddy is the FIRST container to start — no depends_on.
    # It tolerates 502s on upstreams until gateway/backoffice come up;
    # external traffic still reaches it immediately for health checks.
    # Previous depends_on (gateway + backoffice) created a deadlock with
    # forward_auth — those services now bind-mount the internal CA for
    # their own mTLS identity, and Caddy waits for them via upstream
    # retries, not compose ordering.
    #
    # EX-231-10 network isolation (2026-04-29):
    # Caddy is the SOLE ingress. It joins:
    #   edge          — host port mapping (80/443)
    #   caddy_internal — proxy to backoffice:8443 + gateway:8080
    #   obs           — proxy /admin/grafana, /admin/prometheus, /admin/jaeger
    # Caddy does NOT join `data` — no reason to talk to postgres/redis/OPA.
    networks:
      - edge
      - caddy_internal
      - obs

  # ---------------------------------------------------------------------------
  # Gateway — MCP reverse proxy (data plane)
  # ---------------------------------------------------------------------------
  gateway:
    dns_search: ["."]
    image: yashigani/gateway:${YASHIGANI_VERSION:-2.23.4}
    build:
      context: ..
      dockerfile: docker/Dockerfile.gateway
    restart: unless-stopped
    mem_limit: ${YASHIGANI_GATEWAY_MEM_LIMIT:-1024m}
    cpus: ${YASHIGANI_GATEWAY_CPU_LIMIT:-1.0}
    environment:
      <<: *common-env
      YASHIGANI_SERVICE_NAME: gateway
      YASHIGANI_UPSTREAM_URL: ${UPSTREAM_MCP_URL:?set UPSTREAM_MCP_URL}
      # v2.23.2: OPA serves mTLS; gateway uses internal_httpx_client (EX-231-01).
      YASHIGANI_OPA_URL: https://policy:8181
      # FIX-OPA-SSL (2026-05-30): MCP broker OPA httpx client needs the internal CA
      # cert to verify OPA's TLS cert (issued by the Yashigani internal PKI).
      # Without this, _opa.py AsyncClient → [SSL: CERTIFICATE_VERIFY_FAILED] →
      # opa_unreachable → tools/call fail-closed deny.
      YASHIGANI_CA_CERT: /run/secrets/ca_root.crt
      OLLAMA_BASE_URL: http://ollama:11434  # Ollama has no TLS; internal bridge-only + bearer token (honest gap, tracked in manifest as mtls_capable: false)
      REDIS_HOST: redis
      REDIS_PORT: "6380"                     # TLS-only port
      REDIS_USE_TLS: "true"
      YASHIGANI_SECRETS_DIR: /run/secrets
      YASHIGANI_AGENT_ROUTING_ENABLED: "true"
      YASHIGANI_AGENT_PATH_PREFIX: "/agents"
      YASHIGANI_AGENT_TOKEN_MIN_LENGTH: "64"
      # Postgres via PgBouncer — TLS verify-ca + client cert.
      YASHIGANI_DB_DSN: postgresql://yashigani_app:${POSTGRES_PASSWORD_URLENC}@pgbouncer:5432/yashigani?sslmode=verify-ca&sslrootcert=/run/secrets/ca_root.crt&sslcert=/run/secrets/gateway_client.crt&sslkey=/run/secrets/gateway_client.key
      # BUG-GATEWAY-DSN-DIRECT-MISSING fix: gateway run_migrations() acquires a
      # session-scoped pg_advisory_lock.  When it uses the pgbouncer DSN the lock
      # lands on backend pid N; pgbouncer then recycles that backend to the asyncpg
      # pool — the lock survives on pid N.  Backoffice lifespan then tries
      # pg_advisory_lock on its own direct connection (pid M) and blocks
      # permanently because pid N still holds the lock (pgbouncer transaction-pool
      # DISCARD ALL does NOT release advisory locks).  Fix: route the lock
      # connection direct to postgres:5432, bypassing pgbouncer, identical to
      # backoffice line ~306 and Helm gateway.yaml:141.
      YASHIGANI_DB_DSN_DIRECT: postgresql://yashigani_app:${POSTGRES_PASSWORD_URLENC}@postgres:5432/yashigani?sslmode=verify-ca&sslrootcert=/run/secrets/ca_root.crt&sslcert=/run/secrets/gateway_client.crt&sslkey=/run/secrets/gateway_client.key
      YASHIGANI_DEPLOYMENT_STREAM: ${YASHIGANI_DEPLOYMENT_STREAM:-opensource}
      # M-01 fix: switched from http:// (plaintext) to grpcs:// (mTLS).
      # Pattern A for Python ssl: opentelemetry-exporter-otlp uses Python ssl,
      # so trust anchor is the PUBLIC ca_root.crt (Py 3.12/OpenSSL 3.0 strict
      # chain — gate #58a evidence). Gateway presents its leaf from /run/secrets.
      OTEL_EXPORTER_OTLP_ENDPOINT: grpcs://otel-collector:4317
      OTEL_EXPORTER_OTLP_CERTIFICATE: /run/secrets/ca_root.crt
      OTEL_EXPORTER_OTLP_CLIENT_CERTIFICATE: /run/secrets/gateway_client.crt
      OTEL_EXPORTER_OTLP_CLIENT_KEY: /run/secrets/gateway_client.key
      SKLEARN_MODEL_PATH: /app/models/sensitivity_classifier.joblib
      # Agent auth tokens for upstream calls
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      # EX-231-10 Layer B — per-install shared secret for X-Caddy-Verified-Secret
      # verification. the gateway/backoffice middleware reads this at lifespan startup and rejects
      # requests that do not carry the matching header value.
      CADDY_INTERNAL_HMAC: ${CADDY_INTERNAL_HMAC:?run install.sh to generate caddy_internal_hmac}
      # v2.2 — PII detection (ON by default for all traffic)
      # Modes: log | redact | block  (default: log)
      YASHIGANI_PII_MODE: ${YASHIGANI_PII_MODE:-log}
      # Cloud bypass OFF by default — admin must explicitly enable to allow PII to cloud LLMs
      YASHIGANI_PII_CLOUD_BYPASS: ${YASHIGANI_PII_CLOUD_BYPASS:-false}
      # YSG-RISK-057 — response inspection is OFF by default (design-by-pairing).
      # Compliance customers (CMMC / ISO 27001 / SOC 2) MUST set BOTH:
      #   YASHIGANI_INSPECT_RESPONSES=true   (activates ResponseInspectionPipeline)
      #   YASHIGANI_OPA_URL=https://policy:8181  (already set above — OPA must be deployed)
      # Without inspection OPA never receives a sensitivity label, ceiling check
      # operates on PUBLIC by default (benign for non-compliance deployments).
      # Without OPA, inspection produces a classification with nothing to consume it.
      # See docs/operator-guide.md §2 for the opt-in recipe and YSG-RISK-057 for rationale.
      YASHIGANI_INSPECT_RESPONSES: ${YASHIGANI_INSPECT_RESPONSES:-false}
      # P3 MCP broker — JSON array of registered MCP server descriptors.
      # Written by install.sh --onboard (Shape C) and cleared by install.sh --offboard.
      # Default [] = no MCP servers (broker disabled at startup).
      # Format: [{"agent_name":"<name>","upstream_url":"http://<host>:8000/mcp","tenant_id":"<tid>"}]
      # gateway reads this at lifespan startup; changes require container recreate:
      #   docker compose -f docker/docker-compose.yml up --no-deps -d gateway
      # P3 broker E2E gate (2026-05-30): must be declared here so compose passes it into container.
      YASHIGANI_MCP_SERVERS: ${YASHIGANI_MCP_SERVERS:-[]}
    volumes:
      - audit_data:/data/audit
      - bootstrap_data:/data/bootstrap
      - ./secrets:/run/secrets:ro
      # Internal mTLS — runtime manifest (with per-install bootstrap_token_sha256 values).
      # Source: docker/var/runtime/service_identities.yaml (gitignored, populated by install.sh).
      - ./var/runtime/service_identities.yaml:/etc/yashigani/service_identities.yaml:ro
      # Container socket for Pool Manager (per-identity isolation)
      # SECURITY: read-only mount, gateway runs as non-root (UID 1001).
      # Pool Manager uses only: containers.run(), .get(), .kill(), .remove().
      # No host filesystem access. Podman rootless provides additional isolation.
      # To disable: set CONTAINER_SOCKET_ENABLED=false — Pool Manager falls back to stub mode.
      # macOS Podman: socket can't be mounted from host — Pool Manager uses stub mode.
    read_only: true
    tmpfs:
      - /tmp:size=100M
      - /var/log/yashigani:size=50M
    security_opt:
      - no-new-privileges:true
      # Seccomp default (Pentest finding #2 — enabled by default in v2.23.1).
      # Path fix (#31/#4): install.sh sets YASHIGANI_SECCOMP_PROFILE to an
      # absolute path (${WORK_DIR}/docker/seccomp/yashigani.json) so both Docker
      # Compose and native Podman-compose (podman-compose 1.x / podman compose)
      # resolve the profile without path-doubling. The ./seccomp/... fallback is
      # correct for manual `docker compose up` from inside docker/ — Docker
      # Compose v2 resolves ./ relative to the compose file directory.
      # Override: set YASHIGANI_SECCOMP_PROFILE=unconfined if a host kernel
      # rejects the profile (non-standard kernels, nested virtualisation).
      - seccomp=${YASHIGANI_SECCOMP_PROFILE:-./seccomp/yashigani.json}
      # AppArmor default (Linux hosts with apparmor loaded).
      # Load once per host: sudo apparmor_parser -r docker/apparmor/yashigani-gateway
      # Override with YASHIGANI_APPARMOR_PROFILE=unconfined on hosts without
      # AppArmor (macOS, rootless Podman without profile loaded).
      - apparmor=${YASHIGANI_APPARMOR_PROFILE:-yashigani-gateway}
    # V232-CSCAN-01k-RES-01: align cap_drop with Helm (gateway.yaml:55-56).
    # No cap_add: gateway binds port 8080 (non-privileged).
    cap_drop: [ALL]
    depends_on:
      redis:
        condition: service_healthy
      policy:
        # OPA healthcheck disabled in compose (scratch image, podman-compose
        # CMD translation incompatibility — V232-SMOKE-003). Using service_started
        # instead; gateway fails-closed per-request if OPA unreachable.
        # K8s uses httpGet probe on port 8282 (policy.yaml readinessProbe).
        condition: service_started
      ollama:
        condition: service_healthy
      pgbouncer:
        condition: service_started
    healthcheck:
      # mTLS port now used — healthcheck uses the client cert inside the
      # container. Pattern A for Python ssl: trust anchor is the public ca_root.crt
      # (Py 3.12/OpenSSL 3.0 strict-chain rejects intermediate-only — gate #58a).
      test: ["CMD-SHELL", "python3 -c \"import ssl, urllib.request; c=ssl.create_default_context(cafile='/run/secrets/ca_root.crt'); c.load_cert_chain('/run/secrets/gateway_client.crt','/run/secrets/gateway_client.key'); urllib.request.urlopen('https://localhost:8080/healthz', context=c)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    # EX-231-10: gateway joins caddy_internal (Caddy→gateway:8080) AND data
    # (gateway→redis, policy, ollama, pgbouncer outbound).
    # Does NOT join obs or edge.
    # YSG-RISK-055 UA-10: gateway also joins all per-agent isolated bridges so
    # it can reach each agent on the registered-upstream dispatch path.
    # Agents cannot reach each other via these bridges (each bridge has only
    # the agent service + gateway as members).
    networks:
      - caddy_internal
      - data
      - langflow_isolated
      - letta_isolated
      - openclaw_isolated

  # ---------------------------------------------------------------------------
  # Backoffice — Admin control plane (generates first-run credentials)
  # ---------------------------------------------------------------------------
  backoffice:
    dns_search: ["."]
    image: yashigani/backoffice:${YASHIGANI_VERSION:-2.23.4}
    build:
      context: ..
      dockerfile: docker/Dockerfile.backoffice
    restart: unless-stopped
    mem_limit: ${YASHIGANI_BACKOFFICE_MEM_LIMIT:-1024m}
    cpus: ${YASHIGANI_BACKOFFICE_CPU_LIMIT:-1.0}
    environment:
      <<: *common-env
      YASHIGANI_SERVICE_NAME: backoffice
      REDIS_HOST: redis
      REDIS_PORT: "6380"             # TLS-only
      REDIS_USE_TLS: "true"
      # v2.23.2: OPA serves mTLS; backoffice uses internal_httpx_client (EX-231-01).
      YASHIGANI_OPA_URL: https://policy:8181
      YASHIGANI_ADMIN_USERNAME: ${YASHIGANI_ADMIN_USERNAME:-admin@yashigani.local}
      YASHIGANI_ADMIN_MIN_TOTAL: "2"
      YASHIGANI_ADMIN_MIN_ACTIVE: "2"
      YASHIGANI_ADMIN_SOFT_TARGET: "3"
      YASHIGANI_SECRETS_DIR: /run/secrets
      YASHIGANI_INSPECTION_DEFAULT_BACKEND: ${YASHIGANI_INSPECTION_DEFAULT_BACKEND:-ollama}
      # v2.2: gemini removed from default fallback to prevent unredacted content reaching
      # cloud providers before PII filtering. Admins who explicitly want cloud fallback
      # can set this var; ensure YASHIGANI_PII_MODE=redact or block first.
      YASHIGANI_INSPECTION_FALLBACK_CHAIN: ${YASHIGANI_INSPECTION_FALLBACK_CHAIN:-ollama,fail_closed}
      # Postgres via PgBouncer — TLS verify-ca + client cert.
      YASHIGANI_DB_DSN: postgresql://yashigani_app:${POSTGRES_PASSWORD_URLENC}@pgbouncer:5432/yashigani?sslmode=verify-ca&sslrootcert=/run/secrets/ca_root.crt&sslcert=/run/secrets/backoffice_client.crt&sslkey=/run/secrets/backoffice_client.key
      # v2.23.3 (B4 fix, PR #60): Direct-to-postgres DSN, bypassing pgbouncer.
      # Used ONLY by postgres_password rotation (ALTER USER requires a session-mode
      # postgres connection; pgbouncer transaction-pool mode blocks DDL across
      # connection hops). Helm sets this automatically via backoffice.yaml; this
      # line closes the Compose parity gap (Iris blocker 8, 2026-05-08).
      # POSTGRES_PASSWORD_URLENC is set by install.sh (URL-encoded postgres password).
      YASHIGANI_DB_DSN_DIRECT: postgresql://yashigani_app:${POSTGRES_PASSWORD_URLENC}@postgres:5432/yashigani?sslmode=verify-ca&sslrootcert=/run/secrets/ca_root.crt&sslcert=/run/secrets/backoffice_client.crt&sslkey=/run/secrets/backoffice_client.key
      YASHIGANI_DEPLOYMENT_STREAM: ${YASHIGANI_DEPLOYMENT_STREAM:-opensource}
      OWUI_API_URL: http://open-webui:8080
      # OWUI_SECRET_KEY is required — install.sh generates a fresh random
      # value and writes it to docker/.env. No fallback default here
      # (Pentest finding #4, fail-closed). If unset the container will
      # fail to start with a clear error rather than run with a
      # publicly-known secret.
      OWUI_SECRET_KEY: ${OWUI_SECRET_KEY:?OWUI_SECRET_KEY must be set in docker/.env — run install.sh to generate}
      YASHIGANI_TLS_DOMAIN: ${YASHIGANI_TLS_DOMAIN:-localhost}
      # SSO 2FA — require Yashigani TOTP after IdP authentication
      YASHIGANI_SSO_2FA_REQUIRED: ${YASHIGANI_SSO_2FA_REQUIRED:-false}
      # SSO IdP configuration — up to 10 IdPs via env vars
      # OIDC format: YASHIGANI_IDP_<N>_ID, _NAME, _PROTOCOL, _DISCOVERY_URL,
      #              _CLIENT_ID, _CLIENT_SECRET, _EMAIL_DOMAINS, _REDIRECT_URI
      # SAML format: above + _ENTITY_ID, _SAML_IDP_SSO_URL, _SAML_IDP_SLS_URL,
      #              _SAML_IDP_X509_CERT, _SAML_SP_SLS_URL,
      #              _SAML_SP_PRIVATE_KEY (RSA only), _SAML_SP_CERT
      YASHIGANI_IDP_1_ID: ${YASHIGANI_IDP_1_ID:-}
      YASHIGANI_IDP_1_NAME: ${YASHIGANI_IDP_1_NAME:-}
      YASHIGANI_IDP_1_PROTOCOL: ${YASHIGANI_IDP_1_PROTOCOL:-}
      YASHIGANI_IDP_1_DISCOVERY_URL: ${YASHIGANI_IDP_1_DISCOVERY_URL:-}
      YASHIGANI_IDP_1_CLIENT_ID: ${YASHIGANI_IDP_1_CLIENT_ID:-}
      YASHIGANI_IDP_1_CLIENT_SECRET: ${YASHIGANI_IDP_1_CLIENT_SECRET:-}
      YASHIGANI_IDP_1_EMAIL_DOMAINS: ${YASHIGANI_IDP_1_EMAIL_DOMAINS:-}
      YASHIGANI_IDP_1_REDIRECT_URI: ${YASHIGANI_IDP_1_REDIRECT_URI:-}
      YASHIGANI_IDP_2_ID: ${YASHIGANI_IDP_2_ID:-}
      YASHIGANI_IDP_2_NAME: ${YASHIGANI_IDP_2_NAME:-}
      YASHIGANI_IDP_2_PROTOCOL: ${YASHIGANI_IDP_2_PROTOCOL:-}
      YASHIGANI_IDP_2_DISCOVERY_URL: ${YASHIGANI_IDP_2_DISCOVERY_URL:-}
      YASHIGANI_IDP_2_CLIENT_ID: ${YASHIGANI_IDP_2_CLIENT_ID:-}
      YASHIGANI_IDP_2_CLIENT_SECRET: ${YASHIGANI_IDP_2_CLIENT_SECRET:-}
      YASHIGANI_IDP_2_EMAIL_DOMAINS: ${YASHIGANI_IDP_2_EMAIL_DOMAINS:-}
      YASHIGANI_IDP_2_REDIRECT_URI: ${YASHIGANI_IDP_2_REDIRECT_URI:-}
      YASHIGANI_IDP_2_ENTITY_ID: ${YASHIGANI_IDP_2_ENTITY_ID:-}
      YASHIGANI_IDP_2_SAML_IDP_SSO_URL: ${YASHIGANI_IDP_2_SAML_IDP_SSO_URL:-}
      YASHIGANI_IDP_2_SAML_IDP_SLS_URL: ${YASHIGANI_IDP_2_SAML_IDP_SLS_URL:-}
      YASHIGANI_IDP_2_SAML_IDP_X509_CERT: ${YASHIGANI_IDP_2_SAML_IDP_X509_CERT:-}
      YASHIGANI_IDP_2_SAML_SP_SLS_URL: ${YASHIGANI_IDP_2_SAML_SP_SLS_URL:-}
      YASHIGANI_IDP_2_SAML_SP_PRIVATE_KEY: ${YASHIGANI_IDP_2_SAML_SP_PRIVATE_KEY:-}
      YASHIGANI_IDP_2_SAML_SP_CERT: ${YASHIGANI_IDP_2_SAML_SP_CERT:-}
      # M-01 fix: backoffice also exports OTLP traces to the collector via mTLS.
      # Pattern A for Python ssl: anchor on the public ca_root.crt — Python OTEL
      # exporter goes through Python ssl (gate #58a evidence, 2026-04-28).
      OTEL_EXPORTER_OTLP_ENDPOINT: grpcs://otel-collector:4317
      OTEL_EXPORTER_OTLP_CERTIFICATE: /run/secrets/ca_root.crt
      OTEL_EXPORTER_OTLP_CLIENT_CERTIFICATE: /run/secrets/backoffice_client.crt
      OTEL_EXPORTER_OTLP_CLIENT_KEY: /run/secrets/backoffice_client.key
      # EX-231-10 Layer B — per-install shared secret for X-Caddy-Verified-Secret
      # verification. the gateway/backoffice middleware reads this at lifespan startup and rejects
      # requests that do not carry the matching header value.
      CADDY_INTERNAL_HMAC: ${CADDY_INTERNAL_HMAC:?run install.sh to generate caddy_internal_hmac}
      # v2.23.2 #47 — Backup status + verify: mount host backups dir read-only.
      # Python reads from this path; install.sh and update.sh write to
      # ${INSTALL_DIR}/backups on the host. The :ro flag prevents the
      # backoffice container from modifying backup files.
      YASHIGANI_BACKUPS_DIR: /data/backups
      # v2.23.3 (#60 fix) — AES-256 key for pgcrypto pgp_sym_encrypt (W6/B2).
      # install.sh writes this to docker/.env via _write_aes_key_to_env(); the
      # value must also appear in the container environment block so Compose
      # passes it through into the running container. Helm sources this from
      # the yashigani-backoffice-secrets Secret (backoffice.yaml:222).
      # Missing key → RuntimeError at lifespan startup (fail-closed per SOP 1).
      YASHIGANI_DB_AES_KEY: ${YASHIGANI_DB_AES_KEY:?YASHIGANI_DB_AES_KEY must be set — run install.sh to generate}
      # v2.23.2 fix — SSRF guard hostname allowlist (TM-V231-004 / Pentest #95).
      # _assert_safe_upstream_url() blocks loopback/RFC1918/link-local by default.
      # These three Compose service names are the canonical Yashigani-internal agent
      # bundle hostnames; they resolve to Docker-bridge IPs on the `data` network.
      # Adding a hostname here means trusting that host as a legitimate internal mesh
      # service — the SSRF guard still blocks all other private IPs and all non-HTTP(S)
      # schemes. Agent registration remains admin-gated (TOTP step-up + audit log).
      # TM trade-off: TA-3 (insider admin SSRF) / TA-2 (admin compromise) — attacker
      # who can both compromise an admin account AND point the `langflow`, `letta`, or
      # `openclaw` hostname to a private IP bypasses the IP-class check. Compensating
      # controls: TOTP step-up on every registration, OPA-gated invocation, audit trail.
      # Operators extending with custom agents: append comma-separated names to this value.
      # Example: YASHIGANI_AGENT_UPSTREAM_HOSTNAMES=langflow,letta,openclaw,custom-agent
      YASHIGANI_AGENT_UPSTREAM_HOSTNAMES: "langflow,letta,openclaw"
    volumes:
      - audit_data:/data/audit
      - bootstrap_data:/data/bootstrap
      # v2.23.2 #47 — Backup directory mount (read-only — backoffice reads, never writes).
      - ${INSTALL_DIR:-..}/backups:/data/backups:ro
      # LIC-007 / LIC-012 (v2.24.0 DEFERRED): This mount is writable because
      # write_docker_secrets() writes admin credentials + license_key here during
      # bootstrap. After bootstrap, license_key should be chmod 0400. The trivial
      # fix (chmod in write_docker_secrets() post-write) is Tom Group 5.1.
      # Schema-split (separate :ro PKI mount + writable bootstrap mount) = LIC-012
      # for v2.24.0. K8s is already protected: backoffice.yaml initContainer runs
      # chmod 0400 on all /secrets-rw/* files including license_key.
      - ./secrets:/run/secrets
      # Internal mTLS — runtime manifest (with per-install bootstrap_token_sha256 values).
      # Source: docker/var/runtime/service_identities.yaml (gitignored, populated by install.sh).
      - ./var/runtime/service_identities.yaml:/etc/yashigani/service_identities.yaml:ro
    read_only: true
    tmpfs:
      - /tmp:size=100M
      - /var/log/yashigani:size=50M
    security_opt:
      - no-new-privileges:true
      # Seccomp + AppArmor default (Pentest finding #2 — enabled in v2.23.1).
      # See gateway service above for path resolution and override documentation.
      - seccomp=${YASHIGANI_SECCOMP_PROFILE:-./seccomp/yashigani.json}
      # Backoffice shares the gateway AppArmor profile (same Python/FastAPI
      # surface). A dedicated yashigani-backoffice profile may ship later.
      - apparmor=${YASHIGANI_APPARMOR_PROFILE:-yashigani-gateway}
    # V232-CSCAN-01k-RES-01: align cap_drop with Helm (backoffice.yaml:104-105).
    # No cap_add: backoffice binds port 8443 (non-privileged).
    cap_drop: [ALL]
    healthcheck:
      # mTLS — Pattern A for Python ssl: trust anchor is the public ca_root.crt
      # (Py 3.12/OpenSSL 3.0 strict-chain rejects intermediate-only — gate #58a).
      test: ["CMD-SHELL", "python3 -c \"import ssl, urllib.request; c=ssl.create_default_context(cafile='/run/secrets/ca_root.crt'); c.load_cert_chain('/run/secrets/backoffice_client.crt','/run/secrets/backoffice_client.key'); urllib.request.urlopen('https://localhost:8443/healthz', context=c)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    # EX-231-10: backoffice joins caddy_internal (Caddy→backoffice:8443) AND
    # data (backoffice→redis, policy, ollama, pgbouncer outbound).
    # Does NOT join obs or edge.
    networks:
      - caddy_internal
      - data

  # ---------------------------------------------------------------------------
  # Open WebUI — User-facing chat interface (v1.0)
  # Internal network only. No external port. All LLM calls route through gateway.
  # Auth: trusts X-Forwarded-User from Caddy (SSO) or API key passthrough.
  #
  # DEPRECATED (v2.23.2): Open WebUI integration is sunsetting. Yashigani's own
  # built-in UI ships in v2.24.0. This service is opt-in (docker compose
  # --profile openwebui) and will be removed in v2.24.0. Administrators should
  # plan migration before upgrading. No image bump will be applied.
  # ---------------------------------------------------------------------------
  open-webui:
    dns_search: ["."]
    image: ghcr.io/open-webui/open-webui:v0.9.2@sha256:a7e4796ae894d1e2a0c1824860ade472f35c507608a01c3581377b5c19b0ed49
    restart: unless-stopped
    mem_limit: ${YASHIGANI_OPENWEBUI_MEM_LIMIT:-2048m}
    cpus: ${YASHIGANI_OPENWEBUI_CPU_LIMIT:-1.0}
    # Captain Bucket-C: entrypoint shim reads YASHIGANI_INTERNAL_BEARER from
    # /run/secrets/yashigani_internal_bearer and exports it as OPENAI_API_KEY
    # before exec-ing the upstream image CMD (bash start.sh — verified via
    # `docker inspect ghcr.io/open-webui/open-webui:v0.9.2`).
    # open-webui does not support *_FILE env convention; shim is required.
    entrypoint:
      - /bin/sh
      - -c
      - 'OPENAI_API_KEY=$(cat /run/secrets/yashigani_internal_bearer) && export OPENAI_API_KEY && exec "$@"'
      - '--'
    command: ["bash", "start.sh"]
    environment:
      # Disable Open WebUI's own auth — Caddy/Yashigani handles identity
      WEBUI_AUTH: "false"
      WEBUI_AUTH_TRUSTED_EMAIL_HEADER: "X-Forwarded-User"
      WEBUI_AUTH_TRUSTED_NAME_HEADER: "X-Forwarded-Name"
      ENABLE_SIGNUP: "true"
      # Secret key for JWT signing — allows programmatic API access.
      # Fail-closed: MUST be set in docker/.env (install.sh generates it).
      WEBUI_SECRET_KEY: ${OWUI_SECRET_KEY:?OWUI_SECRET_KEY must be set in docker/.env — run install.sh to generate}
      # Point ALL inference at Yashigani gateway — OpenAI-compatible
      # BUG-2 (v2.23.4): gateway:8080 is mTLS-only (ssl.CERT_REQUIRED).
      # Route Open WebUI through gateway's internal mesh port (8081, plain HTTP,
      # data-network-only). Network isolation on `data` bridge is the transport
      # guard; AgentAuthMiddleware enforces token auth at the app layer.
      OPENAI_API_BASE_URL: http://gateway:8081/v1
      # OPENAI_API_KEY is injected by the entrypoint shim from
      # /run/secrets/yashigani_internal_bearer — do NOT set it here.
      # Disable direct Ollama access — everything through gateway
      OLLAMA_BASE_URL: ""
      ENABLE_OLLAMA_API: "false"
      # UI settings
      DEFAULT_MODELS: "qwen2.5:3b"
      WEBUI_NAME: "Yashigani AI — Powered by Open WebUI"
      # BUG-3 (v2.23.4): Route RAG embeddings through Ollama to eliminate the
      # HuggingFace SentenceTransformer dependency.  HF_HUB_OFFLINE=1 makes
      # SentenceTransformer fail fast (LocalEntryNotFoundError) rather than
      # timing out against huggingface.co, but the error still fires on every
      # retrieval call.  Routing through Ollama (already available on the data
      # network) removes the dependency entirely.
      RAG_EMBEDDING_ENGINE: "ollama"
      RAG_OLLAMA_BASE_URL: "http://ollama:11434"
      # HuggingFace/external model offline flags — prevent startup download
      # attempts that time out against NetworkPolicy-blocked hosts.
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      HF_DATASETS_OFFLINE: "1"
      SCARF_NO_ANALYTICS: "true"
      DO_NOT_TRACK: "1"
      RAG_EMBEDDING_MODEL_AUTO_UPDATE: "false"
      SENTENCE_TRANSFORMERS_HOME: "/app/backend/data/cache/embedding/models"
    volumes:
      - openwebui_data:/app/backend/data
      # Captain Bucket-C: mount secrets dir so entrypoint shim can read
      # yashigani_internal_bearer at startup.
      - ./secrets:/run/secrets:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      gateway:
        condition: service_healthy
    read_only: true
    tmpfs:
      # YSG-RISK-008 (v2.23.4): /app/backend/data is a named volume (writable).
      # /tmp needed for Python/FastAPI runtime temp files.
      # /var/cache needed by Python package runtime.
      - /tmp:size=128m,mode=1777
      - /var/cache:size=32m,mode=0755
    security_opt:
      - no-new-privileges:true
    # V232-CSCAN-01k-RES-01: align cap_drop with Helm (open-webui.yaml:90,110).
    # No cap_add: open-webui binds port 8080 (non-privileged).
    cap_drop: [ALL]
    # YSG-SECRETS-DIST-002 CLOSED (Laura A1): open-webui UID 0 reads
    # yashigani_internal_bearer as file owner (host file chowned 0:2002 0640).
    # cap_drop:[ALL] drops DAC_OVERRIDE — UID 0 == file UID 0, so owner-read
    # applies without needing DAC_OVERRIDE. GID 2002 removed from this service.
    # EX-231-10 (v2.23.4 BUG-1 fix): open-webui joins BOTH caddy_internal AND data.
    # caddy_internal — Caddy reverse-proxies TO open-webui:8080. Without this
    #   network, the DNS name "open-webui" is unresolvable from Caddy's namespace
    #   (502 on https://localhost:8443/ — Ava Track B finding 2026-05-17).
    # data — open-webui calls gateway:8081/v1 (internal mesh port, plain HTTP).
    #   gateway is on `data`; gateway:8081 is the mesh-only listener with no mTLS.
    # open-webui does NOT join obs (no metrics scraping needed).
    networks:
      - caddy_internal
      - data
    profiles:
      - openwebui

  # ---------------------------------------------------------------------------
  # Budget Redis — Dedicated Redis for budget counters (noeviction)
  # Separate from main Redis to prevent counter loss under memory pressure.
  # ---------------------------------------------------------------------------
  budget-redis:
    dns_search: ["."]
    image: docker.io/library/redis:7.4.9-alpine@sha256:286bd4264adb303147270bb2d735352497e950f7b73b2ca42364d63d7daf61ee
    # gate V232-SMOKE-018: redis:7-alpine has no USER directive (defaults to root).
    # With cap_drop: [ALL], root has no DAC_OVERRIDE → cannot read TLS keys
    # chowned to 999:999 by `_pki_chown_client_keys`. Pin to UID 999:999 (the
    # redis user image expects) so the chowned material is readable as owner.
    user: "999:999"
    restart: unless-stopped
    mem_limit: ${YASHIGANI_BUDGET_REDIS_MEM_LIMIT:-256m}
    cpus: ${YASHIGANI_BUDGET_REDIS_CPU_LIMIT:-0.25}
    entrypoint: ["sh", "-c"]
    # v2.23.1 — TLS-only port 6380 with client-cert auth; plaintext disabled.
    # trust anchor: ca_root.crt — libssl strict-mode (error:0A000086 with intermediate)
    command:
      - |
        redis-server \
          --port 0 \
          --tls-port 6380 \
          --tls-cert-file /run/secrets/budget-redis_client.crt \
          --tls-key-file /run/secrets/budget-redis_client.key \
          --tls-ca-cert-file /run/secrets/ca_root.crt \
          --tls-auth-clients yes \
          --tls-protocols "TLSv1.2 TLSv1.3" \
          --maxmemory-policy noeviction \
          --maxmemory 256mb \
          --requirepass "$(cat /run/secrets/redis_password)" \
          --appendonly yes
    volumes:
      - budget_redis_data:/data
      # YSG-SECRETS-DIST-002 CLOSED: blanket ./secrets mount retained for PKI
      # material (certs/keys). redis_password additionally mounted per-file so
      # budget-redis cannot read postgres_password or yashigani_internal_bearer.
      - ./secrets:/run/secrets:ro
      - ./secrets/redis_password:/run/secrets/redis_password:ro
    healthcheck:
      # trust anchor: ca_root.crt — libssl strict-mode (error:0A000086 with intermediate)
      test: ["CMD-SHELL", "redis-cli --tls --cert /run/secrets/budget-redis_client.crt --key /run/secrets/budget-redis_client.key --cacert /run/secrets/ca_root.crt -p 6380 -a \"$(cat /run/secrets/redis_password)\" ping 2>/dev/null | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    read_only: true
    tmpfs:
      # YSG-RISK-008 (v2.23.4): budget_redis_data:/data is a named volume.
      # /tmp needed for redis internal temp files. /run for PID file.
      - /tmp:size=32m,mode=1777
      - /run:size=8m,mode=0755
    security_opt:
      - no-new-privileges:true
    # V232-CSCAN-01k-RES-01: align cap_drop with Helm (budget-redis.yaml:49).
    # No cap_add: redis binds port 6380 (non-privileged).
    cap_drop: [ALL]
    # YSG-SECRETS-DIST-002 CLOSED (Laura A1): budget-redis UID 999 reads
    # redis_password as file owner (host file chowned 999:999 0600 by install.sh).
    # GID 2002 removed — per-file mount eliminates cross-secret read path.
    # EX-231-10: budget-redis is a data-plane dep of gateway/backoffice only.
    networks:
      - data

  # ---------------------------------------------------------------------------
  # Policy — OPA (Open Policy Agent) — always local, never cloud-delegated
  # ---------------------------------------------------------------------------
  policy:
    dns_search: ["."]
    image: docker.io/openpolicyagent/opa:1.16.1@sha256:c6f9910d5e982df13fa4c65f02cfa7f65f9cfdbef9fbaf80d6547f840294aa02
    restart: unless-stopped
    mem_limit: ${YASHIGANI_POLICY_MEM_LIMIT:-256m}
    cpus: ${YASHIGANI_POLICY_CPU_LIMIT:-0.25}
    # v2.23.2: OPA now serves mTLS on port 8181 using its own leaf cert
    # (policy_client.crt / policy_client.key signed by the internal CA).
    # All Python callers updated to use internal_httpx_client (EX-231-01 closed).
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--diagnostic-addr=0.0.0.0:8282"
      - "--log-level=error"
      - "--tls-cert-file=/run/secrets/policy_client.crt"
      - "--tls-private-key-file=/run/secrets/policy_client.key"
      - "--tls-ca-cert-file=/run/secrets/ca_root.crt"
      - "/policies"
    volumes:
      - ../policy:/policies:ro
      - ../policy/data:/policies/data:ro
      - ./secrets:/run/secrets:ro
    healthcheck:
      # OPA image is scratch-based: only /opa binary, no shell, no curl, no wget.
      # podman-compose 1.0.6 translates CMD form to /bin/sh -c which fails on
      # scratch images (V232-SMOKE-003). There is no exec-form healthcheck that
      # works on both Docker Engine and podman-compose without shell.
      # Mitigation: disable compose healthcheck. OPA liveness is verified at the
      # K8s layer via httpGet probe against port 8282 (policy.yaml readinessProbe).
      # In compose, gateway uses condition: service_started (not service_healthy)
      # and fails-closed per request if OPA is unreachable (deny by default).
      # Healthcheck is re-enabled in K8s only.
      disable: true
    read_only: true
    # YSG-RISK-008 (v2.23.4): OPA is scratch-based — all state is in-memory.
    # Policy files are read-only mounts. No tmpfs required: OPA writes nothing
    # to filesystem during normal operation.
    # YSG-RISK-008: no-new-privileges hardening (v2.23.4).
    security_opt:
      - no-new-privileges:true
    # V232-CSCAN-01k-RES-01: align cap_drop with Helm (policy.yaml:36).
    # No cap_add: OPA binds ports 8181/8282 (non-privileged).
    cap_drop: [ALL]
    # EX-231-10: OPA is a data-plane dep only. Never needs to reach caddy_internal.
    networks:
      - data

  # ---------------------------------------------------------------------------
  # Redis — session store + TOTP provisioning tokens + rate limiter counters
  # ---------------------------------------------------------------------------
  redis:
    dns_search: ["."]
    image: docker.io/library/redis:7.4.9-alpine@sha256:286bd4264adb303147270bb2d735352497e950f7b73b2ca42364d63d7daf61ee
    # gate V232-SMOKE-018 — see budget-redis above for rationale.
    user: "999:999"
    restart: unless-stopped
    mem_limit: ${YASHIGANI_REDIS_MEM_LIMIT:-256m}
    cpus: ${YASHIGANI_REDIS_CPU_LIMIT:-0.25}
    # v2.23.1 — plaintext 6379 disabled (port 0), TLS-only on 6380 with
    # client-cert auth (tls-auth-clients yes). Clients connect via rediss://.
    # trust anchor: ca_root.crt — libssl strict-mode (error:0A000086 with intermediate)
    command: >
      sh -c 'redis-server
      --port 0
      --tls-port 6380
      --tls-cert-file /run/secrets/redis_client.crt
      --tls-key-file /run/secrets/redis_client.key
      --tls-ca-cert-file /run/secrets/ca_root.crt
      --tls-auth-clients yes
      --tls-protocols "TLSv1.2 TLSv1.3"
      --save ""
      --appendonly no
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass "$$(cat /run/secrets/redis_password)"'
    volumes:
      - redis_data:/data
      # YSG-SECRETS-DIST-002 CLOSED: blanket ./secrets mount retained for PKI
      # material (certs/keys). redis_password additionally mounted per-file so
      # redis cannot read postgres_password or yashigani_internal_bearer.
      - ./secrets:/run/secrets:ro
      - ./secrets/redis_password:/run/secrets/redis_password:ro
    healthcheck:
      # redis-cli over TLS with our client cert.
      # trust anchor: ca_root.crt — libssl strict-mode (error:0A000086 with intermediate)
      # P-9 fix: list form (not YAML block scalar) to avoid trailing-newline in
      # CMD-SHELL string when parsed by podman-compose 1.5.0.
      test: ["CMD-SHELL", "redis-cli --tls --cert /run/secrets/redis_client.crt --key /run/secrets/redis_client.key --cacert /run/secrets/ca_root.crt -p 6380 -a \"$$(cat /run/secrets/redis_password)\" ping 2>/dev/null | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    # No depends_on — redis_password is written by the installer to docker/secrets/
    # before compose starts. Removed backoffice dependency to break cycle.
    read_only: true
    tmpfs:
      # YSG-RISK-008 (v2.23.4): redis_data:/data is a named volume (writable).
      # /tmp needed for redis internal temp files. /run for PID file.
      - /tmp:size=32m,mode=1777
      - /run:size=8m,mode=0755
    # YSG-RISK-008: no-new-privileges hardening (v2.23.4).
    security_opt:
      - no-new-privileges:true
    # V232-CSCAN-01k-RES-01: align cap_drop with Helm (redis.yaml:51).
    # No cap_add: redis binds port 6380 (non-privileged).
    cap_drop: [ALL]
    # YSG-SECRETS-DIST-002 CLOSED (Laura A1): redis UID 999 reads
    # redis_password as file owner (host file chowned 999:999 0600 by install.sh).
    # GID 2002 removed — per-file mount eliminates cross-secret read path.
    # EX-231-10: redis is a data-plane dep only.
    networks:
      - data

  # ---------------------------------------------------------------------------
  # Ollama — local LLM inference (never a cloud call for security classification)
  # ---------------------------------------------------------------------------
  ollama:
    dns_search: ["."]
    image: docker.io/ollama/ollama:0.23.1@sha256:6077dbbd6508dce8973f8b91c30d8026b1279ab0483e15f0dfad469dba676c2f
    # gate V232-SMOKE-018: bbd556e set user: "1000:1000" with HOME=/data
    # (verified working on macOS Podman where vfs initialises the volume
    # owned by the caller UID). On Linux Docker, named volumes are
    # root-owned at creation time; UID 1000 cannot mkdir /data/.ollama.
    # Reverting to root inside the container — cap_drop: [ALL] below
    # remains the security boundary (no DAC_OVERRIDE / SETUID / etc).
    user: "0:0"
    restart: unless-stopped
    mem_limit: ${YASHIGANI_OLLAMA_MEM_LIMIT:-4096m}
    cpus: ${YASHIGANI_OLLAMA_CPU_LIMIT:-2.0}
    volumes:
      # ollama_data mounted at /root/.ollama — the standard ollama-in-container path.
      # Ollama writes models, node identity, and partials all under ~/.ollama (= /root/.ollama
      # because user:0:0). Earlier override redirected via OLLAMA_MODELS env to /data/models
      # without moving the volume, which left model partials trying to write to a tmpfs at
      # /root/.ollama (8MB) → "no space left on device" on pull. Aligning volume + default
      # path makes models persist across container restarts and removes the env-redirect.
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: "0.0.0.0"
    healthcheck:
      # ollama image has no curl/wget — use bash /dev/tcp to check port
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/11434' 2>/dev/null"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s
    read_only: true
    tmpfs:
      # /tmp needed for model decompression staging during pulls (1777 standard for /tmp).
      # No /root/.ollama tmpfs — it's now the named-volume mount above (persistent models).
      - /tmp:size=512m,mode=1777
    # YSG-RISK-008: no-new-privileges hardening (v2.23.4).
    security_opt:
      - no-new-privileges:true
    # V232-CSCAN-01k-RES-01: align cap_drop with Helm (ollama.yaml:42).
    # No cap_add: ollama binds port 11434 (non-privileged).
    cap_drop: [ALL]
    # EX-231-10: ollama is a data-plane dep. Joins `data` for gateway/backoffice
    # calls and `edge` for model pulls from registry.ollama.ai (needs internet).
    networks:
      - data
      - edge    # Required for model pulls from registry.ollama.ai
    # Uncomment for NVIDIA GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # Model bootstrap — pull default LLM model when any AI workload is enabled.
  # Gated on profiles: [openwebui, langflow, letta, openclaw] — runs when any
  # of these profiles is active (SF-011 fix 2026-05-19: was openwebui-only,
  # which left agent-bundle installs with 0 models and HTTP 404 on chat).
  # Model: qwen2.5:3b (1.9 GB, Qwen 2.5 3B-parameter instruct, available on
  # registry.ollama.ai). Override via OLLAMA_MODEL env var in docker/.env.
  # Digest check guards against supply-chain substitution (SOL-SC-03).
  ollama-init:
    dns_search: ["."]
    image: docker.io/ollama/ollama:0.23.1@sha256:6077dbbd6508dce8973f8b91c30d8026b1279ab0483e15f0dfad469dba676c2f
    # gate V232-SMOKE-018 — same rationale as `ollama` service above.
    user: "0:0"
    restart: on-failure:3
    # mem_limit: 256m is sufficient — the init container is a thin CLI client;
    # it sends an HTTP pull request to ollama:11434 and streams the model there.
    # The 1.9 GB model data is written to the ollama volume, not into this container.
    mem_limit: ${YASHIGANI_OLLAMA_INIT_MEM_LIMIT:-256m}
    cpus: ${YASHIGANI_OLLAMA_INIT_CPU_LIMIT:-0.25}
    environment:
      # OLLAMA_MODEL: defaults to qwen2.5:3b. install.sh writes this to .env
      # when --with-openwebui is used; agent-bundle installs rely on this default.
      # Operators may override in docker/.env.
      # OLLAMA_MODEL_DIGEST: short SHA for supply-chain digest verification.
      # Set to "skip" to bypass (e.g. after an upstream model update).
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
      OLLAMA_MODEL_DIGEST: ${OLLAMA_MODEL_DIGEST:-357c53fb659c}
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        until </dev/tcp/ollama/11434 2>/dev/null; do
          echo "waiting for ollama..."; sleep 3
        done
        echo "ollama is ready, checking disk space..."
        # Disk-space pre-check: require ≥3 GB free on the ollama data volume.
        # The model (qwen2.5:3b) is 1.9 GB; 3 GB leaves headroom for staging.
        # Uses df on /data (the ollama volume mount) in 1K blocks.
        AVAIL_KB=$$(df -k /data 2>/dev/null | awk 'NR==2{print $$4}')
        REQUIRED_KB=3145728  # 3 GB in KB
        if [ -n "$$AVAIL_KB" ] && [ "$$AVAIL_KB" -lt "$$REQUIRED_KB" ]; then
          AVAIL_GB=$$(( AVAIL_KB / 1024 / 1024 ))
          echo "WARNING: Ollama volume has only ~$$AVAIL_GB GB free (need ≥3 GB for model pull)."
          echo "Skipping model pull to avoid failed install. Free space on the docker volume and re-run install.sh."
          exit 0
        fi
        echo "Disk space OK ($$AVAIL_KB KB free). Pulling model..."
        OLLAMA_HOST=http://ollama:11434 ollama pull "${OLLAMA_MODEL:-qwen2.5:3b}"
        # Verify model digest — detect tampered/poisoned models (SOL-SC-03)
        EXPECTED_DIGEST="${OLLAMA_MODEL_DIGEST:-357c53fb659c}"
        ACTUAL_DIGEST=$$(OLLAMA_HOST=http://ollama:11434 ollama list | grep "${OLLAMA_MODEL:-qwen2.5:3b}" | awk '{print $$2}')
        if [ -n "$$EXPECTED_DIGEST" ] && [ "$$EXPECTED_DIGEST" != "skip" ]; then
          if echo "$$ACTUAL_DIGEST" | grep -q "$$EXPECTED_DIGEST"; then
            echo "Model digest verified: $$ACTUAL_DIGEST"
          else
            echo "WARNING: Model digest mismatch! Expected=$$EXPECTED_DIGEST Actual=$$ACTUAL_DIGEST"
            echo "This may indicate a tampered or updated model. Set OLLAMA_MODEL_DIGEST=skip to bypass."
            exit 1
          fi
        fi
        echo "Model pull complete: ${OLLAMA_MODEL:-qwen2.5:3b}"
    depends_on:
      ollama:
        condition: service_healthy
    read_only: true
    tmpfs:
      # YSG-RISK-008 (v2.23.4): ollama-init is a one-shot pull job.
      # /tmp needed for download staging before writing to ollama:/data via HTTP.
      - /tmp:size=512m,mode=1777
    # YSG-RISK-008: no-new-privileges hardening (v2.23.4).
    security_opt:
      - no-new-privileges:true
    # V232-CSCAN-01k-RES-01: defence-in-depth — Helm counterpart is the
    # ollama-init Job in helm/yashigani/templates/ollama.yaml (gated on
    # openWebui.enabled OR any agentBundles.*.enabled — SF-011 parity fix).
    # No cap_add: no privileged-port binding.
    cap_drop: [ALL]
    # EX-231-10: ollama-init needs data (ollama DNS) + edge (model pull).
    networks:
      - data
      - edge    # Required for model registry DNS resolution
    # SF-011 fix (2026-05-19): ollama-init must also run when agent bundles
    # (langflow, letta, openclaw) are active without --with-openwebui.
    # The gateway DEFAULT_MODELS env defaults to qwen2.5:3b for ALL inference;
    # without the model pulled, /v1/chat/completions returns HTTP 404
    # "model not found" for all agent-bundle workloads regardless of auth.
    # Root cause: ollama-init was gated on `openwebui` only, so
    # `--agent-bundles langflow,letta` with no `--with-openwebui` never ran
    # it → 0 models in ollama → 404 on every chat call.
    # Fix: add all agent-bundle profiles so ollama-init runs whenever any
    # AI workload that needs the model is active.
    profiles:
      - openwebui
      - langflow
      - letta
      - openclaw

  # ---------------------------------------------------------------------------
  # Prometheus — metrics collection
  # Exposed externally only via Caddy /metrics-federate (basic auth)
  # ---------------------------------------------------------------------------
  prometheus:
    dns_search: ["."]
    image: docker.io/prom/prometheus:v3.11.3@sha256:e4254400b85610324913f0dc4acf92603d9984e7519414c5a12811aa6146acc3
    restart: unless-stopped
    mem_limit: ${YASHIGANI_PROMETHEUS_MEM_LIMIT:-1024m}
    cpus: ${YASHIGANI_PROMETHEUS_CPU_LIMIT:-0.5}
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}"
      - "--web.enable-remote-write-receiver"
      - "--web.listen-address=0.0.0.0:9090"
      # retro #83: enable TLS on Prometheus port 9090 (Pattern B mTLS).
      # Grafana datasource calls now use https://prometheus:9090 with mutual TLS.
      - "--web.config.file=/etc/prometheus/web-config.yml"
    # Internal security finding (EX-231-10 closure): Prometheus runs as uid 65534
    # (nobody) but needs to read prometheus_client.{crt,key} from /run/secrets.
    # Fix: add GID 1001 (yashigani app group) so Prometheus can read the
    # 0640/group-1001 key file without making it world-readable.
    # install.sh _pki_chown_client_keys chowns prometheus_client.key to
    # 1001:1001 0640 and prometheus_client.crt to 1001:1001 0644.
    group_add:
      - "1001"
    volumes:
      - ../config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../config/prometheus_alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
      # v2.23.1 EX-231-08 (+ #81): Prometheus presents its leaf cert to Caddy's
      # :8444 (gateway) + :8445 (backoffice) listeners for SPIFFE-URI-gated
      # scrapes of /internal/metrics. Split-listener design replaced the prior
      # Host-header matcher (Prom v3 forbids setting Host via http_headers).
      # retro #83: web-config.yml enables TLS + mTLS on port 9090 so Grafana
      # → Prometheus datasource calls use mutual TLS (Pattern B).
      - ../config/prometheus-web-config.yml:/etc/prometheus/web-config.yml:ro
      - ./secrets:/run/secrets:ro
    healthcheck:
      # v2.23.3 RETRO-V233-001: prometheus enables RequireAndVerifyClientCert
      # (prometheus-web-config.yml). wget --no-check-certificate skips server
      # cert validation but CANNOT present a client cert (BusyBox wget has no
      # --certificate / --private-key flags). Result: TLS alert 70 (cert_unknown)
      # → healthcheck permanently fails → grafana/alertmanager blocked by
      # condition: service_healthy → compose deadlock in sequential mode.
      # Fix: use nc -z TCP probe (port-open check). nc is present in the prom
      # base image (BusyBox). TCP connect succeeds without a TLS handshake so
      # RequireAndVerifyClientCert is irrelevant. Prometheus is functionally
      # healthy if port 9090 is listening.
      test: ["CMD", "nc", "-z", "localhost", "9090"]
      interval: 15s
      timeout: 5s
      retries: 3
    read_only: true
    tmpfs:
      # YSG-RISK-008 (v2.23.4): prometheus_data:/prometheus is a named volume.
      # /tmp needed for TSDB write-ahead staging and BusyBox shell temp files.
      - /tmp:size=64m,mode=1777
    # YSG-RISK-008: no-new-privileges hardening (v2.23.4).
    security_opt:
      - no-new-privileges:true
    # V232-CSCAN-01k-RES-01: align cap_drop with Helm (prometheus.yaml:116).
    # No cap_add: prometheus binds port 9090 (non-privileged).
    cap_drop: [ALL]
    # EX-231-10: prometheus scrapes gateway/backoffice VIA Caddy (:8444/:8445).
    # Must be on `obs` (same network as Caddy). Does NOT join `data`.
    # Caddy also joins `obs`, so Prometheus can resolve `caddy` by name here.
    networks:
      - obs

  # ---------------------------------------------------------------------------
  # Grafana — dashboards and alerting
  # Admin password auto-generated at bootstrap (check backoffice logs)
  # ---------------------------------------------------------------------------
  grafana:
    dns_search: ["."]
    image: docker.io/grafana/grafana:13.0.1@sha256:0f86bada30d65ef9d0183b90c1e2682ac92d53d95da8bed322b984ea78a4a73a
    restart: unless-stopped
    mem_limit: ${YASHIGANI_GRAFANA_MEM_LIMIT:-512m}
    cpus: ${YASHIGANI_GRAFANA_CPU_LIMIT:-0.25}
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-grafana-admin}
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_SERVER_ROOT_URL: "https://${YASHIGANI_TLS_DOMAIN}/admin/grafana"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      # retro #83: Grafana ingress mTLS.
      # Grafana serves HTTPS on port 3443. Caddy proxies /admin/grafana/* over
      # mTLS using import internal-mtls (caddy_client.crt → ca_intermediate verify).
      # TA-3 (network observer): without server TLS on Grafana, HTTPS only
      # existed from the browser → Caddy; the Caddy → Grafana leg was plaintext
      # HTTP on the obs bridge network. Any process on that bridge could read
      # dashboard session traffic. mTLS closes both eavesdrop and MITM.
      GF_SERVER_PROTOCOL: "https"
      GF_SERVER_HTTP_PORT: "3443"
      GF_SERVER_CERT_FILE: "/run/secrets/grafana_client.crt"
      GF_SERVER_CERT_KEY: "/run/secrets/grafana_client.key"
      # YSG-RISK-008: force console-only logging so /var/log/grafana is not needed
      # (avoids a second tmpfs mount; structured logs remain visible in docker logs).
      GF_LOG_MODE: "console"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./secrets:/run/secrets:ro
    healthcheck:
      # retro #83: Grafana now serves HTTPS on 3443. wget --no-check-certificate
      # skips CA verification for localhost-only healthcheck (no SPIFFE needed).
      test: ["CMD-SHELL", "wget -qO- --no-check-certificate https://localhost:3443/api/health | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      prometheus:
        condition: service_healthy
      backoffice:
        condition: service_healthy
    read_only: true
    tmpfs:
      # YSG-RISK-008 (v2.23.4): grafana_data:/var/lib/grafana is a named volume.
      # /tmp for Go/Grafana runtime temp files.
      # /var/log/grafana needed if GF_LOG_MODE includes file (default includes console).
      # Set GF_LOG_MODE=console to avoid needing /var/log/grafana tmpfs.
      - /tmp:size=64m,mode=1777
    # YSG-RISK-008: no-new-privileges hardening (v2.23.4).
    security_opt:
      - no-new-privileges:true
    # V232-CSCAN-01k-RES-01: align cap_drop with Helm (grafana.yaml:41).
    # No cap_add: grafana binds port 3000 (non-privileged).
    cap_drop: [ALL]
    # EX-231-10: grafana is obs-plane only.
    networks:
      - obs

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — primary durable store (tenants, audit, inference, RBAC)
  # ---------------------------------------------------------------------------
  postgres:
    dns_search: ["."]
    image: docker.io/pgvector/pgvector:0.8.2-pg16@sha256:7d400e340efb42f4d8c9c12c6427adb253f726881a9985d2a471bf0eed824dff
    # gate V232-SMOKE-018: pgvector/pgvector has no USER directive (defaults to
    # root). The postgres entrypoint then runs gosu/setpriv to switch from root
    # → postgres user, but `cap_drop: [ALL]` strips CAP_SETUID/SETGID/FOWNER —
    # the privilege drop fails with "operation not permitted". Pin to UID
    # 999:999 (the postgres user the entrypoint would have switched to) so the
    # entrypoint runs as the right uid from PID 1, no setuid dance needed.
    user: "999:999"
    restart: unless-stopped
    mem_limit: ${YASHIGANI_POSTGRES_MEM_LIMIT:-1024m}
    cpus: ${YASHIGANI_POSTGRES_CPU_LIMIT:-1.0}
    environment:
      POSTGRES_DB: yashigani
      POSTGRES_USER: yashigani_app
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Bind-mount host secrets directory directly (not the shared named volume).
      # Postgres starts before backoffice populates secrets_volume, so it needs
      # the installer-generated password file from disk immediately.
      # YSG-SECRETS-DIST-002 CLOSED: blanket ./secrets mount retained for PKI
      # material (certs/keys). postgres_password additionally mounted per-file so
      # postgres cannot read redis_password or yashigani_internal_bearer.
      - ./secrets:/run/secrets:ro
      - ./secrets/postgres_password:/run/secrets/postgres_password:ro
      # Init scripts run in alphabetical order — 05 must come before 10/11.
      # 05: TLS + client-cert verification on first initdb.
      # 10: pgbouncer_authenticator role + ysg_pgbouncer_get_auth function (YSG-RISK-049 close).
      # 11: create agent databases (letta, langflow).
      # 10 runs before 11 — pgbouncer_authenticator role is cluster-global and must exist
      # before agent-db init scripts attempt any auth-adjacent operations.
      - ./postgres/05-enable-ssl.sh:/docker-entrypoint-initdb.d/05-enable-ssl.sh:ro
      - ./postgres/10-pgbouncer-auth.sh:/docker-entrypoint-initdb.d/10-pgbouncer-auth.sh:ro
      - ./postgres/init-agent-dbs.sh:/docker-entrypoint-initdb.d/11-agent-dbs.sh:ro
    healthcheck:
      # pg_isready over a local socket — doesn't need TLS.
      test: ["CMD-SHELL", "pg_isready -U yashigani_app -d yashigani"]
      interval: 10s
      timeout: 5s
      retries: 5
    # YSG-RISK-008 (v2.23.4): read_only skipped on compose path for postgres.
    # postgres needs writable /var/run/postgresql (unix-domain socket + PID lock file)
    # owned by uid 999 (postgres-in-container) with restrictive perms (e.g. 0755 or 0700).
    # podman-compose tmpfs short-form syntax does not accept `uid=`/`gid=` options,
    # and mode=1777 on a system socket directory is unacceptable per security review.
    # Compensating controls: cap_drop:[ALL] + no-new-privileges + user:999:999 +
    # seccomp profile on the application services that connect to postgres.
    # K8s path retains full readOnlyRootFilesystem via securityContext (uid mapping
    # works correctly there). See YSG-RISK-008 risk register entry for rationale.
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    # V232-CSCAN-01k-RES-01: align cap_drop with Helm (postgres.yaml:67).
    # No cap_add: postgres binds port 5432 (non-privileged).
    cap_drop: [ALL]
    # YSG-SECRETS-DIST-002 CLOSED (Laura A1): postgres UID 999 reads
    # postgres_password as file owner (host file chowned 999:999 0600 by install.sh).
    # cap_drop:[ALL] + user:999:999 — UID 999 == file UID 999, owner-read applies.
    # GID 2002 removed — per-file mount eliminates cross-secret read path.
    # EX-231-10: postgres is data-plane only.
    networks:
      - data

  # ---------------------------------------------------------------------------
  # PgBouncer — transaction-mode connection pooler
  # ---------------------------------------------------------------------------
  pgbouncer:
    image: docker.io/edoburu/pgbouncer:v1.25.1-p0@sha256:c7bfcaa24de830e29588bb9ad1eb39cebaf07c27149e1974445899b695634bb4
    # gate V232-SMOKE-018: edoburu/pgbouncer has USER pgbouncer (UID 70) but
    # the same cap_drop ALL constraint applies on init scripts. Pin
    # explicitly so the chowned client keys (70:70 by `_pki_chown_client_keys`)
    # are readable as owner without relying on image defaults.
    user: "70:70"
    restart: unless-stopped
    mem_limit: ${YASHIGANI_PGBOUNCER_MEM_LIMIT:-256m}
    cpus: ${YASHIGANI_PGBOUNCER_CPU_LIMIT:-0.25}
    # Retro #3ah (v2.23.1): c-ares fail-fatal on host-leaked search domains.
    # Originator of the dns_search hardening — see top-of-file block for
    # the full rationale now that every service inherits the same setting.
    dns_search: ["."]
    environment:
      # YSG-RISK-073 cycle 7 / YSG-RISK-077 (BUG-C7-001): cert auth + pg_ident.
      # pgbouncer authenticates to postgres as auth_user via TLS client cert
      # (pgbouncer-auth_client.crt, CN=pgbouncer-auth) — no password exchange.
      # pg_hba carveout: `hostssl yashigani pgbouncer_authenticator 0.0.0.0/0 cert map=pgb-auth-map`
      # pg_ident map pgb-auth-map maps CN=pgbouncer-auth → pgbouncer_authenticator.
      # NO password needed in DATABASE_URL — cert is the sole credential for auth_user.
      # DATABASE_URL still required: edoburu entrypoint writes userlist.txt from it;
      # without DATABASE_URL the entrypoint exits before exec. userlist.txt is used
      # only for incoming client SCRAM challenges (auth_query path), NOT for auth_user.
      # Userlist entry written without password: "pgbouncer_authenticator" "" — harmless.
      # YSG-RISK-049 INIT-003 fix preserved: DATABASE_URL still exported at startup.
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "100"
      DEFAULT_POOL_SIZE: "20"
    # Cycle 7 fix (YSG-RISK-073): DATABASE_URL exported without password.
    # No secret read required — cert auth replaces password auth for auth_user.
    # edoburu entrypoint still needs DATABASE_URL to start; password component omitted.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        # YSG-RISK-073 cycle 7: cert auth — no password in DATABASE_URL.
        # pgbouncer_authenticator auth_user authenticates to postgres via cert
        # (pgbouncer-auth_client.crt, CN=pgbouncer-auth, mapped via pg_ident).
        # YSG-RISK-077: avoids pgbouncer 1.25.1 ARM64 SCRAM computation bug.
        export AUTH_TYPE=scram-sha-256
        export DATABASE_URL="postgresql://pgbouncer_authenticator@postgres:5432/yashigani"
        exec /entrypoint.sh pgbouncer /etc/pgbouncer/pgbouncer.ini
    volumes:
      - ./secrets:/run/secrets:ro
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      # YSG-RISK-073 cycle 7: pgbouncer_authenticator_password redundant mount removed.
      # ./secrets:/run/secrets:ro bulk mount above provides all needed certs.
      # Password secret no longer read (cert auth replaces SCRAM for auth_user).
    healthcheck:
      # Internal integration review finding: pg_isready can't negotiate TLS with
      # client_tls_sslmode=verify-ca (it has no --sslcert flag).
      # edoburu/pgbouncer image is busybox-based — no bash + sh has no
      # /dev/tcp support + busybox nc doesn't understand -z. Quirks:
      #   * localhost resolves IPv6-first, pgbouncer only binds v4 → use 127.0.0.1
      #   * -w 2 = 2s connect timeout
      #   * </dev/null so nc doesn't hang on stdin
      # A successful TCP connect proves the process is listening; real
      # cert-auth is exercised by gateway/backoffice connection path.
      test: ["CMD-SHELL", "nc -w 2 127.0.0.1 5432 </dev/null >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
    # YSG-RISK-008 (v2.23.4): read_only skipped on compose path for pgbouncer.
    # v2.24.0: edoburu does NOT generate /etc/pgbouncer/userlist.txt under
    # scram-sha-256 + auth_query mode. /var/run/pgbouncer still needs to be
    # writable for the PID file. Compensating controls: cap_drop:[ALL] +
    # no-new-privileges + user:70:70.
    # K8s path retains full readOnlyRootFilesystem via securityContext.
    tmpfs:
      - /tmp:size=32m,mode=1777
    security_opt:
      - no-new-privileges:true
    # V232-CSCAN-01k-RES-01: align cap_drop with Helm (pgbouncer.yaml:50).
    # No cap_add: pgbouncer binds port 5432 (non-privileged).
    cap_drop: [ALL]
    # EX-231-10: pgbouncer is data-plane only.
    networks:
      - data

  # ---------------------------------------------------------------------------
  # Alertmanager — alert routing (Slack → Email → PagerDuty)
  # ---------------------------------------------------------------------------
  alertmanager:
    dns_search: ["."]
    image: docker.io/prom/alertmanager:v0.32.1@sha256:51a825c2a40acc3e338fdd00d622e01ec090f72be2b3ea46be0839cd47a4d286
    restart: unless-stopped
    mem_limit: ${YASHIGANI_ALERTMANAGER_MEM_LIMIT:-256m}
    cpus: ${YASHIGANI_ALERTMANAGER_CPU_LIMIT:-0.25}
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ../config/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
      - ./secrets:/run/secrets:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9093/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
    read_only: true
    tmpfs:
      # YSG-RISK-008 (v2.23.4): alertmanager_data:/alertmanager is a named volume.
      # /tmp needed for Go runtime temp files.
      - /tmp:size=32m,mode=1777
    # YSG-RISK-008: no-new-privileges hardening (v2.23.4).
    security_opt:
      - no-new-privileges:true
    # V232-CSCAN-01k-RES-01: align cap_drop with Helm (alertmanager.yaml:38).
    # No cap_add: alertmanager binds port 9093 (non-privileged).
    cap_drop: [ALL]
    # EX-231-10: alertmanager is obs-plane only (receives from prometheus).
    networks:
      - obs

  # ---------------------------------------------------------------------------
  # Loki — log aggregation backend
  # ---------------------------------------------------------------------------
  # retro #84 (v2.23.2): mTLS enabled on port 3100.
  # Server cert: loki_client.crt/key (issued by install.sh PKI bootstrap).
  # Trust anchor: ca_intermediate.crt (Pattern B).
  # Clients: Promtail, Grafana, otel-collector — all must present leaf certs.
  loki:
    dns_search: ["."]
    image: docker.io/grafana/loki:3.7.1@sha256:73e905b51a7f917f7a1075e4be68759df30226e03dcb3cd2213b989cc0dc8eb4
    restart: unless-stopped
    mem_limit: ${YASHIGANI_LOKI_MEM_LIMIT:-512m}
    cpus: ${YASHIGANI_LOKI_CPU_LIMIT:-0.25}
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ../config/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
      # PKI certs: loki server cert + CA intermediate for client-cert auth.
      # loki is mtls_capable:true in service_identities.yaml so the bootstrap
      # issues loki_client.crt/key. /run/secrets is read-only (RO bind-mount).
      - ./secrets:/run/secrets:ro
    healthcheck:
      # v2.23.3 RETRO-V233-001 (extended): Loki 3.7.1 is fully distroless — the
      # image contains only the /bin/loki binary. No shell, no wget, and no nc.
      # nc -z was tried first but "executable file not found" — nc is absent.
      # The only probing option without adding a tool is disabling the healthcheck.
      # promtail depends_on changed to service_started (see below) so the compose
      # dependency chain is not blocked. Loki startup is reliable; promtail retries
      # on connection failure at the application level.
      # K8s Helm: tcpSocket probe works because kubelet performs the TCP check
      # natively (no in-container binary needed) — see loki.yaml.
      disable: true
    read_only: true
    tmpfs:
      # YSG-RISK-008 (v2.23.4): loki_data:/loki is a named volume.
      # /tmp needed for Loki WAL compaction staging (distroless but Go binary uses /tmp).
      - /tmp:size=256m,mode=1777
    # YSG-RISK-008: no-new-privileges hardening (v2.23.4).
    security_opt:
      - no-new-privileges:true
    # V232-CSCAN-01k-RES-01: align cap_drop with Helm (loki.yaml:39).
    # No cap_add: loki binds port 3100 (non-privileged).
    cap_drop: [ALL]
    # EX-231-10: loki is obs-plane only.
    networks:
      - obs

  # ---------------------------------------------------------------------------
  # Promtail — ships Docker container logs to Loki
  # ---------------------------------------------------------------------------
  # retro #84 (v2.23.2): Promtail presents its leaf cert to Loki (mTLS client).
  # promtail_client.crt/key issued by install.sh PKI bootstrap.
  # Trust anchor for verifying Loki's server cert: ca_intermediate.crt (Pattern B).
  # Promtail itself does not terminate TLS (mtls_capable: true in manifest means
  # it gets a client cert, NOT that it runs a TLS server). Port 9080 remains HTTP.
  promtail:
    dns_search: ["."]
    image: docker.io/grafana/promtail:3.6.10@sha256:2a0f5e3e160ee5d549c585f6cc4f4e1c566ff783324a424bd75bc16503fc660e
    restart: unless-stopped
    mem_limit: ${YASHIGANI_PROMTAIL_MEM_LIMIT:-256m}
    cpus: ${YASHIGANI_PROMTAIL_CPU_LIMIT:-0.25}
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ../config/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # PKI certs: promtail client cert for mTLS push to Loki.
      - ./secrets:/run/secrets:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9080' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      loki:
        # service_started (not service_healthy): loki 3.7.1 is fully distroless
        # (only /bin/loki binary), so no in-container probe is possible and loki's
        # healthcheck is disabled. service_started is safe: loki binds :3100 before
        # accepting connections; promtail retries at the application level on any
        # connection failure. — RETRO-V233-001 (extended)
        condition: service_started
    read_only: true
    tmpfs:
      # YSG-RISK-008 (v2.23.4): promtail has no data volume. Config + certs are
      # read-only mounts. Docker socket is read-only bind mount. /tmp for Go runtime.
      - /tmp:size=32m,mode=1777
    # YSG-RISK-008: no-new-privileges hardening (v2.23.4).
    security_opt:
      - no-new-privileges:true
    # V232-CSCAN-01k-RES-01: defence-in-depth — no Helm counterpart for promtail.
    # No cap_add: promtail binds port 9080 (non-privileged). Docker socket access
    # is via bind mount (read-only), not a capability.
    cap_drop: [ALL]
    # EX-231-10: promtail ships logs to loki, obs-plane only.
    networks:
      - obs

  # ---------------------------------------------------------------------------
  # OpenTelemetry Collector — OTLP receiver, Jaeger exporter
  # M-01 fix (2026-04-27): receivers upgraded to mTLS.
  # Cert: otel-collector_client.crt (issued by install.sh PKI bootstrap).
  # Trust anchor: ca_intermediate.crt (Pattern B — never ca_root.crt).
  # Clients (gateway, backoffice) must present valid leaf certs signed by
  # the same intermediate. See config/otel/otel-collector.yml for TLS config.
  # ---------------------------------------------------------------------------
  otel-collector:
    dns_search: ["."]
    image: docker.io/otel/opentelemetry-collector-contrib:0.151.0@sha256:d57bfe8eee2378f31cb1193239fbcac521d54a5a071fca2bfc106916a32b892d
    restart: unless-stopped
    mem_limit: ${YASHIGANI_OTEL_COLLECTOR_MEM_LIMIT:-512m}
    cpus: ${YASHIGANI_OTEL_COLLECTOR_CPU_LIMIT:-0.5}
    command: ["--config=/etc/otel/otel-collector.yml"]
    volumes:
      - ../config/otel/otel-collector.yml:/etc/otel/otel-collector.yml:ro
      # PKI certs: collector presents otel-collector leaf cert to clients;
      # trusts ca_intermediate.crt as the client-cert verification CA.
      - ./secrets:/run/secrets:ro
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "components"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      - jaeger
    read_only: true
    tmpfs:
      # YSG-RISK-008 (v2.23.4): otel-collector has no data volume.
      # Config + certs are read-only mounts. In-memory receiver.
      # /tmp needed for Go runtime temp files.
      - /tmp:size=64m,mode=1777
    # YSG-RISK-008: no-new-privileges hardening (v2.23.4).
    security_opt:
      - no-new-privileges:true
    # V232-CSCAN-01k-RES-01: align cap_drop with Helm (otel-collector.yaml:56).
    # No cap_add: otel-collector binds ports 4317/4318 (non-privileged).
    cap_drop: [ALL]
    # EX-231-10: otel-collector receives traces from gateway/backoffice (OTLP
    # push, not pull). gateway/backoffice are on `data`. otel-collector needs
    # to be reachable from `data` to receive OTLP pushes.
    # Also joins `obs` to forward traces to jaeger.
    networks:
      - data
      - obs

  # ---------------------------------------------------------------------------
  # Jaeger — distributed trace UI (v2.17.0)
  # Migrated from v1 (all-in-one image, env-var config) to v2 (jaeger image, YAML config).
  # v2 is built on OpenTelemetry Collector; config in config/jaeger/jaeger.yml.
  #
  # EX-231-09 fix (v2.23.2): OTLP gRPC collector port uses mTLS (Pattern B).
  # TLS config moved from v1 env vars to jaeger.yml receivers.otlp.protocols.grpc.tls.
  # Jaeger presents jaeger_client.crt; otel-collector must present a valid leaf
  # signed by ca_intermediate.crt.
  # UI port (16686) and admin port (13133) remain HTTP on obs-internal network.
  # ---------------------------------------------------------------------------
  jaeger:
    dns_search: ["."]
    image: docker.io/jaegertracing/jaeger:2.17.0@sha256:6266573208d665ce5c17483bce0a75d0806480d92c84766d288d0aee885ce708
    restart: unless-stopped
    mem_limit: ${YASHIGANI_JAEGER_MEM_LIMIT:-512m}
    cpus: ${YASHIGANI_JAEGER_CPU_LIMIT:-0.5}
    command: ["--config=/etc/jaeger/jaeger.yml"]
    volumes:
      - ./secrets:/run/secrets:ro
      - ../config/jaeger/jaeger.yml:/etc/jaeger/jaeger.yml:ro
    healthcheck:
      # v2.23.3 RETRO-V233-001: Jaeger v2 all-in-one image is distroless — no
      # shell and no wget/curl. CMD-SHELL fails with "executable file not found".
      # Fix: nc -z TCP probe on :13133 (healthcheckv2 extension port). nc is
      # present in the jaeger distroless image. TCP connect is sufficient signal
      # that the healthcheck extension is listening.
      test: ["CMD", "nc", "-z", "localhost", "13133"]
      interval: 15s
      timeout: 5s
      retries: 3
    read_only: true
    tmpfs:
      # YSG-RISK-008 (v2.23.4): jaeger v2 is distroless with in-memory storage.
      # /tmp needed for Go runtime. jaeger.yml config + secrets are read-only.
      - /tmp:size=64m,mode=1777
    # YSG-RISK-008: no-new-privileges hardening (v2.23.4).
    security_opt:
      - no-new-privileges:true
    # V232-CSCAN-01k-RES-01: align cap_drop with Helm (jaeger.yaml:48).
    # No cap_add: jaeger binds ports 13133/16686/4317 (non-privileged).
    cap_drop: [ALL]
    # EX-231-10: jaeger is obs-plane only.
    networks:
      - obs

  # ---------------------------------------------------------------------------
  # Keycloak — upstream test IdP for OIDC/SAML federation validation
  # WARNING: dev-mode (start-dev) — NOT for production. Internal network only.
  # Usage: docker compose --profile test-idp --env-file docker/.env.test-idp up -d
  # Realm is imported on first boot from docker/keycloak/yashigani-test-realm.json.
  # ---------------------------------------------------------------------------
  keycloak:
    dns_search: ["."]
    image: quay.io/keycloak/keycloak:26.6.1@sha256:26ae26445475f7fac5f90ee138b1bdb64324f5815fb16133ffdbdb122d97c4d8
    restart: unless-stopped
    mem_limit: ${YASHIGANI_KEYCLOAK_MEM_LIMIT:-1024m}
    cpus: ${YASHIGANI_KEYCLOAK_CPU_LIMIT:-1.0}
    command:
      - "start-dev"
      - "--import-realm"
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "false"
      # H2 is fine for dev-mode; no external DB dependency
      KC_DB: dev-file
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak:/opt/keycloak/data/import:ro
    healthcheck:
      test:
        - "CMD-SHELL"
        - "bash -c '</dev/tcp/localhost/9000' 2>/dev/null"
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 60s
    read_only: true
    tmpfs:
      # YSG-RISK-008 (v2.23.4): keycloak_data:/opt/keycloak/data is a named volume.
      # JVM requires writable /tmp for temp file operations (large for JVM GC).
      - /tmp:size=256m,mode=1777
    security_opt:
      - no-new-privileges:true
    # V232-CSCAN-01k-RES-01: defence-in-depth — no Helm counterpart (test-idp profile).
    # No cap_add: keycloak binds port 9000 (non-privileged; dev-mode).
    cap_drop: [ALL]
    # EX-231-10: keycloak is the upstream IdP for backoffice SSO redirect.
    # Backoffice reaches it on `data`; keycloak itself doesn't need caddy_internal.
    networks:
      - data
    profiles:
      - test-idp

  # ---------------------------------------------------------------------------
  # Vault — HashiCorp Vault dev-mode KMS (opt-in: --profile vault)
  # WARNING: dev-mode — data NOT persisted. NOT for production.
  # ---------------------------------------------------------------------------
  vault:
    dns_search: ["."]
    image: docker.io/hashicorp/vault:2.0.0@sha256:e40c741ed95bb271425e3e6ca6c222d620cf8682f6f7a1b1e7c9d49d0aba484b
    restart: unless-stopped
    mem_limit: ${YASHIGANI_VAULT_MEM_LIMIT:-512m}
    cpus: ${YASHIGANI_VAULT_CPU_LIMIT:-0.5}
    # YSG-RISK-008: no-new-privileges hardening (v2.23.4).
    security_opt:
      - no-new-privileges:true
    # V232-CSCAN-01k-RES-01: defence-in-depth — no Helm counterpart (vault profile).
    # IPC_LOCK required: Vault uses mlock(2) to prevent secrets swapping to disk.
    cap_drop: [ALL]
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    volumes:
      - ./secrets:/run/secrets:ro
    read_only: true
    tmpfs:
      # YSG-RISK-008 (v2.23.4): vault dev-mode stores data in-memory only.
      # /tmp needed for Go runtime temp files.
      # /home/vault needed by vault binary for credential caching.
      - /tmp:size=64m,mode=1777
      - /home/vault:size=16m,mode=0700
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    # EX-231-10: vault is a KMS dep for backoffice/gateway — data-plane.
    networks:
      - data
    profiles:
      - vault

  # ---------------------------------------------------------------------------
  # OPTIONAL AGENT BUNDLES
  # Provided as a courtesy by Agnostic Security.
  # Images are pinned to upstream-tagged digests and updated with each
  # Yashigani release. All support goes to the upstream maintainers.
  # Enable at install time or via:
  #   docker compose --profile langflow up -d
  #   docker compose --profile letta up -d
  #   docker compose --profile openclaw up -d
  #
  # DISCLAIMER: These integrations carry no support obligation from
  # Agnostic Security. Direct issues to the upstream project teams.
  # ---------------------------------------------------------------------------

  # Langflow — Visual multi-agent workflow builder (MIT)
  # https://github.com/langflow-ai/langflow
  # Single container, embedded SQLite. OpenAI-compatible API on port 7860.
  # Users build custom agent workflows visually via the Langflow UI.
  langflow:
    dns_search: ["."]
    image: docker.io/langflowai/langflow:1.9.2@sha256:45238e614ce42bf93fea36a56316d3ebafdaf70c4df4425aeb2c90b035ec4a14
    restart: unless-stopped
    mem_limit: ${YASHIGANI_LANGFLOW_MEM_LIMIT:-1024m}
    cpus: ${YASHIGANI_LANGFLOW_CPU_LIMIT:-1.0}
    # Captain Bucket-C: entrypoint shim reads YASHIGANI_INTERNAL_BEARER from
    # /run/secrets/yashigani_internal_bearer and exports it as OPENAI_API_KEY.
    # Langflow 1.9.2 CMD: python -m langflow run --host 0.0.0.0 --port 7860
    # (verified from upstream Dockerfile at tag 1.9.2).
    entrypoint:
      - /bin/sh
      - -c
      - 'OPENAI_API_KEY=$(cat /run/secrets/yashigani_internal_bearer) && export OPENAI_API_KEY && exec "$@"'
      - '--'
    command: ["python", "-m", "langflow", "run", "--host", "0.0.0.0", "--port", "7860"]
    environment:
      # Route all LLM calls through Yashigani gateway (OpenAI-compatible)
      # BUG-V241-LANGFLOW-LETTA-BASE-URL: gateway:8080 is mTLS-only — route langflow
      # through gateway's internal mesh port (8081, plain HTTP, data-network-only).
      # open-webui got this fix at v2.23.4 BUG-2; langflow + letta were added later
      # and inherited the wrong value. Network isolation on `data` bridge is the
      # transport guard; AgentAuthMiddleware enforces token auth at the app layer.
      OPENAI_API_BASE: http://gateway:8081/v1
      # OPENAI_API_KEY is injected by the entrypoint shim from
      # /run/secrets/yashigani_internal_bearer — do NOT set it here.
      # Default model for new flows
      LANGFLOW_DEFAULT_MODEL: "qwen2.5:3b"
      # Disable telemetry
      DO_NOT_TRACK: "true"
      LANGFLOW_AUTO_LOGIN: "true"
      # YSG-RISK-008 (read_only:true): redirect DB and config dir to named volume.
      # Default DB path (/app/.venv/.../langflow.db) and default config dir
      # (/app/data/.cache/langflow) are under the read-only rootfs.
      # Named volume langflow_data:/app/langflow is writable.
      LANGFLOW_DATABASE_URL: "sqlite:////app/langflow/langflow.db"
      LANGFLOW_CONFIG_DIR: "/app/langflow/config"
      # YSG-RISK-008 (read_only:true): alembic migration log cannot write to
      # /app/.venv/.../langflow/alembic/alembic.log (read-only rootfs).
      # redirect to stdout — identical output, no file needed.
      LANGFLOW_ALEMBIC_LOG_TO_STDOUT: "true"
    volumes:
      - langflow_data:/app/langflow
    # PROBE-AG1 fix: per-key Docker named-secrets — replaces wholesale ./secrets mount.
    # langflow only needs yashigani_internal_bearer (entrypoint shim: cat /run/secrets/yashigani_internal_bearer).
    # caddy_internal_hmac, PKI certs, postgres/redis passwords are NOT exposed to langflow.
    secrets:
      - source: yashigani_internal_bearer
        target: yashigani_internal_bearer
        mode: 0440
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:7860/health', timeout=5)\""]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s
    depends_on:
      gateway:
        condition: service_healthy
    read_only: true
    tmpfs:
      # YSG-RISK-008 (v2.23.4): langflow_data:/app/langflow is a named volume.
      # /tmp needed for Python runtime temp files and pip install caching.
      # /app/data: langflow mkdir('/app/data') at startup — ephemeral cache dir,
      # not persisted across restarts (tmpfs acceptable per brief, data in named vol).
      # mode=1777: langflow runs as uid=1000(user) gid=0(root) — needs world-writable
      # tmpfs so non-root user can create subdirs at startup.
      - /tmp:size=128m,mode=1777
      - /app/data:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    # V232-CSCAN-01k-RES-01: align cap_drop with Helm (agent-bundles.yaml:53).
    # No cap_add: langflow binds port 7860 (non-privileged).
    cap_drop: [ALL]
    # YSG-SECRETS-DIST-002 CLOSED (Laura A1): langflow UID 1000 cannot read
    # yashigani_internal_bearer as owner (host file chowned 0:2002 0640) and
    # cap_drop:[ALL] drops DAC_OVERRIDE. GID 2002 retained on langflow ONLY —
    # it is the sole remaining group-read consumer. All other services removed.
    # See: cap_drop+CAP_DAC_OVERRIDE doc note (compose lines 587-591 budget-redis).
    group_add:
      - "2002"
    # YSG-RISK-055 UA-10 (v2.24.1): langflow moves from `data` to
    # `langflow_isolated`. Gateway joins langflow_isolated so langflow can still
    # resolve `gateway` by DNS and route LLM calls via OPENAI_API_BASE.
    # langflow CANNOT resolve letta or openclaw by DNS — they are not members
    # of this bridge. Direct peer-to-peer TCP access is severed at L2.
    # Does NOT join caddy_internal (auth HELD per synthesis §2.5).
    networks:
      - langflow_isolated
    profiles:
      - langflow

  # letta-pgbouncer — session-mode pgbouncer sidecar for letta→postgres mTLS
  # Implements Iris design recommendation (Option 1 — 33/35):
  #   iris-letta-postgres-mtls-design-review.md
  # Security fixes: laura-pgbouncer-letta-threat-model.md (F1 Helm netpol,
  #   F2 admin console disable, F3 client_tls constraint comment, F4 YSG-RISK-049)
  #
  # Replaces the dead-end letta-pg-stunnel design (commit e694127):
  #   stunnel UID contradiction (pki_ownership.sh records UID 0:0600 for a cert
  #   stunnel reads as UID 101 — clean install would fail at key-read), five 0777
  #   tmpfs mounts (feedback_security_company_no_shortcuts violation), hand-rolled
  #   protocol handler (Iris C2 violation), amd64-only image (Iris C5 violation).
  #
  # pgbouncer accepts plain TCP from letta (letta pg8000 cannot present client certs
  # via URI params — constraint C1 in Iris's register), then dials postgres:5432
  # over full mTLS presenting letta-pgbouncer_client.crt (issued by install.sh,
  # chowned UID 70:0600). session mode required for alembic DDL advisory locks.
  # YSG-RISK-048 CLOSED 2026-05-20 via pgbouncer session-mode sidecar.
  letta-pgbouncer:
    dns_search: ["."]
    image: docker.io/edoburu/pgbouncer:v1.25.1-p0@sha256:c7bfcaa24de830e29588bb9ad1eb39cebaf07c27149e1974445899b695634bb4
    user: "70:70"
    restart: unless-stopped
    mem_limit: 64m
    cpus: 0.2
    environment:
      # YSG-RISK-073 cycle 7 / YSG-RISK-077 (BUG-C7-001): cert auth + pg_ident.
      # Same fix as main pgbouncer service. letta-pgbouncer authenticates to postgres
      # as auth_user via TLS client cert (letta-pgbouncer_client.crt, CN=letta-pgbouncer).
      # pg_ident map pgb-auth-map maps CN=letta-pgbouncer → pgbouncer_authenticator.
      # NO password needed — cert is the sole credential. DATABASE_URL still required
      # for edoburu entrypoint (writes userlist.txt without password — harmless).
      # auth_dbname = yashigani in pgbouncer-letta.ini (Amendment C6) — the
      # auth_query function lives in yashigani DB; DATABASE_URL uses yashigani.
      # YSG-RISK-049 INIT-003 fix preserved: DATABASE_URL still exported at startup.
      POOL_MODE: session
      MAX_CLIENT_CONN: "50"
      DEFAULT_POOL_SIZE: "20"
    # Cycle 7 fix (YSG-RISK-073): DATABASE_URL exported without password.
    # No secret read required — cert auth replaces password auth for auth_user.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        # YSG-RISK-073 cycle 7: cert auth — no password in DATABASE_URL.
        # letta-pgbouncer auth_user authenticates to postgres via cert
        # (letta-pgbouncer_client.crt, CN=letta-pgbouncer, mapped via pg_ident).
        # YSG-RISK-077: avoids pgbouncer 1.25.1 ARM64 SCRAM computation bug.
        export AUTH_TYPE=scram-sha-256
        export DATABASE_URL="postgresql://pgbouncer_authenticator@postgres:5432/yashigani"
        exec /entrypoint.sh pgbouncer /etc/pgbouncer/pgbouncer.ini
    volumes:
      - ./pgbouncer/pgbouncer-letta.ini:/etc/pgbouncer/pgbouncer.ini:ro
    # PROBE-AG1 fix: per-key Docker named-secrets — replaces wholesale ./secrets mount.
    # YSG-RISK-073 cycle 7: pgbouncer_authenticator_password no longer mounted.
    # cert auth means no password is read — least-privilege: drop the secret from scope.
    # letta-pgbouncer needs exactly 3 secrets:
    #   ca_root.crt                      — server_tls_ca_file in pgbouncer-letta.ini
    #   letta-pgbouncer_client.crt       — server_tls_cert_file in pgbouncer-letta.ini
    #   letta-pgbouncer_client.key       — server_tls_key_file in pgbouncer-letta.ini
    # caddy_internal_hmac, yashigani_internal_bearer, gateway/backoffice certs, postgres/redis
    # passwords, pgbouncer_authenticator_password are NOT exposed to letta-pgbouncer.
    secrets:
      - source: ca_root_crt
        target: ca_root.crt
        mode: 0444
      - source: letta_pgbouncer_client_crt
        target: letta-pgbouncer_client.crt
        mode: 0444
      - source: letta_pgbouncer_client_key
        target: letta-pgbouncer_client.key
        mode: 0400
    healthcheck:
      # edoburu/pgbouncer image is busybox-based — same nc healthcheck as the
      # existing pgbouncer instance. 127.0.0.1 avoids IPv6-first resolution.
      test: ["CMD-SHELL", "nc -w 2 127.0.0.1 5432 </dev/null >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
    # YSG-RISK-008 (v2.23.4): read_only skipped on compose path for pgbouncer.
    # v2.24.0: edoburu does NOT generate /etc/pgbouncer/userlist.txt under
    # scram-sha-256 + auth_query mode. /var/run/pgbouncer still needs to be
    # writable for the PID file. Compensating controls: cap_drop:[ALL] +
    # no-new-privileges + user:70:70.
    # K8s path retains full readOnlyRootFilesystem via securityContext in sidecar spec.
    tmpfs:
      - /tmp:size=32m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    # YSG-RISK-055 UA-10 (v2.24.1): letta-pgbouncer straddles letta_isolated
    # and data. It needs letta_isolated so letta can resolve letta-pgbouncer
    # by DNS for the LETTA_PG_URI postgresql://...@letta-pgbouncer:5432/letta
    # connection. It needs data to dial postgres:5432 upstream (postgres lives
    # on data). This is a deliberate and documented exception — pgbouncer is
    # a session-mode TLS sidecar, not an agent. It cannot resolve langflow or
    # openclaw (they are on their own isolated bridges, not data).
    networks:
      - letta_isolated
      - data
    profiles:
      - letta

  # Letta (formerly MemGPT) — Stateful agent with persistent memory (Apache 2.0)
  # https://github.com/letta-ai/letta
  # Agent with long-term memory, tool use, and conversation persistence.
  # Exposes REST API on port 8283 with OpenAI-compatible chat endpoint.
  letta:
    dns_search: ["."]
    image: docker.io/letta/letta:0.16.7@sha256:fb7bd2c94a8bb7badbcfdb78a334abe3c1a75b5ea59e177aeba2e6356f54f92c
    restart: unless-stopped
    mem_limit: ${YASHIGANI_LETTA_MEM_LIMIT:-1024m}
    cpus: ${YASHIGANI_LETTA_CPU_LIMIT:-1.0}
    # Captain Bucket-C: entrypoint shim reads YASHIGANI_INTERNAL_BEARER from
    # /run/secrets/yashigani_internal_bearer and exports it as OPENAI_API_KEY.
    # Letta 0.16.7 upstream: ENTRYPOINT ["/usr/local/bin/docker-entrypoint.sh"]
    #                        CMD ["./letta/server/startup.sh"]
    # startup.sh: runs `alembic upgrade head` then starts letta server.
    # AGENT-RUNTIME-003: original shim used `exec "$@"` which resolved to
    # `exec letta server --host 0.0.0.0` — bypassing startup.sh and alembic
    # migrations, causing "relation 'organizations' does not exist" crash.
    # Fix: exec /app/letta/server/startup.sh (runs alembic upgrade head first).
    # AGENT-RUNTIME-003b (2026-05-20): prior fix added `cd /tmp` before exec,
    # believing letta writes openapi_letta.json to CWD at runtime. Investigation
    # confirms this is false — openapi_letta.json is in .gitignore, not written
    # by the server at runtime. `cd /tmp` caused alembic to fail ("No
    # 'script_location' key found") because alembic.ini is at /app/alembic.ini
    # and alembic resolves script_location relative to CWD. Fix: drop cd /tmp.
    entrypoint:
      - /bin/sh
      - -c
      - 'OPENAI_API_KEY=$(cat /run/secrets/yashigani_internal_bearer) && export OPENAI_API_KEY && exec /app/letta/server/startup.sh'
    environment:
      # Route LLM calls through Yashigani gateway (OpenAI-compatible)
      # BUG-V241-LANGFLOW-LETTA-BASE-URL: gateway:8080 is mTLS-only — route letta
      # through gateway's internal mesh port (8081, plain HTTP, data-network-only).
      # open-webui got this fix at v2.23.4 BUG-2; langflow + letta were added later
      # and inherited the wrong value. Network isolation on `data` bridge is the
      # transport guard; AgentAuthMiddleware enforces token auth at the app layer.
      OPENAI_API_BASE: http://gateway:8081/v1
      # OPENAI_API_KEY is injected by the entrypoint shim from
      # /run/secrets/yashigani_internal_bearer — do NOT set it here.
      LETTA_LLM_MODEL: "qwen2.5:3b"
      LETTA_EMBEDDING_MODEL: "qwen2.5:3b"
      # Use shared Postgres for persistence (separate DB).
      # Letta connects to letta-pgbouncer:5432 as plain TCP (no sslmode —
      # letta pg8000 cannot present client certs via URI params, C1 in Iris's register).
      # pgbouncer sidecar accepts plain TCP from letta and dials postgres:5432
      # over full mTLS presenting letta-pgbouncer_client.crt. End-to-end transport
      # is mTLS; letta is unaware. YSG-RISK-048 CLOSED 2026-05-20 via pgbouncer
      # session-mode sidecar (Iris design doc Option 1 — replaces stunnel).
      LETTA_PG_URI: postgresql://yashigani_app:${POSTGRES_PASSWORD}@letta-pgbouncer:5432/letta
    volumes:
      - letta_data:/root/.letta
      # letta 0.16.7 write-path fix — keep read_only:true on the rootfs:
      # app.py:162 writes openapi_letta.json via Path("openapi_letta.json").write_text()
      # relative to CWD (/app). Single-file bind mount creates a writable inode at exactly
      # /app/openapi_letta.json without making the rest of /app writable. Pre-create the
      # file on the host so Docker can bind it (bind-mount of a non-existent path creates
      # a directory, not a file). The file is regenerated on every startup — host copy
      # is just a placeholder. Installer (Su) creates this file in install.sh.
      - ./letta-runtime/openapi_letta.json:/app/openapi_letta.json:rw
    # PROBE-AG1 fix: per-key Docker named-secrets — replaces wholesale ./secrets mount.
    # letta only needs yashigani_internal_bearer (entrypoint shim: cat /run/secrets/yashigani_internal_bearer).
    # caddy_internal_hmac, PKI certs, postgres/redis passwords are NOT exposed to letta.
    # letta-pgbouncer certs are mounted on letta-pgbouncer sidecar, not on letta itself
    # (letta→letta-pgbouncer is plain TCP, pg8000 constraint C1; pgbouncer owns the mTLS leg).
    secrets:
      - source: yashigani_internal_bearer
        target: yashigani_internal_bearer
        mode: 0440
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8283/v1/health\", timeout=5)'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      gateway:
        condition: service_healthy
      postgres:
        condition: service_healthy
      letta-pgbouncer:
        condition: service_healthy
    read_only: true
    tmpfs:
      # /tmp: Python runtime temp files.
      - /tmp:size=64m,mode=1777
      # /root/nltk_data: NLTK punkt_tab download in lifespan (fallback, not pre-baked in image).
      # NLTK download is wrapped in try/except; would fail silently without this tmpfs,
      # but providing a writable path means punkt_tab is available for on-demand tokenisation.
      - /root/nltk_data:size=32m,mode=0700
    security_opt:
      - no-new-privileges:true
    # V232-CSCAN-01k-RES-01: align cap_drop with Helm (agent-bundles.yaml:53).
    # No cap_add: letta binds port 8283 (non-privileged).
    cap_drop: [ALL]
    # YSG-SECRETS-DIST-002 CLOSED (Laura A1): letta UID 0 reads
    # yashigani_internal_bearer as file owner (host file chowned 0:2002 0640).
    # cap_drop:[ALL] drops DAC_OVERRIDE — UID 0 == file UID 0, so owner-read
    # applies without needing DAC_OVERRIDE. GID 2002 removed from this service.
    # YSG-RISK-055 UA-10 (v2.24.1): letta moves from `data` to `letta_isolated`.
    # Gateway joins letta_isolated for dispatch. letta-pgbouncer also joins
    # letta_isolated so letta can reach it via DNS (letta-pgbouncer:5432).
    # letta CANNOT resolve langflow or openclaw — they are on separate bridges.
    networks:
      - letta_isolated
    profiles:
      - letta

  # Goose — REMOVED (ACP protocol too slow on CPU, ~300s per request)

  # CrewAI — removed from community/open-source edition.
  # CrewAI Docker image is now an enterprise-only feature.
  # Contact sales@agnosticsec.com for Enterprise tier with CrewAI support.

  # OpenClaw — Node.js personal AI with 30+ messaging channel integrations
  # https://openclaw.ai  |  https://github.com/openclaw/openclaw
  # Runs its own Gateway on port 18789. All LLM requests route through Yashigani.
  # Integration: OpenClaw (:18789) → Yashigani Gateway (:8080) → Ollama/LLM
  openclaw:
    dns_search: ["."]
    image: ghcr.io/openclaw/openclaw:2026.5.6@sha256:2ca86d6296fe2ae7111dac14843551340a4c5099e01566253b62c4d3e0a337fc
    restart: unless-stopped
    mem_limit: ${YASHIGANI_OPENCLAW_MEM_LIMIT:-1024m}
    cpus: ${YASHIGANI_OPENCLAW_CPU_LIMIT:-1.0}
    ports:
      # YSG-RISK-006 #3aw: loopback-bind only. OpenClaw is behind the gateway;
      # external clients must never bypass the gateway to reach OpenClaw directly.
      # Messaging channel webhooks reach OpenClaw via the host loopback (or a
      # local nginx/Caddy reverse proxy) — not directly from the public internet.
      # Gateway-to-OpenClaw traffic stays on the internal Docker bridge (no ports:
      # entry needed for that path). CWE-668 — design decision: option A.
      - "127.0.0.1:18789:18789"
    # Captain Bucket-C NOTE: openclaw.json contains __YASHIGANI_INTERNAL_BEARER__
    # as a placeholder. Su's install.sh must substitute it with the real per-install
    # token from docker/secrets/yashigani_internal_bearer before starting this service.
    # See: https://github.com/agnosticsec-com/yashigani/issues/openclaw-bearer-sub
    environment:
      OPENCLAW_CONFIG_PATH: /etc/openclaw/openclaw.json
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_SERVER_MODE: "true"
      OPENCLAW_DISABLE_AUDIO: "true"
      OPENCLAW_DISABLE_CAMERA: "true"
      OPENCLAW_DISABLE_LOCATION: "true"
      OPENCLAW_DISABLE_VOICE_WAKE: "true"
    volumes:
      - openclaw_data:/home/node/.openclaw
      - ./openclaw/openclaw.json:/etc/openclaw/openclaw.json:ro
    # PROBE-AG1 fix: NO /run/secrets mount at all for openclaw.
    # openclaw reads yashigani_internal_bearer via openclaw.json (install.sh substitutes
    # __YASHIGANI_INTERNAL_BEARER__ at install time — bearer is baked into the config).
    # No runtime secret file reads required. caddy_internal_hmac and ALL PKI material
    # are NOT accessible to openclaw containers.
    # openclaw also joins `edge` (internet-facing for Slack/Telegram webhooks) — the
    # absence of /run/secrets mount is the critical blast-radius reduction for PROBE-AG1.
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:18789/healthz 2>/dev/null || wget -qO- http://localhost:18789/healthz 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      gateway:
        condition: service_healthy
    read_only: true
    tmpfs:
      # YSG-RISK-008 (v2.23.4): openclaw_data:/home/node/.openclaw is a named volume.
      # /tmp needed for Node.js runtime temp files.
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    # V232-CSCAN-01k-RES-01: defence-in-depth — no Helm counterpart (openclaw profile).
    # No cap_add: openclaw binds port 18789 (non-privileged).
    cap_drop: [ALL]
    # YSG-RISK-055 UA-10 (v2.24.1): openclaw moves from `data` to
    # `openclaw_isolated`. Gateway joins openclaw_isolated for dispatch.
    # openclaw CANNOT resolve langflow or letta — they are on separate bridges.
    # `edge` retained: openclaw needs internet egress for messaging channel
    # webhooks (Slack, Telegram inbound POST to :18789). This was the original
    # EX-231-10 rationale. openclaw_isolated is internal:true (no host-external
    # DNS from that bridge); edge provides the internet path.
    networks:
      - openclaw_isolated
      - edge      # Port 18789 must be reachable by messaging channel webhooks
    profiles:
      - openclaw

  # ---------------------------------------------------------------------------
  # Wazuh SIEM — Open source security monitoring (opt-in)
  # Full stack: manager (receives events) + indexer (OpenSearch) + dashboard
  # All Yashigani audit events are forwarded via the SIEM sink (audit/sinks.py)
  # ---------------------------------------------------------------------------
  wazuh-manager:
    dns_search: ["."]
    image: docker.io/wazuh/wazuh-manager:4.14.5@sha256:3b2b7aae2daf696071ecc8b32a5d1e65e5c2a625291afc434bd20171a9d41109
    restart: unless-stopped
    mem_limit: ${YASHIGANI_WAZUH_MANAGER_MEM_LIMIT:-1024m}
    cpus: ${YASHIGANI_WAZUH_MANAGER_CPU_LIMIT:-1.0}
    environment:
      INDEXER_URL: https://wazuh-indexer:9200
      INDEXER_USERNAME: admin
      INDEXER_PASSWORD: ${WAZUH_INDEXER_PASSWORD:-}
      FILEBEAT_SSL_VERIFICATION_MODE: none
      SSL_CERTIFICATE_AUTHORITIES: /etc/ssl/root-ca.pem
      SSL_CERTIFICATE: /etc/wazuh-indexer/certs/wazuh.manager.pem
      SSL_KEY: /etc/wazuh-indexer/certs/wazuh.manager-key.pem
      API_USERNAME: wazuh-wui
      API_PASSWORD: ${WAZUH_API_PASSWORD:-}
    volumes:
      - wazuh_api_configuration:/var/ossec/api/configuration
      - wazuh_etc:/var/ossec/etc
      - wazuh_logs:/var/ossec/logs
      - wazuh_queue:/var/ossec/queue
      - wazuh_var_multigroups:/var/ossec/var/multigroups
      - wazuh_integrations:/var/ossec/integrations
      - wazuh_active_response:/var/ossec/active-response/bin
      - wazuh_agentless:/var/ossec/agentless
      - wazuh_wodles:/var/ossec/wodles
      - filebeat_etc:/etc/filebeat
      - filebeat_var:/var/lib/filebeat
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:55000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    # YSG-RISK-008: no-new-privileges hardening (v2.23.4).
    # read_only skipped: wazuh-manager has numerous internal write paths under
    # /var/ossec not fully captured by the named volumes — asymmetry documented
    # in risk register YSG-RISK-008.
    security_opt:
      - no-new-privileges:true
    # V232-CSCAN-01k-RES-01: defence-in-depth — no Helm counterpart (wazuh profile).
    # No cap_add: wazuh-manager uses standard ports (55000/1514/1515).
    cap_drop: [ALL]
    # EX-231-10: wazuh receives audit events from backoffice/gateway sinks.
    # Both gateway/backoffice are on `data`, so wazuh-manager joins `data`.
    # Also joins `obs` for indexer (wazuh-indexer is on obs).
    networks:
      - data
      - obs
    profiles:
      - wazuh

  wazuh-indexer:
    dns_search: ["."]
    image: docker.io/wazuh/wazuh-indexer:4.14.5@sha256:bcba58b3fe756114249b8834bcae8f852d277ffc6b9695d3de5989f5fe94d36c
    restart: unless-stopped
    mem_limit: ${YASHIGANI_WAZUH_INDEXER_MEM_LIMIT:-1024m}
    cpus: ${YASHIGANI_WAZUH_INDEXER_CPU_LIMIT:-1.0}
    environment:
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - wazuh_indexer_data:/var/lib/wazuh-indexer
    healthcheck:
      test: ["CMD-SHELL", "curl -sf https://localhost:9200 -k || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    # YSG-RISK-008: no-new-privileges hardening (v2.23.4).
    # read_only skipped: OpenSearch/JVM writes to /usr/share/wazuh-indexer paths
    # not covered by volumes — asymmetry documented in risk register YSG-RISK-008.
    security_opt:
      - no-new-privileges:true
    # V232-CSCAN-01k-RES-01: defence-in-depth — no Helm counterpart (wazuh profile).
    # No cap_add: wazuh-indexer binds port 9200 (non-privileged).
    cap_drop: [ALL]
    # EX-231-10: wazuh-indexer is obs-plane (receives from wazuh-manager).
    networks:
      - obs
    profiles:
      - wazuh

  wazuh-dashboard:
    dns_search: ["."]
    image: docker.io/wazuh/wazuh-dashboard:4.14.5@sha256:75437f4fb347db2d040863801f9eb73b0ca16c8b3fb4d93a07df34b7313b16af
    restart: unless-stopped
    mem_limit: ${YASHIGANI_WAZUH_DASHBOARD_MEM_LIMIT:-1024m}
    cpus: ${YASHIGANI_WAZUH_DASHBOARD_CPU_LIMIT:-1.0}
    environment:
      INDEXER_USERNAME: admin
      INDEXER_PASSWORD: ${WAZUH_INDEXER_PASSWORD:-}
      WAZUH_API_URL: https://wazuh-manager
      DASHBOARD_USERNAME: kibanaserver
      DASHBOARD_PASSWORD: ${WAZUH_DASHBOARD_PASSWORD:-}
      API_USERNAME: wazuh-wui
      API_PASSWORD: ${WAZUH_API_PASSWORD:-}
    volumes:
      - wazuh_dashboard_config:/usr/share/wazuh-dashboard/data/wazuh/config
      - wazuh_dashboard_custom:/usr/share/wazuh-dashboard/plugins/wazuh/public/assets/custom
    depends_on:
      wazuh-manager:
        condition: service_healthy
      wazuh-indexer:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    # YSG-RISK-008: no-new-privileges hardening (v2.23.4).
    # read_only skipped: wazuh-dashboard writes plugin assets to paths under
    # /usr/share/wazuh-dashboard not captured by volumes — asymmetry documented
    # in risk register YSG-RISK-008.
    security_opt:
      - no-new-privileges:true
    # V232-CSCAN-01k-RES-01: defence-in-depth — no Helm counterpart (wazuh profile).
    # No cap_add: wazuh-dashboard binds port 5601 (non-privileged).
    cap_drop: [ALL]
    # EX-231-10: wazuh-dashboard is obs-plane (queries indexer + manager).
    networks:
      - obs
    profiles:
      - wazuh

  # ---------------------------------------------------------------------------
  # Smallstep CA — Internal Certificate Authority for service-to-service TLS
  # Provides automated certificate issuance and renewal for all internal
  # services. Caddy integrates natively with step-ca via ACME.
  # Enable with: --with-internal-ca
  # ---------------------------------------------------------------------------
  step-ca:
    dns_search: ["."]
    image: docker.io/smallstep/step-ca:0.30.2@sha256:a2b17872915c193259b75a5474c398326f41bd199f0842093e52cf4182bc8270
    restart: unless-stopped
    mem_limit: ${YASHIGANI_STEP_CA_MEM_LIMIT:-256m}
    cpus: ${YASHIGANI_STEP_CA_CPU_LIMIT:-0.25}
    environment:
      DOCKER_STEPCA_INIT_NAME: "Yashigani Internal CA"
      DOCKER_STEPCA_INIT_DNS_NAMES: "step-ca,localhost"
      DOCKER_STEPCA_INIT_REMOTE_MANAGEMENT: "true"
      DOCKER_STEPCA_INIT_ACME: "true"
    volumes:
      - step_ca_data:/home/step
    healthcheck:
      test: ["CMD-SHELL", "step ca health --ca-url https://localhost:9000 --root /home/step/certs/root_ca.crt 2>/dev/null || curl -sf -k https://localhost:9000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    read_only: true
    tmpfs:
      # YSG-RISK-008 (v2.23.4): step_ca_data:/home/step is a named volume (CA state).
      # /tmp needed for Go runtime temp files.
      - /tmp:size=32m,mode=1777
    # YSG-RISK-008: no-new-privileges hardening (v2.23.4).
    security_opt:
      - no-new-privileges:true
    # V232-CSCAN-01k-RES-01: defence-in-depth — no Helm counterpart (internal-ca profile).
    # No cap_add: step-ca binds port 9000 (non-privileged).
    cap_drop: [ALL]
    # EX-231-10: step-ca issues certs for internal services; data-plane dep.
    networks:
      - data
    profiles:
      - internal-ca

# ---------------------------------------------------------------------------
# Named volumes
# ---------------------------------------------------------------------------
volumes:
  audit_data:
    driver: local
    # On Linux with a dedicated audit partition, override with:
    #   AUDIT_DATA_PATH=/mnt/audit docker compose up -d
    # driver_opts:
    #   type: none
    #   o: bind
    #   device: ${AUDIT_DATA_PATH:-./data/audit}
  bootstrap_data:
    driver: local
  # secrets_volume removed — all services now bind-mount ./secrets directly
  redis_data:
    driver: local
  ollama_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
  postgres_data:
    driver: local
  alertmanager_data:
    driver: local
  loki_data:
    driver: local
  # Test IdP volume
  keycloak_data:
    driver: local
  # Agent bundle volumes — always declared at project level (Docker Compose creates all
  # top-level named volumes on `docker compose up`, regardless of which profiles are
  # active). The volumes are empty until the agent service actually starts under its
  # profile (langflow/letta/openclaw/openwebui). This is a Docker Compose design
  # constraint: per-profile volume scoping is not supported natively. The volumes are
  # benign when empty; the _check_contaminated_volumes guard in install.sh is
  # intentionally NOT triggered by these agent volumes on the additive re-run path
  # (REUSE_VOLUMES=true is set in check_existing_installation — BUG-B+-002).
  openclaw_data:
    driver: local
  langflow_data:
    driver: local
  letta_data:
    driver: local
  openwebui_data:
    driver: local
  budget_redis_data:
    driver: local
  step_ca_data:
    driver: local
  # Wazuh SIEM volumes (opt-in)
  wazuh_api_configuration:
    driver: local
  wazuh_etc:
    driver: local
  wazuh_logs:
    driver: local
  wazuh_queue:
    driver: local
  wazuh_var_multigroups:
    driver: local
  wazuh_integrations:
    driver: local
  wazuh_active_response:
    driver: local
  wazuh_agentless:
    driver: local
  wazuh_wodles:
    driver: local
  filebeat_etc:
    driver: local
  filebeat_var:
    driver: local
  wazuh_indexer_data:
    driver: local
  wazuh_dashboard_config:
    driver: local
  wazuh_dashboard_custom:
    driver: local

# ---------------------------------------------------------------------------
# Docker named-secrets (PROBE-AG1 fix, v2.24.1)
# ---------------------------------------------------------------------------
# Per-key Docker named-secrets replace wholesale ./secrets:/run/secrets:ro mounts on
# agent containers (langflow, letta, letta-pgbouncer). Each secret is exposed ONLY to
# the service(s) that actually need it. caddy_internal_hmac is NOT listed here because
# no agent container needs it — it is passed to gateway/backoffice/caddy via .env only.
#
# openclaw has NO entry in this block — it needs zero secret file reads at runtime.
# The bearer token is pre-substituted into openclaw.json by install.sh.
#
# Most core services (gateway, backoffice, caddy, redis, postgres, pgbouncer, etc.)
# continue to use the ./secrets:/run/secrets:ro bind-mount directly — those services
# are first-party Python/Go workloads with constrained blast radius. The bind-mount
# pattern is intentionally preserved for them; the named-secrets pattern is applied
# to third-party agent containers that join the `edge` network (openclaw) or that
# have broader blast-radius exposure.
#
# Secret files are generated by install.sh and stored in docker/secrets/.
# To upgrade to a paid tier, replace docker/secrets/license_key with your .ysg content.
secrets:
  # langflow + letta entrypoint shim: cat /run/secrets/yashigani_internal_bearer
  yashigani_internal_bearer:
    file: ./secrets/yashigani_internal_bearer

  # letta-pgbouncer: wrapper command reads password; pgbouncer-letta.ini reads certs
  pgbouncer_authenticator_password:
    file: ./secrets/pgbouncer_authenticator_password
  ca_root_crt:
    file: ./secrets/ca_root.crt
  letta_pgbouncer_client_crt:
    file: ./secrets/letta-pgbouncer_client.crt
  letta_pgbouncer_client_key:
    file: ./secrets/letta-pgbouncer_client.key

# ---------------------------------------------------------------------------
# Networks — Caddy-centric isolation (EX-231-10 fix, 2026-04-29)
# ---------------------------------------------------------------------------
# Four networks enforce the security directive: Caddy is the SOLE ingress to
# backoffice and gateway. No other service may reach :8443 or :8080 directly.
#
# Network topology:
#
#   edge          — Caddy only; host port mapping (80/443) lives here.
#                   `internal: false` so Caddy can reach Let's Encrypt ACME.
#
#   caddy_internal — Caddy + backoffice + gateway ONLY.
#                   `internal: true` — no host-port egress.
#                   This is the only network where backoffice/:8443 and
#                   gateway/:8080 are reachable. Since Docker DNS only resolves
#                   hostnames to IPs on shared networks, a service on `data`
#                   that is NOT on `caddy_internal` cannot resolve backoffice or
#                   gateway at all (DNS returns NXDOMAIN).
#
#   data          — backoffice + gateway + their outbound deps: postgres,
#                   pgbouncer, redis, budget-redis, policy (OPA), ollama.
#                   `internal: true`. Backoffice/gateway are MEMBERS of this
#                   network so their outbound DB/cache calls work, but their
#                   listeners (:8443/:8080) are NOT reachable here because
#                   every service on `data` that IS NOT also on `caddy_internal`
#                   will get an NXDOMAIN for `backoffice` and `gateway` (Docker
#                   DNS scopes resolution to shared networks).
#
#   obs           — prometheus + grafana + loki + alertmanager + otel-collector
#                   + jaeger. `internal: true`.
#                   Prometheus scrapes gateway/backoffice via Caddy's
#                   SPIFFE-gated listeners (:8444/:8445), so Caddy also joins
#                   `obs`. Obs services never need to reach `data` services
#                   directly, so they are NOT joined to `data`.
#
# Residual risk (documented, not hidden):
#   Docker containers bind listeners to 0.0.0.0 by default, so a container
#   that IS on both `caddy_internal` and `data` (backoffice, gateway) will
#   technically accept TCP connections to :8443/:8080 from any peer that has
#   a route to either network IP. However:
#     (a) No `data`-only peer (postgres, redis, OPA, etc.) shares the
#         `caddy_internal` network, so they have NO route to those IPs.
#     (b) The `data` IP of backoffice/gateway is unreachable to `data`-only
#         peers because Docker DNS will NOT resolve `backoffice` or `gateway`
#         from a network where they don't share membership — Docker DNS is
#         scoped to shared-network members only.
#     (c) A `data`-only attacker would have to discover the raw IP via
#         e.g. ARP/ICMP, which requires layer-2 adjacency — Docker bridges
#         are separate L2 segments. Different bridge = no ARP reachability.
#   The belt-and-braces mTLS + SPIFFE middleware remains active. K8s
#   NetworkPolicy enforces this at the kernel level (no residual).
#
networks:
  # ── Address-family posture (Tiago directives 2026-05-26) ─────────────────
  # Internal mesh: IPv4-only. Every internal bridge (caddy_internal, data,
  # obs, *_isolated) sets `enable_ipv6: false` to prevent Docker/Podman
  # from creating dual-stack bridges that would route IPv6 traffic around
  # the IPv4 iptables allowlist enforced in Caddy + the in-mesh service
  # network policies. ("do not implement ipv inside of the yashigani
  # network ... block it")
  #
  # Edge bridge: keeps IPv6 ENABLED (no `enable_ipv6: false`) so internet
  # clients connecting INBOUND to Caddy over IPv6 are accepted. ("allow
  # ipv6 in the front to connect to the internet if the client wants to")
  # Caddy's ip6tables OUTPUT chain still DROPs new outbound IPv6 — only
  # ESTABLISHED,RELATED response packets are allowed back out to v6
  # clients (see docker/caddy/caddy-entrypoint.sh Step 1b).
  # ─────────────────────────────────────────────────────────────────────────
  edge:
    driver: bridge
    # IPv6 left at Docker default (true) — Caddy accepts inbound IPv6 clients
    # from internet per Tiago 2026-05-26. New IPv6 outbound is DROPped by
    # caddy-entrypoint.sh ip6tables OUTPUT policy.
    # external: true — Caddy needs internet access for ACME challenges (IPv4)
  caddy_internal:
    driver: bridge
    enable_ipv6: false
    internal: true
    # Only Caddy, backoffice, gateway are members.
    # Caddy → backoffice:8443 and Caddy → gateway:8080 happen here.
  data:
    driver: bridge
    enable_ipv6: false
    internal: true
    # Core data-plane: backoffice + gateway (outbound) + their deps.
    # No obs services; no edge services.
  obs:
    driver: bridge
    enable_ipv6: false
    internal: true
    # Observability-plane: prometheus, grafana, loki, alertmanager,
    # otel-collector, jaeger. Caddy joins to proxy /admin/grafana etc.
  # YSG-RISK-055 UA-10: per-agent isolated bridges (v2.24.1).
  # Each agent lives on its own bridge. Gateway joins all three for the
  # registered-upstream dispatch path. Agents CANNOT reach each other
  # directly — L2 bridge segmentation enforces this at the kernel level.
  # letta-pgbouncer also joins `data` (straddling) because it must reach
  # postgres on the data network. This is documented as a deliberate
  # exception: letta-pgbouncer is a session-mode TLS sidecar, not an
  # agent container. Its exposure is limited to the postgres port only
  # and it cannot resolve langflow/openclaw by DNS (they are not members
  # of the `data` bridge under this design).
  langflow_isolated:
    driver: bridge
    enable_ipv6: false
    internal: true
  letta_isolated:
    driver: bridge
    enable_ipv6: false
    internal: true
  openclaw_isolated:
    driver: bridge
    enable_ipv6: false
    internal: true
