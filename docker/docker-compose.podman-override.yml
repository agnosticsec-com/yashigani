# Podman rootless overrides — applied automatically by install.sh when RUNTIME=podman
# Usage: podman compose -f docker/docker-compose.yml -f docker/docker-compose.podman-override.yml up -d

services:
  gateway:
    security_opt:
      - label=disable
    userns_mode: keep-id

  backoffice:
    security_opt:
      - label=disable
    userns_mode: keep-id

  policy:
    security_opt:
      - label=disable
    userns_mode: keep-id

  redis:
    security_opt:
      - label=disable
    userns_mode: keep-id

  ollama:
    security_opt:
      - label=disable
    userns_mode: keep-id

  ollama-init:
    security_opt:
      - label=disable
    userns_mode: keep-id

  prometheus:
    security_opt:
      - label=disable
    userns_mode: keep-id

  grafana:
    security_opt:
      - label=disable
    userns_mode: keep-id

  caddy:
    security_opt:
      - label=disable
    userns_mode: keep-id

  postgres:
    security_opt:
      - label=disable
    userns_mode: keep-id

  pgbouncer:
    security_opt:
      - label=disable
    userns_mode: keep-id

  alertmanager:
    security_opt:
      - label=disable
    userns_mode: keep-id

  loki:
    security_opt:
      - label=disable
    userns_mode: keep-id

  promtail:
    security_opt:
      - label=disable
    userns_mode: keep-id
    # Override volumes to replace Docker-specific paths with Podman equivalents
    volumes:
      - ../config/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/log:/var/log:ro
      # Podman container logs are in /var/log, not /var/lib/docker/containers

  otel-collector:
    security_opt:
      - label=disable
    userns_mode: keep-id

  jaeger:
    security_opt:
      - label=disable
    userns_mode: keep-id

  vault:
    security_opt:
      - label=disable
    userns_mode: keep-id

  open-webui:
    security_opt:
      - label=disable
    userns_mode: keep-id

  budget-redis:
    security_opt:
      - label=disable
    userns_mode: keep-id
