# Podman rootless overrides — applied automatically by install.sh when RUNTIME=podman
# Usage: podman compose -f docker/docker-compose.yml -f docker/docker-compose.podman-override.yml up -d

services:
  gateway:
    security_opt:
      - label=disable
    userns_mode: keep-id

  backoffice:
    security_opt:
      - label=disable
    userns_mode: keep-id

  policy:
    security_opt:
      - label=disable
    userns_mode: keep-id

  redis:
    security_opt:
      - label=disable
    userns_mode: keep-id

  ollama:
    security_opt:
      - label=disable
    userns_mode: keep-id

  ollama-init:
    security_opt:
      - label=disable
    userns_mode: keep-id

  prometheus:
    security_opt:
      - label=disable
    userns_mode: keep-id

  grafana:
    security_opt:
      - label=disable
    userns_mode: keep-id

  caddy:
    security_opt:
      - label=disable
    userns_mode: keep-id

  postgres:
    security_opt:
      - label=disable
    userns_mode: keep-id

  pgbouncer:
    security_opt:
      - label=disable
    userns_mode: keep-id

  alertmanager:
    security_opt:
      - label=disable
    userns_mode: keep-id

  loki:
    security_opt:
      - label=disable
    userns_mode: keep-id

  promtail:
    security_opt:
      - label=disable
    userns_mode: keep-id
    # Promtail cannot access container logs in Podman rootless mode —
    # /var/lib/docker/containers does not exist and Podman stores logs
    # in the user's home directory which is not bind-mountable from
    # within a rootless container. Disable promtail; use journald or
    # Loki's Podman log driver instead.
    profiles:
      - promtail-disabled

  otel-collector:
    security_opt:
      - label=disable
    userns_mode: keep-id

  jaeger:
    security_opt:
      - label=disable
    userns_mode: keep-id

  vault:
    security_opt:
      - label=disable
    userns_mode: keep-id

  open-webui:
    security_opt:
      - label=disable
    userns_mode: keep-id

  budget-redis:
    security_opt:
      - label=disable
    userns_mode: keep-id
