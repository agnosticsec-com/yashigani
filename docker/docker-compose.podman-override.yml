# Podman rootless overrides — applied automatically by install.sh when RUNTIME=podman
# Usage: podman compose -f docker/docker-compose.yml -f docker/docker-compose.podman-override.yml up -d

services:
  gateway:
    security_opt:
      - label=disable
    userns_mode: keep-id

  backoffice:
    security_opt:
      - label=disable
    userns_mode: keep-id

  policy:
    security_opt:
      - label=disable
    userns_mode: keep-id

  redis:
    security_opt:
      - label=disable
    userns_mode: keep-id

  ollama:
    security_opt:
      - label=disable
    userns_mode: keep-id

  ollama-init:
    security_opt:
      - label=disable
    userns_mode: keep-id

  prometheus:
    security_opt:
      - label=disable
    userns_mode: keep-id

  grafana:
    security_opt:
      - label=disable
    userns_mode: keep-id

  caddy:
    security_opt:
      - label=disable
    userns_mode: keep-id

  postgres:
    security_opt:
      - label=disable
    userns_mode: keep-id

  pgbouncer:
    security_opt:
      - label=disable
    userns_mode: keep-id

  alertmanager:
    security_opt:
      - label=disable
    userns_mode: keep-id

  loki:
    security_opt:
      - label=disable
    userns_mode: keep-id

  promtail:
    security_opt:
      - label=disable
    userns_mode: keep-id

  otel-collector:
    security_opt:
      - label=disable
    userns_mode: keep-id

  jaeger:
    security_opt:
      - label=disable
    userns_mode: keep-id

  vault:
    security_opt:
      - label=disable
    userns_mode: keep-id
