# ─────────────────────────────────────────────────────────────────────────────
# Yashigani — Service Identity Manifest (IaC-declared ecosystem allowlist)
# Last updated: 2026-05-26T00:00:00+01:00 (fix: move runtime bootstrap_token_sha256 to var/runtime/ — stop tracked-file drift)
#
# Every container that speaks inside the Yashigani mesh MUST have an entry
# here. Services not in this file cannot obtain an internal-CA-signed client
# certificate from install.sh and will fail the mTLS handshake at the edge.
#
# Contract (enforced by install.sh enroll_services + src/yashigani/pki):
#   name                  — compose service name (also DNS SAN on the cert)
#   dns_sans              — additional DNS SANs to embed (e.g. *.internal)
#   spiffe_id             — SPIFFE URI embedded as URI SAN on the leaf cert.
#                           Format: spiffe://yashigani.internal/<name>.
#                           Caddy extracts this from the validated peer cert
#                           and forwards it as the X-SPIFFE-ID header to the
#                           application-layer gate (see endpoint_acls below).
#                           Strictly generic — any service that terminates or
#                           originates mTLS inside the mesh gets one.
#   purpose               — one-line human description (required)
#   mtls_capable          — whether the service can terminate mTLS itself.
#                           false => the service uses the internal CA only as
#                           a client (e.g. Ollama has no TLS; relies on
#                           bridge-network isolation + bearer token).
#   bootstrap_token_sha256 — SHA-256 of the per-install bootstrap token that
#                            lives at ./secrets/<name>_bootstrap_token.
#                            SCHEMA PLACEHOLDER ONLY in this file ("").
#                            install.sh populates real values into
#                            docker/var/runtime/service_identities.yaml
#                            (git-ignored), which is what compose and the PKI
#                            issuer use at runtime. This file never changes on
#                            install — git status stays clean.
#   revoked               — operator kill switch. revoked: true => the next
#                            install.sh rotate-certs run skips this service
#                            and the current cert is allowed to expire. Used
#                            for incident response. A future canary hook can
#                            flip this programmatically (see docs/incident.md).
#
# This file is IaC — service shape (name, dns_sans, spiffe_id, purpose,
# mtls_capable, revoked) is committed and version-controlled. The per-install
# bootstrap_token_sha256 values are NOT committed; they live in the runtime
# manifest at docker/var/runtime/service_identities.yaml (gitignored).
# install.sh copies this file to the runtime path and populates the hashes.
#
# Cert lifetime: chosen at install time (YASHIGANI_CERT_LIFETIME_DAYS,
# range 30–365, default 90). Admins can change it later from
# /admin/settings/internal-pki and trigger a rotation.
# ─────────────────────────────────────────────────────────────────────────────

schema_version: 1

