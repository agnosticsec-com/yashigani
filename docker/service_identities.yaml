# ─────────────────────────────────────────────────────────────────────────────
# Endpoint ACLs — per-path SPIFFE-ID allowlists.
#
# Contract (enforced by yashigani.auth.spiffe.require_spiffe_id):
#   * Each key is an exact request path.
#   * allowed_spiffe_ids is the list of SPIFFE URIs permitted to hit that path.
#   * A request without an X-SPIFFE-ID header is rejected 401.
#   * A request whose header value is not in the list is rejected 403.
#   * A request to a path with NO entry here is rejected 403 (default-deny).
#
# The X-SPIFFE-ID header is only trustable when set by Caddy after peer-cert
# validation against the internal CA. Caddy strips any inbound occurrence of
# the header before setting its own from {http.request.tls.client.san.uris.0}.
# No other upstream is permitted to send this header.
# ─────────────────────────────────────────────────────────────────────────────
endpoint_acls:
  "/internal/metrics":
    allowed_spiffe_ids:
      - spiffe://yashigani.internal/prometheus

  # YSG-RISK-012b / ASVS V10.3.5 — SPIFFE binding on /admin/agents write routes.
  #
  # POST/PUT/DELETE /admin/agents and POST /admin/agents/{id}/token/rotate are
  # gated to two permitted callers:
  #
  #   caddy     — all admin-UI browser sessions reach the backoffice via Caddy's
  #               TLS reverse-proxy leg; Caddy presents caddy_client.crt, so the
  #               application-layer peer-cert SPIFFE URI is always
  #               spiffe://yashigani.internal/caddy.  This means a stolen admin
  #               session cookie cannot be replayed directly against backoffice:8443
  #               without also presenting Caddy's private key.
  #
  #   backoffice — install.sh agent-registration runs inside the backoffice
  #               container and calls localhost:8443 presenting
  #               backoffice_client.crt (same pattern as the Dockerfile
  #               HEALTHCHECK).  SPIFFE URI = spiffe://yashigani.internal/backoffice.
  #
  # All other callers — including any attacker who steals a session cookie and
  # replays it directly against the backoffice over mTLS with their own cert —
  # are rejected 403 spiffe_id_not_allowed at the application layer, before any
  # route handler executes.
  #
  # Closed: YSG-RISK-012b (2026-05-16) — commit see risk register.
  "/admin/agents":
    allowed_spiffe_ids:
      - spiffe://yashigani.internal/caddy
      - spiffe://yashigani.internal/backoffice

# ─────────────────────────────────────────────────────────────────────────────
# Cert policy — two-tier PKI (root → intermediate → leaf).
#
# Bounds here are the hard min/max enforced by install.sh and the
# /admin/settings/internal-pki API. The running values live in
# docker/.env + the Postgres settings table so admin-UI edits persist
# without touching IaC. install.sh reads docker/.env on each run.
#
# Rotation model:
#   * Leaf certs (service client certs) — auto-reissued when <33% of
#     lifetime remains. No downtime: services reload certs on HUP.
#   * Intermediate — auto-reissued by cron (same threshold). Existing
#     leaves remain valid because the root didn't change; new leaves
#     get signed by the new intermediate.
#   * Root — never auto. Separate "Rotate Root CA" admin action with
#     explicit confirmation and an operator-scheduled maintenance window.
#     A fresh install sets root lifetime once; subsequent edits to
#     root_lifetime_years only affect the NEXT root rotation event.
# ─────────────────────────────────────────────────────────────────────────────
cert_policy:
  # ── Root CA ─────────────────────────────────────────────────────────────
  root_lifetime_years_min: 5
  root_lifetime_years_max: 20
  root_lifetime_years_default: 10
  root_rotation_requires_manual_confirmation: true

  # ── Intermediate CA ─────────────────────────────────────────────────────
  intermediate_lifetime_days_min: 90
  intermediate_lifetime_days_max: 365
  intermediate_lifetime_days_default: 180

  # ── Leaf (service client certs) ─────────────────────────────────────────
  leaf_lifetime_days_min: 30
  leaf_lifetime_days_max: 90
  leaf_lifetime_days_default: 90

  # Re-issue when less than this fraction of lifetime remains.
  renewal_threshold: 0.33

# ─────────────────────────────────────────────────────────────────────────────
# CA source — tier-gated. The install-time prompt and the admin API refuse
# to select a mode the current license does not entitle.
#
#   yashigani_generated — Community / Starter / Pro / Enterprise
#     Default. Caddy's pki module bootstraps the root; install.sh derives
#     an intermediate from it; leaves signed by the intermediate.
#
#   byo_intermediate    — Professional / Enterprise
#     Operator uploads their own intermediate cert + key (signed by their
#     own corporate root). Yashigani mints leaves under it. Root stays
#     offline / in their HSM. Their root goes into every service's trust
#     bundle as the sole trust anchor.
#     [Implementation: v2.23.2 — admin API accepts upload, install.sh
#      skips root generation when mode=byo_intermediate.]
#
#   byo_root            — Enterprise
#     Full BYO. Operator supplies root and intermediate. We don't sign
#     anything at any tier; we only issue leaves against their supplied
#     intermediate. Compatible with HSM-backed corporate PKI.
#     [Implementation: v2.23.2.]
#
#   remote_acme         — Enterprise
#     Every leaf cert is signed by an external ACME / ACMEv2 endpoint
#     (step-ca, AWS Private CA, HashiCorp Vault PKI, Smallstep Cloud).
#     Yashigani runs an ACME client per service. Their CA is the only
#     trust anchor. Most appropriate for large orgs with existing
#     corporate PKI automation.
#     [Implementation: v2.23.2 — drivers: step-ca, aws-pca, vault-pki,
#      acme-eab.]
#
# Tier gate (v2.23.1 — this release):
#   License tier is checked server-side on /admin/settings/internal-pki.
#   Selecting a tier-gated mode below your license returns 402 with an
#   upgrade CTA. In v2.23.1 the non-default modes are accepted by the API
#   but install.sh returns 501 "BYO-CA coming in v2.23.2" until drivers
#   ship.
# ─────────────────────────────────────────────────────────────────────────────
ca_source:
  mode: yashigani_generated
  # Populated only when mode != yashigani_generated:
  byo:
    root_cert_path: ""
    intermediate_cert_path: ""
    intermediate_key_path: ""
  remote_acme:
    driver: ""              # step-ca | aws-pca | vault-pki | acme-eab
    directory_url: ""
    eab_kid: ""
    eab_hmac_key_secret_ref: ""
  min_license_tier:
    yashigani_generated: community
    byo_intermediate: professional
    byo_root: enterprise
    remote_acme: enterprise

# ─────────────────────────────────────────────────────────────────────────────
# Future hook: canary-triggered revocation.
# If a service's canary endpoint fires, a small daemon (not yet implemented,
# tracked as v2.24 follow-up) will PATCH this file to set revoked: true on
# the offending service, commit, and push to the ops branch for operator
# review. Purely a design anchor — no runtime behaviour yet.
# ─────────────────────────────────────────────────────────────────────────────
canary_policy:
  auto_revoke_on_canary_hit: false
  canary_branch: "ops/canary-revocations"
