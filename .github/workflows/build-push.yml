name: Build & Push Images

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-push:
    name: Build, Push, Sign & SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
        with:
          driver: docker-container
      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: agnosticsec-com
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Metadata gateway
        id: meta-gateway
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/yashigani-gateway
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
      - name: Metadata backoffice
        id: meta-backoffice
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/yashigani-backoffice
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
      - name: Build & push gateway
        id: build-gateway
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: docker/Dockerfile.gateway
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-gateway.outputs.tags }}
          labels: ${{ steps.meta-gateway.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
      - name: Build & push backoffice
        id: build-backoffice
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: docker/Dockerfile.backoffice
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-backoffice.outputs.tags }}
          labels: ${{ steps.meta-backoffice.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign gateway
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository_owner }}/yashigani-gateway@${{ steps.build-gateway.outputs.digest }}
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
      - name: Sign backoffice
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository_owner }}/yashigani-backoffice@${{ steps.build-backoffice.outputs.digest }}
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
      - name: SBOM gateway
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/yashigani-gateway@${{ steps.build-gateway.outputs.digest }}
          format: spdx-json
          output-file: sbom-gateway.spdx.json
      - uses: anchore/sbom-action/publish-sbom@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          sbom-artifact-match: ".*gateway.*\\.spdx\\.json$"
      - name: SBOM backoffice
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/yashigani-backoffice@${{ steps.build-backoffice.outputs.digest }}
          format: spdx-json
          output-file: sbom-backoffice.spdx.json
      - uses: anchore/sbom-action/publish-sbom@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          sbom-artifact-match: ".*backoffice.*\\.spdx\\.json$"
