# Last updated: 2026-05-03T00:00:00+01:00
name: CI

on:
  push:
    branches: [main, "release/**", "v2.23.*", "2.23.x"]
  pull_request:
    branches: [main, "release/**", "v2.23.*", "2.23.x"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  statuses: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: |
          python -m pytest src/tests/ -x -q --tb=short \
            --junitxml=test-results-${{ matrix.python-version }}.xml
        # --junitxml: machine-readable results for artifact archive; always produced
        # even when -x aborts early so the artifact upload step gets a file.

      - name: Build pytest verdict
        if: always()
        run: |
          python - <<'PYEOF'
          import xml.etree.ElementTree as ET, sys, os

          xml_path = f"test-results-{os.environ['PYTHON_VERSION']}.xml"
          try:
              tree = ET.parse(xml_path)
              root = tree.getroot()
              suite = root if root.tag == 'testsuite' else root.find('testsuite')
              total   = int(suite.get('tests',  0))
              errors  = int(suite.get('errors',  0))
              failed  = int(suite.get('failures', 0))
              skipped = int(suite.get('skipped',  0))
              passed  = total - failed - errors - skipped
              status  = 'PASS' if (failed + errors) == 0 else 'FAIL'
          except Exception as exc:
              total = passed = skipped = 0
              failed = errors = 1
              status = 'FAIL'
              print(f"[ERROR] could not parse junit xml: {exc}", file=sys.stderr)

          verdict_path = f"verdict-{os.environ['PYTHON_VERSION']}.txt"
          with open(verdict_path, 'w') as f:
              f.write(f"Unit tests: {status}\n")
              f.write(f"Python: {os.environ['PYTHON_VERSION']}\n")
              f.write(f"Total: {total}\n")
              f.write(f"Passed: {passed}\n")
              f.write(f"Failed: {failed + errors}\n")
              f.write(f"Skipped: {skipped}\n")
              f.write(f"Commit: {os.environ.get('GITHUB_SHA', 'unknown')}\n")
              f.write(f"Workflow: {os.environ.get('GITHUB_WORKFLOW', 'CI')}\n")
              f.write(f"Run: {os.environ.get('GITHUB_RUN_ID', 'unknown')}\n")
          print(open(verdict_path).read())
          PYEOF
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}

      - name: Upload unit-test artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: unit-tests-py${{ matrix.python-version }}-${{ github.sha }}
          path: |
            test-results-${{ matrix.python-version }}.xml
            verdict-${{ matrix.python-version }}.txt
          retention-days: 90

      - name: Verify all package imports
        run: |
          for pkg in $(find src/yashigani -name "__init__.py" -exec dirname {} \; | sed 's|src/||' | tr '/' '.' | sort); do
            python -c "import $pkg" || exit 1
          done

      - name: Shell script syntax check
        run: |
          for f in install.sh update.sh scripts/*.sh; do
            bash -n "$f" || exit 1
          done

      - name: YAML validation
        run: |
          python -c "import yaml; yaml.safe_load(open('docker/docker-compose.yml'))"
          python -c "import yaml; yaml.safe_load(open('docker/docker-compose.podman-override.yml'))"

      - name: Version consistency check
        run: |
          PY_VER=$(python -c "import yashigani; print(yashigani.__version__)")
          TOML_VER=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$PY_VER" != "$TOML_VER" ]; then
            echo "Version mismatch: __init__.py=$PY_VER pyproject.toml=$TOML_VER"
            exit 1
          fi
          echo "Version consistent: $PY_VER"

  lint-sudo-pattern:
    runs-on: ubuntu-latest
    # Fast grep-based gate — no Python install needed. Fails immediately if any
    # file outside the documented exclusion list introduces a forbidden sudo
    # pattern. See scripts/lint_sudo_pattern.sh for the two detected classes.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check for forbidden sudo patterns
        run: bash scripts/lint_sudo_pattern.sh .

  lint-tmp-paths:
    runs-on: ubuntu-latest
    # V232-P23: fail if any host-side installer, restore, or script introduces
    # /tmp/ file paths (project policy — all work must stay under the
    # install dir, never /tmp). Excludes legitimate container-internal paths
    # (Dockerfile RUN layers, Helm tmpfs mounts, SSH heredoc VM-side paths).
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check for host-filesystem /tmp/ paths
        run: bash scripts/lint_tmp_paths.sh .

  lint-safe-error-envelope:
    runs-on: ubuntu-latest
    # V232-CSCAN-01e: fail if any route or gateway file inlines str(exc) directly
    # into an HTTP response body. Use safe_error_envelope() instead.
    # Pattern matches: {"error": str(exc)} or similar inline exception-to-response.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check for str(exc) in HTTP responses (V232-CSCAN-01e/01j)
        run: |
          # V232-CSCAN-01e/01g/01j: guard all migrated files.
          # Fail if str(exc) or f-string {exc} is re-introduced in any of them.
          MIGRATED_FILES=(
            src/yashigani/backoffice/routes/cache.py
            src/yashigani/backoffice/routes/inspection_backend.py
            src/yashigani/backoffice/routes/kms.py
            src/yashigani/backoffice/routes/sensitivity.py
            src/yashigani/gateway/openai_router.py
            src/yashigani/backoffice/routes/services.py
            src/yashigani/backoffice/routes/dashboard.py
            src/yashigani/backoffice/routes/kms_vault.py
            src/yashigani/backoffice/routes/jwt_config.py
            src/yashigani/backoffice/routes/webauthn.py
            src/yashigani/backoffice/routes/audit.py
            src/yashigani/backoffice/routes/ratelimit.py
            src/yashigani/backoffice/routes/inspection.py
            src/yashigani/backoffice/routes/opa_assistant.py
            src/yashigani/backoffice/routes/rbac.py
          )
          # Pattern covers all known inline str(exc) / f-string {exc} forms.
          HITS=$(grep -En \
            '"error"[[:space:]]*:[[:space:]]*str\(exc\)|"message"[[:space:]]*:[[:space:]]*str\(exc\)|"message"[[:space:]]*:[[:space:]]*f"[^"]*\{exc\}|"detail"[[:space:]]*:[[:space:]]*str\(exc\)|"detail"[[:space:]]*:[[:space:]]*f"[^"]*\{exc\}' \
            "${MIGRATED_FILES[@]}" \
            || true)
          if [ -n "$HITS" ]; then
            echo "ERROR: str(exc) or f-string {exc} found in HTTP response body in a migrated file."
            echo "Use safe_error_envelope() from yashigani.common.error_envelope instead."
            echo ""
            echo "$HITS"
            exit 1
          fi
          echo "OK: no inline str(exc) in migrated error-envelope files."

  mypy:
    runs-on: ubuntu-latest
    # Run on Python 3.12 only — type stubs are stable; 3.13 parity is not
    # required for a type-check gate (would just duplicate findings).

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run mypy
        id: run_mypy
        # --xml-report writes mypy-xml/index.xml; always() ensures the upload
        # step runs even when mypy exits non-zero (i.e. on type errors).
        run: |
          mypy src/yashigani/ \
            --xml-report mypy-xml \
            --any-exprs-report mypy-xml \
            2>&1 | tee mypy-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Build mypy verdict
        if: always()
        run: |
          python - <<'PYEOF'
          import re, os

          output_path = "mypy-output.txt"
          try:
              text = open(output_path).read()
          except FileNotFoundError:
              text = ""

          # mypy summary line: "Found N errors in M files (checked K source files)"
          # or "Success: no issues found in K source files"
          error_match = re.search(r'Found (\d+) error', text)
          success_match = re.search(r'Success: no issues found', text)
          checked_match = re.search(r'checked (\d+) source files', text)

          errors = int(error_match.group(1)) if error_match else 0
          checked = int(checked_match.group(1)) if checked_match else 0
          status = 'PASS' if (success_match or errors == 0) else 'FAIL'

          with open("mypy-summary.txt", "w") as f:
              f.write(f"Type check: {status}\n")
              f.write(f"Errors: {errors}\n")
              f.write(f"Files checked: {checked}\n")
              f.write(f"Commit: {os.environ.get('GITHUB_SHA', 'unknown')}\n")
              f.write(f"Workflow: {os.environ.get('GITHUB_WORKFLOW', 'CI')}\n")
              f.write(f"Run: {os.environ.get('GITHUB_RUN_ID', 'unknown')}\n")
          print(open("mypy-summary.txt").read())
          PYEOF

      - name: Upload mypy artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: mypy-${{ github.sha }}
          path: |
            mypy-xml/
            mypy-output.txt
            mypy-summary.txt
          retention-days: 90

      - name: Fail if mypy found errors
        # Deferred exit so the artifact is always uploaded regardless of result.
        if: steps.run_mypy.outputs.exit_code != '0'
        run: |
          echo "mypy reported type errors — see mypy-output.txt artifact"
          exit 1

  helm-template-parity:
    # Fast contract test — no Helm/tiller required, pure Python regex over raw
    # template text. Catches the 1a6db9f class of regression (env vars silently
    # dropped from one service template during re-templating).
    # 7 parametrised green-tip specs + 3 in-process mutation guards.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install test deps
        run: pip install "pytest>=8"

      - name: Run Helm env-parity contract tests
        run: python3 -m pytest tests/contracts/test_helm_env_parity.py -v --tb=short

  contracts:
    runs-on: ubuntu-latest
    # Integration-contract gate: verifies that shared artefacts that must be
    # identical across runtimes (docker/ vs helm/) have not drifted. Fails fast
    # — no matrix, no Python version permutations needed for a file-hash check.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest

      - name: service_identities.yaml SHA parity
        # Fails if docker/ canonical and helm/files/ derived copy have diverged.
        # Fix: edit docker/service_identities.yaml, run `make sync-service-identities`,
        # commit both files. See docs/development/service_identities.md.
        run: python3 -m pytest tests/contracts/test_service_identities_sha.py -v

      - name: make check-service-identities (shell gate)
        # Independent shell-level check using shasum — catches any pytest
        # collection failure masking a real drift.
        run: make check-service-identities

      - name: Caddyfile family contract tests
        # Anti-rot gate (V232-D06+P11): catches drift re-emerging after the 73
        # reverse_proxy block audit.  Asserts inject-caddy-verified coverage on
        # all mTLS proxies, TLS 1.3 minimum, GCM-only ciphers, client_auth
        # placement, and cross-file count consistency.  Includes mutation guards
        # that verify the test itself fails on a tampered fixture (SOP 4).
        # caddy adapt steps are skipped here (no caddy binary in ubuntu-latest);
        # they run locally when CADDY_BIN is set or caddy is on PATH.
        run: python3 -m pytest tests/contracts/test_caddyfile_family.py -v --tb=short

      - name: Partition maintenance helm parity
        # Asserts the embedded partition_maintenance.py in configmaps.yaml is
        # byte-identical to scripts/partition_maintenance.py for all SQL-bearing
        # lines and security-critical functions (CWE-89 / YSG-RISK-001 controls).
        # Internal re-audit YCS-20260502-v2.23.1-CWE89-reaudit-001 follow-up #3.
        run: python3 tools/check_partition_helm_parity.py
