# Last updated: 2026-05-02T10:00:00+01:00
name: Tag — GPG Sign & Verify

# Triggered when a version tag is pushed (e.g. v2.23.2).
# This workflow:
#   1. Imports the Agnostic Security GPG release signing key from GitHub Secrets.
#   2. Deletes the unsigned/annotated-only tag that triggered it.
#   3. Re-creates the same tag as a GPG-signed annotated tag at the same commit.
#   4. Force-pushes the signed tag back to origin.
#   5. Verifies the signature; fails if verification fails.
#
# For new releases: this runs automatically after the tag is pushed.
# For retroactive signing: dispatch manually via workflow_dispatch with
#   the tag name and commit SHA inputs.
#
# GPG key setup (one-time, per-team):
#   1. Generate: gpg --full-generate-key (RSA 4096, releases@agnosticsec.com)
#   2. Export private: gpg --armor --export-secret-keys releases@agnosticsec.com
#   3. Store in GitHub Secrets: GPG_PRIVATE_KEY (armored), GPG_PASSPHRASE
#   4. Export public: gpg --armor --export releases@agnosticsec.com
#   5. Commit public key to: docs/release-signing-key.asc

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to sign (e.g. v2.23.1)'
        required: true
        type: string
      commit_sha:
        description: 'Commit SHA the tag points to (full 40-char)'
        required: true
        type: string

concurrency:
  group: tag-sign-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # push signed tag back

jobs:
  sign-tag:
    name: GPG Sign Release Tag
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout (full history — needed to resolve tag commits)
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          fetch-tags: true

      # -----------------------------------------------------------------------
      # 2. Resolve tag and commit from trigger source
      # -----------------------------------------------------------------------
      - name: Resolve tag and commit
        id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
            COMMIT="${{ inputs.commit_sha }}"
          else
            TAG="${GITHUB_REF_NAME}"
            COMMIT="${GITHUB_SHA}"
          fi

          # Validate tag format
          if ! echo "${TAG}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$'; then
            echo "ERROR: Tag '${TAG}' does not match vN.N.N or vN.N.N-rc.N" >&2
            exit 1
          fi

          # For push triggers, resolve via git (GITHUB_SHA is the commit, not tag object)
          if [[ "${{ github.event_name }}" == "push" ]]; then
            # The tag may point to a tag object; dereference to commit
            COMMIT=$(git rev-parse "${TAG}^{commit}" 2>/dev/null || echo "${COMMIT}")
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "commit=${COMMIT}" >> "$GITHUB_OUTPUT"
          echo "Resolved: tag=${TAG} commit=${COMMIT}"

      # -----------------------------------------------------------------------
      # 3. Check if tag is already GPG-signed
      # -----------------------------------------------------------------------
      - name: Check existing signature
        id: sig_check
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          # Fetch the tag object and look for PGP header
          if git cat-file tag "${TAG}" 2>/dev/null | grep -q "BEGIN PGP SIGNATURE"; then
            echo "already_signed=true" >> "$GITHUB_OUTPUT"
            echo "[INFO] Tag ${TAG} is already GPG-signed."
          else
            echo "already_signed=false" >> "$GITHUB_OUTPUT"
            echo "[INFO] Tag ${TAG} is unsigned — proceeding to sign."
          fi

      # -----------------------------------------------------------------------
      # 4. Skip if already signed (idempotency guard)
      # -----------------------------------------------------------------------
      - name: Skip if already signed
        if: steps.sig_check.outputs.already_signed == 'true'
        run: |
          echo "[INFO] Tag is already signed. Nothing to do."
          echo "To re-sign, first delete the tag on origin and re-run."

      # -----------------------------------------------------------------------
      # 5. Import GPG release signing key
      # -----------------------------------------------------------------------
      - name: Import GPG key
        if: steps.sig_check.outputs.already_signed == 'false'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE:  ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [[ -z "${GPG_PRIVATE_KEY}" ]]; then
            echo "ERROR: GitHub secret GPG_PRIVATE_KEY is not set." >&2
            echo "See docs/release-process.md §9 for key setup instructions." >&2
            exit 1
          fi
          echo "${GPG_PRIVATE_KEY}" | gpg --batch --import
          # Retrieve the imported key fingerprint
          KEY_FP=$(gpg --list-secret-keys --with-colons 'releases@agnosticsec.com' \
            | awk -F: '/^sec/ { print $5 }' | head -1)
          echo "KEY_FP=${KEY_FP}" >> "$GITHUB_ENV"
          echo "[INFO] Imported key fingerprint: ${KEY_FP}"

          # Pre-set ultimate trust so git tag -v passes without interactive prompting
          echo "${KEY_FP}:6:" | gpg --import-ownertrust

      # -----------------------------------------------------------------------
      # 6. Configure git identity for the signed tag
      # -----------------------------------------------------------------------
      - name: Configure git
        if: steps.sig_check.outputs.already_signed == 'false'
        run: |
          git config user.name  "Agnostic Security Releases"
          git config user.email "releases@agnosticsec.com"
          git config user.signingkey "${KEY_FP}"
          git config tag.gpgsign true

      # -----------------------------------------------------------------------
      # 7. Capture existing tag message (to preserve on re-sign)
      # -----------------------------------------------------------------------
      - name: Capture tag message
        if: steps.sig_check.outputs.already_signed == 'false'
        id: tag_msg
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          COMMIT="${{ steps.resolve.outputs.commit }}"

          # Extract the body of the existing tag object (strip header lines)
          MSG=$(git cat-file tag "${TAG}" 2>/dev/null | sed '1,/^$/d' || echo "Yashigani ${TAG}")
          echo "msg<<MSG_EOF" >> "$GITHUB_OUTPUT"
          echo "${MSG}"      >> "$GITHUB_OUTPUT"
          echo "MSG_EOF"     >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # 8. Delete the unsigned tag locally and re-create as signed
      # -----------------------------------------------------------------------
      - name: Create signed tag
        if: steps.sig_check.outputs.already_signed == 'false'
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          COMMIT="${{ steps.resolve.outputs.commit }}"
          MSG="${{ steps.tag_msg.outputs.msg }}"

          # Delete the existing (unsigned) local tag
          git tag -d "${TAG}" 2>/dev/null || true

          # Re-create as signed annotated tag
          echo "${GPG_PASSPHRASE}" | gpg --batch --yes \
            --pinentry-mode loopback \
            --passphrase-fd 0 \
            --armor --output /dev/null --sign /dev/null 2>/dev/null || true

          git -c "gpg.program=gpg" tag -s "${TAG}" "${COMMIT}" \
            --local-user "releases@agnosticsec.com" \
            -m "${MSG}"

          echo "[INFO] Signed tag created: ${TAG} -> ${COMMIT}"

      # -----------------------------------------------------------------------
      # 9. Verify the signature locally before pushing
      # -----------------------------------------------------------------------
      - name: Verify signature
        if: steps.sig_check.outputs.already_signed == 'false'
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          VERIFY_OUT=$(git tag -v "${TAG}" 2>&1)
          echo "${VERIFY_OUT}"
          if ! echo "${VERIFY_OUT}" | grep -qiE "(good signature|gpg: Signature made)"; then
            echo "ERROR: Signature verification failed. Tag NOT pushed." >&2
            exit 1
          fi
          echo "[INFO] Signature: GOOD"

      # -----------------------------------------------------------------------
      # 10. Force-push the signed tag to origin
      # -----------------------------------------------------------------------
      - name: Push signed tag
        if: steps.sig_check.outputs.already_signed == 'false'
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          git push origin "refs/tags/${TAG}" --force
          echo "[INFO] Signed tag ${TAG} pushed to origin."

      # -----------------------------------------------------------------------
      # 11. Summary
      # -----------------------------------------------------------------------
      - name: Summary
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          COMMIT="${{ steps.resolve.outputs.commit }}"
          ALREADY="${{ steps.sig_check.outputs.already_signed }}"

          if [[ "${ALREADY}" == "true" ]]; then
            echo "## Tag Signing — Skipped (already signed)" >> "$GITHUB_STEP_SUMMARY"
            echo "Tag \`${TAG}\` was already GPG-signed. No action taken." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Tag Signing — Success" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
            echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| Tag | \`${TAG}\` |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Commit | \`${COMMIT}\` |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Signer | releases@agnosticsec.com |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Method | GPG (git tag -s) |" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Verify the signature:**" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`sh" >> "$GITHUB_STEP_SUMMARY"
            echo "gpg --import docs/release-signing-key.asc" >> "$GITHUB_STEP_SUMMARY"
            echo "git fetch --tags --force origin" >> "$GITHUB_STEP_SUMMARY"
            echo "git tag -v ${TAG}" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          fi
