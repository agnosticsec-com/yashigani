# Last updated: 2026-05-03T12:00:00+01:00
# install-smoke.yml — Install smoke-test matrix (V232-P1)
#
# Matrix: ubuntu-latest × (docker|podman) — GATE
#         macos-latest  × (docker|podman) — INFORMATIONAL (self-hosted required)
#
# GH hosted macOS runners (macos-latest = Sonoma/Sequoia arm64) do NOT support
# the Apple Virtualization Framework (VZ) or nested virtualization. Both Colima
# (Docker on macOS) and Podman machine (Podman on macOS) require VZ to start a
# VM-backed daemon. GH hosted runners fail at `colima start` / `podman machine
# start` with "exiting, status={Exiting:true}" / "Setting up Rosetta share".
# macOS cells are therefore set continue-on-error: true and excluded from the
# smoke-gate. They are retained in the matrix so they run automatically when
# self-hosted macOS runners are available (set runs-on to the self-hosted label
# and remove continue-on-error: true from macOS cells).
#
# Runner cost (GH hosted):
#   Linux cells: 2 × ~12 min × 1× = ~24 Linux-equivalent minutes per run.
#   macOS cells: run but don't block (expected to fail during setup).
#   Runs only on PRs/pushes to 2.23.x — not on every branch push.
#
# WORK_DIR note:
#   YSG_INSTALL_DIR is intentionally NOT set. The installer resolves WORK_DIR
#   from its own script path (the checkout dir, which contains docker/docker-compose.yml).
#   Setting YSG_INSTALL_DIR to the workspace would trigger the "existing installation
#   found" path, which sets SKIP_PULL=true and bypasses the compose build.

name: Install Smoke Matrix

on:
  push:
    branches: ["2.23.x", "feat/v232-install-smoke-matrix*"]
  pull_request:
    branches: ["2.23.x"]
  workflow_dispatch: {}

concurrency:
  group: install-smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# ---------------------------------------------------------------------------
# Smoke matrix
# ---------------------------------------------------------------------------
jobs:
  smoke:
    name: "smoke / ${{ matrix.os-label }} / ${{ matrix.runtime }}"
    strategy:
      fail-fast: false   # surface all failing cells, not just the first
      matrix:
        include:
          - os: ubuntu-latest
            os-label: linux
            runtime: docker
            gates: true       # included in smoke-gate

          - os: ubuntu-latest
            os-label: linux
            runtime: podman
            gates: true       # included in smoke-gate

          - os: macos-latest
            os-label: macos
            runtime: docker
            gates: false      # informational — requires self-hosted runner for VZ

          - os: macos-latest
            os-label: macos
            runtime: podman
            gates: false      # informational — requires self-hosted runner for VZ

    runs-on: ${{ matrix.os }}
    # macOS cells continue-on-error because GH hosted runners lack VZ support.
    # Remove continue-on-error when pointing macos cells at self-hosted runners.
    continue-on-error: ${{ !matrix.gates }}
    timeout-minutes: 25   # hard ceiling: prevents runaway bill if compose hangs

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.sha }}

      # -----------------------------------------------------------------------
      # Runtime setup — Linux / Docker
      # Docker is pre-installed on ubuntu-latest; daemon is running.
      # -----------------------------------------------------------------------
      - name: "[linux/docker] Verify Docker daemon"
        if: matrix.os-label == 'linux' && matrix.runtime == 'docker'
        run: |
          docker info
          docker compose version

      # -----------------------------------------------------------------------
      # Runtime setup — Linux / Podman
      # ubuntu-latest ships podman 4.x; compose plugin via podman-compose.
      # Rootless requires subuid/subgid entries (absent on GH runners by default).
      # We run rootful podman (sudo-started daemon) to avoid the subuid dance.
      # -----------------------------------------------------------------------
      - name: "[linux/podman] Install podman-compose + configure rootful"
        if: matrix.os-label == 'linux' && matrix.runtime == 'podman'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq podman podman-compose
          # Rootful: confirm podman socket is reachable
          sudo systemctl start podman.socket 2>/dev/null || true
          podman --version
          podman-compose version

      # -----------------------------------------------------------------------
      # Runtime setup — macOS / Docker
      # GH-hosted macos-latest (Sonoma/arm64) ships the Docker CLI but no daemon.
      # Colima provides a lightweight VM-backed daemon via the Docker socket.
      # brew install colima pulls ~150 MB; colima start takes ~90 s on arm64.
      # -----------------------------------------------------------------------
      - name: "[macos/docker] Install Colima + start Docker daemon"
        if: matrix.os-label == 'macos' && matrix.runtime == 'docker'
        run: |
          brew install colima docker docker-compose 2>/dev/null || true
          colima start --cpu 2 --memory 4 --disk 20 --arch aarch64 --vm-type vz --vz-rosetta 2>/dev/null || \
            colima start --cpu 2 --memory 4 --disk 20
          # Give the socket a moment to settle
          sleep 5
          docker info
          docker compose version

      # -----------------------------------------------------------------------
      # Runtime setup — macOS / Podman
      # Podman machine provides the daemon via a VM on macOS.
      # -----------------------------------------------------------------------
      - name: "[macos/podman] Install Podman + init machine"
        if: matrix.os-label == 'macos' && matrix.runtime == 'podman'
        run: |
          brew install podman podman-compose 2>/dev/null || true
          # Init and start the Podman machine (VM-backed on macOS)
          podman machine init --cpus 2 --memory 4096 --disk-size 20 ysg-smoke || true
          podman machine start ysg-smoke
          # Confirm connectivity
          podman info
          podman-compose version

      # -----------------------------------------------------------------------
      # Run the installer
      # --non-interactive  → no TTY prompts, demo mode auto-selected
      # --deploy demo      → explicit demo mode (self-signed TLS, localhost)
      # --runtime <r>      → lock runtime (admin selects podman/docker/k8s)
      # --skip-preflight   → skip disk/memory checks that fail on thin runners
      #
      # YSG_RUNTIME is set as an env var so health-check.sh compose-detection
      # also picks it up (health-check.sh reads YSG_RUNTIME independently).
      #
      # YSG_INSTALL_DIR is intentionally absent — installer uses $HOME/.yashigani
      # as the default install target, and resolves WORK_DIR from its own script
      # path (the checkout dir). Setting it to $GITHUB_WORKSPACE would trigger
      # the "existing installation" upgrade path and bypass compose build.
      #
      # DOCKER_DEFAULT_PLATFORM: the Dockerfiles currently pin arm64-specific
      # digest SHAs (built on an M-chip Mac dev machine). On amd64 GH runners
      # those digests fail with "exec format error". Setting DOCKER_DEFAULT_PLATFORM
      # tells BuildKit to pull the amd64 variant of the multi-arch manifest for
      # the same image tag, bypassing the pinned digest. This is a temporary
      # workaround; the correct long-term fix is to update digest pins to the
      # amd64 SHA or to use a multi-arch pin + explicit --platform in Dockerfiles
      # (tracked as V232-SMOKE-001 in the v2.23.2 backlog).
      # -----------------------------------------------------------------------
      # Node.js setup (V232-CSCAN-01i)
      # Open-redirect JS-execution tests (test_v2232_open_redirect_cscan_01d.py)
      # call `node --input-type=module` via subprocess.  Without Node on PATH the 26
      # dynamic tests in TestSafeNextRejectsOffOriginCases and TestSafeNextAcceptsLegitimatePaths
      # silently skip.  Node 22 LTS is pre-installed on ubuntu-latest and macos-latest
      # GH runners, but actions/setup-node@v4 guarantees the exact version and adds it
      # to PATH regardless of runner vintage.
      # -----------------------------------------------------------------------
      - name: "Setup Node.js 22 LTS for JS unit tests"
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      # -----------------------------------------------------------------------
      # V232-SMOKE-001 (pre-existing): Dockerfiles AND docker-compose.yml pin arm64
      # digest SHAs (built/generated on an M-chip Mac dev machine). On amd64 GH
      # runners those layers fail with "exec /bin/sh: exec format error" for both
      # images built from source (gateway, backoffice) AND pre-pulled images
      # (redis, postgres, caddy, prometheus, OPA, loki, jaeger, ollama, etc.).
      # DOCKER_DEFAULT_PLATFORM=linux/amd64 does NOT override an explicit @sha256:
      # digest — BuildKit/Docker always pulls the pinned layer regardless.
      # Work-around: strip @sha256:... from both Dockerfile FROM lines and compose
      # image: fields before install runs. Permanent fix (release engineering): update all
      # digest pins to amd64 or add explicit --platform directives.
      # Tracked as V232-SMOKE-001 in the v2.23.2 backlog.
      - name: "[ci] Strip arm64 digest pins for amd64 runner compatibility"
        if: matrix.os-label == 'linux'
        run: |
          # Strip @sha256:... from Dockerfile FROM lines and docker-compose image: lines
          # so BuildKit/Docker pulls the tag's native amd64 manifest instead of the
          # pinned arm64 layer. Only affects the local workspace copy; committed files
          # are untouched. Covers both images we build (Dockerfiles) and pre-built
          # images pulled at runtime (compose image: fields — redis, postgres, caddy,
          # prometheus, OPA, loki, jaeger, ollama, etc.). Without stripping compose
          # image pins those containers crash immediately with "exec format error".
          python3 - <<'PYEOF'
          import re, glob

          DIGEST_RE = re.compile(r'@sha256:[a-f0-9]{64}')

          # Dockerfile FROM lines: FROM <image>@sha256:... [AS stage]
          for path in glob.glob("docker/Dockerfile*"):
              with open(path) as f:
                  content = f.read()
              patched = re.sub(
                  r'(^FROM\s+\S+)@sha256:[a-f0-9]{64}',
                  r'\1',
                  content,
                  flags=re.MULTILINE
              )
              if patched != content:
                  with open(path, 'w') as f:
                      f.write(patched)
                  print(f"Dockerfile stripped: {path}")
              else:
                  print(f"Dockerfile no pins: {path}")

          # Compose image: fields: image: <name>@sha256:...
          for path in glob.glob("docker/docker-compose*.yml"):
              with open(path) as f:
                  content = f.read()
              patched = re.sub(
                  r'(image:\s*\S+)@sha256:[a-f0-9]{64}',
                  r'\1',
                  content
              )
              if patched != content:
                  with open(path, 'w') as f:
                      f.write(patched)
                  print(f"Compose stripped: {path}")
              else:
                  print(f"Compose no pins: {path}")
          PYEOF

      - name: Run installer
        env:
          YSG_RUNTIME: ${{ matrix.runtime }}
          CI: "true"
        run: |
          chmod +x install.sh
          # Capture install exit code correctly — do NOT pipe through tee.
          # `cmd | tee` reports tee's exit code (0), not cmd's, so a failed
          # install would appear green while the stack never starts.
          set +e
          ./install.sh \
            --non-interactive \
            --deploy demo \
            --runtime "${{ matrix.runtime }}" \
            --skip-preflight \
            > install.log 2>&1
          install_exit=$?
          set -e
          cat install.log   # surface output to GH Actions log viewer
          echo "installer exit code: $install_exit"
          exit $install_exit
        timeout-minutes: 18   # inner timeout; outer job timeout is 25

      # -----------------------------------------------------------------------
      # Smoke assertion: gateway /healthz → HTTP 200
      # Port selection:
      #   Linux: Caddy binds 443 (Docker handles host port mapping as root).
      #   macOS: installer falls back to 8443 (cannot bind 443 on macOS non-root).
      # Try 443 first; if no response within 30 s try 8443.
      # -k: self-signed TLS in demo mode.
      # Total window: 300 s (30 attempts × 10 s).
      # -----------------------------------------------------------------------
      - name: "Assert gateway /healthz → 200"
        run: |
          echo "Detecting HTTPS port..."
          # Read from .env if installer wrote YASHIGANI_HTTPS_PORT
          ENV_FILE="${HOME}/.yashigani/docker/.env"
          [ -f "$ENV_FILE" ] || ENV_FILE="${GITHUB_WORKSPACE}/docker/.env"
          if [ -f "$ENV_FILE" ]; then
            port=$(grep "^YASHIGANI_HTTPS_PORT=" "$ENV_FILE" 2>/dev/null | cut -d= -f2 | tr -d '[:space:]') || port=""
          fi
          port="${port:-443}"
          echo "Using port: ${port}"

          echo "Polling https://localhost:${port}/healthz for up to 300 s..."
          deadline=$(( $(date +%s) + 300 ))
          attempt=0
          while [ "$(date +%s)" -lt "$deadline" ]; do
            attempt=$(( attempt + 1 ))
            http_code=$(curl -sk -o /dev/null -w "%{http_code}" \
              --resolve "localhost:${port}:127.0.0.1" \
              --max-time 5 \
              "https://localhost:${port}/healthz" 2>/dev/null || echo "000")
            echo "  attempt ${attempt} (port ${port}): HTTP ${http_code}"
            if [ "$http_code" = "200" ]; then
              echo "SMOKE PASS: gateway /healthz returned 200 on port ${port}"
              exit 0
            fi
            # Midpoint: if 443 yielded nothing, also try 8443
            if [ "$attempt" = "15" ] && [ "$port" = "443" ]; then
              alt_code=$(curl -sk -o /dev/null -w "%{http_code}" \
                --resolve "localhost:8443:127.0.0.1" \
                --max-time 5 \
                "https://localhost:8443/healthz" 2>/dev/null || echo "000")
              if [ "$alt_code" = "200" ]; then
                echo "SMOKE PASS: gateway /healthz returned 200 on fallback port 8443"
                exit 0
              fi
              # Switch primary port if 8443 is responding at all
              if [ "$alt_code" != "000" ]; then
                echo "  switching primary port to 8443 (got ${alt_code} vs 000 on 443)"
                port="8443"
              fi
            fi
            sleep 10
          done
          echo "SMOKE FAIL: gateway /healthz did not return 200 within 300 s (last port: ${port})"
          exit 1

      # -----------------------------------------------------------------------
      # V232-CSCAN-01i: Run JS open-redirect unit tests
      # These tests are pure-static + Node.js subprocess — no running stack needed.
      # 26 tests call safeNext() via `node --input-type=module`; 10 static source
      # checks run without Node.  All 36 must PASS (not skip) now that Node 22 is
      # on PATH.
      # -----------------------------------------------------------------------
      - name: "Run JS open-redirect unit tests (V232-CSCAN-01d, V232-CSCAN-01i)"
        run: |
          pip install pytest --quiet
          python -m pytest src/tests/unit/test_v2232_open_redirect_cscan_01d.py \
            -v --tb=short 2>&1 | tee cscan01d-results.txt
          pytest_exit="${PIPESTATUS[0]}"
          # Fail if any test was skipped — a skip means Node is still missing
          if grep -q " skipped" cscan01d-results.txt; then
            echo "CSCAN-01i FAIL: tests still skipping — Node may not be on PATH"
            exit 1
          fi
          exit "${pytest_exit}"

      # -----------------------------------------------------------------------
      # Diagnostics on failure
      # -----------------------------------------------------------------------
      - name: "Dump container logs on failure"
        if: failure()
        env:
          YSG_RUNTIME: ${{ matrix.runtime }}
        run: |
          compose_cmd="docker compose"
          if [ "$YSG_RUNTIME" = "podman" ]; then
            if command -v podman-compose >/dev/null 2>&1; then
              compose_cmd="podman-compose"
            elif podman compose version >/dev/null 2>&1; then
              compose_cmd="podman compose"
            fi
          fi
          compose_file="${GITHUB_WORKSPACE}/docker/docker-compose.yml"
          [ -f "$compose_file" ] || compose_file="${HOME}/.yashigani/docker/docker-compose.yml"
          ${compose_cmd} -f "${compose_file}" logs --tail=50 2>/dev/null || true

      - name: "Upload install log"
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: install-log-${{ matrix.os-label }}-${{ matrix.runtime }}-${{ github.sha }}
          path: install.log
          retention-days: 14

# ---------------------------------------------------------------------------
# Mutation test: sabotage Dockerfile.gateway so compose build always fails
#
# Per the brief: "confirm workflow fails" when compose build breaks.
# Runs on Linux/Docker only (cheapest cell, sufficient to prove gate semantics).
#
# Sabotage strategy: insert `RUN false` as the first RUN instruction in
# Dockerfile.gateway. This causes `docker build` to fail unconditionally —
# unlike patching install.sh which can be bypassed by early-return paths
# (e.g. SKIP_PULL=true when an existing install is detected). The Dockerfile
# is the ground-truth build artifact; its failure always surfaces as a non-zero
# compose build exit code regardless of installer branching logic.
#
# The patch only modifies the local workspace copy; original repo is untouched.
# ---------------------------------------------------------------------------
  mutation:
    name: "mutation / compose-build-sabotage"
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.sha }}

      - name: "[linux/docker] Verify Docker daemon"
        run: |
          docker info
          docker compose version

      - name: "Inject Dockerfile sabotage"
        run: |
          # Verify the target exists
          head -5 docker/Dockerfile.gateway

          # Insert `RUN false` as the first executable instruction.
          # We use a Python one-liner to insert after the first FROM line,
          # which is more robust than sed across FROM variants (multi-stage, args).
          python3 - <<'PYEOF'
          with open("docker/Dockerfile.gateway", "r") as f:
              lines = f.readlines()
          patched = []
          inserted = False
          for line in lines:
              patched.append(line)
              if not inserted and line.strip().upper().startswith("FROM "):
                  patched.append("# MUTATION TEST: force build failure\n")
                  patched.append("RUN echo 'MUTATION: compose build sabotaged' && false\n")
                  inserted = True
          with open("docker/Dockerfile.gateway", "w") as f:
              f.writelines(patched)
          print(f"Inserted RUN false after first FROM (inserted={inserted})")
          PYEOF

          echo "--- Sabotage injected. First 10 lines of Dockerfile.gateway ---"
          head -10 docker/Dockerfile.gateway

      - name: "Run sabotaged installer (must fail)"
        id: sabotaged_run
        env:
          YSG_RUNTIME: docker
          CI: "true"
          # See DOCKER_DEFAULT_PLATFORM comment in smoke job: same arm64-pin workaround.
          # Without this the build fails on arch mismatch rather than our sabotage,
          # which is still a non-zero exit but we want the test to verify the specific
          # sabotage path fires, not just any failure.
          DOCKER_DEFAULT_PLATFORM: linux/amd64
        run: |
          chmod +x install.sh
          # Capture install exit code correctly.
          # MUST NOT pipe through tee here: `cmd | tee` tests tee's exit code (0),
          # not cmd's, causing a false "sabotage not detected" result even when
          # install.sh exits non-zero. Redirect stdout+stderr to file directly.
          set +e
          ./install.sh \
              --non-interactive \
              --deploy demo \
              --runtime docker \
              --skip-preflight \
              > mutation-install.log 2>&1
          install_exit=$?
          set -e
          echo "install exit code: $install_exit"
          if [ "$install_exit" -ne 0 ]; then
            echo "sabotage_detected=true" >> "$GITHUB_OUTPUT"
          else
            echo "sabotage_detected=false" >> "$GITHUB_OUTPUT"
          fi

      - name: "Assert mutation was detected (install must have exited non-zero)"
        run: |
          # Verify the log contains the expected sabotage marker
          echo "--- Checking mutation marker in log ---"
          grep -i "MUTATION\|compose build\|build.*fail\|Failed to build" mutation-install.log | head -5 || true

          if [ "${{ steps.sabotaged_run.outputs.sabotage_detected }}" != "true" ]; then
            echo "MUTATION FAIL: sabotaged install exited 0 — gate is not enforcing build failure"
            echo "This means the compose build step was bypassed or the error was swallowed."
            exit 1
          fi
          echo "MUTATION PASS: sabotaged install correctly exited non-zero"

      - name: "Upload mutation log"
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mutation-log-${{ github.sha }}
          path: mutation-install.log
          retention-days: 14

# ---------------------------------------------------------------------------
# Gate summary: all smoke cells + mutation must pass before merge
# ---------------------------------------------------------------------------
  smoke-gate:
    name: "smoke-gate (all cells)"
    needs: [smoke, mutation]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: "Check all jobs passed"
        run: |
          smoke_result="${{ needs.smoke.result }}"
          mutation_result="${{ needs.mutation.result }}"
          echo "smoke matrix: ${smoke_result}"
          echo "mutation:     ${mutation_result}"
          if [ "$smoke_result" != "success" ] || [ "$mutation_result" != "success" ]; then
            echo "GATE FAIL: one or more cells did not pass"
            exit 1
          fi
          echo "GATE PASS: all smoke cells and mutation test passed"
