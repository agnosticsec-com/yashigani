# Last updated: 2026-05-06 (Trivy: strip arm64 digest pins; pip-audit: pip 26.1 + CVE-2026-6357 fix)
# Previous: 2026-05-03 (V232-CSCAN-01h: Trivy SARIF digest annotation)
name: Security Scan

on:
  schedule:
    - cron: '0 3 * * *'
  push:
    branches: [main, "release/**", "v2.23.*", "2.23.x"]
  pull_request:
    branches: [main, "release/**", "v2.23.*", "2.23.x"]

permissions:
  security-events: write
  contents: read

jobs:
  trivy-scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      # V232-SMOKE-001 (pre-existing): Dockerfiles + docker-compose.yml pin arm64
      # digest SHAs generated on an M-chip Mac dev machine. On amd64 GH runners
      # those layers fail with "exec /bin/sh: exec format error" the moment
      # docker build tries to RUN anything in the FROM image. Mirrors the strip
      # step the install-smoke matrix uses (linux cells). Only affects the
      # workspace copy; committed files are untouched. Permanent fix: update
      # digest pins to amd64 or use multi-arch + explicit --platform directives.
      - name: "[ci] Strip arm64 digest pins for amd64 runner compatibility"
        run: |
          python3 - <<'PYEOF'
          import re, glob

          # Dockerfile FROM lines: FROM <image>@sha256:... [AS stage]
          for path in glob.glob("docker/Dockerfile*"):
              with open(path) as f:
                  content = f.read()
              patched = re.sub(
                  r'(^FROM\s+\S+)@sha256:[a-f0-9]{64}',
                  r'\1',
                  content,
                  flags=re.MULTILINE,
              )
              if patched != content:
                  with open(path, 'w') as f:
                      f.write(patched)
                  print(f"Dockerfile stripped: {path}")
              else:
                  print(f"Dockerfile no pins: {path}")
          PYEOF
      - name: Build gateway for scan
        run: docker build -f docker/Dockerfile.gateway -t yashigani/gateway:scan .
      - name: Trivy gateway
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: yashigani/gateway:scan
          scan-type: image
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
          format: sarif
          output: trivy-gateway.sarif
      - name: Build backoffice for scan
        run: docker build -f docker/Dockerfile.backoffice -t yashigani/backoffice:scan .
      - name: Trivy backoffice
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: yashigani/backoffice:scan
          scan-type: image
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
          format: sarif
          output: trivy-backoffice.sarif
      # P0-5b: distinct category per upload — GitHub rejects duplicate tool+job combinations.
      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-gateway.sarif
          category: trivy-gateway
      - name: Upload SARIF backoffice
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-backoffice.sarif
          category: trivy-backoffice
      - name: Push CVE metrics
        if: always()
        run: |
          pip install --quiet requests
          python scripts/parse_trivy.py --input trivy-gateway.sarif --image gateway \
            --pushgateway "${PUSHGATEWAY_URL:-http://localhost:9091}" --job yashigani-ci || true
          python scripts/parse_trivy.py --input trivy-backoffice.sarif --image backoffice \
            --pushgateway "${PUSHGATEWAY_URL:-http://localhost:9091}" --job yashigani-ci || true

  bandit-sast:
    name: Bandit SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "bandit[toml]>=1.7"
      - name: Run Bandit
        run: |
          # Write JSON artifact (JSON format always exits 0 — separate baseline check below).
          bandit -r src/yashigani/ -c pyproject.toml -f json -o bandit-report.json -ll || true
          # P0-5d: baseline check exits 1 on any net-new finding not in .bandit baseline.
          # .bandit baseline pins 12 triaged B310 findings with documented compensating
          # controls (validate_siem_url, _assert_safe_owui_url, EX-231-02/04 exceptions).
          # B324 SHA-1 findings closed by usedforsecurity=False in auth/password.py.
          bandit -r src/yashigani/ -c pyproject.toml -ll -b .bandit
      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30

  pip-audit:
    name: pip-audit Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          pip install --upgrade "pip==26.1"
          pip install -e "." "pip-audit>=2.7"
      - name: Run pip-audit
        # P0-5c: --fail-on-cvss was removed in pip-audit 2.x (flag never existed in
        # the OSS release; was confused with OWASP Dependency Check --failOnCVSS).
        # pip-audit now exits non-zero on any found vulnerability by default.
        # OSV provides broader CVE coverage than the default PyPI advisory database.
        #
        # pip pinned to 26.1: fixes GHSA-jp4c-xjxw-mgf9 (CVE-2026-6357, pip ≤26.0.x,
        # HIGH, incorrect archive extraction). pip 26.1 published 2026-04-26 on PyPI.
        # No suppression required for this CVE.
        #
        # Risk-accepted suppressions (each must reference the risk-register entry):
        # - GHSA-58qw-9mgm-455v (CVE-2026-3219, pip ≤26.0.1 + 26.1, MEDIUM, no patched
        #   version upstream as of 2026-05-06): pip is build-time only. Runtime images
        #   strip pip via `pip uninstall -y pip` in the Dockerfile final layer, so the
        #   CVE has no runtime exposure. pip-audit runs against the CI host venv (not
        #   the built image), so it still sees pip here.
        #   Risk-accept analysis: internal compliance archive
        #   (V232-CSCAN-01k, risk-accept dated 2026-05-03, residual risk
        #   NEGLIGIBLE post-hardening). Remove this ignore once upstream pip
        #   ships a patched release.
        run: |
          pip-audit \
            --vulnerability-service osv \
            --ignore-vuln GHSA-58qw-9mgm-455v \
            --format json \
            --output pip-audit-report.json
      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report
          path: pip-audit-report.json
          retention-days: 30

  opengrep-full:
    name: Opengrep Full Scan (scheduled only)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - name: Install Opengrep
        # Opengrep is not on PyPI. Install via binary release from GitHub.
        # Pinned to v1.20.0 (verified current 2026-05-02). ubuntu-latest = x86_64.
        run: |
          curl -sSfL "https://github.com/opengrep/opengrep/releases/download/v1.20.0/opengrep_manylinux_x86" \
            -o /usr/local/bin/opengrep
          chmod +x /usr/local/bin/opengrep
          opengrep --version
      - name: Run Opengrep full scan
        # LAURA-2026-04-29-005 (P0-9): Semgrep replaced with Opengrep per standing ban.
        # Four rule packs mirror the former semgrep-full config.
        # --sarif-output writes to file (verified v1.20.0 — --sarif alone writes stdout).
        # No --error flag: exit 0 on findings, exit 1 on scan infrastructure error only.
        run: |
          opengrep scan \
            --config p/python \
            --config p/owasp-top-ten \
            --config p/secrets \
            --config p/supply-chain \
            --sarif-output opengrep.sarif \
            src/yashigani/
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: opengrep.sarif
          # P0-5b: distinct category per upload — GitHub rejects duplicate tool+job combinations.
          category: opengrep-full

  opengrep-push:
    name: Opengrep Push Scan
    runs-on: ubuntu-latest
    # Runs on every push/PR (not schedule-only). Uses the local ACS ruleset from
    # opengrep-rules/ so that findings are deterministic and version-controlled.
    # schedule event reuses opengrep-full (broader p/* rulesets); this job is
    # the per-commit gate used by the release evidence archive.
    if: github.event_name != 'schedule'
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Install Opengrep
        # Opengrep is not on PyPI. Install via binary release from GitHub.
        # Pinned to v1.20.0 (verified current 2026-05-02). ubuntu-latest = x86_64.
        run: |
          curl -sSfL "https://github.com/opengrep/opengrep/releases/download/v1.20.0/opengrep_manylinux_x86" \
            -o /usr/local/bin/opengrep
          chmod +x /usr/local/bin/opengrep
          opengrep --version

      - name: Run Opengrep scan
        id: run_opengrep
        # opengrep scan exits 0 when findings exist (scan ran successfully with no error),
        # exits 1 on scan infrastructure error. We don't use --error so the step doesn't
        # abort before both output files are written.
        # Per feedback_opengrep_not_semgrep.md: opengrep, never semgrep.
        # --json-output / --sarif-output write to file (verified v1.20.0).
        # Single scan produces both outputs; two separate scans would double the work.
        run: |
          opengrep scan \
            --config opengrep-rules/ \
            --json-output opengrep-results.json \
            --sarif-output opengrep-push.sarif \
            src/yashigani/
          echo "done=true" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Build Opengrep verdict
        if: always()
        run: |
          python - <<'PYEOF'
          import json, os, sys

          json_path = "opengrep-results.json"
          try:
              data = json.load(open(json_path))
              results = data.get("results", [])
              errors  = data.get("errors", [])

              severity_counts = {"CRITICAL": 0, "HIGH": 0, "MEDIUM": 0, "LOW": 0, "INFO": 0}
              for r in results:
                  sev = r.get("extra", {}).get("severity", "INFO").upper()
                  sev = sev if sev in severity_counts else "INFO"
                  severity_counts[sev] += 1

              scan_error = len(errors) > 0
              blocking_findings = severity_counts["CRITICAL"] + severity_counts["HIGH"]
              # PASS = scan ran cleanly AND no CRITICAL/HIGH findings.
              # FAIL = scan error OR any CRITICAL/HIGH finding.
              # WARN = scan clean but MEDIUM/LOW findings present (non-blocking).
              if scan_error:
                  status = "FAIL"
              elif blocking_findings > 0:
                  status = "FAIL"
              else:
                  status = "PASS"
          except Exception as exc:
              severity_counts = {"CRITICAL": 0, "HIGH": 0, "MEDIUM": 0, "LOW": 0, "INFO": 0}
              errors = [str(exc)]
              blocking_findings = 1
              status = "FAIL"
              print(f"[ERROR] could not parse opengrep json: {exc}", file=sys.stderr)

          with open("opengrep-summary.txt", "w") as f:
              f.write(f"Opengrep: {status}\n")
              f.write(f"Critical: {severity_counts['CRITICAL']}\n")
              f.write(f"High: {severity_counts['HIGH']}\n")
              f.write(f"Medium: {severity_counts['MEDIUM']}\n")
              f.write(f"Low: {severity_counts['LOW']}\n")
              f.write(f"Info: {severity_counts['INFO']}\n")
              f.write(f"Total findings: {sum(severity_counts.values())}\n")
              f.write(f"Scan errors: {len(errors)}\n")
              f.write(f"Commit: {os.environ.get('GITHUB_SHA', 'unknown')}\n")
              f.write(f"Workflow: {os.environ.get('GITHUB_WORKFLOW', 'Security Scan')}\n")
              f.write(f"Run: {os.environ.get('GITHUB_RUN_ID', 'unknown')}\n")
          print(open("opengrep-summary.txt").read())
          PYEOF

      - name: Upload Opengrep artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: opengrep-${{ github.sha }}
          path: |
            opengrep-results.json
            opengrep-summary.txt
          retention-days: 90

      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: opengrep-push.sarif
          category: opengrep-push

      - name: Fail if blocking findings or scan error
        if: always()
        run: |
          STATUS=$(grep "^Opengrep:" opengrep-summary.txt | awk '{print $2}')
          if [ "$STATUS" != "PASS" ]; then
            echo "Opengrep gate FAIL — see opengrep-summary.txt artifact"
            exit 1
          fi

  owasp-dep-check:
    name: OWASP Dependency Check (scheduled only)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v6
      - uses: dependency-check/Dependency-Check_Action@main
        with:
          project: yashigani
          path: .
          format: JSON HTML
          args: --failOnCVSS 7 --enableRetired
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-dep-check-report
          path: reports/
          retention-days: 30
