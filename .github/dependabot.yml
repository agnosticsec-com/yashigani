version: 2

updates:
  # Python dependencies (pyproject.toml)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"
    reviewers:
      - "n0n0iz"
    target-branch: "main"

  # GitHub Actions — SHA-pinned with version comments (OWASP CI/CD C-7 / LAURA-2026-04-29-004)
  # Dependabot understands `uses: action@<sha> # vX.Y.Z` and will open PRs updating
  # both the SHA and the comment when a new release is tagged.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "ci"
      - "dependencies"
      - "security"
    reviewers:
      - "n0n0iz"
    target-branch: "2.23.x"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "docker"
      - "dependencies"
    reviewers:
      - "n0n0iz"
