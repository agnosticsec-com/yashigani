- id: YSG-RISK-055
  description: Intra-data bridge direct connect possible despite OPA agent_call_allowed being the designed inspection
    path. A compromised agent that deviates from its OPENAI_API_BASE config could reach a peer agent over the shared
    `data` Docker bridge by service name, bypassing the gateway intercept. PRIMARY control (OPA + gateway intercept)
    holds for well-behaved agents; this is a network-segmentation defence-in-depth gap, not a designed bypass.
  severity: medium
  controls_impacted:
  - OWASP Agentic AI Top 10 (Agent-to-agent unsafe communication)
  - ASVS V12.6
  - NIST SP 800-204C §4
  - CWE-668
  compensating_controls:
  - OPA agent_call_allowed enforced at gateway intercept (gateway/proxy.py:364-368)
  - policy/agents.rego principal.type=='agent' + target_agent.allowed_caller_groups + allowed_paths
  - Both langflow + letta have OPENAI_API_BASE=http://gateway:8081/v1 (calls go via gateway mesh port — BUG-V241-LANGFLOW-LETTA-BASE-URL
    fixed :8080→:8081)
  - cap_drop:ALL + read_only:true on agent containers (post-RCE pivot harder)
  - Caddy is the auth perimeter (feedback_caddy_is_the_auth_perimeter)
  status: mitigated
  accepted_by: Tiago
  accepted_at: 2026-05-23
  review_by: 2026-08-22
  closure_evidence:
  - rationale: 'Per-agent bridge isolation (Compose): langflow moves to langflow_isolated, letta to letta_isolated,
      openclaw to openclaw_isolated. Gateway joins all three isolated bridges for the registered-upstream dispatch
      path. Agents cannot resolve peer agents by DNS (Docker DNS is scoped to shared-network members only). L2 bridge
      segmentation severs direct TCP at the kernel level. Laura''s attack chain (langflow RCE → curl letta:8283
      → curl openclaw:18789) fails: DNS resolution returns NXDOMAIN; TCP connect times out. letta-pgbouncer straddles
      letta_isolated + data (documented exception: TLS sidecar only, cannot resolve langflow/openclaw). Chained-agent
      feature (@Scout→@Julietta→@qwen per CHANGELOG:735) preserved: calls route openclaw→gateway→letta via OPENAI_API_BASE,
      not direct bridge.'
    commit: 4d19647
    test: testing_runs/captain_ua10_isolation_20260524/
  - rationale: 'K8s NetworkPolicy (Helm): per-agent ingress policies (allow-langflow-ingress, allow-letta-ingress,
      allow-openclaw-ingress) restrict inbound to gateway-only using yashigani.io/bundle label selector. Per-agent
      egress policies restrict outbound to gateway:8080 + postgres:5432 (letta sidecar) only. Gateway egress policy
      extended with agent dispatch ports (7860/8283/18789). Agent-to-agent egress hits default-deny-egress. helm
      lint PASS, helm template renders all 6 new NetworkPolicy objects.'
    commit: 4d19647
    test: testing_runs/captain_ua10_isolation_20260524/helm-lint.log
  last_threat_model_review: 2026-05-24
  source_grep: internal-docs/yashigani/synthesis-v241-agent-infrastructure-council.md:36-47
  original_lu_status: accepted_known_residual
  ua10_accelerated: Tiago directive 2026-05-24 — accelerated from v2.24.2 to v2.24.1
- id: YSG-RISK-056
  description: 'DDoSProtector per-IP throttle defaults scale with licensed max_end_users to avoid blocking legitimate
    big-NAT / multi-user deployments. Formula: max(5000, max_end_users * 25); enterprise/academic = 100000. Window
    60s. Operator can always override via YASHIGANI_DDOS_PER_IP_LIMIT.'
  rationale: Tiago 2026-05-24 — "tie the threshold to the number of users so you don't block big deployments". Floor
    5000 protects free/community from demo abuse; multiplier 25x user-count gives headroom for corporate NAT topologies;
    enterprise sentinel 100000 + operator override for mature SOC setups.
  severity: low
  controls_impacted:
  - ASVS V11.1.4
  - CIS Docker Benchmark §5.10
  compensating_controls:
  - Caddy connection timeout + read/write deadlines (first-line)
  - Per-IP env var override available for tighter control (YASHIGANI_DDOS_PER_IP_LIMIT)
  - Rate limiter on /v1/* fires before DDoSProtector for authenticated requests
  - License-scaled default ensures big-NAT corporate deployments are not blocked
  status: accepted
  accepted_by: Tiago
  accepted_at: 2026-05-24
  review_by: 2026-08-22
  closure_evidence: null
  last_threat_model_review: 2026-05-24
- id: NICO-V241-001
  description: 'caddy_client.key (and caddy_internal_hmac) mounted into all agent containers via wholesale ./secrets:/run/secrets:ro
    bind-mount; agent container with RCE could read PKI material and forge SPIFFE identity for Caddy. Root cause:
    wholesale mount instead of per-key named-secrets.'
  severity: high
  controls_impacted:
  - ASVS V10.3.5
  - NIST SP 800-204C §4
  - CWE-732
  - CWE-290
  - FIPS 140-3 boundary coherence
  compensating_controls:
  - Agent containers run cap_drop:ALL
  - SPIFFE identity verified at Caddy edge; forge would need Caddy mTLS termination
  - v2.24.0 customer base single-tenant per install
  status: mitigated
  mitigated_by: Captain
  mitigated_at: 2026-05-24
  review_by: 2026-08-24
  closure_evidence:
