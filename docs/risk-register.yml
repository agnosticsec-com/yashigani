- id: YSG-RISK-057
  description: >-
    DESIGN-BY-PAIRING — ResponseInspectionPipeline and OPA are deliberately paired.
    Both default OFF (YASHIGANI_INSPECT_RESPONSES=false, OPA not deployed). Compliance
    customers opt-in to BOTH together. The "default OFF" decision is a product UX
    decision — facilitates adoption, prevents support-mail flood ("why is X blocked",
    "why slow"), keeps simple/demo/community deploys frictionless. When OPA is not
    deployed, the response-leg check is moot anyway: there is no policy engine to
    consume sensitivity classification, so producing it would be wasted CPU. When
    customer enables OPA, they enable inspection alongside it; the pairing then
    enforces sensitivity ceiling on responses (v1_routing.rego response_decision rule).
  severity: informational
  controls_impacted:
  - Product UX (adoption, support-load management)
  - Documented design pairing (not a control gap)
  compensating_controls: []
  status: accepted
  accepted_by: Tiago
  accepted_at: 2026-05-24
  review_by: 2026-08-22
  closure_evidence: null
  last_threat_model_review: 2026-05-24
  rationale: >-
    Tiago 2026-05-24 — "simple user experience first case"; "facilitates adoption and
    stops flood of support mails"; "if there is no OPA in place what is the point of
    closing for the sake of closing it?" OPA + inspection are deployed together by
    compliance customers (CMMC / ISO 27001 / SOC 2 surfaces), and BOTH ship as opt-in
    via env vars. Documenting here so future auditors see the design choice, not as
    a risk needing compensating controls.
  documentation_pointer: docs/operator-guide.md (opt-in pairing recipe)
  source: changelog-vs-reality-drift-audit-20260524.md finding #4


- id: YSG-RISK-058
  description: >-
    Per-user request rate limited at 100 RPS (200 burst) by default. On breach:
    HTTP 429 + Retry-After header + audit event USER_RATE_LIMIT_EXCEEDED +
    Prometheus metric yashigani_user_rate_limit_violations_total{user_id_hash="..."}
    + Grafana alert rule (config/grafana/alerts/user-rate-limit-burst.json) +
    Wazuh-routable admin alert via audit chain. Configurable via
    YASHIGANI_RATE_LIMIT_PER_USER_RPS env var. Distinct from DDoSProtector (per-IP
    coarse layer, YSG-RISK-056) — this is the per-authenticated-identity layer for
    finer-grained throttling and operator observability. user_id hashed (SHA-256[:16])
    in all metric labels and external-facing surfaces; full identifier stays in
    admin-only audit chain.
  severity: informational
  controls_impacted:
  - ASVS V11.1 (rate limiting)
  - OWASP API4:2023 (Unrestricted Resource Consumption)
  - SOC 2 CC6.1 (logical access security)
  compensating_controls: []
  status: accepted
  accepted_by: Tiago
  accepted_at: 2026-05-24
  review_by: 2026-08-22
  closure_evidence: null
  last_threat_model_review: 2026-05-24
  rationale: >-
    Tiago 2026-05-24 — "put 100 requests per second per user that is reasonable
    even for user with many agents" + "more than that throttle them down and alert
    the admins". 100 RPS chosen so users operating many agents simultaneously stay
    under threshold; sustained burst above triggers operator visibility via both
    Prometheus/Grafana (always available) and Wazuh audit-event route (for customers
    with configured SIEM alerting). Complements DDoSProtector per-IP layer
    (YSG-RISK-056) — these are two distinct layers addressing different threat vectors.


- id: YSG-RISK-059
  description: >-
    E2E test process gap — container-healthy checks accepted as proof of dispatch-working.
    Prior Yashigani E2E sweeps (Tier 1 MAX, 5 platforms) verified container health,
    agent registration in Redis, and /healthz reachability from inside the gateway
    container — but did NOT exercise the actual agent dispatch data path
    (POST /v1/chat/completions -> agent -> OPENAI_API_BASE -> gateway -> Ollama).
    This gap allowed BUG-V241-LANGFLOW-LETTA-BASE-URL to ship undetected: langflow
    and letta were configured with OPENAI_API_BASE: http://gateway:8080/v1 (mTLS-only
    port, ssl.CERT_REQUIRED) instead of http://gateway:8081/v1 (plain-HTTP mesh port).
    Every langflow and letta inference call failed at TLS handshake; all health/
    registration/reachability checks still passed. The blast radius of this class
    is any agent whose data path includes a callback to the gateway — a wrong port
    number, wrong bearer token, or wrong protocol in OPENAI_API_BASE will cause
    silent inference failure across the full lifetime of the agent bundle.
  severity: medium
  controls_impacted:
  - ASVS V11.1 (Application Logic — process gap allows functional regression)
  - OWASP API5:2023 (Broken Function-Level Auth — dispatch failure not surfaced)
  - SOC 2 CC4.1 (monitoring controls — functional gap not caught by health monitoring)
  - A1 amendment principle (absence of dispatch evidence = SKIP, not PASS)
  compensating_controls:
  - >-
    tests/contracts/test_agent_base_url_port.py (7 tests, static, run on every PR/push):
    asserts compose + Helm OPENAI_API_BASE values use port 8081 (mesh) not 8080 (mTLS).
    Regression gate for BUG-V241-LANGFLOW-LETTA-BASE-URL and the config-class of this bug.
  - >-
    src/tests/e2e/test_agent_dispatch_e2e.py (6 live tests, stack required):
    sends real POST /v1/chat/completions through each agent and asserts non-empty
    choices[0].message.content. Also verifies callback leg from inside agent container.
    Runs nightly via .github/workflows/agent-dispatch-e2e.yml.
  - >-
    docs/testing/e2e-coverage-guarantees.md: documents container-healthy vs dispatch-working
    distinction, A1 amendment principle, and instructions for adding coverage when new
    agent bundles are included.
  status: mitigated
  accepted_by: Ava
  accepted_at: 2026-05-24
  review_by: 2026-08-22
  closure_evidence:
  - commit: pending (this commit)
    rationale: >-
      tests/contracts/test_agent_base_url_port.py (7 tests, all PASS post-fix) +
      src/tests/e2e/test_agent_dispatch_e2e.py (6 live tests, SKIP without stack,
      PASS against fixed compose) + .github/workflows/agent-dispatch-e2e.yml CI gate +
      docs/testing/e2e-coverage-guarantees.md coverage doc.
  last_threat_model_review: 2026-05-24
  root_cause: >-
    New agent bundles (langflow, letta) added in v2.24.0 without dispatch-working
    E2E test. Per feedback_laura_review_new_third_party_components.md, new third-party
    components require a Laura threat model at inclusion time — this was absent.
    The inclusion brief did not cue the OPENAI_API_BASE port requirement (the
    feedback_brief_cue_adjacent_abstractions.md pattern). Result: both langflow and
    letta inherited the pre-BUG-2 port 8080 pattern from the compose template.
  fix_in_version: v2.24.1
  bug_reference: BUG-V241-LANGFLOW-LETTA-BASE-URL

- id: YSG-RISK-060
  description: >-
    openclaw + edge network + wholesale ./secrets:/run/secrets:ro mount compound.
    openclaw joins the `edge` network (internet-facing for Slack/Telegram webhook
    inbound on :18789). An openclaw RCE (e.g. via malicious webhook payload) combined
    with the wholesale secrets mount could allow an attacker to read caddy_internal_hmac
    from /run/secrets/caddy_internal_hmac, forge X-Caddy-Verified-Secret HMAC tokens,
    and bypass the entire Caddy auth perimeter at backoffice. Same root cause as
    NICO-V241-001 (wholesale ./secrets mount instead of per-key named-secrets) but
    ESCALATED severity due to openclaw's edge-network internet-facing adjacency.
    Attack chain: Slack/Telegram malicious webhook → openclaw RCE → read
    caddy_internal_hmac → forge X-Caddy-Verified-Secret → bypass Caddy
    forward_auth at backoffice → full admin access without credentials.
  severity: high
  controls_impacted:
  - ASVS V10.3.5
  - NIST SP 800-204C §4
  - CWE-732
  - CWE-290
  - CWE-284 (Improper Access Control)
  - OWASP A01:2021 (Broken Access Control)
  compensating_controls:
  - openclaw cap_drop:ALL
  - openclaw read_only:true rootfs
  - openclaw joins openclaw_isolated (internal:true) — no data-plane access
  - caddy_internal_hmac passed via .env (env var), not just file
