      gains NET_ADMIN capability. helm/yashigani/templates/networkpolicy-caddy-egress.yaml adds K8s NetworkPolicy
      restricting Caddy external egress to :443/:80 for ACME/OCSP. allow-caddy-egress gains grafana:3443 and prometheus:9090
