    OUTPUT rules in container entrypoint. Reduces post-Caddy-RCE attacker impact by blocking internet exfil, C2,
    and second-stage payload fetch. Probability of Caddy RCE itself unchanged (~10⁻³/yr per Laura cost-benefit LAURA-V241-RESIDUAL-001
    2026-05-25); this is impact reduction. Cross-version effective (KMS-independent). NET_ADMIN capability added
    to Caddy (was: NET_BIND_SERVICE only). NET_ADMIN allows iptables manipulation within the container''s network
    namespace; does not affect host networking. K8s NetworkPolicy (networkpolicy-caddy-egress.yaml) provides equivalent
    kernel-enforced egress restriction as defence-in-depth.'
