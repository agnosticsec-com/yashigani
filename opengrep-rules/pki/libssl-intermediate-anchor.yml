# Last updated: 2026-04-27T22:18:09+01:00
# Regression guard for v2.23.1 retro §5.E
#
# Rule: libssl-direct services (pgbouncer, Redis) must NOT use ca_intermediate.crt
# as their TLS trust anchor. OpenSSL verify-ca strict mode rejects non-self-signed
# anchors with error:0A000086. These services require ca_root.crt (self-signed).
#
# TLS library compatibility matrix:
#   Python ssl, Go crypto/tls, postgres libssl → KEEP_INTERMEDIATE (partial-chain support)
#   pgbouncer libssl, Redis libssl             → FLIP_TO_ROOT (no partial-chain)
#
# See memory: project_v231_pki_trust_pattern.md

rules:
  - id: pgbouncer-must-use-root-ca
    message: >
      pgbouncer uses libssl-direct which requires a self-signed trust anchor.
      ca_intermediate.crt is NOT self-signed and will fail with error:0A000086.
      Use ca_root.crt instead. See retro §5.E.
    severity: ERROR
    languages: [generic]
    paths:
      include:
        - "docker/pgbouncer/*.ini"
        - "helm/yashigani/files/pgbouncer.ini"
    patterns:
      - pattern: |
          $CA_KEY = /run/secrets/ca_intermediate.crt
    metadata:
      cwe: "CWE-295"
      category: "security"
      retro-item: "5.E"
      fix: "Replace ca_intermediate.crt with ca_root.crt for pgbouncer TLS trust anchor"

  - id: redis-must-use-root-ca-tls-ca-cert-file
    message: >
      redis-server --tls-ca-cert-file must reference ca_root.crt, not ca_intermediate.crt.
      Redis uses libssl-direct which requires a self-signed trust anchor.
      ca_intermediate.crt will fail with error:0A000086. See retro §5.E.
    severity: ERROR
    languages: [generic]
    paths:
      include:
        - "docker/docker-compose.yml"
        - "helm/yashigani/templates/redis.yaml"
        - "helm/yashigani/templates/budget-redis.yaml"
    patterns:
      - pattern: |
          --tls-ca-cert-file /run/secrets/ca_intermediate.crt
    metadata:
      cwe: "CWE-295"
      category: "security"
      retro-item: "5.E"
      fix: "Replace ca_intermediate.crt with ca_root.crt for redis-server TLS trust anchor"

  - id: redis-cli-must-use-root-ca-cacert
    message: >
      redis-cli --cacert must reference ca_root.crt, not ca_intermediate.crt.
      redis-cli uses libssl-direct; ca_intermediate.crt will fail with error:0A000086.
      See retro §5.E.
    severity: ERROR
    languages: [generic]
    paths:
      include:
        - "docker/docker-compose.yml"
        - "helm/yashigani/templates/redis.yaml"
        - "helm/yashigani/templates/budget-redis.yaml"
        - "helm/yashigani/templates/tests/test-redis-ping.yaml"
    patterns:
      - pattern: |
          --cacert /run/secrets/ca_intermediate.crt
    metadata:
      cwe: "CWE-295"
      category: "security"
      retro-item: "5.E"
      fix: "Replace ca_intermediate.crt with ca_root.crt for redis-cli --cacert trust anchor"
