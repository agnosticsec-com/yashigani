# airgap/manifest.yml — Yashigani v2.23.4 air-gap image manifest
# last-updated: 2026-05-09T00:00:00+01:00 (feat: air-gap mode + customer-built offline bundle #58)
#
# PURPOSE
# -------
# This manifest is the single source of truth for every container image required
# by a Yashigani installation.  It is used by two parties:
#
#   1. Customer (connected host): scripts/prepare-airgap-bundle.sh reads this
#      file to pull, verify, and save images into a tar.zst bundle.
#
#   2. Installer (isolated host): install.sh --air-gap reads this file to
#      verify that every image loaded from the bundle matches the pinned digest
#      before any service starts.
#
# SUPPLY-CHAIN NOTE
# -----------------
# The customer builds the bundle from their own connected host using their own
# registry credentials and their own supply-chain attestation tooling.
# Agnostic Security ships this manifest (kilobytes) only — no images, no blobs.
# Customers retain their own audit trail (e.g. SBOM generated from this manifest).
#
# DIGEST FORMAT
# -------------
# Every image is pinned as name:tag@sha256:digest following feedback_image_pinning.md.
# Digests are multi-arch manifest INDEX digests verified at v2.23.3 branch cut.
# If your registry mirrors use different digests, update this file before building.
#
# PROFILES
# --------
# core         — Required for every deployment (gateway, backoffice, supporting services)
# observability — Prometheus, Grafana, Loki, Promtail, Alertmanager, Jaeger, OTel
# agents       — Optional LangFlow, Letta, OpenClaw agent bundles
# openwebui    — Open WebUI browser-based chat interface (pull-unmodified, own licence)
# wazuh        — Wazuh SIEM (Manager + Indexer + Dashboard)
# spire        — Smallstep CA for internal service-to-service TLS (--with-internal-ca)
# full         — Alias that includes core + observability + openwebui

